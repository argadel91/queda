const { useState, useEffect, useCallback } = React;

// ── Colores ───────────────────────────────────────────────────────────────────
const A='#CDFF6C',BG='#0A0A0A',CARD='#141414',CARD2='#1C1C1C',BD='#262626',T='#F0EBE1',M='#555',M2='#888';

// ── Utils ─────────────────────────────────────────────────────────────────────
const genId=()=>Math.random().toString(36).substring(2,7).toUpperCase();
function getNextDays(n=21){return Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i+1);d.setHours(0,0,0,0);return d.toISOString().split('T')[0];});}
function fmtDate(iso){const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});}
function fmtShort(iso){const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});}
const HOURS=['18:00','19:00','20:00','21:00','22:00','23:00','00:00','01:00','02:00','03:00'];
const STOP_CATS=['🍽️ Restaurante','🍸 Bar / Copas','🎉 Discoteca','☕ Café','🎭 Actividad','🏠 Casa','🍕 Informal','🍺 Cervecería','📍 Otro'];
const WEATHER_CODES={0:'☀️ Despejado',1:'🌤️ Casi despejado',2:'⛅ Parcialmente nublado',3:'☁️ Nublado',45:'🌫️ Niebla',51:'🌦️ Llovizna',61:'🌧️ Lluvia ligera',63:'🌧️ Lluvia',65:'⛈️ Lluvia intensa',80:'🌧️ Chubascos',95:'⛈️ Tormenta'};

// ── Supabase: DB ──────────────────────────────────────────────────────────────
const configured = SUPABASE_URL !== 'PEGA_AQUI_TU_URL';

async function savePlan(plan) {
  if (!configured) { localStorage.setItem('planv3:'+plan.id, JSON.stringify(plan)); return; }
  await db.from('plans').upsert({ id: plan.id, data: plan });
}
async function loadPlan(id) {
  if (!configured) { try { const r=localStorage.getItem('planv3:'+id); return r?JSON.parse(r):null; } catch{return null;} }
  const { data } = await db.from('plans').select('data').eq('id', id).single();
  return data?.data || null;
}
async function saveResponse(planId, name, resp) {
  if (!configured) {
    const key='respv3:'+planId;
    const ex=JSON.parse(localStorage.getItem(key)||'[]');
    const fil=ex.filter(r=>r.name.toLowerCase()!==name.toLowerCase());
    localStorage.setItem(key, JSON.stringify([...fil, resp]));
    return;
  }
  // upsert por plan_id + name
  const { data: existing } = await db.from('responses').select('id').eq('plan_id', planId).eq('name', name).single();
  if (existing) {
    await db.from('responses').update({ data: resp }).eq('id', existing.id);
  } else {
    await db.from('responses').insert({ plan_id: planId, name, data: resp });
  }
}
async function loadResponses(planId) {
  if (!configured) { try { return JSON.parse(localStorage.getItem('respv3:'+planId)||'[]'); } catch{return[];} }
  const { data } = await db.from('responses').select('data').eq('plan_id', planId);
  return (data||[]).map(r=>r.data);
}

      <div style={{color:'#F59E0B',fontWeight:'700',marginBottom:'6px'}}>⚠️ Sin configurar — modo demo local</div>
      <div style={{color:M2}}>Los planes solo se guardan en este navegador. Para que funcione entre dispositivos, añade tu URL y clave de Supabase en las líneas 20–21 del código.</div>
    </div>
  );
}

// ── UI Base ───────────────────────────────────────────────────────────────────
const Btn=({children,onClick,variant='primary',disabled,full,sm,style={}})=>(
  <button onClick={onClick} disabled={disabled} style={{padding:sm?'8px 16px':'13px 22px',borderRadius:'12px',border:'none',cursor:disabled?'not-allowed':'pointer',fontSize:sm?'13px':'15px',fontWeight:'600',fontFamily:'inherit',transition:'opacity .15s',opacity:disabled?.3:1,width:full?'100%':'auto',...(variant==='primary'?{background:A,color:'#0A0A0A'}:{background:CARD,color:T,border:`1px solid ${BD}`}),...style}}>{children}</button>
);
const Inp=({value,onChange,placeholder,type='text',mono})=>(
  <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} type={type}
    style={{background:CARD,border:`1px solid ${BD}`,borderRadius:'10px',padding:'12px 14px',color:T,fontSize:mono?'20px':'14px',fontFamily:mono?'monospace':'inherit',outline:'none',width:'100%',letterSpacing:mono?'.15em':'normal',fontWeight:mono?'800':'400',boxSizing:'border-box'}}/>
);
const Txa=({value,onChange,placeholder,rows=3})=>(
  <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
    style={{background:CARD,border:`1px solid ${BD}`,borderRadius:'10px',padding:'12px 14px',color:T,fontSize:'14px',fontFamily:'inherit',outline:'none',width:'100%',resize:'vertical',boxSizing:'border-box',lineHeight:1.6}}/>
);
const Lbl=({children})=><div style={{fontSize:'11px',color:M,fontWeight:'600',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:'8px'}}>{children}</div>;
const Tag=({children,color=A})=><span style={{fontSize:'11px',fontWeight:'700',padding:'3px 10px',borderRadius:'20px',background:`${color}18`,color,border:`1px solid ${color}35`}}>{children}</span>;
const Card=({children,style={},accent})=><div style={{background:CARD,border:`1px solid ${accent?A+'40':BD}`,borderRadius:'14px',padding:'16px',marginBottom:'10px',...style}}>{children}</div>;
const Div=()=><div style={{height:'1px',background:BD,margin:'20px 0'}}/>;
const Back=({onClick})=><button onClick={onClick} style={{background:'none',border:'none',color:M2,cursor:'pointer',fontSize:'14px',padding:'0 0 22px',fontFamily:'inherit',display:'block'}}>← Volver</button>;
const steps=['Básico','Fechas','Ruta','Extras'];
const Stepper=({current})=>(
  <div style={{display:'flex',gap:'6px',marginBottom:'28px'}}>
    {steps.map((s,i)=>(
      <div key={s} style={{flex:1,textAlign:'center'}}>
        <div style={{height:'3px',borderRadius:'2px',background:i<=current?A:BD,marginBottom:'6px',transition:'background .3s'}}/>
        <span style={{fontSize:'11px',color:i===current?A:M,fontWeight:i===current?'700':'400'}}>{s}</span>
      </div>
    ))}
  </div>
);

// ── Clima ─────────────────────────────────────────────────────────────────────
function WeatherWidget({city,date}){
  const [w,setW]=useState(null);const [loading,setL]=useState(false);
  useEffect(()=>{
    if(!city||!date)return;setL(true);setW(null);
    (async()=>{
      try{
        const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=es`).then(r=>r.json());
        if(!geo.results?.length){setL(false);return;}
        const{latitude:lat,longitude:lon}=geo.results[0];
        const wd=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe/Madrid&start_date=${date}&end_date=${date}`).then(r=>r.json());
        if(wd.daily)setW({code:wd.daily.weathercode[0],max:Math.round(wd.daily.temperature_2m_max[0]),min:Math.round(wd.daily.temperature_2m_min[0]),rain:wd.daily.precipitation_probability_max[0]});
      }catch{}finally{setL(false);}
    })();
  },[city,date]);
  if(!city||!date)return null;
  if(loading)return<div style={{fontSize:'12px',color:M,padding:'12px 0'}}>Consultando el tiempo...</div>;
  if(!w)return<div style={{fontSize:'12px',color:M,padding:'12px 0'}}>No se encontró la ciudad.</div>;
  return(
    <div style={{background:`${A}0A`,border:`1px solid ${A}25`,borderRadius:'12px',padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div><div style={{fontSize:'20px',marginBottom:'2px'}}>{WEATHER_CODES[w.code]||'🌡️'}</div><div style={{fontSize:'12px',color:M2}}>Lluvia: {w.rain}%</div></div>
      <div style={{textAlign:'right'}}><div style={{fontSize:'28px',fontWeight:'800',color:A}}>{w.max}°</div><div style={{fontSize:'13px',color:M2}}>{w.min}° mín</div></div>
    </div>
  );
}

// ── Home ──────────────────────────────────────────────────────────────────────
function HomeScreen({onCreate,onJoin}){
  const [code,setCode]=useState('');const [err,setErr]=useState('');const [loading,setL]=useState(false);
  const handleJoin=async()=>{setErr('');setL(true);const ok=await onJoin(code.trim().toUpperCase());setL(false);if(!ok)setErr('Código no encontrado. ¿Está bien escrito?');};
  return(
    <div style={{padding:'52px 24px 40px',maxWidth:'420px',margin:'0 auto'}}>
      {!configured&&<ConfigWarning/>}
      <div style={{marginBottom:'52px'}}>
        <Tag>QUEDA · Planes sin caos</Tag>
        <h1 style={{fontFamily:"'Syne',serif",fontSize:'48px',fontWeight:'800',color:T,margin:'20px 0 16px',lineHeight:1}}>Planes sin<br/><span style={{color:A}}>caos.</span></h1>
        <p style={{color:M2,fontSize:'15px',lineHeight:1.7}}>Fechas, horarios, ruta, presupuesto, regalo, transporte y clima — todo en un código.</p>
      </div>
      <Btn onClick={onCreate} full style={{padding:'16px',fontSize:'16px',marginBottom:'16px'}}>Crear un plan →</Btn>
      <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'14px'}}>
        <div style={{flex:1,height:'1px',background:BD}}/><span style={{color:M,fontSize:'11px',fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase'}}>o únete</span><div style={{flex:1,height:'1px',background:BD}}/>
      </div>
      <div style={{display:'flex',gap:'8px'}}>
        <Inp value={code} onChange={v=>setCode(v.toUpperCase())} placeholder="Código del plan" mono/>
        <Btn onClick={handleJoin} variant="secondary" disabled={code.length<4||loading} style={{flexShrink:0}}>{loading?'..':'Ir'}</Btn>
      </div>
      {err&&<div style={{color:'#ff6b6b',fontSize:'13px',marginTop:'10px'}}>{err}</div>}
      <div style={{marginTop:'48px',padding:'20px',background:CARD,border:`1px solid ${BD}`,borderRadius:'16px'}}>
        <div style={{fontSize:'11px',color:M,fontWeight:'700',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:'14px'}}>Cómo funciona</div>
        {[['1.','Crea un plan con fechas y horarios posibles'],['2.','Comparte el código con tu grupo'],['3.','Cada uno marca cuándo puede desde su móvil'],['4.','Ves la mejor fecha, ruta, clima y más']].map(([n,tx])=>(
          <div key={n} style={{display:'flex',gap:'12px',marginBottom:'10px',fontSize:'14px'}}>
            <span style={{color:A,fontWeight:'700',minWidth:'18px'}}>{n}</span><span style={{color:T}}>{tx}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Create ────────────────────────────────────────────────────────────────────
function CreateScreen({onBack,onCreated}){
  const allDays=getNextDays(21);
  const [step,setStep]=useState(0);
  const [name,setName]=useState('');const [desc,setDesc]=useState('');const [org,setOrg]=useState('');
  const [selD,setSelD]=useState([]);const [selH,setSelH]=useState({});
  const [stops,setStops]=useState([{id:1,name:'',cat:STOP_CATS[0],address:'',cost:'',link:''}]);
  const [city,setCity]=useState('');
  const [gift,setGift]=useState({enabled:false,name:'',link:'',price:''});
  const [bring,setBring]=useState(['']);
  const [saving,setSaving]=useState(false);

  const togD=d=>setSelD(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d]);
  const togH=(d,h)=>setSelH(p=>({...p,[d]:(p[d]||[]).includes(h)?(p[d]||[]).filter(x=>x!==h):[...(p[d]||[]),h]}));
  const addStop=()=>setStops(p=>[...p,{id:Date.now(),name:'',cat:STOP_CATS[0],address:'',cost:'',link:''}]);
  const updStop=(id,k,v)=>setStops(p=>p.map(s=>s.id===id?{...s,[k]:v}:s));
  const remStop=id=>setStops(p=>p.filter(s=>s.id!==id));
  const budget=stops.reduce((s,x)=>s+(parseFloat(x.cost)||0),0);

  const create=async()=>{
    setSaving(true);
    const plan={id:genId(),name:name.trim(),desc:desc.trim(),organizer:org.trim(),dates:selD.sort(),hours:selH,stops,city,gift:gift.enabled?gift:null,bring:bring.filter(Boolean),createdAt:new Date().toISOString()};
    await savePlan(plan);
    onCreated(plan);
  };

  return(
    <div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
      <Back onClick={step===0?onBack:()=>setStep(s=>s-1)}/>
      <Stepper current={step}/>

      {step===0&&<>
        <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:T,marginBottom:'24px'}}>Lo básico</h2>
        <div style={{marginBottom:'14px'}}><Lbl>Nombre del plan</Lbl><Inp value={name} onChange={setName} placeholder="Cumpleaños de Luis, Cena de equipo..."/></div>
        <div style={{marginBottom:'14px'}}><Lbl>Descripción (opcional)</Lbl><Txa value={desc} onChange={setDesc} placeholder="Detalles, dress code, qué se va a hacer..."/></div>
        <div style={{marginBottom:'24px'}}><Lbl>Tu nombre</Lbl><Inp value={org} onChange={setOrg} placeholder="¿Cómo te llamas?"/></div>
        <Btn onClick={()=>setStep(1)} disabled={!name.trim()||!org.trim()} full style={{padding:'15px'}}>Continuar →</Btn>
      </>}

      {step===1&&<>
        <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:T,marginBottom:'6px'}}>Fechas y horarios</h2>
        <p style={{color:M2,fontSize:'13px',marginBottom:'20px'}}>Selecciona las fechas posibles y los horarios de cada una.</p>
        {allDays.slice(0,14).map(d=>{const sel=selD.includes(d);return(
          <div key={d} style={{marginBottom:'8px'}}>
            <div onClick={()=>togD(d)} style={{padding:'12px 14px',borderRadius:'10px',border:`1px solid ${sel?A:BD}`,background:sel?`${A}12`:CARD,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',transition:'all .12s'}}>
              <span style={{fontSize:'14px',color:sel?A:T,fontWeight:sel?'600':'400',textTransform:'capitalize'}}>{fmtShort(d)}</span>
              <div style={{width:'22px',height:'22px',borderRadius:'50%',border:`2px solid ${sel?A:BD}`,background:sel?A:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',color:'#0A0A0A',fontWeight:'800'}}>{sel?'✓':''}</div>
            </div>
            {sel&&<div style={{padding:'10px 14px',background:CARD2,borderRadius:'0 0 10px 10px',border:`1px solid ${BD}`,borderTop:'none'}}>
              <div style={{fontSize:'11px',color:M,fontWeight:'700',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:'7px'}}>Horarios posibles</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
                {HOURS.map(h=>{const on=(selH[d]||[]).includes(h);return<span key={h} onClick={()=>togH(d,h)} style={{fontSize:'12px',padding:'5px 11px',borderRadius:'20px',border:`1px solid ${on?A:BD}`,background:on?`${A}20`:'transparent',color:on?A:M2,cursor:'pointer',fontWeight:on?'700':'400'}}>{h}</span>;})}
              </div>
            </div>}
          </div>
        );})}
        <div style={{marginTop:'20px'}}><Btn onClick={()=>setStep(2)} disabled={selD.length<1} full style={{padding:'15px'}}>Continuar →</Btn></div>
      </>}

      {step===2&&<>
        <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:T,marginBottom:'6px'}}>Ruta y presupuesto</h2>
        <p style={{color:M2,fontSize:'13px',marginBottom:'18px'}}>Añade los sitios en orden. Coste estimado por persona.</p>
        <div style={{marginBottom:'14px'}}><Lbl>Ciudad (para el clima)</Lbl><Inp value={city} onChange={setCity} placeholder="Madrid, Barcelona, Sevilla..."/></div>
        <Div/>
        {stops.map((s,i)=>(
          <div key={s.id} style={{background:CARD2,border:`1px solid ${BD}`,borderRadius:'14px',padding:'16px',marginBottom:'10px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <div style={{width:'24px',height:'24px',borderRadius:'50%',background:`${A}25`,border:`1px solid ${A}50`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:'800',color:A}}>{i+1}</div>
                <span style={{fontSize:'12px',color:M2,fontWeight:'600',letterSpacing:'.06em',textTransform:'uppercase'}}>Parada {i+1}</span>
              </div>
              {stops.length>1&&<button onClick={()=>remStop(s.id)} style={{background:'none',border:'none',color:M,cursor:'pointer',fontSize:'18px'}}>×</button>}
            </div>
            <select value={s.cat} onChange={e=>updStop(s.id,'cat',e.target.value)} style={{background:CARD,border:`1px solid ${BD}`,color:T,fontSize:'13px',padding:'9px 12px',borderRadius:'8px',width:'100%',fontFamily:'inherit',marginBottom:'8px'}}>
              {STOP_CATS.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'8px'}}>
              <input value={s.name} onChange={e=>updStop(s.id,'name',e.target.value)} placeholder="Nombre del lugar" style={{background:CARD,border:`1px solid ${BD}`,borderRadius:'8px',padding:'9px 12px',color:T,fontSize:'13px',fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}/>
              <input value={s.address} onChange={e=>updStop(s.id,'address',e.target.value)} placeholder="Dirección" style={{background:CARD,border:`1px solid ${BD}`,borderRadius:'8px',padding:'9px 12px',color:T,fontSize:'13px',fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
              <input value={s.cost} onChange={e=>updStop(s.id,'cost',e.target.value)} type="number" placeholder="€ por persona" style={{background:CARD,border:`1px solid ${BD}`,borderRadius:'8px',padding:'9px 12px',color:T,fontSize:'13px',fontFamily:'inherit',outline:'none',width:'100%',boxSizing:'border-box'}}/>
              <input value={s.link} onChange={e=>updStop(s.id,'link',e.target.value)} placeholder="Link reserva/web" style={{background:CARD,border:`1px solid ${BD}`,borderRadius:'8px',padding:'9px 12px',color:T,fontSize:'13px',fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}/>
            </div>
          </div>
        ))}
        <Btn onClick={addStop} variant="secondary" full sm style={{marginBottom:'14px'}}>+ Añadir parada</Btn>
        {budget>0&&<div style={{background:`${A}0D`,border:`1px solid ${A}30`,borderRadius:'12px',padding:'14px 16px',marginBottom:'14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:M2,fontSize:'14px'}}>Estimado por persona</span><span style={{color:A,fontSize:'22px',fontWeight:'800'}}>{budget.toFixed(0)}€</span></div>}
        <Btn onClick={()=>setStep(3)} full style={{padding:'15px'}}>Continuar →</Btn>
      </>}

      {step===3&&<>
        <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:T,marginBottom:'6px'}}>Extras</h2>
        <p style={{color:M2,fontSize:'13px',marginBottom:'20px'}}>Regalo colectivo y qué llevar.</p>
        <div style={{marginBottom:'22px'}}>

              {bring.length>1&&<button onClick={()=>setBring(p=>p.filter((_,j)=>j!==i))} style={{background:'none',border:`1px solid ${BD}`,color:M,cursor:'pointer',fontSize:'16px',borderRadius:'8px',width:'36px'}}>×</button>}

      </>}

// ── Respond ───────────────────────────────────────────────────────────────────
function RespondScreen({plan,onBack,onDone}){
  const [name,setName]=useState('');const [avail,setAvail]=useState({});const [hourPref,setHourPref]=useState({});const [how,setHow]=useState('');const [saving,setSaving]=useState(false);const [done,setDone]=useState(false);
  const togD=d=>setAvail(p=>({...p,[d]:!p[d]}));
  const togH=(d,h)=>setHourPref(p=>({...p,[d]:(p[d]||[]).includes(h)?(p[d]||[]).filter(x=>x!==h):[...(p[d]||[]),h]}));
  const submit=async()=>{
    if(!name.trim())return;setSaving(true);
    const resp={name:name.trim(),avail,hourPref,how,at:new Date().toISOString()};
    await saveResponse(plan.id,name.trim(),resp);
    setSaving(false);setDone(true);setTimeout(onDone,1800);
  };
  const totalBudget=plan.stops.reduce((s,p2)=>s+(parseFloat(p2.cost)||0),0);
  const giftPer=plan.gift?.price?parseFloat(plan.gift.price):0;
  if(done)return(<div style={{padding:'80px 24px',maxWidth:'420px',margin:'0 auto',textAlign:'center'}}><div style={{fontSize:'64px',marginBottom:'20px'}}>✅</div><h2 style={{fontFamily:"'Syne',serif",fontSize:'28px',fontWeight:'800',color:A,marginBottom:'10px'}}>¡Guardado!</h2><p style={{color:M2}}>Tu disponibilidad está registrada.</p></div>);
  return(
    <div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
      <Back onClick={onBack}/>
      <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:T,marginBottom:'4px'}}>{plan.name}</h2>
      <div style={{fontSize:'13px',color:M2,marginBottom:'8px'}}>Organizado por {plan.organizer}</div>
      {plan.desc&&<p style={{fontSize:'14px',color:T,lineHeight:1.7,marginBottom:'16px',padding:'12px 14px',background:CARD,border:`1px solid ${BD}`,borderRadius:'10px'}}>{plan.desc}</p>}
      {totalBudget>0&&<div style={{background:`${A}0D`,border:`1px solid ${A}30`,borderRadius:'10px',padding:'12px 16px',marginBottom:'16px',display:'flex',justifyContent:'space-between'}}><span style={{color:M2,fontSize:'13px'}}>Presupuesto estimado</span><span style={{color:A,fontWeight:'700'}}>{(totalBudget+giftPer).toFixed(0)}€/persona</span></div>}
      <Div/>
      <div style={{marginBottom:'16px'}}><Lbl>Tu nombre</Lbl><Inp value={name} onChange={setName} placeholder="¿Cómo te llamas?"/></div>
      <div style={{marginBottom:'20px'}}>
        <Lbl>¿Cuándo puedes?</Lbl>
        {plan.dates.map(d=>{const on=avail[d];const hs=plan.hours?.[d]||[];return(
          <div key={d} style={{marginBottom:'8px'}}>
            <div onClick={()=>togD(d)} style={{padding:'12px 14px',borderRadius:'10px',border:`1px solid ${on?A:BD}`,background:on?`${A}12`:CARD,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',transition:'all .12s'}}>
              <span style={{fontSize:'14px',color:on?A:T,fontWeight:on?'600':'400',textTransform:'capitalize'}}>{fmtDate(d)}</span>
              <div style={{width:'22px',height:'22px',borderRadius:'50%',border:`2px solid ${on?A:BD}`,background:on?A:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',color:'#0A0A0A',fontWeight:'800'}}>{on?'✓':''}</div>
            </div>
            {on&&hs.length>0&&<div style={{padding:'10px 14px',background:CARD2,borderRadius:'0 0 10px 10px',border:`1px solid ${BD}`,borderTop:'none'}}>
              <div style={{fontSize:'11px',color:M,fontWeight:'700',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:'7px'}}>¿A qué hora te viene bien?</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>
                {hs.map(h=>{const on2=(hourPref[d]||[]).includes(h);return<span key={h} onClick={()=>togH(d,h)} style={{fontSize:'12px',padding:'4px 11px',borderRadius:'20px',border:`1px solid ${on2?A:BD}`,background:on2?`${A}20`:'transparent',color:on2?A:M2,cursor:'pointer',fontWeight:on2?'700':'400'}}>{h}</span>;})}
              </div>
            </div>}
          </div>
        );})}
      </div>
      <div style={{marginBottom:'20px'}}>
        <Lbl>¿Cómo llegas? (opcional)</Lbl>
        <select value={how} onChange={e=>setHow(e.target.value)} style={{background:CARD,border:`1px solid ${BD}`,color:how?T:M,fontSize:'14px',padding:'12px 14px',borderRadius:'10px',width:'100%',fontFamily:'inherit'}}>
          <option value=''>Selecciona una opción...</option>
          <option value='coche'>🚗 En coche</option>
          <option value='transporte'>🚇 Transporte público</option>
          <option value='uber'>🚕 Taxi / Uber</option>
          <option value='andando'>🚶 Andando</option>
          <option value='bici'>🚲 Bici / Patinete</option>
        </select>
      </div>
      <Btn onClick={submit} disabled={!name.trim()||saving} full style={{padding:'15px',fontSize:'15px'}}>{saving?'Guardando...':'Confirmar disponibilidad →'}</Btn>
    </div>
  );
}

// ── Results ───────────────────────────────────────────────────────────────────

  const [tab,setTab]=useState('disponibilidad');const [responses,setResponses]=useState([]);const [loading,setL]=useState(true);
  const [payModal,setPayModal]=useState(false);const [payMethod,setPayMethod]=useState('');const [payDone,setPayDone]=useState(false);
  const refresh=useCallback(async()=>{setL(true);setResponses(await loadResponses(plan.id));setL(false);},[plan.id]);
  useEffect(()=>{refresh();},[refresh]);
  const total=responses.length;
  const counts=plan.dates.reduce((acc,d)=>{acc[d]=responses.filter(r=>r.avail[d]).length;return acc;},{});
  const maxCount=Math.max(...Object.values(counts),1);
  const bestDate=total>0?plan.dates.reduce((best,d)=>counts[d]>counts[best]?d:best,plan.dates[0]):null;
  const totalBudget=plan.stops.reduce((s,p2)=>s+(parseFloat(p2.cost)||0),0);
  const giftPer=plan.gift?.price?parseFloat(plan.gift.price):0;
  const firstStop=plan.stops.find(s=>s.address||s.name);
  const tabs=['disponibilidad','ruta','extras','clima','transporte'];
  const tabLabels={disponibilidad:'👥 Quién puede',ruta:'📍 Ruta',extras:'🎁 Extras',clima:'🌤️ Clima',transporte:'🚗 Transporte'};
  return(
    <div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>

      </div>
      <div style={{fontSize:'13px',color:M2,marginBottom:'16px'}}>{total} respuesta{total!==1?'s':''} · <span style={{color:A,fontWeight:'700',letterSpacing:'.1em'}}>{plan.id}</span></div>
      <div style={{display:'flex',gap:'6px',overflowX:'auto',paddingBottom:'4px',marginBottom:'20px'}}>
        {tabs.map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:'7px 12px',borderRadius:'20px',border:`1px solid ${tab===t?A+'60':BD}`,background:tab===t?`${A}15`:CARD,color:tab===t?A:M2,fontSize:'12px',fontWeight:tab===t?'700':'400',cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',flexShrink:0,transition:'all .15s'}}>{tabLabels[t]}</button>)}
      </div>

      {loading&&<div style={{textAlign:'center',color:M,padding:'48px'}}>Cargando...</div>}

      {!loading&&tab==='disponibilidad'&&(total===0?(
        <Card style={{textAlign:'center',padding:'32px'}}><div style={{fontSize:'36px',marginBottom:'12px'}}>⏳</div><div style={{color:T,fontWeight:'500',marginBottom:'6px'}}>Nadie ha respondido todavía</div><div style={{color:M2,fontSize:'13px'}}>Comparte el código <span style={{color:A,fontWeight:'700'}}>{plan.id}</span></div></Card>
      ):(
        <>
          {bestDate&&counts[bestDate]>0&&<div style={{background:`${A}12`,border:`1px solid ${A}35`,borderRadius:'14px',padding:'16px',marginBottom:'18px',display:'flex',gap:'14px',alignItems:'center'}}>
            <div style={{fontSize:'28px'}}>⭐</div>
            <div>
              <div style={{fontSize:'11px',color:A,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'2px'}}>Mejor opción</div>
              <div style={{fontSize:'15px',color:T,fontWeight:'600',textTransform:'capitalize'}}>{fmtDate(bestDate)}</div>
              {plan.hours?.[bestDate]?.length>0&&<div style={{fontSize:'12px',color:M2}}>Horas: {plan.hours[bestDate].join(', ')}</div>}

          </div>}
          <div style={{marginBottom:'20px'}}>
            {plan.dates.map(d=>{const n=counts[d];const pct=(n/maxCount)*100;const best=d===bestDate&&n>0;return(

                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'5px'}}>
                  <span style={{fontSize:'13px',color:best?A:T,fontWeight:best?'700':'400',textTransform:'capitalize'}}>{fmtShort(d)}{best?' ⭐':''}</span>
                  <span style={{fontSize:'13px',color:best?A:M2,fontWeight:best?'700':'400'}}>{n}/{total}</span>
                </div>
                <div style={{height:'7px',background:BD,borderRadius:'4px',overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,background:best?A:'#333',borderRadius:'4px',transition:'width .5s'}}/></div>

              </div>
            ))}
          </Card>
        </>
      ))}

      {!loading&&tab==='ruta'&&<>

            <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>

              {i<plan.stops.length-1&&<div style={{width:'2px',flex:1,background:BD,margin:'4px 0'}}/>}
            </div>
            <Card style={{flex:1,marginBottom:0}}>
              <div style={{fontSize:'11px',color:M2,marginBottom:'4px'}}>{s.cat}</div>
              <div style={{fontSize:'15px',color:T,fontWeight:'600',marginBottom:'4px'}}>{s.name||'Sin nombre'}</div>
              {s.address&&<div style={{fontSize:'12px',color:M2,marginBottom:'6px'}}>📍 {s.address}</div>}

                </div>

        {totalBudget>0&&<><Div/>

          {giftPer>0&&<div style={{display:'flex',justifyContent:'space-between',padding:'12px 16px',background:CARD,border:`1px solid ${BD}`,borderRadius:'12px',marginBottom:'10px'}}><span style={{color:M2,fontSize:'14px'}}>+ regalo</span><span style={{color:T,fontWeight:'600'}}>{giftPer.toFixed(0)}€/persona</span></div>}
          <div style={{display:'flex',justifyContent:'space-between',padding:'14px 16px',background:CARD2,border:`1px solid ${BD}`,borderRadius:'12px'}}><span style={{color:T,fontWeight:'700'}}>Total</span><span style={{color:A,fontSize:'18px',fontWeight:'800'}}>{(totalBudget+giftPer).toFixed(0)}€</span></div>
        </>}

            <div style={{fontSize:'18px',color:T,fontWeight:'600',marginBottom:'8px'}}>{plan.gift.name||'Sin nombre'}</div>

            <Btn onClick={()=>{setPayModal(true);setPayDone(false);setPayMethod('');}} full style={{padding:'13px'}}>💳 Pagar mi parte</Btn>

          <Card style={{marginBottom:'12px'}}><div style={{fontSize:'11px',color:M2,fontWeight:'700',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:'8px'}}>Destino</div><div style={{fontSize:'15px',color:T,fontWeight:'600'}}>{firstStop.name}</div>{firstStop.address&&<div style={{fontSize:'13px',color:M2}}>{firstStop.address}</div>}</Card>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'20px'}}>
            {[{name:'Google Maps',icon:'🗺️',url:`https://maps.google.com/?q=${encodeURIComponent((firstStop.name||'')+(firstStop.address?' '+firstStop.address:''))}`},{name:'Uber',icon:'⚫',url:'https://m.uber.com/'},{name:'Cabify',icon:'🟣',url:'https://cabify.com/'},{name:'Renfe',icon:'🚆',url:'https://www.renfe.com/'},{name:'Metro/EMT',icon:'🚇',url:'https://www.emt.madrid.es/'},{name:'Trainline',icon:'🎫',url:'https://www.thetrainline.com/'}].map(tx=>(
              <a key={tx.name} href={tx.url} target="_blank" rel="noreferrer" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'8px',padding:'18px 10px',background:CARD,border:`1px solid ${BD}`,borderRadius:'14px',textDecoration:'none'}}>
                <div style={{fontSize:'28px'}}>{tx.icon}</div><div style={{fontSize:'13px',color:T,fontWeight:'600',textAlign:'center'}}>{tx.name}</div>
              </a>
            ))}
          </div>
          {responses.filter(r=>r.how).length>0&&<><Lbl>¿Cómo va cada uno?</Lbl>{responses.filter(r=>r.how).map((r,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${BD}`,fontSize:'14px'}}><span style={{color:T}}>{r.name}</span><span style={{color:M2}}>{r.how==='coche'?'🚗 Coche':r.how==='transporte'?'🚇 Transporte':r.how==='uber'?'🚕 Taxi':r.how==='andando'?'🚶 Andando':'🚲 Bici'}</span></div>)}</>}
        </>:<Card style={{textAlign:'center',padding:'28px'}}><div style={{fontSize:'32px',marginBottom:'10px'}}>📍</div><div style={{color:M2,fontSize:'14px'}}>Añade paradas a la ruta para ver las opciones de transporte</div></Card>}
      </>}

      {payModal&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.85)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:100}} onClick={e=>{if(e.target===e.currentTarget)setPayModal(false);}}>
        <div style={{background:'#141414',border:`1px solid ${BD}`,borderRadius:'24px 24px 0 0',padding:'28px 24px 40px',width:'100%',maxWidth:'460px'}}>
          {payDone?(<div style={{textAlign:'center',padding:'20px 0'}}><div style={{fontSize:'52px',marginBottom:'14px'}}>✅</div><div style={{fontSize:'20px',fontWeight:'700',color:A,marginBottom:'8px'}}>¡Pago registrado!</div><div style={{fontSize:'14px',color:M2,marginBottom:'24px'}}>Tu parte del regalo está marcada como pagada.</div><Btn onClick={()=>setPayModal(false)} variant="secondary">Cerrar</Btn></div>
          ):(<>
            <div style={{fontSize:'18px',fontWeight:'700',color:T,marginBottom:'4px'}}>Pagar mi parte</div>
            <div style={{fontSize:'14px',color:M2,marginBottom:'20px'}}>Regalo: {plan.gift?.name} · {total>0?(parseFloat(plan.gift?.price||0)/total).toFixed(2):'?'}€</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'16px'}}>
              {[['💳','Tarjeta'],['📱','Bizum'],['🅿️','PayPal'],['₿','Crypto']].map(([icon,label])=>(
                <div key={label} onClick={()=>setPayMethod(label)} style={{padding:'16px',textAlign:'center',background:payMethod===label?`${A}15`:CARD2,border:`1.5px solid ${payMethod===label?A:BD}`,borderRadius:'12px',cursor:'pointer',transition:'all .15s'}}>
                  <div style={{fontSize:'24px',marginBottom:'6px'}}>{icon}</div>
                  <div style={{fontSize:'13px',color:payMethod===label?A:T,fontWeight:payMethod===label?'700':'400'}}>{label}</div>
                </div>
              ))}
            </div>
            {payMethod&&<div style={{background:CARD2,border:`1px solid ${BD}`,borderRadius:'12px',padding:'14px',marginBottom:'14px'}}><div style={{fontSize:'12px',color:'#F5A623',fontWeight:'600',marginBottom:'4px'}}>⚠️ Demo — sin cobro real</div><div style={{fontSize:'13px',color:M2,lineHeight:1.6}}>En producción esto conectaría con {payMethod==='Bizum'?'Redsys':payMethod==='PayPal'?'PayPal API':payMethod==='Crypto'?'Coinbase Commerce':'Stripe'}.</div></div>}
            <Btn onClick={()=>{if(payMethod)setPayDone(true);}} disabled={!payMethod} full style={{padding:'14px'}}>{payMethod?`Pagar con ${payMethod} →`:'Selecciona un método'}</Btn>
          </>)}
        </div>
      </div>}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('home');const [plan,setPlan]=useState(null);

  // Soporte para link directo con ?code=XXXXX
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const code=params.get('code');
    if(code){
      loadPlan(code).then(p=>{if(p){setPlan(p);setScreen('respond');}});
    }
  },[]);

  const handleJoin=async code=>{const p=await loadPlan(code);if(p){setPlan(p);setScreen('respond');return true;}return false;};
  return(
    <div style={{minHeight:'100vh',background:BG,color:T,fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      <div style={{borderBottom:`1px solid ${BD}`,padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:`${BG}F0`,backdropFilter:'blur(10px)',zIndex:10}}>
        <div onClick={()=>setScreen('home')} style={{fontFamily:"'Syne',serif",fontWeight:'800',fontSize:'22px',cursor:'pointer',color:T,letterSpacing:'-.02em'}}>queda<span style={{color:A}}>.</span></div>
        {plan&&screen!=='home'&&screen!=='create'&&<div style={{fontSize:'12px',color:M}}>código: <span style={{color:A,fontWeight:'800',letterSpacing:'.1em'}}>{plan.id}</span></div>}
      </div>
      {screen==='home'&&<HomeScreen onCreate={()=>setScreen('create')} onJoin={handleJoin}/>}
      {screen==='create'&&<CreateScreen onBack={()=>setScreen('home')} onCreated={p=>{setPlan(p);setScreen('share');}}/>}
      {screen==='share'&&plan&&<ShareScreen plan={plan} onViewResults={()=>setScreen('results')} onBack={()=>setScreen('home')}/>}
      {screen==='respond'&&plan&&<RespondScreen plan={plan} onBack={()=>setScreen('home')} onDone={()=>setScreen('results')}/>}
      {screen==='results'&&plan&&<ResultsScreen plan={plan} onBack={()=>setScreen('share')}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
