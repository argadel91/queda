const ls = {
  get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};
const getMyPlans = () => ls.get('q_plans', []);
const addMyPlan = (id, name, role) => {
  const p = getMyPlans().filter(x => x.id !== id);
  ls.set('q_plans', [{ id, name, role, at: new Date().toISOString() }, ...p].slice(0, 30));
};

const savePlan = async p => { await db.from('plans').upsert({ id: p.id, data: p }); };
const loadPlan = async id => { try { const { data } = await db.from('plans').select('data').eq('id', id).single(); return data?.data || null; } catch { return null; } };
const updatePlan = async p => { await db.from('plans').update({ data: p }).eq('id', p.id); };
const saveResp = async (planId, name, resp) => {
  try {
    const { data: ex } = await db.from('responses').select('id').eq('plan_id', planId).eq('name', name).single();
    if (ex) { await db.from('responses').update({ data: resp }).eq('id', ex.id); }
    else { await db.from('responses').insert({ plan_id: planId, name, data: resp }); }
  } catch(e) { console.error('saveResp:', e); }
};
const loadResps = async id => { try { const { data } = await db.from('responses').select('data').eq('plan_id', id); return (data || []).map(r => r.data); } catch { return []; } };

const sendEmail = async (plan, who, dates) => {
  if (!EMAIL_ON || !plan.organizerEmail) return;
  try {
    await emailjs.send(EJS_SVC, EJS_TPL, {
      to_email: plan.organizerEmail, to_name: plan.organizer,
      plan_name: plan.name, responder_name: who,
      dates_available: dates.join(', ') || 'None',
      plan_code: plan.id,
      plan_url: location.href.split('?')[0] + '?code=' + plan.id,
    }, EJS_KEY);
  } catch(e) { console.log('email:', e); }
};

const fmtDate = (iso, lang) => {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString(lang === 'en' ? 'en-GB' : 'es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
};

  const d = new Date(iso + 'T12:00:00');

// ══════════════════════════════════════════
function CalendarPicker({ selected, onChange, c, lang }) {
  const col = c || COLORS('dark');
  const now = today();
  const maxDate = addDays(now, 365);
  const [viewYear, setViewYear] = useState(now.getFullYear());
  const [viewMonth, setViewMonth] = useState(now.getMonth());

  const getDaysInMonth = (y, m) => new Date(y, m+1, 0).getDate();
  const getFirstDay = (y, m) => new Date(y, m, 1).getDay();

  const prevMonth = () => { if (viewMonth === 0) { setViewYear(y=>y-1); setViewMonth(11); } else setViewMonth(m=>m-1); };
  const nextMonth = () => {
    const next = new Date(viewYear, viewMonth+1, 1);
    if (next <= maxDate) { if (viewMonth === 11) { setViewYear(y=>y+1); setViewMonth(0); } else setViewMonth(m=>m+1); }
  };

  const days = getDaysInMonth(viewYear, viewMonth);
  const firstDay = (getFirstDay(viewYear, viewMonth) + 6) % 7;
  const dayLabels = lang === 'en' ? ['M','T','W','T','F','S','S'] : ['L','M','X','J','V','S','D'];

  const toggleDay = iso => {
    onChange(selected.includes(iso) ? selected.filter(d=>d!==iso) : [...selected, iso]);
  };

  return (
    <div style={{background:col.CARD2,border:`1px solid ${col.BD}`,borderRadius:'14px',padding:'16px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>

          const date = new Date(viewYear, viewMonth, i+1);
          const iso = toISO(date);
          const isPast = date < now;
          const isFuture = date > maxDate;
          const sel = selected.includes(iso);
          const disabled = isPast || isFuture;
          return (
            <div key={i} onClick={()=>!disabled&&toggleDay(iso)} style={{
              textAlign:'center',padding:'7px 2px',borderRadius:'8px',fontSize:'13px',cursor:disabled?'default':'pointer',
              background: sel?col.A:disabled?'transparent':col.CARD,
              color: sel?'#0A0A0A':disabled?col.BD:col.T,
              fontWeight: sel?'700':'400',
              border: sel?'none':`1px solid ${disabled?'transparent':col.BD}`,
              transition:'all .1s',
            }}>{i+1}</div>
          );
        })}
      </div>
      {selected.length>0&&<div style={{marginTop:'12px',fontSize:'12px',color:col.M2,display:'flex',flexWrap:'wrap',gap:'4px'}}>
        {selected.sort().map(d=>(
          <span key={d} onClick={()=>toggleDay(d)} style={{padding:'3px 8px',background:col.A+'20',color:col.A,border:`1px solid ${col.A}40`,borderRadius:'20px',cursor:'pointer',textTransform:'capitalize',fontSize:'11px',fontWeight:'600'}}>
            {fmtShort(d,lang)} ×
          </span>
        ))}
      </div>}
    </div>
  );
}

function TimePicker({ times, onChange, c, lang, tz }) {
  const col = c || COLORS('dark');
  const t = LANG[lang];
  const [hour, setHour] = useState('20');
  const [min, setMin] = useState('00');

  const addTime = () => {
    const val = `${hour}:${min}`;
    if (!times.includes(val)) onChange([...times, val].sort());
  };
  const remove = v => onChange(times.filter(x=>x!==v));

  return (
    <div>
      <div style={{display:'flex',gap:'8px',alignItems:'flex-end',marginBottom:'10px'}}>
        <div style={{flex:1}}>
          <Lbl c={c}>{t.hour}</Lbl>
          <select value={hour} onChange={e=>setHour(e.target.value)} style={{background:col.CARD,border:`1px solid ${col.BD}`,color:col.T,fontSize:'14px',padding:'10px 12px',borderRadius:'10px',width:'100%',fontFamily:'inherit'}}>
            {Array.from({length:24},(_,i)=>i.toString().padStart(2,'0')).map(h=><option key={h} value={h}>{h}:00</option>)}
          </select>
        </div>
        <div style={{flex:1}}>
          <Lbl c={c}>{t.minute}</Lbl>
          <select value={min} onChange={e=>setMin(e.target.value)} style={{background:col.CARD,border:`1px solid ${col.BD}`,color:col.T,fontSize:'14px',padding:'10px 12px',borderRadius:'10px',width:'100%',fontFamily:'inherit'}}>
            {['00','15','30','45'].map(m=><option key={m} value={m}>{m}</option>)}
          </select>
        </div>
        <Btn onClick={addTime} sm c={c} style={{height:'40px',marginBottom:'1px'}}>{t.addTime}</Btn>
      </div>
      {tz&&<div style={{fontSize:'12px',color:col.M2,marginBottom:'8px'}}>🌍 {tz}</div>}
      {times.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
        {times.map(h=>(
          <span key={h} onClick={()=>remove(h)} style={{fontSize:'12px',padding:'5px 11px',borderRadius:'20px',border:`1px solid ${col.A}50`,background:`${col.A}15`,color:col.A,cursor:'pointer',fontWeight:'600'}}>
            {h} ×
          </span>
        ))}
      </div>}
    </div>
  );
}

// WEATHER
// ══════════════════════════════════════════
function WeatherWidget({ city, date, c, lang }) {
  const col = c || COLORS('dark');
  const [w, setW] = useState(null);
  const [loading, setL] = useState(false);
  useEffect(() => {
    if (!city || !date) return;
    setL(true); setW(null);
    (async () => {
      try {
        const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=${lang}`).then(r=>r.json());
        if (!geo.results?.length) { setL(false); return; }
        const { latitude: lat, longitude: lon } = geo.results[0];
        const wd = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe/Madrid&start_date=${date}&end_date=${date}`).then(r=>r.json());
        if (wd.daily) setW({ code: wd.daily.weathercode[0], max: Math.round(wd.daily.temperature_2m_max[0]), min: Math.round(wd.daily.temperature_2m_min[0]), rain: wd.daily.precipitation_probability_max[0] });
      } catch {} finally { setL(false); }
    })();
  }, [city, date]);
  if (!city || !date) return null;
  if (loading) return <div style={{fontSize:'12px',color:col.M,padding:'12px 0'}}>...</div>;
  if (!w) return <div style={{fontSize:'12px',color:col.M,padding:'12px 0'}}>City not found.</div>;
  const desc = WX_DESC[lang]?.[w.code] || '';
  return (
    <div style={{background:`${col.A}0A`,border:`1px solid ${col.A}25`,borderRadius:'12px',padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div><div style={{fontSize:'20px',marginBottom:'2px'}}>{WX[w.code]||'🌡️'} {desc}</div><div style={{fontSize:'12px',color:col.M2}}>{lang==='en'?'Rain':'Lluvia'}: {w.rain}%</div></div>
      <div style={{textAlign:'right'}}><div style={{fontSize:'28px',fontWeight:'800',color:col.A}}>{w.max}°</div><div style={{fontSize:'13px',color:col.M2}}>{w.min}° min</div></div>
    </div>
  );
}

              <input value={b.text} onChange={e=>updBring(b.id,'text',e.target.value)} placeholder={t.newItem}
                style={{flex:1,background:col.CARD,border:`1px solid ${col.BD}`,borderRadius:'8px',padding:'10px 12px',color:col.T,fontSize:'14px',fontFamily:'inherit',outline:'none'}}/>
              {bring.length>1&&<button onClick={()=>remBring(b.id)} style={{background:'none',border:`1px solid ${col.BD}`,color:col.M,cursor:'pointer',fontSize:'16px',borderRadius:'8px',width:'36px'}}>×</button>}
            </div>
          ))}
          <Btn onClick={addBring} v="secondary" sm c={col}>{t.addItem}</Btn>
        </div>
        <Btn onClick={create} disabled={saving} full style={{padding:'16px',fontSize:'16px'}} c={col}>{saving?t.saving:t.createPlanBtn}</Btn>
      </>}
    </div>
  );
}

        <div style={{fontFamily:'monospace',fontSize:'58px',fontWeight:'900',color:col.A,letterSpacing:'.2em',lineHeight:1,marginBottom:'14px'}}>{plan.id}</div>
        <div style={{fontSize:'15px',color:col.T,fontWeight:'600',marginBottom:'4px'}}>{plan.name}</div>

// RESPOND
// ══════════════════════════════════════════
function RespondScreen({ plan, onBack, onDone, c, lang: appLang }) {
  const planLang = plan.lang || appLang;
  const col = c;
  const t = LANG[planLang];
  const [name, setName] = useState('');
  const [avail, setAvail] = useState({});
  const [timePref, setTimePref] = useState({});
  const [how, setHow] = useState('');
  const [howOther, setHowOther] = useState('');
  const [saving, setSaving] = useState(false);
  const [done, setDone] = useState(false);

  const togD = d => setAvail(p=>({...p,[d]:!p[d]}));
  const togT = (d,h) => setTimePref(p=>({...p,[d]:(p[d]||[]).includes(h)?(p[d]||[]).filter(x=>x!==h):[...(p[d]||[]),h]}));

  const submit = async () => {
    if (!name.trim()) return;
    setSaving(true);
    const howFinal = how==='other' ? howOther : how;
    const resp = { name:name.trim(), avail, timePref, how:howFinal, at:new Date().toISOString() };
    await saveResp(plan.id, name.trim(), resp);
    addMyPlan(plan.id, plan.name, 'invited');
    await sendEmail(plan, name.trim(), plan.dates.filter(d=>avail[d]).map(d=>fmtShort(d,planLang)));
    setSaving(false); setDone(true);
    setTimeout(onDone, 1800);
  };

  const budget = plan.stops.reduce((s,p2)=>s+(parseFloat(p2.cost)||0),0);
  const giftPer = plan.gift?.price ? parseFloat(plan.gift.price) : 0;

  if (done) return (
    <div style={{padding:'80px 24px',maxWidth:'420px',margin:'0 auto',textAlign:'center'}}>
      <div style={{fontSize:'64px',marginBottom:'20px'}}>✅</div>
      <h2 style={{fontFamily:"'Syne',serif",fontSize:'28px',fontWeight:'800',color:col.A,marginBottom:'10px'}}>{t.saved}</h2>
      <p style={{color:col.M2}}>{t.savedSub}</p>
    </div>
  );

  return (
    <div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
      <Back onClick={onBack} c={col} label={t.back}/>
      {plan.confirmedDate&&(
        <div style={{background:`${col.A}15`,border:`1px solid ${col.A}50`,borderRadius:'12px',padding:'14px 16px',marginBottom:'16px',display:'flex',gap:'10px',alignItems:'center'}}>
          <div style={{fontSize:'20px'}}>📌</div>
          <div>
            <div style={{fontSize:'11px',color:col.A,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'2px'}}>{t.confirmedDate}</div>
            <div style={{fontSize:'15px',color:col.T,fontWeight:'600',textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate,planLang)}</div>
          </div>
        </div>
      )}
      <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:col.T,marginBottom:'4px'}}>{plan.name}</h2>
      <div style={{fontSize:'13px',color:col.M2,marginBottom:'8px'}}>@ {plan.organizer}</div>
      {plan.desc&&<p style={{fontSize:'14px',color:col.T,lineHeight:1.7,marginBottom:'16px',padding:'12px 14px',background:col.CARD,border:`1px solid ${col.BD}`,borderRadius:'10px'}}>{plan.desc}</p>}
      {budget>0&&<div style={{background:`${col.A}0D`,border:`1px solid ${col.A}30`,borderRadius:'10px',padding:'12px 16px',marginBottom:'16px',display:'flex',justifyContent:'space-between'}}><span style={{color:col.M2,fontSize:'13px'}}>{t.estimatedPer}</span><span style={{color:col.A,fontWeight:'700'}}>{(budget+giftPer).toFixed(0)}€/persona</span></div>}
      <HR c={col}/>
      <div style={{marginBottom:'16px'}}><Lbl c={col}>{t.yourName}</Lbl><Inp value={name} onChange={setName} placeholder={t.yourNamePh} c={col}/></div>
      <div style={{marginBottom:'20px'}}>
        <Lbl c={col}>{t.yourAvailability}</Lbl>
        {plan.dates.map(d=>{
          const on=avail[d]; const ts=plan.times?.[d]||[];
          return (
            <div key={d} style={{marginBottom:'8px'}}>
              <div onClick={()=>togD(d)} style={{padding:'12px 14px',borderRadius:'10px',border:`1px solid ${on?col.A:col.BD}`,background:on?`${col.A}12`:col.CARD,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',transition:'all .12s'}}>
                <span style={{fontSize:'14px',color:on?col.A:col.T,fontWeight:on?'600':'400',textTransform:'capitalize'}}>{fmtDate(d,planLang)}</span>
                <div style={{width:'22px',height:'22px',borderRadius:'50%',border:`2px solid ${on?col.A:col.BD}`,background:on?col.A:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',color:'#0A0A0A',fontWeight:'800'}}>{on?'✓':''}</div>
              </div>
              {on&&ts.length>0&&(
                <div style={{padding:'10px 14px',background:col.CARD2,borderRadius:'0 0 10px 10px',border:`1px solid ${col.BD}`,borderTop:'none'}}>
                  <div style={{fontSize:'11px',color:col.M,fontWeight:'700',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:'7px'}}>{t.whatTime}</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>
                    {ts.map(h=>{const o=(timePref[d]||[]).includes(h);return<span key={h} onClick={()=>togT(d,h)} style={{fontSize:'12px',padding:'4px 11px',borderRadius:'20px',border:`1px solid ${o?col.A:col.BD}`,background:o?`${col.A}20`:'transparent',color:o?col.A:col.M2,cursor:'pointer',fontWeight:o?'700':'400'}}>{h}</span>;})}
                  </div>
                  {plan.timezone&&<div style={{fontSize:'11px',color:col.M2,marginTop:'6px'}}>🌍 {TIMEZONES.find(x=>x.tz===plan.timezone)?.label||plan.timezone}</div>}
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{marginBottom:'20px'}}>
        <Lbl c={col}>{t.howGetThere}</Lbl>
        <select value={how} onChange={e=>setHow(e.target.value)} style={{background:col.CARD,border:`1px solid ${col.BD}`,color:how?col.T:col.M,fontSize:'14px',padding:'12px 14px',borderRadius:'10px',width:'100%',fontFamily:'inherit',marginBottom:how==='other'?'8px':'0'}}>
          <option value=''>—</option>
          <option value='car'>{t.how_car}</option>
          <option value='transit'>{t.how_transit}</option>
          <option value='taxi'>{t.how_taxi}</option>
          <option value='walk'>{t.how_walk}</option>
          <option value='bike'>{t.how_bike}</option>
          <option value='other'>{t.how_other}</option>
        </select>
        {how==='other'&&<Inp value={howOther} onChange={setHowOther} placeholder={t.how_otherPh} c={col}/>}
      </div>
      <Btn onClick={submit} disabled={!name.trim()||saving} full style={{padding:'15px',fontSize:'15px'}} c={col}>{saving?t.saving:t.confirmBtn}</Btn>
    </div>
  );
}

// RESULTS
// ══════════════════════════════════════════
function ResultsScreen({ plan: initPlan, onBack, isOrg, c, lang }) {
  const [plan, setPlan] = useState(initPlan);
  const col = c; const t = LANG[lang];
  const [tab, setTab] = useState('who');
  const [responses, setRs] = useState([]);
  const [loading, setL] = useState(true);
  const [confirming, setCon] = useState(false);
  const [reminderSent, setReminderSent] = useState(false);

  const refresh = useCallback(async () => {
    setL(true);
    const rs = await loadResps(plan.id);
    setRs(rs);
    setL(false);
  }, [plan.id]);

  useEffect(() => { refresh(); }, [refresh]);

  const total = responses.length;
  const counts = plan.dates.reduce((acc,d)=>{ acc[d]=responses.filter(r=>r.avail[d]).length; return acc; },{});
  const mx = Math.max(...Object.values(counts), 1);
  const best = total>0 ? plan.dates.reduce((b,d)=>counts[d]>counts[b]?d:b, plan.dates[0]) : null;
  const budget = plan.stops.reduce((s,p2)=>s+(parseFloat(p2.cost)||0),0);
  const giftPer = plan.gift?.price ? parseFloat(plan.gift.price) : 0;
  const fs = plan.stops.find(s=>s.address||s.name);

  const confirmDate = async d => {
    setCon(true);
    const up = {...plan, confirmedDate:d};
    await updatePlan(up);
    setPlan(up);
    ls.set('q_state', {...ls.get('q_state',{}), planConfirmed: d });
    setCon(false);
  };

  const waConfirm = () => {
    if (!plan.confirmedDate) return;
    const url = location.href.split('?')[0]+'?code='+plan.id;
    const msg = lang==='en'
      ? `📌 *${plan.name}* — date confirmed!\n\n🗓️ ${fmtDate(plan.confirmedDate,lang)}\n\n${url}`
      : `📌 *${plan.name}* — ¡fecha confirmada!\n\n🗓️ ${fmtDate(plan.confirmedDate,lang)}\n\n${url}`;
    window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
  };

  const sendReminder = async () => {
    if (!EMAIL_ON || !plan.organizerEmail) return;
    setReminderSent(true);
    await sendEmail(plan, lang==='en'?'Reminder':'Recordatorio', [plan.confirmedDate ? fmtDate(plan.confirmedDate,lang) : '']);
  };

  const TABS = ['who','route','extras','weather','transport'];
  const TLABELS = t.tabs;
  const tlabel = k => ({ who:TLABELS.who, route:TLABELS.route, extras:TLABELS.extras, weather:TLABELS.weather, transport:TLABELS.transport }[k]);

  const howLabel = v => {
    const m = { car:t.how_car, transit:t.how_transit, taxi:t.how_taxi, walk:t.how_walk, bike:t.how_bike };
    return m[v] || `🚀 ${v}`;
  };

  return (
    <div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
      <Back onClick={onBack} c={col} label={t.back}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'4px'}}>
        <h2 style={{fontFamily:"'Syne',serif",fontSize:'24px',fontWeight:'800',color:col.T,margin:0}}>{plan.name}</h2>
        <button onClick={refresh} style={{background:'none',border:`1px solid ${col.BD}`,color:col.M2,cursor:'pointer',fontSize:'12px',padding:'6px 10px',borderRadius:'8px',fontFamily:'inherit'}}>↻</button>
      </div>
      <div style={{fontSize:'13px',color:col.M2,marginBottom:'12px'}}>{total} {total===1?t.responses:t.responsesPlural} · <span style={{color:col.A,fontWeight:'700',letterSpacing:'.1em'}}>{plan.id}</span></div>

      {plan.confirmedDate&&(
        <div style={{background:`${col.A}15`,border:`1px solid ${col.A}50`,borderRadius:'12px',padding:'14px 16px',marginBottom:'14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:'11px',color:col.A,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'2px'}}>{t.confirmedDate}</div>
            <div style={{fontSize:'15px',color:col.T,fontWeight:'600',textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate,lang)}</div>
          </div>
          <div style={{display:'flex',gap:'6px'}}>
            {isOrg&&<button onClick={waConfirm} style={{background:'#25D366',border:'none',borderRadius:'10px',padding:'8px 12px',color:'#fff',fontSize:'12px',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'}}>{t.notifyGroup}</button>}
            {isOrg&&EMAIL_ON&&<button onClick={sendReminder} style={{background:col.CARD2,border:`1px solid ${col.BD}`,borderRadius:'10px',padding:'8px 12px',color:reminderSent?col.A:col.M2,fontSize:'12px',fontWeight:'600',cursor:'pointer',fontFamily:'inherit'}}>{reminderSent?t.reminderSent:t.reminder}</button>}
          </div>
        </div>
      )}

      <div style={{display:'flex',gap:'5px',overflowX:'auto',paddingBottom:'4px',marginBottom:'20px'}}>
        {TABS.map(tb=>(
          <button key={tb} onClick={()=>setTab(tb)} style={{padding:'7px 11px',borderRadius:'20px',border:`1px solid ${tab===tb?col.A+'60':col.BD}`,background:tab===tb?`${col.A}15`:col.CARD,color:tab===tb?col.A:col.M2,fontSize:'12px',fontWeight:tab===tb?'700':'400',cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',flexShrink:0}}>
            {tlabel(tb)}
          </button>
        ))}
      </div>

      {loading&&<div style={{textAlign:'center',color:col.M,padding:'48px'}}>...</div>}

      {!loading&&tab==='who'&&(
        total===0
        ? <Card c={col} style={{textAlign:'center',padding:'32px'}}>
            <div style={{fontSize:'36px',marginBottom:'12px'}}>⏳</div>
            <div style={{color:col.T,fontWeight:'500',marginBottom:'6px'}}>{t.noResponses}</div>
            <div style={{color:col.M2,fontSize:'13px'}}>{t.noResponsesSub} <span style={{color:col.A,fontWeight:'700'}}>{plan.id}</span></div>
          </Card>
        : <>
            {best&&counts[best]>0&&(
              <div style={{background:`${col.A}12`,border:`1px solid ${col.A}35`,borderRadius:'14px',padding:'16px',marginBottom:'18px'}}>
                <div style={{display:'flex',gap:'14px',alignItems:'center',marginBottom:isOrg&&!plan.confirmedDate?'14px':'0'}}>
                  <div style={{fontSize:'28px'}}>⭐</div>
                  <div>
                    <div style={{fontSize:'11px',color:col.A,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'2px'}}>{t.bestOption}</div>
                    <div style={{fontSize:'15px',color:col.T,fontWeight:'600',textTransform:'capitalize'}}>{fmtDate(best,lang)}</div>
                    {plan.times?.[best]?.length>0&&<div style={{fontSize:'12px',color:col.M2}}>{plan.times[best].join(', ')} ({TIMEZONES.find(x=>x.tz===plan.timezone)?.label||''})</div>}
                    <div style={{fontSize:'13px',color:col.M2}}>{counts[best]}/{total} {lang==='en'?'can make it':'pueden'}</div>
                  </div>
                </div>
                {isOrg&&!plan.confirmedDate&&<Btn onClick={()=>confirmDate(best)} disabled={confirming} full sm c={col}>{confirming?t.confirming:t.confirmThis}</Btn>}
              </div>
            )}
            <div style={{marginBottom:'20px'}}>
              {plan.dates.map(d=>{
                const n=counts[d];const pct=(n/mx)*100;const isBest=d===best&&n>0;const isConf=d===plan.confirmedDate;
                return (
                  <div key={d} style={{marginBottom:'12px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                        <span style={{fontSize:'13px',color:isConf||isBest?col.A:col.T,fontWeight:isConf||isBest?'700':'400',textTransform:'capitalize'}}>{fmtShort(d,lang)}</span>
                        {isConf&&<span style={{fontSize:'10px',background:col.A,color:'#0A0A0A',padding:'1px 7px',borderRadius:'20px',fontWeight:'800'}}>{t.confirmed}</span>}
                        {!isConf&&isBest&&<span>⭐</span>}
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                        <span style={{fontSize:'13px',color:isBest?col.A:col.M2,fontWeight:isBest?'700':'400'}}>{n}/{total}</span>
                        {isOrg&&!plan.confirmedDate&&d!==best&&n>0&&<button onClick={()=>confirmDate(d)} style={{background:'none',border:'none',color:col.M2,fontSize:'11px',cursor:'pointer',fontFamily:'inherit',textDecoration:'underline'}}>{t.confirmSmall}</button>}
                      </div>
                    </div>
                    <div style={{height:'7px',background:col.BD,borderRadius:'4px',overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,background:isConf||isBest?col.A:col.CARD2,borderRadius:'4px',transition:'width .5s'}}/></div>
                  </div>
                );
              })}
            </div>
            <Card c={col}>
              <Lbl c={col}>{lang==='en'?'Detail per person':'Detalle por persona'}</Lbl>
              {responses.map((r,i)=>(
                <div key={i} style={{paddingBottom:'12px',marginBottom:'12px',borderBottom:i<responses.length-1?`1px solid ${col.BD}`:'none'}}>
                  <div style={{fontSize:'14px',color:col.T,fontWeight:'600',marginBottom:'6px'}}>
                    {r.name} {r.how&&<span style={{fontSize:'12px',color:col.M2,fontWeight:'400'}}>· {r.how}</span>}
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>
                    {plan.dates.map(d=><span key={d} style={{fontSize:'11px',padding:'3px 9px',borderRadius:'20px',background:r.avail[d]?`${col.A}20`:col.CARD2,color:r.avail[d]?col.A:col.M,fontWeight:r.avail[d]?'700':'400',border:`1px solid ${r.avail[d]?col.A+'40':col.BD}`,textTransform:'capitalize'}}>{fmtShort(d,lang)}</span>)}
                  </div>
                </div>
              ))}
            </Card>
          </>
      )}

      {!loading&&tab==='route'&&<>
        {plan.stops.map((s,i)=>(
          <div key={s.id||i} style={{display:'flex',gap:'12px',marginBottom:'10px'}}>

              {s.address&&<div style={{fontSize:'12px',color:col.M2,marginBottom:'8px'}}>📍 {s.address}</div>}
              <div style={{display:'flex',flexWrap:'wrap',gap:'6px',alignItems:'center'}}>

                {s.link&&<a href={s.link.startsWith('http')?s.link:'https://'+s.link} target="_blank" rel="noreferrer" style={{fontSize:'12px',color:col.A,textDecoration:'none',padding:'4px 10px',border:`1px solid ${col.A}40`,borderRadius:'8px'}}>{lang==='en'?'Book':'Reserva'} ↗</a>}
                {s.stripeLink&&<a href={s.stripeLink.startsWith('http')?s.stripeLink:'https://'+s.stripeLink} target="_blank" rel="noreferrer" style={{fontSize:'12px',color:'#fff',textDecoration:'none',padding:'4px 10px',borderRadius:'8px',background:'#635BFF',fontWeight:'600'}}>💳 {lang==='en'?'Pay':'Pagar'}</a>}
              </div>
            </Card>
          </div>
        ))}
        {budget>0&&<>
          <HR c={col}/>
          <div style={{display:'flex',justifyContent:'space-between',padding:'14px 16px',background:`${col.A}0D`,border:`1px solid ${col.A}30`,borderRadius:'12px',marginBottom:'10px'}}><span style={{color:col.M2}}>{t.perPerson}</span><span style={{color:col.A,fontSize:'22px',fontWeight:'800'}}>{budget.toFixed(0)}€</span></div>
          {giftPer>0&&<div style={{display:'flex',justifyContent:'space-between',padding:'12px 16px',background:col.CARD,border:`1px solid ${col.BD}`,borderRadius:'12px',marginBottom:'10px'}}><span style={{color:col.M2,fontSize:'14px'}}>+ {lang==='en'?'gift':'regalo'}</span><span style={{color:col.T,fontWeight:'600'}}>{giftPer.toFixed(0)}€/pers.</span></div>}
          <div style={{display:'flex',justifyContent:'space-between',padding:'14px 16px',background:col.CARD2,border:`1px solid ${col.BD}`,borderRadius:'12px'}}><span style={{color:col.T,fontWeight:'700'}}>{t.total}</span><span style={{color:col.A,fontSize:'18px',fontWeight:'800'}}>{(budget+giftPer).toFixed(0)}€</span></div>
        </>}
      </>}

      {!loading&&tab==='extras'&&<>
        {plan.gift
          ? <Card c={col} accent style={{marginBottom:'16px'}}>
              <div style={{fontSize:'11px',color:col.M2,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'12px'}}>{t.collectiveGift}</div>
              <div style={{fontSize:'18px',color:col.T,fontWeight:'600',marginBottom:'8px'}}>{plan.gift.name||'—'}</div>
              {plan.gift.price&&<>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}><span style={{color:col.M2,fontSize:'14px'}}>{t.totalPrice}</span><span style={{color:col.A,fontWeight:'700',fontSize:'18px'}}>{plan.gift.price}€</span></div>
                {total>0&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:'12px'}}><span style={{color:col.M2,fontSize:'14px'}}>{t.perPersonOf} ({total})</span><span style={{color:col.A,fontWeight:'700'}}>{(parseFloat(plan.gift.price)/total).toFixed(2)}€</span></div>}
              </>}
              {plan.gift.link&&<a href={plan.gift.link.startsWith('http')?plan.gift.link:'https://'+plan.gift.link} target="_blank" rel="noreferrer" style={{display:'block',textAlign:'center',padding:'10px',background:`${col.A}20`,border:`1px solid ${col.A}50`,borderRadius:'10px',color:col.A,textDecoration:'none',fontSize:'14px',fontWeight:'600',marginBottom:'10px'}}>{t.seeGift}</a>}
              {plan.gift.stripeLink
                ? <a href={plan.gift.stripeLink.startsWith('http')?plan.gift.stripeLink:'https://'+plan.gift.stripeLink} target="_blank" rel="noreferrer" style={{display:'block',textAlign:'center',padding:'13px',background:'#635BFF',borderRadius:'12px',color:'#fff',textDecoration:'none',fontSize:'15px',fontWeight:'700'}}>{t.payStripe}</a>
                : <div style={{textAlign:'center',padding:'10px',background:col.CARD2,border:`1px solid ${col.BD}`,borderRadius:'10px',fontSize:'13px',color:col.M2}}>{t.payPending}</div>
              }
            </Card>
          : <Card c={col} style={{textAlign:'center',padding:'28px'}}><div style={{fontSize:'32px',marginBottom:'10px'}}>🎁</div><div style={{color:col.M2,fontSize:'14px'}}>{lang==='en'?'No gift in this plan':'No hay regalo en este plan'}</div></Card>
        }
        {plan.bring?.filter(b=>b.text||typeof b==='string').length>0&&(
          <Card c={col}>
            <Lbl c={col}>{t.bringList}</Lbl>
            {plan.bring.filter(b=>b.text||typeof b==='string').map((b,i)=>{
              const text = typeof b==='string'?b:b.text;
              return <div key={i} style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 0',borderBottom:i<plan.bring.length-1?`1px solid ${col.BD}`:'none',fontSize:'14px',color:col.T}}><div style={{width:'7px',height:'7px',borderRadius:'50%',background:col.A,flexShrink:0}}/>{text}</div>;
            })}
          </Card>
        )}
      </>}

      {!loading&&tab==='weather'&&<>
        {best
          ? <>
              <div style={{fontSize:'14px',color:col.M2,marginBottom:'16px'}}>{t.forecastFor} <span style={{color:col.T,fontWeight:'600',textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate||best,lang)}</span>{plan.city?` — ${plan.city}`:''}</div>
              {plan.city
                ? <WeatherWidget city={plan.city} date={plan.confirmedDate||best} c={col} lang={lang}/>
                : <Card c={col} style={{textAlign:'center',padding:'28px'}}><div style={{fontSize:'32px',marginBottom:'10px'}}>🌤️</div><div style={{color:col.M2,fontSize:'14px'}}>{t.addCityForWeather}</div></Card>
              }
              {plan.city&&plan.dates.length>1&&<>
                <HR c={col}/><Lbl c={col}>{t.allDates}</Lbl>
                {plan.dates.map(d=>(
                  <div key={d} style={{marginBottom:'14px'}}>
                    <div style={{fontSize:'13px',color:col.M2,marginBottom:'6px',textTransform:'capitalize'}}>{fmtShort(d,lang)}{d===plan.confirmedDate?' 📌':''}</div>
                    <WeatherWidget city={plan.city} date={d} c={col} lang={lang}/>
                  </div>
                ))}
              </>}
            </>
          : <Card c={col} style={{textAlign:'center',padding:'28px'}}><div style={{fontSize:'32px',marginBottom:'10px'}}>⏳</div><div style={{color:col.M2,fontSize:'14px'}}>{t.needResponse}</div></Card>
        }
      </>}

      {!loading&&tab==='transport'&&<>
        {fs
          ? <>
              <Card c={col} style={{marginBottom:'12px'}}>
                <div style={{fontSize:'11px',color:col.M2,fontWeight:'700',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:'8px'}}>{t.destination}</div>
                <div style={{fontSize:'15px',color:col.T,fontWeight:'600'}}>{fs.name}</div>
                {fs.address&&<div style={{fontSize:'13px',color:col.M2}}>{fs.address}</div>}
              </Card>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'20px'}}>
                {[
                  {name:'Google Maps',icon:'🗺️',url:`https://maps.google.com/?q=${encodeURIComponent((fs.name||'')+(fs.address?' '+fs.address:''))}`},
                  {name:'Uber',icon:'⚫',url:'https://m.uber.com/'},
                  {name:'Cabify',icon:'🟣',url:'https://cabify.com/'},
                  {name:'Renfe',icon:'🚆',url:'https://www.renfe.com/'},
                  {name:'Metro/EMT',icon:'🚇',url:'https://www.emt.madrid.es/'},
                  {name:'Trainline',icon:'🎫',url:'https://www.thetrainline.com/'},
                ].map(tx=>(
                  <a key={tx.name} href={tx.url} target="_blank" rel="noreferrer" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'8px',padding:'18px 10px',background:col.CARD,border:`1px solid ${col.BD}`,borderRadius:'14px',textDecoration:'none'}}>
                    <div style={{fontSize:'28px'}}>{tx.icon}</div><div style={{fontSize:'13px',color:col.T,fontWeight:'600',textAlign:'center'}}>{tx.name}</div>
                  </a>
                ))}
              </div>
              {responses.filter(r=>r.how).length>0&&<>
                <Lbl c={col}>{t.howEachGoes}</Lbl>
                {responses.filter(r=>r.how).map((r,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${col.BD}`,fontSize:'14px'}}>
                    <span style={{color:col.T}}>{r.name}</span>
                    <span style={{color:col.M2}}>{r.how}</span>
                  </div>
                ))}
              </>}
            </>
          : <Card c={col} style={{textAlign:'center',padding:'28px'}}><div style={{fontSize:'32px',marginBottom:'10px'}}>📍</div><div style={{color:col.M2,fontSize:'14px'}}>{t.noStops}</div></Card>
        }
      </>}
    </div>
  );
}

// ══════════════════════════════════════════
// APP
// ══════════════════════════════════════════
function App() {
  const [theme, setTheme] = useState(() => ls.get('q_theme', null) || getSysTheme());
  const [lang, setLang] = useState(() => ls.get('q_lang', 'es'));
  const [screen, setScreen] = useState('home');
  const [plan, setPlan] = useState(null);
  const [isOrg, setIsOrg] = useState(false);
  const c = useMemo(() => COLORS(theme), [theme]);

  useEffect(() => { applyTheme(theme); }, [theme]);

  const toggleTheme = () => setTheme(t => { const n = t==='dark'?'light':'dark'; applyTheme(n); ls.set('q_theme',n); return n; });
  const toggleLang = () => setLang(l => { const n = l==='es'?'en':'es'; ls.set('q_lang',n); return n; });

  // Restore state on reload
  useEffect(() => {
    const code = new URLSearchParams(location.search).get('code');
    if (code) {
      loadPlan(code).then(p => { if(p){ setPlan(p); setIsOrg(false); setScreen('respond'); } });
      return;
    }
    const saved = ls.get('q_state', null);
    if (saved?.planId) {
      loadPlan(saved.planId).then(p => {
        if (p) {
          setPlan(p);
          setIsOrg(saved.isOrg || false);
          setScreen(saved.screen || 'home');
        }
      });
    }
  }, []);

  const nav = (s, p=null, org=false) => {
    setScreen(s);
    if (p) setPlan(p);
    setIsOrg(org);
    if (s !== 'home') ls.set('q_state', { screen:s, planId:p?.id||plan?.id, isOrg:org });
    else ls.set('q_state', {});
  };

  const handleJoin = async code => {
    const p = await loadPlan(code);
    if (p) { nav('respond', p, false); return true; }
    return false;
  };

  const handleOpenFromProfile = async id => {
    const p = await loadPlan(id);
    if (p) {
      const mine = getMyPlans().find(x => x.id===id);
      nav('results', p, mine?.role==='organizer');
    }
  };

  const t = LANG[lang];

  return (
    <div style={{minHeight:'100vh',background:c.BG,color:c.T,fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      <div style={{borderBottom:`1px solid ${c.BD}`,padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:c.BG+'F0',backdropFilter:'blur(10px)',zIndex:10}}>
        <div onClick={()=>nav('home')} style={{fontFamily:"'Syne',serif",fontWeight:'800',fontSize:'22px',cursor:'pointer',color:c.T,letterSpacing:'-.02em'}}>
          queda<span style={{color:c.A}}>.</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          {plan&&!['home','create','profile'].includes(screen)&&<span style={{fontSize:'12px',color:c.M}}>código: <span style={{color:c.A,fontWeight:'800',letterSpacing:'.1em'}}>{plan.id}</span></span>}
          <button onClick={toggleLang} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'5px 10px',cursor:'pointer',fontSize:'12px',fontWeight:'700',color:c.M2}}>{lang==='es'?'EN':'ES'}</button>
          <button onClick={toggleTheme} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'6px 10px',cursor:'pointer',fontSize:'15px'}}>{theme==='dark'?'☀️':'🌙'}</button>
        </div>
      </div>

      {screen==='home'&&<HomeScreen onCreate={()=>nav('create')} onJoin={handleJoin} onProfile={()=>nav('profile')} c={c} lang={lang} toggleLang={toggleLang} toggleTheme={toggleTheme} theme={theme}/>}
      {screen==='profile'&&<ProfileScreen onBack={()=>nav('home')} onOpen={handleOpenFromProfile} c={c} lang={lang}/>}
      {screen==='create'&&<CreateScreen onBack={()=>nav('home')} onCreated={p=>nav('share',p,true)} c={c} lang={lang}/>}
      {screen==='share'&&plan&&<ShareScreen plan={plan} onViewResults={()=>nav('results',plan,isOrg)} onBack={()=>nav('home')} c={c} lang={lang}/>}
      {screen==='respond'&&plan&&<RespondScreen plan={plan} onBack={()=>nav('home')} onDone={()=>nav('results',plan,false)} c={c} lang={lang}/>}
      {screen==='results'&&plan&&<ResultsScreen plan={plan} onBack={()=>nav(isOrg?'share':'home',plan,isOrg)} isOrg={isOrg} c={c} lang={lang}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
