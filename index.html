// Weather advice based on code
const weatherAdvice = (code, lang) => {
  const isEs = lang==='es';
  if (code >= 95) return { clothing: isEs?'🧥 Paraguas y ropa impermeable obligatorios':'🧥 Umbrella and waterproof clothing essential', transport: isEs?'❌ No recomendado ir a pie o en bici':'❌ Not recommended to walk or cycle' };
  if (code >= 61) return { clothing: isEs?'☂️ Lleva paraguas, ropa impermeable':'☂️ Bring umbrella, waterproof jacket', transport: isEs?'⚠️ Evita la bici, coge un taxi':'⚠️ Avoid cycling, take a taxi' };
  if (code >= 51) return { clothing: isEs?'🌂 Paraguas por si acaso':'🌂 Umbrella just in case', transport: isEs?'✅ Transporte público recomendado':'✅ Public transport recommended' };
  if (code === 3) return { clothing: isEs?'🧥 Puede refrescar, lleva chaqueta':'🧥 Might get cold, bring a jacket', transport: isEs?'✅ Todo bien para ir a pie':'✅ Fine to walk' };
  return { clothing: isEs?'👕 Ropa ligera, buen día':'👕 Light clothing, nice day', transport: isEs?'🚲 Perfecto para ir a pie o en bici':'🚲 Perfect for walking or cycling' };
};

// Local suggestions by category
const localSuggestions = (city, cat, lang) => {
  const isEs = lang==='es';
  const cityLower = (city||'').toLowerCase();
  const isMadrid = cityLower.includes('madrid');
  const isBarcelona = cityLower.includes('barcelona');
  const isLondon = cityLower.includes('london');
  if (cat?.includes('Restaurante') || cat?.includes('Restaurant')) {
    if (isMadrid) return ['Mercado de San Miguel','DiverXO','Sobrino de Botín','Estado Puro'];
    if (isBarcelona) return ['El Nacional','Tickets','Bodega Sepúlveda','La Boqueria'];
    if (isLondon) return ['Dishoom','The Ledbury','Padella','Sketch'];
    return isEs ? ['Busca en TripAdvisor','Mira en TheFork','Consulta Google Maps'] : ['Search TripAdvisor','Check TheFork','Look on Google Maps'];
  }
  if (cat?.includes('Bar') || cat?.includes('Copas')) {
    if (isMadrid) return ['El Imparcial','La Venencia','Salmon Guru','Bar Cock'];
    if (isBarcelona) return ['El Xampanyet','Paradiso','Bar Marsella','Dry Martini'];
    if (isLondon) return ['Nightjar','Beaufort Bar','Evans & Peel','Callooh Callay'];
    return isEs ? ['Busca bares locales en Google','Consulta Yelp'] : ['Search Google for local bars','Check Yelp'];
  }
  return [];
};

const saveResp = async (planId,name,resp) => {
  try{
    const{data:ex}=await db.from('responses').select('id').eq('plan_id',planId).eq('name',name).single();
    if(ex){await db.from('responses').update({data:resp}).eq('id',ex.id);}

  }catch(e){console.error('saveResp:',e);}
};

  if(!EMAIL_ON||!plan.organizerEmail) return;
  try{await emailjs.send(EJS_SVC,EJS_TPL,{to_email:plan.organizerEmail,to_name:plan.organizer,plan_name:plan.name,responder_name:who,dates_available:dates.join(', ')||'—',plan_code:plan.id,plan_url:location.href.split('?')[0]+'?code='+plan.id},EJS_KEY);}catch(e){console.log('email:',e);}
};

// ══════════════════════════
// CALENDAR PICKER
// ══════════════════════════
function CalendarPicker({selected,onChange,c,lang}){
  const col=c||C('dark');
  const now=today(); const max=addDays(now,365);
  const[vy,setVy]=useState(now.getFullYear());
  const[vm,setVm]=useState(now.getMonth());
  const days=new Date(vy,vm+1,0).getDate();
  const first=(new Date(vy,vm,1).getDay()+6)%7;
  const dls=lang==='en'?['M','T','W','T','F','S','S']:['L','M','X','J','V','S','D'];
  const prev=()=>{if(vm===0){setVy(y=>y-1);setVm(11);}else setVm(m=>m-1);};
  const next=()=>{const n=new Date(vy,vm+1,1);if(n<=max){if(vm===11){setVy(y=>y+1);setVm(0);}else setVm(m=>m+1);}};
  const tog=iso=>onChange(selected.includes(iso)?selected.filter(d=>d!==iso):[...selected,iso]);
  return(<div style={{background:col.CARD2,border:`1px solid ${col.BD}`,borderRadius:'14px',padding:'16px'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
      <button onClick={prev} style={{background:'none',border:'none',color:col.M2,cursor:'pointer',fontSize:'20px',padding:'2px 8px'}}>‹</button>
      <span style={{fontSize:'14px',fontWeight:'600',color:col.T,textTransform:'capitalize'}}>{fmtMonthYear(vy,vm,lang)}</span>
      <button onClick={next} style={{background:'none',border:'none',color:col.M2,cursor:'pointer',fontSize:'20px',padding:'2px 8px'}}>›</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px',marginBottom:'4px'}}>
      {dls.map((d,i)=><div key={i} style={{textAlign:'center',fontSize:'11px',color:col.M,fontWeight:'600',padding:'4px 0'}}>{d}</div>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px'}}>
      {Array.from({length:first}).map((_,i)=><div key={'e'+i}/>)}
      {Array.from({length:days}).map((_,i)=>{
        const date=new Date(vy,vm,i+1); const iso=toISO(date);
        const past=date<now; const future=date>max; const sel=selected.includes(iso); const dis=past||future;
        return(<div key={i} onClick={()=>!dis&&tog(iso)} style={{textAlign:'center',padding:'7px 2px',borderRadius:'8px',fontSize:'13px',cursor:dis?'default':'pointer',background:sel?col.A:dis?'transparent':col.CARD,color:sel?'#0A0A0A':dis?col.BD:col.T,fontWeight:sel?'700':'400',border:sel?'none':`1px solid ${dis?'transparent':col.BD}`,transition:'all .1s'}}>{i+1}</div>);
      })}
    </div>
    {selected.length>0&&<div style={{marginTop:'10px',display:'flex',flexWrap:'wrap',gap:'4px'}}>
      {selected.sort().map(d=><span key={d} onClick={()=>tog(d)} style={{padding:'3px 8px',background:`${col.A}20`,color:col.A,border:`1px solid ${col.A}40`,borderRadius:'20px',cursor:'pointer',fontSize:'11px',fontWeight:'600',textTransform:'capitalize'}}>{fmtShort(d,lang)} ×</span>)}
    </div>}
  </div>);
}

// ══════════════════════════
// MAP MODAL (place search + pick)
// ══════════════════════════
function MapModal({onSelect,onClose,c,lang,initialSearch=''}){
  const col=c||C('dark'); const t=T[lang];
  const mapRef=useRef(null); const leafletMap=useRef(null); const marker=useRef(null);
  const[query,setQuery]=useState(initialSearch);
  const[searching,setSearching]=useState(false);
  const[selected,setSel]=useState(null);

  useEffect(()=>{
    if(!mapRef.current||leafletMap.current) return;
    leafletMap.current=L.map(mapRef.current,{center:[40.4168,-3.7038],zoom:5});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(leafletMap.current);
    leafletMap.current.on('click',async e=>{
      const{lat,lng}=e.latlng;
      try{
        const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`).then(x=>x.json());
        const addr=r.display_name||`${lat.toFixed(5)},${lng.toFixed(5)}`;
        const name=r.name||r.address?.road||'';
        setSel({name,address:addr,lat,lng});
        if(marker.current)marker.current.remove();
        marker.current=L.marker([lat,lng]).addTo(leafletMap.current).bindPopup(name||addr).openPopup();
      }catch{}
    });
  },[]);

  const search=async()=>{
    if(!query.trim())return;
    setSearching(true);
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`).then(x=>x.json());
      if(r.length>0){
        const{lat,lon,display_name,name}=r[0];
        const latN=parseFloat(lat); const lngN=parseFloat(lon);
        leafletMap.current?.setView([latN,lngN],15);
        setSel({name:name||query,address:display_name,lat:latN,lng:lngN});
        if(marker.current)marker.current.remove();
        marker.current=L.marker([latN,lngN]).addTo(leafletMap.current).bindPopup(name||display_name).openPopup();
      }
    }catch{}
    setSearching(false);
  };

  return(<div className="map-modal" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="map-modal-inner">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:'16px',fontWeight:'600',color:'#F0EBE1'}}>{t.searchMap}</span>
        <button onClick={onClose} style={{background:'none',border:'none',color:'#888',cursor:'pointer',fontSize:'20px'}}>×</button>
      </div>
      <div style={{display:'flex',gap:'8px'}}>
        <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&search()} placeholder={t.cityPh} style={{flex:1,background:'#1C1C1C',border:'1px solid #2A2A2A',borderRadius:'10px',padding:'10px 14px',color:'#F0EBE1',fontSize:'14px',fontFamily:'inherit',outline:'none'}}/>
        <button onClick={search} style={{background:'#CDFF6C',border:'none',borderRadius:'10px',padding:'10px 16px',color:'#0A0A0A',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'}}>{searching?'...':t.go}</button>
      </div>
      <div ref={mapRef} style={{flex:1,borderRadius:'12px',overflow:'hidden',minHeight:'200px'}}/>
      {selected&&<div style={{background:'#1C1C1C',borderRadius:'10px',padding:'12px',fontSize:'13px',color:'#F0EBE1'}}>
        <div style={{fontWeight:'600',marginBottom:'4px'}}>{selected.name}</div>
        <div style={{color:'#888',fontSize:'12px',marginBottom:'10px'}}>{selected.address}</div>
        <button onClick={()=>onSelect(selected)} style={{width:'100%',background:'#CDFF6C',border:'none',borderRadius:'10px',padding:'11px',color:'#0A0A0A',fontWeight:'700',cursor:'pointer',fontFamily:'inherit',fontSize:'14px'}}>✓ Seleccionar este lugar</button>
      </div>}
    </div>
  </div>);
}

// ══════════════════════════
// ROUTE MAP (results view)
// ══════════════════════════
function RouteMap({stops,c}){
  const col=c||C('dark');
  const mapRef=useRef(null); const lmap=useRef(null);
  const validStops=stops.filter(s=>s.lat&&s.lng);

  useEffect(()=>{
    if(!mapRef.current||lmap.current) return;
    const center=validStops.length>0?[validStops[0].lat,validStops[0].lng]:[40.4168,-3.7038];
    lmap.current=L.map(mapRef.current,{center,zoom:validStops.length>0?13:5});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(lmap.current);
    validStops.forEach((s,i)=>{
      const icon=L.divIcon({html:`<div style="background:${col.A};color:#0A0A0A;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.3)">${i+1}</div>`,iconSize:[28,28],className:''});
      L.marker([s.lat,s.lng],{icon}).addTo(lmap.current).bindPopup(`<b>${s.name||'Parada '+(i+1)}</b><br>${s.address||''}`);
    });
    if(validStops.length>1){
      const lls=validStops.map(s=>[s.lat,s.lng]);
      L.polyline(lls,{color:col.A,weight:2,opacity:.7,dashArray:'8 4'}).addTo(lmap.current);
      lmap.current.fitBounds(lls,{padding:[30,30]});
    }
  },[]);

  if(validStops.length===0) return<Card c={col} style={{textAlign:'center',padding:'24px'}}><div style={{fontSize:'28px',marginBottom:'8px'}}>🗺️</div><div style={{color:col.M2,fontSize:'13px'}}>Busca los lugares en el mapa al crear el plan para verlos aquí</div></Card>;
  return<div ref={mapRef} style={{height:'300px',borderRadius:'12px',overflow:'hidden'}}/>;
}

// ══════════════════════════
// WEATHER WIDGET + ADVICE
// ══════════════════════════
function WeatherWidget({city,date,c,lang,showAdvice=false}){
  const col=c||C('dark');
  const[w,setW]=useState(null);const[loading,setL]=useState(false);
  useEffect(()=>{
    if(!city||!date)return; setL(true); setW(null);
    (async()=>{
      try{
        const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=${lang}`).then(r=>r.json());
        if(!geo.results?.length){setL(false);return;}
        const{latitude:lat,longitude:lon}=geo.results[0];
        const wd=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe/Madrid&start_date=${date}&end_date=${date}`).then(r=>r.json());
        if(wd.daily)setW({code:wd.daily.weathercode[0],max:Math.round(wd.daily.temperature_2m_max[0]),min:Math.round(wd.daily.temperature_2m_min[0]),rain:wd.daily.precipitation_probability_max[0]});
      }catch{}finally{setL(false);}
    })();
  },[city,date]);
  if(!city||!date)return null;
  if(loading)return<div style={{fontSize:'12px',color:col.M,padding:'12px 0'}}>...</div>;
  if(!w)return null;
  const desc=lang==='en'?WX_EN[w.code]:WX_ES[w.code]||'';
  const advice=showAdvice?weatherAdvice(w.code,lang):null;
  return(<div>
    <div style={{background:`${col.A}0A`,border:`1px solid ${col.A}25`,borderRadius:'12px',padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:advice?'8px':'0'}}>
      <div><div style={{fontSize:'20px',marginBottom:'2px'}}>{WX[w.code]||'🌡️'} {desc}</div><div style={{fontSize:'12px',color:col.M2}}>{lang==='en'?'Rain':'Lluvia'}: {w.rain}%</div></div>
      <div style={{textAlign:'right'}}><div style={{fontSize:'28px',fontWeight:'800',color:col.A}}>{w.max}°</div><div style={{fontSize:'13px',color:col.M2}}>{w.min}° min</div></div>
    </div>
    {advice&&<div style={{background:col.CARD2,border:`1px solid ${col.BD}`,borderRadius:'10px',padding:'12px 14px',fontSize:'13px',display:'flex',flexDirection:'column',gap:'6px'}}>
      <div>{advice.clothing}</div>
      <div>{advice.transport}</div>
    </div>}
  </div>);
}

function RespondScreen({plan,onBack,onDone,c,lang:appLang}){
  const planLang=plan.lang||appLang;
  const col=c; const t=T[planLang];
  const[name,setName]=useState('');const[avail,setAvail]=useState({});const[timePref,setTimePref]=useState({});
  const[how,setHow]=useState('');const[howOther,setHowOther]=useState('');
  const[saving,setSaving]=useState(false);const[done,setDone]=useState(false);
  const togD=d=>setAvail(p=>({...p,[d]:!p[d]}));
  const togT=(d,h)=>setTimePref(p=>({...p,[d]:(p[d]||[]).includes(h)?(p[d]||[]).filter(x=>x!==h):[...(p[d]||[]),h]}));
  const submit=async()=>{
    if(!name.trim())return; setSaving(true);
    const resp={name:name.trim(),avail,timePref,how:how==='other'?howOther:how,at:new Date().toISOString()};
    await saveResp(plan.id,name.trim(),resp);
    addMyPlan(plan.id,plan.name,'invited');
    await sendEmail(plan,name.trim(),plan.dates.filter(d=>avail[d]).map(d=>fmtShort(d,planLang)));
    setSaving(false); setDone(true); setTimeout(onDone,1800);
  };
  const budget=plan.stops?.reduce((s,p2)=>s+(parseFloat(p2.cost)||0),0)||0;
  const giftPer=plan.gift?.price?parseFloat(plan.gift.price):0;
  if(done)return(<div style={{padding:'48px 24px',maxWidth:'420px',margin:'0 auto',textAlign:'center'}}><div style={{fontSize:'64px',marginBottom:'20px'}}>✅</div><h2 style={{fontFamily:"'Syne',serif",fontSize:'28px',fontWeight:'800',color:col.A,marginBottom:'10px'}}>{t.savedTitle}</h2><p style={{color:col.M2,marginBottom:'0'}}>{t.savedSub}</p><ViralCTA c={col} lang={lang} onCreate={onCreateOwn}/></div>);
  return(<div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
    <Back onClick={onBack} c={col} label={t.back}/>
    {plan.confirmedDate&&<div style={{background:`${col.A}15`,border:`1px solid ${col.A}50`,borderRadius:'12px',padding:'14px 16px',marginBottom:'16px',display:'flex',gap:'10px',alignItems:'center'}}><div style={{fontSize:'20px'}}>📌</div><div><div style={{fontSize:'11px',color:col.A,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'2px'}}>{t.confirmedDate}</div><div style={{fontSize:'15px',color:col.T,fontWeight:'600',textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate,planLang)}</div></div></div>}
    <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:col.T,marginBottom:'4px'}}>{plan.name}</h2>
    <div style={{fontSize:'13px',color:col.M2,marginBottom:'8px'}}>@ {plan.organizer}</div>
    {plan.desc&&<p style={{fontSize:'14px',color:col.T,lineHeight:1.7,marginBottom:'16px',padding:'12px 14px',background:col.CARD,border:`1px solid ${col.BD}`,borderRadius:'10px'}}>{plan.desc}</p>}
    {budget>0&&<div style={{background:`${col.A}0D`,border:`1px solid ${col.A}30`,borderRadius:'10px',padding:'12px 16px',marginBottom:'16px',display:'flex',justifyContent:'space-between'}}><span style={{color:col.M2,fontSize:'13px'}}>{t.estPer}</span><span style={{color:col.A,fontWeight:'700'}}>{(budget+giftPer).toFixed(0)}€</span></div>}
    <HR c={col}/>
    <div style={{marginBottom:'16px'}}><Lbl c={col}>{t.yourName}</Lbl><Inp value={name} onChange={setName} placeholder={t.yourNamePh} c={col}/></div>
    <div style={{marginBottom:'20px'}}>
      <Lbl c={col}>{t.whenCan}</Lbl>
      {plan.dates?.map(d=>{const on=avail[d];const ts=plan.times?.[d]||[];return(
        <div key={d} style={{marginBottom:'8px'}}>
          <div onClick={()=>togD(d)} style={{padding:'12px 14px',borderRadius:'10px',border:`1px solid ${on?col.A:col.BD}`,background:on?`${col.A}12`:col.CARD,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:'14px',color:on?col.A:col.T,fontWeight:on?'600':'400',textTransform:'capitalize'}}>{fmtDate(d,planLang)}</span>
            <div style={{width:'22px',height:'22px',borderRadius:'50%',border:`2px solid ${on?col.A:col.BD}`,background:on?col.A:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',color:'#0A0A0A',fontWeight:'800'}}>{on?'✓':''}</div>
          </div>
          {on&&ts.length>0&&<div style={{padding:'10px 14px',background:col.CARD2,borderRadius:'0 0 10px 10px',border:`1px solid ${col.BD}`,borderTop:'none'}}>
            <div style={{fontSize:'11px',color:col.M,fontWeight:'700',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:'7px'}}>{t.whatTime}</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>
              {ts.map(h=>{const o=(timePref[d]||[]).includes(h);return<span key={h} onClick={()=>togT(d,h)} style={{fontSize:'12px',padding:'4px 11px',borderRadius:'20px',border:`1px solid ${o?col.A:col.BD}`,background:o?`${col.A}20`:'transparent',color:o?col.A:col.M2,cursor:'pointer',fontWeight:o?'700':'400'}}>{h}</span>;})}
            </div>
            {plan.timezone&&<div style={{fontSize:'11px',color:col.M2,marginTop:'6px'}}>🌍 {TIMEZONES.find(x=>x.tz===plan.timezone)?.label||plan.timezone}</div>}
          </div>}
        </div>
      );})}
    </div>
    <div style={{marginBottom:'20px'}}>
      <Lbl c={col}>{t.howGet}</Lbl>
      <select value={how} onChange={e=>setHow(e.target.value)} style={{background:col.CARD,border:`1px solid ${col.BD}`,color:how?col.T:col.M,fontSize:'14px',padding:'12px 14px',borderRadius:'10px',width:'100%',fontFamily:'inherit',marginBottom:how==='other'?'8px':'0'}}>
        <option value=''>—</option>
        <option value='car'>{t.car}</option><option value='transit'>{t.transit}</option>
        <option value='taxi'>{t.taxi}</option><option value='walk'>{t.walk}</option>
        <option value='bike'>{t.bike}</option><option value='other'>{t.other}</option>
      </select>
      {how==='other'&&<Inp value={howOther} onChange={setHowOther} placeholder={t.otherPh} c={col}/>}
    </div>
    <Btn onClick={submit} disabled={!name.trim()||saving} full style={{padding:'15px',fontSize:'15px'}} c={col}>{saving?t.saving:t.confirm}</Btn>
  </div>);
}

function ResultsScreen({plan:ip,onBack,isOrg,c,lang}){
  const[plan,setPlan]=useState(ip);
  const col=c; const t=T[lang];
  const[tab,setTab]=useState('who');
  const[responses,setRs]=useState([]);const[loading,setL]=useState(true);
  const[confirming,setCon]=useState(false);const[reminderSent,setReminderSent]=useState(false);
  const[payModal,setPayModal]=useState(false);const[payAmount,setPayAmount]=useState(0);
  const[isOrgState]=useState(isOrg);

  const refresh=useCallback(async()=>{setL(true);setRs(await loadResps(plan.id));setL(false);},[plan.id]);
  useEffect(()=>{refresh();},[refresh]);

  const total=responses.length;
  const counts=plan.dates?.reduce((acc,d)=>{acc[d]=responses.filter(r=>r.avail?.[d]).length;return acc;},{})||{};
  const mx=Math.max(...Object.values(counts),1);
  const best=total>0?plan.dates?.reduce((b,d)=>counts[d]>counts[b]?d:b,plan.dates[0]):null;
  const budget=plan.stops?.reduce((s,p2)=>s+(parseFloat(p2.cost)||0),0)||0;
  const giftPer=plan.gift?.price?parseFloat(plan.gift.price):0;
  const fs=plan.stops?.find(s=>s.address||s.name);

  const confirmDate=async d=>{setCon(true);const up={...plan,confirmedDate:d};await updatePlan(up);setPlan(up);ls.set('q_state',{...ls.get('q_state',{}),planConfirmed:d});setCon(false);};
  const waConfirm=()=>{if(!plan.confirmedDate)return;const url=location.href.split('?')[0]+'?code='+plan.id;const msg=`📌 *${plan.name}* — ${lang==='en'?'date confirmed':'fecha confirmada'}!\n\n🗓️ ${fmtDate(plan.confirmedDate,lang)}\n\n${url}`;window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');};
  const waReminder=()=>{const url=location.href.split('?')[0]+'?code='+plan.id;const msg=lang==='en'?`⏰ Reminder: *${plan.name}* is coming up!\n\nCheck the plan:\n${url}`:`⏰ Recordatorio: ¡se acerca *${plan.name}*!\n\nMira el plan:\n${url}`;window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');};
  const togglePublic=async()=>{const up={...plan,isPublic:!plan.isPublic};await updatePlan(up);setPlan(up);};

  const TABS=['who','route','extras','weather','transport','map','pay'];
  const tl=k=>({who:t.tabs.who,route:t.tabs.route,extras:t.tabs.extras,weather:t.tabs.weather,transport:t.tabs.transport,map:t.tabs.map,pay:t.tabs.pay}[k]);
  const howLabel=v=>({car:t.car,transit:t.transit,taxi:t.taxi,walk:t.walk,bike:t.bike}[v]||`🚀 ${v}`);

  return(<>
    {payModal&&<PaymentModal plan={plan} amount={payAmount} onClose={()=>setPayModal(false)} c={col} lang={lang}/>}
    <div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
      <Back onClick={onBack} c={col} label={t.back}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'4px'}}>
        <h2 style={{fontFamily:"'Syne',serif",fontSize:'24px',fontWeight:'800',color:col.T,margin:0}}>{plan.name}</h2>
        <button onClick={refresh} style={{background:'none',border:`1px solid ${col.BD}`,color:col.M2,cursor:'pointer',fontSize:'12px',padding:'6px 10px',borderRadius:'8px',fontFamily:'inherit'}}>↻</button>
      </div>
      <div style={{fontSize:'13px',color:col.M2,marginBottom:'12px'}}>{total} {total===1?t.responses:t.responsesP} · <span style={{color:col.A,fontWeight:'700',letterSpacing:'.1em'}}>{plan.id}</span>{plan.isPublic?<span style={{color:col.A}}> · 🌍</span>:null}</div>

      {plan.confirmedDate&&<div style={{background:`${col.A}15`,border:`1px solid ${col.A}50`,borderRadius:'12px',padding:'14px 16px',marginBottom:'14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div style={{fontSize:'11px',color:col.A,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'2px'}}>{t.confirmedDate}</div><div style={{fontSize:'15px',color:col.T,fontWeight:'600',textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate,lang)}</div></div>
        <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
          {isOrgState&&<button onClick={waConfirm} style={{background:'#25D366',border:'none',borderRadius:'10px',padding:'8px 12px',color:'#fff',fontSize:'12px',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'}}>{t.notifyGroup}</button>}
          <button onClick={waReminder} style={{background:col.CARD2,border:`1px solid ${col.BD}`,borderRadius:'10px',padding:'8px 12px',color:col.M2,fontSize:'12px',fontWeight:'600',cursor:'pointer',fontFamily:'inherit'}}>{reminderSent?t.reminderSent:t.sendReminder}</button>
        </div>
      </div>}

      {isOrgState&&<div style={{display:'flex',gap:'8px',marginBottom:'16px'}}>
        <button onClick={togglePublic} style={{flex:1,padding:'9px',background:plan.isPublic?`${col.A}15`:col.CARD,border:`1px solid ${plan.isPublic?col.A+'50':col.BD}`,borderRadius:'10px',color:plan.isPublic?col.A:col.M2,fontSize:'12px',fontWeight:'600',cursor:'pointer',fontFamily:'inherit'}}>{plan.isPublic?`✓ ${t.publicPlan}`:t.makePublic}</button>

        ?<Card c={col} style={{textAlign:'center',padding:'32px'}}><div style={{fontSize:'36px',marginBottom:'12px'}}>⏳</div><div style={{color:col.T,fontWeight:'500',marginBottom:'6px'}}>{t.noResp}</div><div style={{color:col.M2,fontSize:'13px'}}>{t.noRespSub} <span style={{color:col.A,fontWeight:'700'}}>{plan.id}</span></div></Card>
        :<>
          {best&&counts[best]>0&&<div style={{background:`${col.A}12`,border:`1px solid ${col.A}35`,borderRadius:'14px',padding:'16px',marginBottom:'18px'}}>
            <div style={{display:'flex',gap:'14px',alignItems:'center',marginBottom:isOrgState&&!plan.confirmedDate?'14px':'0'}}>
              <div style={{fontSize:'28px'}}>⭐</div>

                <div style={{fontSize:'11px',color:col.A,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'2px'}}>{t.bestOpt}</div>

function App(){
  const[theme,setTheme]=useState(()=>ls.get('q_theme',null)||getSysTheme());
  const[lang,setLang]=useState(()=>ls.get('q_lang','es'));
  const[screen,setScreen]=useState('home');
  const[plan,setPlan]=useState(null);
  const[isOrg,setIsOrg]=useState(false);
  const[user,setUser]=useState(()=>ls.get('q_user',null));
  const c=useMemo(()=>C(theme),[theme]);

  useEffect(()=>{applyTheme(theme);},[theme]);
  const toggleTheme=()=>setTheme(t=>{const n=t==='dark'?'light':'dark';applyTheme(n);ls.set('q_theme',n);return n;});
  const toggleLang=()=>setLang(l=>{const n=l==='es'?'en':'es';ls.set('q_lang',n);return n;});

  useEffect(()=>{
    const code=new URLSearchParams(location.search).get('code');
    if(code){loadPlan(code).then(p=>{if(p){setPlan(p);setIsOrg(false);setScreen('respond');}});return;}
    const saved=ls.get('q_state',null);
    if(saved?.planId){loadPlan(saved.planId).then(p=>{if(p){setPlan(p);setIsOrg(saved.isOrg||false);setScreen(saved.screen||'home');}});}
  },[]);

  const nav=(s,p=null,org=false)=>{
    setScreen(s);
    if(p)setPlan(p);
    setIsOrg(org);
    if(s!=='home')ls.set('q_state',{screen:s,planId:p?.id||plan?.id,isOrg:org});
    else ls.set('q_state',{});
  };

  const handleJoin=async code=>{const p=await loadPlan(code);if(p){nav('respond',p,false);return true;}return false;};
  const handleOpenFromProfile=async id=>{const p=await loadPlan(id);if(p){const mine=getMyPlans().find(x=>x.id===id);nav('results',p,mine?.role==='organizer');}};
  const handleDiscoverJoin=async id=>{const p=await loadPlan(id);if(p){nav('respond',p,false);}};

  const t=T[lang];
  const noNav=['home','create','profile','discover'];

  return(<div style={{minHeight:'100vh',background:c.BG,color:c.T,fontFamily:"'DM Sans',system-ui,sans-serif"}}>
    <div style={{borderBottom:`1px solid ${c.BD}`,padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:c.BG+'F0',backdropFilter:'blur(10px)',zIndex:10}}>
      <div onClick={()=>nav('home')} style={{fontFamily:"'Syne',serif",fontWeight:'800',fontSize:'22px',cursor:'pointer',color:c.T,letterSpacing:'-.02em'}}>queda<span style={{color:c.A}}>.</span></div>
      <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
        {plan&&!noNav.includes(screen)&&<span style={{fontSize:'12px',color:c.M}}>código: <span style={{color:c.A,fontWeight:'800',letterSpacing:'.1em'}}>{plan.id}</span></span>}
        {user&&<div style={{width:'28px',height:'28px',borderRadius:'50%',background:`${c.A}25`,border:`1px solid ${c.A}50`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:'800',color:c.A,cursor:'pointer'}} onClick={()=>nav('profile')}>{user.name?.charAt(0).toUpperCase()||'?'}</div>}
        <button onClick={toggleLang} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'5px 10px',cursor:'pointer',fontSize:'12px',fontWeight:'700',color:c.M2}}>{lang==='es'?'EN':'ES'}</button>
        <button onClick={toggleTheme} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'6px 10px',cursor:'pointer',fontSize:'15px'}}>{theme==='dark'?'☀️':'🌙'}</button>
      </div>
    </div>

    {screen==='home'&&<HomeScreen onCreate={()=>nav('create')} onJoin={handleJoin} onProfile={()=>nav('profile')} onDiscover={()=>nav('discover')} c={c} lang={lang} toggleLang={toggleLang} toggleTheme={toggleTheme} theme={theme} user={user}/>}
    {screen==='profile'&&<ProfileScreen onBack={()=>nav('home')} onOpen={handleOpenFromProfile} c={c} lang={lang} user={user}/>}
    {screen==='discover'&&<DiscoverScreen onBack={()=>nav('home')} onJoin={handleDiscoverJoin} c={c} lang={lang}/>}
    {screen==='create'&&<CreateScreen onBack={()=>nav('home')} onCreated={p=>{nav('share',p,true);}} c={c} lang={lang} user={user}/>}
    {screen==='share'&&plan&&<ShareScreen plan={plan} onViewResults={()=>nav('results',plan,isOrg)} onBack={()=>nav('home')} c={c} lang={lang}/>}
    {screen==='respond'&&plan&&<RespondScreen plan={plan} onBack={()=>nav('home')} onDone={()=>nav('results',plan,false)} c={c} lang={lang}/>}
    {screen==='results'&&plan&&<ResultsScreen plan={plan} onBack={()=>nav(isOrg?'share':'home',plan,isOrg)} isOrg={isOrg} c={c} lang={lang}/>}
  </div>);
}

const getPremium = () => ls.get('q_premium', { active: false, earnings: [], totalEarned: 0, pending: 0 });
const setPremium = v => ls.set('q_premium', v);
const activatePremium = () => {
  const p = getPremium();
  setPremium({ ...p, active: true, activatedAt: new Date().toISOString() });
};
const addEarning = (planId, planName, amount) => {
  const p = getPremium();
  const orgShare = parseFloat((amount * ORG_FEE).toFixed(2));
  const entry = { planId, planName, amount, orgShare, date: new Date().toISOString() };
  setPremium({ ...p, earnings: [entry, ...(p.earnings || [])].slice(0, 100), totalEarned: (p.totalEarned || 0) + orgShare, pending: (p.pending || 0) + orgShare });
};

  useEffect(() => {

  return (

          <div>

          {b.link && <a href={b.link.startsWith('http') ? b.link : 'https://' + b.link} target="_blank" rel="noreferrer" style={{ fontSize: '12px', color: col.A, textDecoration: 'none', padding: '4px 10px', border: `1px solid ${col.A}40`, borderRadius: '8px', flexShrink: 0 }}>Ver ↗</a>}

// PATCH: Updated App with new screens
// ══════════════════════════════════════════════════════
function App(){
  const[theme,setTheme]=useState(()=>ls.get('q_theme',null)||getSysTheme());
  const[lang,setLang]=useState(()=>ls.get('q_lang','es'));
  const[screen,setScreen]=useState('home');
  const[plan,setPlan]=useState(null);
  const[isOrg,setIsOrg]=useState(false);
  const[user,setUser]=useState(()=>ls.get('q_user',null));
  const c=useMemo(()=>C(theme),[theme]);

  useEffect(()=>{applyTheme(theme);},[theme]);
  const toggleTheme=()=>setTheme(t=>{const n=t==='dark'?'light':'dark';applyTheme(n);ls.set('q_theme',n);return n;});
  const toggleLang=()=>setLang(l=>{const n=l==='es'?'en':'es';ls.set('q_lang',n);return n;});

  useEffect(()=>{
    const code=new URLSearchParams(location.search).get('code');
    if(code){loadPlan(code).then(p=>{if(p){setPlan(p);setIsOrg(false);setScreen('respond');}});return;}
    const saved=ls.get('q_state',null);
    if(saved?.planId){loadPlan(saved.planId).then(p=>{if(p){setPlan(p);setIsOrg(saved.isOrg||false);setScreen(saved.screen||'home');}});}
  },[]);

  const nav=(s,p=null,org=false)=>{
    setScreen(s);
    if(p)setPlan(p);
    setIsOrg(org);
    if(s!=='home')ls.set('q_state',{screen:s,planId:p?.id||plan?.id,isOrg:org});
    else ls.set('q_state',{});
  };

  const handleJoin=async code=>{const p=await loadPlan(code);if(p){nav('respond',p,false);return true;}return false;};
  const handleOpenFromProfile=async id=>{const p=await loadPlan(id);if(p){const mine=getMyPlans().find(x=>x.id===id);nav('results',p,mine?.role==='organizer');}};
  const handleDiscoverJoin=async id=>{const p=await loadPlan(id);if(p){nav('respond',p,false);}};

  const premium=getPremium();
  const t=T[lang];
  const noNav=['home','create','profile','discover','premium','business'];

  return(<div style={{minHeight:'100vh',background:c.BG,color:c.T,fontFamily:"'DM Sans',system-ui,sans-serif"}}>
    <div style={{borderBottom:`1px solid ${c.BD}`,padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:c.BG+'F0',backdropFilter:'blur(10px)',zIndex:10}}>
      <div onClick={()=>nav('home')} style={{fontFamily:"'Syne',serif",fontWeight:'800',fontSize:'22px',cursor:'pointer',color:c.T,letterSpacing:'-.02em'}}>
        queda<span style={{color:c.A}}>.</span>
        {premium.active&&<span style={{fontSize:'11px',color:c.A,marginLeft:'4px',fontWeight:'700'}}>Pro</span>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
        {plan&&!noNav.includes(screen)&&<span style={{fontSize:'12px',color:c.M}}>código: <span style={{color:c.A,fontWeight:'800',letterSpacing:'.1em'}}>{plan.id}</span></span>}
        {user&&<div style={{width:'28px',height:'28px',borderRadius:'50%',background:`${c.A}25`,border:`1px solid ${c.A}50`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:'800',color:c.A,cursor:'pointer'}} onClick={()=>nav('profile')}>{user.name?.charAt(0).toUpperCase()||'?'}</div>}
        <button onClick={()=>nav('premium')} style={{background:premium.active?`${c.A}20`:c.CARD,border:`1px solid ${premium.active?c.A+'50':c.BD}`,borderRadius:'8px',padding:'5px 9px',cursor:'pointer',fontSize:'12px',fontWeight:'700',color:premium.active?c.A:c.M2}}>⭐{premium.active?' Pro':''}</button>
        <button onClick={toggleLang} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'5px 10px',cursor:'pointer',fontSize:'12px',fontWeight:'700',color:c.M2}}>{lang==='es'?'EN':'ES'}</button>
        <button onClick={toggleTheme} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'6px 10px',cursor:'pointer',fontSize:'15px'}}>{theme==='dark'?'☀️':'🌙'}</button>
      </div>
    </div>

    {screen==='home'&&<HomeScreen onCreate={()=>nav('create')} onJoin={handleJoin} onProfile={()=>nav('profile')} onDiscover={()=>nav('discover')} onBusiness={()=>nav('business')} onPremium={()=>nav('premium')} c={c} lang={lang} toggleLang={toggleLang} toggleTheme={toggleTheme} theme={theme} user={user} premium={premium}/>}
    {screen==='profile'&&<ProfileScreen onBack={()=>nav('home')} onOpen={handleOpenFromProfile} c={c} lang={lang} user={user} onPremium={()=>nav('premium')}/>}
    {screen==='discover'&&<DiscoverScreen onBack={()=>nav('home')} onJoin={handleDiscoverJoin} c={c} lang={lang}/>}
    {screen==='premium'&&<PremiumScreen onBack={()=>nav('home')} c={c} lang={lang}/>}
    {screen==='business'&&<BusinessScreen onBack={()=>nav('home')} c={c} lang={lang}/>}
    {screen==='create'&&<CreateScreen onBack={()=>nav('home')} onCreated={p=>{nav('share',p,true);}} c={c} lang={lang} user={user}/>}
    {screen==='share'&&plan&&<ShareScreen plan={plan} onViewResults={()=>nav('results',plan,isOrg)} onBack={()=>nav('home')} c={c} lang={lang}/>}
    {screen==='respond'&&plan&&<RespondScreen plan={plan} onBack={()=>nav('home')} onDone={()=>nav('results',plan,false)} onCreateOwn={()=>nav('create')} c={c} lang={lang}/>}
    {screen==='results'&&plan&&<ResultsScreen plan={plan} onBack={()=>nav(isOrg?'share':'home',plan,isOrg)} isOrg={isOrg} c={c} lang={lang} onBusiness={()=>nav('business')}/>}
  </div>);
}

const sendMessage = async (planId, name, text) => {
  try {

function ChatPanel({ planId, myName, c, lang }) {
  const col = c;
  const [messages, setMessages] = useState([]);
  const [text, setText] = useState('');
  const [name, setName] = useState(myName || ls.get('q_chatname', ''));
  const [sending, setSending] = useState(false);
  const bottomRef = useRef(null);
  const channelRef = useRef(null);

  useEffect(() => {
    loadMessages(planId).then(setMessages);
    // Realtime subscription
    channelRef.current = db
      .channel(`chat:${planId}`)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `plan_id=eq.${planId}` },
        payload => setMessages(prev => [...prev, payload.new])
      )
      .subscribe();
    return () => { channelRef.current?.unsubscribe(); };
  }, [planId]);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  const send = async () => {
    if (!text.trim() || !name.trim() || sending) return;
    setSending(true);

    setText('');
    setSending(false);
  };

          <div style={{ textAlign: 'center', color: col.M, fontSize: '13px', padding: '32px 0' }}>
            {lang === 'es' ? 'Sé el primero en escribir algo 👋' : 'Be the first to say something 👋'}
          </div>
        )}
        {messages.map((m, i) => {
          const isMe = m.name === name;
          return (
            <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: isMe ? 'flex-end' : 'flex-start' }}>
              {!isMe && <div style={{ fontSize: '11px', color: col.M2, marginBottom: '2px', paddingLeft: '4px' }}>{m.name}</div>}
              <div style={{ maxWidth: '80%', padding: '10px 14px', borderRadius: isMe ? '18px 18px 4px 18px' : '18px 18px 18px 4px', background: isMe ? col.A : col.CARD2, color: isMe ? '#0A0A0A' : col.T, fontSize: '14px', lineHeight: 1.5, wordBreak: 'break-word' }}>
                {m.text}
              </div>
              <div style={{ fontSize: '10px', color: col.M, marginTop: '2px', paddingRight: isMe ? '4px' : '0', paddingLeft: isMe ? '0' : '4px' }}>{fmtTime(m.at)}</div>
            </div>
          );
        })}
        <div ref={bottomRef} />
      </div>
      <div style={{ display: 'flex', gap: '8px', paddingTop: '10px', borderTop: `1px solid ${col.BD}` }}>
        <input value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === 'Enter' && !e.shiftKey && send()} placeholder={lang === 'es' ? 'Escribe un mensaje...' : 'Write a message...'}

    </div>
  );
}

function VotingPanel({ plan, onUpdatePlan, isOrg, myName, c, lang }) {
  const col = c;
  const [votes, setVotes] = useState([]);
  const [loading, setL] = useState(true);
  const [newOption, setNewOption] = useState('');
  const [myVote, setMyVote] = useState(null);
  const userId = myName || ls.get('q_chatname', 'anon');

  useEffect(() => {
    loadVotes(plan.id).then(v => {
      setVotes(v);
      const mine = v.find(x => x.user_id === userId);
      if (mine) setMyVote(mine.option_id);
      setL(false);
    });
  }, [plan.id]);

  const options = plan.voteOptions || [];

  const addOption = async () => {
    if (!newOption.trim()) return;
    const opt = { id: genId(), text: newOption.trim(), addedBy: userId, at: new Date().toISOString() };
    const updated = { ...plan, voteOptions: [...options, opt] };
    await updatePlan(updated);
    onUpdatePlan(updated);
    setNewOption('');
  };

  const vote = async optId => {
    setMyVote(optId);
    await saveVote(plan.id, userId, optId);
    const updated = votes.filter(v => v.user_id !== userId);
    setVotes([...updated, { plan_id: plan.id, user_id: userId, option_id: optId }]);
  };

  const countFor = optId => votes.filter(v => v.option_id === optId).length;
  const maxVotes = Math.max(...options.map(o => countFor(o.id)), 1);

  if (loading) return <div style={{ textAlign: 'center', color: col.M, padding: '32px' }}>...</div>;

  return (
    <div>
      {options.length === 0 ? (
        <div style={{ textAlign: 'center', padding: '32px', color: col.M2, fontSize: '14px' }}>
          {lang === 'es' ? 'No hay opciones para votar todavía.' : 'No options to vote on yet.'}
          {isOrg && <div style={{ marginTop: '8px', fontSize: '13px', color: col.M }}>{lang === 'es' ? 'Añade opciones abajo.' : 'Add options below.'}</div>}
        </div>
      ) : (
        <div style={{ marginBottom: '16px' }}>
          {options.map(opt => {
            const n = countFor(opt.id);
            const pct = (n / maxVotes) * 100;
            const isWin = n === maxVotes && n > 0;
            const isMe = myVote === opt.id;
            return (
              <div key={opt.id} onClick={() => vote(opt.id)} style={{ marginBottom: '10px', cursor: 'pointer' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '5px', alignItems: 'center' }}>
                  <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
                    <span style={{ fontSize: '14px', color: isMe ? col.A : col.T, fontWeight: isMe ? '700' : '400' }}>{opt.text}</span>
                    {isWin && n > 0 && <span style={{ fontSize: '10px', background: col.A, color: '#0A0A0A', padding: '1px 7px', borderRadius: '20px', fontWeight: '800' }}>
                      {lang === 'es' ? 'GANANDO' : 'WINNING'}
                    </span>}
                    {isMe && <span style={{ fontSize: '11px', color: col.A }}>✓ {lang === 'es' ? 'tu voto' : 'your vote'}</span>}
                  </div>
                  <span style={{ fontSize: '13px', color: isWin ? col.A : col.M2, fontWeight: isWin ? '700' : '400' }}>{n}</span>
                </div>
                <div style={{ height: '7px', background: col.BD, borderRadius: '4px', overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: `${pct}%`, background: isWin ? col.A : col.CARD2, borderRadius: '4px', transition: 'width .4s' }} />
                </div>
              </div>
            );
          })}
        </div>
      )}
      {(isOrg || options.length < 10) && (
        <div style={{ display: 'flex', gap: '8px' }}>
          <input value={newOption} onChange={e => setNewOption(e.target.value)} onKeyDown={e => e.key === 'Enter' && addOption()}
            placeholder={lang === 'es' ? 'Añadir opción...' : 'Add option...'}
            style={{ flex: 1, background: col.CARD, border: `1px solid ${col.BD}`, borderRadius: '10px', padding: '10px 14px', color: col.T, fontSize: '14px', fontFamily: 'inherit', outline: 'none' }} />
          <button onClick={addOption} disabled={!newOption.trim()} style={{ background: col.A, border: 'none', borderRadius: '10px', padding: '10px 16px', color: '#0A0A0A', fontWeight: '700', cursor: 'pointer', fontFamily: 'inherit', opacity: !newOption.trim() ? 0.3 : 1 }}>+</button>
        </div>
      )}
    </div>
  );
}

function PlanScore({ planId, confirmedDate, myName, c, lang }) {
  const col = c;
  const [scores, setScores] = useState([]);
  const [myScore, setMyScore] = useState(0);
  const [note, setNote] = useState('');
  const [saved, setSaved] = useState(false);
  const [hovered, setHovered] = useState(0);
  const name = myName || ls.get('q_chatname', '');

  const isPast = confirmedDate && new Date(confirmedDate + 'T23:59:59') < new Date();
  if (!isPast) return null;

  useEffect(() => {
    loadScores(planId).then(s => {
      setScores(s);
      const mine = s.find(x => x.name === name);
      if (mine) { setMyScore(mine.score); setNote(mine.note || ''); setSaved(true); }
    });
  }, [planId]);

  const submit = async () => {
    if (!myScore) return;
    await saveScore(planId, name || 'Anónimo', myScore, note);
    setSaved(true);
    const updated = await loadScores(planId);
    setScores(updated);
  };

  const avg = scores.length > 0 ? (scores.reduce((s, x) => s + x.score, 0) / scores.length).toFixed(1) : null;

  return (
    <div style={{ background: `${col.A}0D`, border: `1px solid ${col.A}30`, borderRadius: '14px', padding: '16px', marginTop: '16px' }}>
      <div style={{ fontSize: '11px', color: col.A, fontWeight: '700', letterSpacing: '.08em', textTransform: 'uppercase', marginBottom: '10px' }}>
        ✨ {lang === 'es' ? '¿Cómo fue el plan?' : 'How was the plan?'}
      </div>
      {avg && <div style={{ textAlign: 'center', fontSize: '32px', fontWeight: '800', color: col.A, marginBottom: '4px' }}>{avg} ⭐</div>}
      {avg && <div style={{ textAlign: 'center', fontSize: '12px', color: col.M2, marginBottom: '12px' }}>{scores.length} {lang === 'es' ? 'valoraciones' : 'ratings'}</div>}
      {!saved ? (
        <>
          <div style={{ display: 'flex', justifyContent: 'center', gap: '8px', marginBottom: '12px' }}>
            {[1,2,3,4,5].map(s => (
              <span key={s} onClick={() => setMyScore(s)} onMouseEnter={() => setHovered(s)} onMouseLeave={() => setHovered(0)}
                style={{ fontSize: '32px', cursor: 'pointer', opacity: (hovered || myScore) >= s ? 1 : 0.3, transition: 'opacity .15s' }}>⭐</span>
            ))}
          </div>
          {myScore > 0 && <>
            <input value={note} onChange={e => setNote(e.target.value)} placeholder={lang === 'es' ? 'Deja un comentario (opcional)...' : 'Leave a comment (optional)...'}
              style={{ width: '100%', background: col.CARD, border: `1px solid ${col.BD}`, borderRadius: '10px', padding: '10px 14px', color: col.T, fontSize: '14px', fontFamily: 'inherit', outline: 'none', boxSizing: 'border-box', marginBottom: '10px' }} />
            <button onClick={submit} style={{ width: '100%', background: col.A, border: 'none', borderRadius: '10px', padding: '12px', color: '#0A0A0A', fontWeight: '700', cursor: 'pointer', fontFamily: 'inherit', fontSize: '14px' }}>
              {lang === 'es' ? 'Enviar valoración →' : 'Submit rating →'}
            </button>
          </>}
        </>
      ) : (
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: '24px', marginBottom: '4px' }}>{'⭐'.repeat(myScore)}</div>
          <div style={{ fontSize: '13px', color: col.M2 }}>{lang === 'es' ? 'Gracias por valorar este plan' : 'Thanks for rating this plan'}</div>
          {note && <div style={{ fontSize: '13px', color: col.T, marginTop: '6px', fontStyle: 'italic' }}>"{note}"</div>}
        </div>
      )}
      {scores.filter(s => s.note).length > 0 && (
        <div style={{ marginTop: '12px', borderTop: `1px solid ${col.BD}`, paddingTop: '12px' }}>
          {scores.filter(s => s.note).map((s, i) => (
            <div key={i} style={{ marginBottom: '8px' }}>
              <div style={{ fontSize: '12px', color: col.M2 }}>{s.name} · {'⭐'.repeat(s.score)}</div>
              <div style={{ fontSize: '13px', color: col.T, fontStyle: 'italic' }}>"{s.note}"</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  const togglePublic = async () => {
    const up = { ...plan, isPublic: !plan.isPublic };
    await updatePlan(up); setPlan(up);
  };
  const setRecurring = async val => {
    const up = { ...plan, recurring: val };
    await updatePlan(up); setPlan(up);
  };

  const TABS = ['who', 'chat', 'vote', 'route', 'extras', 'photos', 'weather', 'transport', 'map', 'pay'];
  const tl = k => ({ who: t.tabs.who, route: t.tabs.route, extras: t.tabs.extras, weather: t.tabs.weather, transport: t.tabs.transport, map: t.tabs.map, pay: t.tabs.pay, chat: '💬 Chat', vote: '🗳️ Votar', photos: '📸 Fotos' }[k]);
  const howLabel = v => ({ car: t.car, transit: t.transit, taxi: t.taxi, walk: t.walk, bike: t.bike }[v] || `🚀 ${v}`);

  return (
    <>
      {payModal && <PaymentModal plan={plan} amount={payAmount} onClose={() => setPayModal(false)} c={col} lang={lang} />}
      <div style={{ padding: '24px', maxWidth: '420px', margin: '0 auto' }}>
        <Back onClick={onBack} c={col} label={t.back} />
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '4px' }}>
          <div>
            <h2 style={{ fontFamily: "'Syne',serif", fontSize: '24px', fontWeight: '800', color: col.T, margin: '0 0 4px' }}>{plan.name}</h2>
            <div style={{ display: 'flex', gap: '6px', alignItems: 'center', flexWrap: 'wrap' }}>
              <RecurringBadge plan={plan} c={col} lang={lang} />
              {plan.isPublic && <span style={{ fontSize: '11px', color: col.A }}>🌍 {lang === 'es' ? 'público' : 'public'}</span>}
            </div>
          </div>
          <button onClick={refresh} style={{ background: 'none', border: `1px solid ${col.BD}`, color: col.M2, cursor: 'pointer', fontSize: '12px', padding: '6px 10px', borderRadius: '8px', fontFamily: 'inherit' }}>↻</button>
        </div>
        <div style={{ fontSize: '13px', color: col.M2, marginBottom: '12px' }}>
          {total} {total === 1 ? t.responses : t.responsesP} · <span style={{ color: col.A, fontWeight: '700', letterSpacing: '.1em' }}>{plan.id}</span>
        </div>

        {plan.confirmedDate && (
          <div style={{ background: `${col.A}15`, border: `1px solid ${col.A}50`, borderRadius: '12px', padding: '14px 16px', marginBottom: '14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: '11px', color: col.A, fontWeight: '700', letterSpacing: '.08em', textTransform: 'uppercase', marginBottom: '2px' }}>{t.confirmedDate}</div>
              <div style={{ fontSize: '15px', color: col.T, fontWeight: '600', textTransform: 'capitalize' }}>{fmtDate(plan.confirmedDate, lang)}</div>
            </div>
            <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
              {isOrgState && <button onClick={waConfirm} style={{ background: '#25D366', border: 'none', borderRadius: '10px', padding: '8px 12px', color: '#fff', fontSize: '12px', fontWeight: '700', cursor: 'pointer', fontFamily: 'inherit' }}>{t.notifyGroup}</button>}
              <button onClick={waReminder} style={{ background: col.CARD2, border: `1px solid ${col.BD}`, borderRadius: '10px', padding: '8px 12px', color: reminderSent ? col.A : col.M2, fontSize: '12px', fontWeight: '600', cursor: 'pointer', fontFamily: 'inherit' }}>{reminderSent ? t.reminderSent : t.sendReminder}</button>
            </div>
          </div>
        )}

        {isOrgState && (
          <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
            <button onClick={togglePublic} style={{ flex: 1, padding: '8px', background: plan.isPublic ? `${col.A}15` : col.CARD, border: `1px solid ${plan.isPublic ? col.A + '50' : col.BD}`, borderRadius: '10px', color: plan.isPublic ? col.A : col.M2, fontSize: '12px', fontWeight: '600', cursor: 'pointer', fontFamily: 'inherit' }}>
              {plan.isPublic ? `✓ ${lang === 'es' ? 'Público' : 'Public'}` : `🌍 ${lang === 'es' ? 'Hacer público' : 'Make public'}`}
            </button>
            <select value={plan.recurring || ''} onChange={e => setRecurring(e.target.value || null)} style={{ flex: 1, background: col.CARD, border: `1px solid ${col.BD}`, color: plan.recurring ? col.A : col.M2, fontSize: '12px', padding: '8px 10px', borderRadius: '10px', fontFamily: 'inherit', fontWeight: plan.recurring ? '600' : '400' }}>
              <option value=''>🔄 {lang === 'es' ? 'Sin repetición' : 'No repeat'}</option>
              <option value='weekly'>{lang === 'es' ? '🔄 Semanal' : '🔄 Weekly'}</option>
              <option value='biweekly'>{lang === 'es' ? '🔄 Quincenal' : '🔄 Biweekly'}</option>
              <option value='monthly'>{lang === 'es' ? '🔄 Mensual' : '🔄 Monthly'}</option>
            </select>
          </div>
        )}

        <div style={{ display: 'flex', gap: '5px', overflowX: 'auto', paddingBottom: '4px', marginBottom: '20px' }}>
          {TABS.map(tb => (
            <button key={tb} onClick={() => setTab(tb)} style={{ padding: '7px 11px', borderRadius: '20px', border: `1px solid ${tab === tb ? col.A + '60' : col.BD}`, background: tab === tb ? `${col.A}15` : col.CARD, color: tab === tb ? col.A : col.M2, fontSize: '12px', fontWeight: tab === tb ? '700' : '400', cursor: 'pointer', fontFamily: 'inherit', whiteSpace: 'nowrap', flexShrink: 0 }}>
              {tl(tb)}
            </button>
          ))}
        </div>

        {loading && <div style={{ textAlign: 'center', color: col.M, padding: '48px' }}>...</div>}

        {!loading && tab === 'who' && (
          total === 0
            ? <Card c={col} style={{ textAlign: 'center', padding: '32px' }}><div style={{ fontSize: '36px', marginBottom: '12px' }}>⏳</div><div style={{ color: col.T, fontWeight: '500', marginBottom: '6px' }}>{t.noResp}</div><div style={{ color: col.M2, fontSize: '13px' }}>{t.noRespSub} <span style={{ color: col.A, fontWeight: '700' }}>{plan.id}</span></div></Card>
            : <>
                {best && counts[best] > 0 && (
                  <div style={{ background: `${col.A}12`, border: `1px solid ${col.A}35`, borderRadius: '14px', padding: '16px', marginBottom: '18px' }}>
                    <div style={{ display: 'flex', gap: '14px', alignItems: 'center', marginBottom: isOrgState && !plan.confirmedDate ? '14px' : '0' }}>
                      <div style={{ fontSize: '28px' }}>⭐</div>
                      <div>
                        <div style={{ fontSize: '11px', color: col.A, fontWeight: '700', letterSpacing: '.08em', textTransform: 'uppercase', marginBottom: '2px' }}>{t.bestOpt}</div>
                        <div style={{ fontSize: '15px', color: col.T, fontWeight: '600', textTransform: 'capitalize' }}>{fmtDate(best, lang)}</div>
                        {plan.times?.[best]?.length > 0 && <div style={{ fontSize: '12px', color: col.M2 }}>{plan.times[best].join(', ')}</div>}
                        <div style={{ fontSize: '13px', color: col.M2 }}>{counts[best]}/{total} {lang === 'en' ? 'can' : 'pueden'}</div>
                      </div>
                    </div>
                    {isOrgState && !plan.confirmedDate && <Btn onClick={() => confirmDate(best)} disabled={confirming} full sm c={col}>{confirming ? t.confirming : t.confirmThis}</Btn>}
                  </div>
                )}
                <div style={{ marginBottom: '20px' }}>
                  {(plan.dates || []).map(d => {
                    const n = counts[d]; const pct = (n / mx) * 100; const isBest = d === best && n > 0; const isConf = d === plan.confirmedDate;
                    return (
                      <div key={d} style={{ marginBottom: '12px' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '5px' }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                            <span style={{ fontSize: '13px', color: isConf || isBest ? col.A : col.T, fontWeight: isConf || isBest ? '700' : '400', textTransform: 'capitalize' }}>{fmtShort(d, lang)}</span>
                            {isConf && <span style={{ fontSize: '10px', background: col.A, color: '#0A0A0A', padding: '1px 7px', borderRadius: '20px', fontWeight: '800' }}>{t.CONFIRMED}</span>}
                            {!isConf && isBest && <span>⭐</span>}
                          </div>
                          <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                            <span style={{ fontSize: '13px', color: isBest ? col.A : col.M2, fontWeight: isBest ? '700' : '400' }}>{n}/{total}</span>
                            {isOrgState && !plan.confirmedDate && d !== best && n > 0 && <button onClick={() => confirmDate(d)} style={{ background: 'none', border: 'none', color: col.M2, fontSize: '11px', cursor: 'pointer', fontFamily: 'inherit', textDecoration: 'underline' }}>{t.confirmSmall}</button>}
                          </div>
                        </div>
                        <div style={{ height: '7px', background: col.BD, borderRadius: '4px', overflow: 'hidden' }}>
                          <div style={{ height: '100%', width: `${pct}%`, background: isConf || isBest ? col.A : col.CARD2, borderRadius: '4px', transition: 'width .5s' }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
                <Card c={col}>
                  <Lbl c={col}>{lang === 'en' ? 'Detail per person' : 'Detalle por persona'}</Lbl>
                  {responses.map((r, i) => (
                    <div key={i} style={{ paddingBottom: '12px', marginBottom: '12px', borderBottom: i < responses.length - 1 ? `1px solid ${col.BD}` : 'none' }}>
                      <div style={{ fontSize: '14px', color: col.T, fontWeight: '600', marginBottom: '6px' }}>{r.name}{r.how && <span style={{ fontSize: '12px', color: col.M2, fontWeight: '400' }}> · {howLabel(r.how)}</span>}</div>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '5px' }}>
                        {(plan.dates || []).map(d => <span key={d} style={{ fontSize: '11px', padding: '3px 9px', borderRadius: '20px', background: r.avail?.[d] ? `${col.A}20` : col.CARD2, color: r.avail?.[d] ? col.A : col.M, fontWeight: r.avail?.[d] ? '700' : '400', border: `1px solid ${r.avail?.[d] ? col.A + '40' : col.BD}`, textTransform: 'capitalize' }}>{fmtShort(d, lang)}</span>)}
                      </div>
                    </div>
                  ))}
                </Card>
                <PlanScore planId={plan.id} confirmedDate={plan.confirmedDate} myName={myName} c={col} lang={lang} />
              </>
        )}

        {!loading && tab === 'chat' && <ChatPanel planId={plan.id} myName={myName} c={col} lang={lang} />}

        {!loading && tab === 'vote' && <VotingPanel plan={plan} onUpdatePlan={setPlan} isOrg={isOrgState} myName={myName} c={col} lang={lang} />}

        {!loading && tab === 'photos' && <PhotoAlbum planId={plan.id} myName={myName} c={col} lang={lang} />}

        {!loading && tab === 'route' && <>
          {(plan.stops || []).map((s, i) => (
            <div key={s.id || i} style={{ display: 'flex', gap: '12px', marginBottom: '10px' }}>
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                <div style={{ width: '28px', height: '28px', borderRadius: '50%', background: `${col.A}20`, border: `1.5px solid ${col.A}60`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '12px', fontWeight: '800', color: col.A, flexShrink: 0 }}>{i + 1}</div>
                {i < plan.stops.length - 1 && <div style={{ width: '2px', flex: 1, background: col.BD, margin: '4px 0' }} />}
              </div>
              <Card c={col} style={{ flex: 1, marginBottom: 0 }}>
                <div style={{ fontSize: '11px', color: col.M2, marginBottom: '4px' }}>{s.cat}</div>
                <div style={{ fontSize: '15px', color: col.T, fontWeight: '600', marginBottom: '4px' }}>{s.name || '—'}</div>
                {s.address && <div style={{ fontSize: '12px', color: col.M2, marginBottom: '8px' }}>📍 {s.address}</div>}
                <BusinessSuggestions city={plan.city} type={s.cat} c={col} lang={lang} />
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px', alignItems: 'center', marginTop: '8px' }}>
                  {parseFloat(s.cost) > 0 && <Badge color={col.A}>{s.cost}€/pers.</Badge>}
                  {(s.address || s.name) && <a href={`https://maps.google.com/?q=${encodeURIComponent((s.name || '') + (s.address ? ' ' + s.address : ''))}`} target="_blank" rel="noreferrer" style={{ fontSize: '12px', color: col.M2, textDecoration: 'none', padding: '4px 10px', border: `1px solid ${col.BD}`, borderRadius: '8px' }}>Maps 🗺️</a>}
                  {s.link && <a href={s.link.startsWith('http') ? s.link : 'https://' + s.link} target="_blank" rel="noreferrer" style={{ fontSize: '12px', color: col.A, textDecoration: 'none', padding: '4px 10px', border: `1px solid ${col.A}40`, borderRadius: '8px' }}>{lang === 'en' ? 'Book' : 'Reserva'} ↗</a>}
                  {s.stripeLink && <a href={s.stripeLink.startsWith('http') ? s.stripeLink : 'https://' + s.stripeLink} target="_blank" rel="noreferrer" style={{ fontSize: '12px', color: '#fff', textDecoration: 'none', padding: '4px 10px', borderRadius: '8px', background: '#635BFF', fontWeight: '600' }}>💳</a>}
                </div>
              </Card>
            </div>
          ))}
          {budget > 0 && <><HR c={col} />
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: '14px 16px', background: `${col.A}0D`, border: `1px solid ${col.A}30`, borderRadius: '12px', marginBottom: '10px' }}><span style={{ color: col.M2 }}>{t.perPerson}</span><span style={{ color: col.A, fontSize: '22px', fontWeight: '800' }}>{budget.toFixed(0)}€</span></div>
            {giftPer > 0 && <div style={{ display: 'flex', justifyContent: 'space-between', padding: '12px 16px', background: col.CARD, border: `1px solid ${col.BD}`, borderRadius: '12px', marginBottom: '10px' }}><span style={{ color: col.M2, fontSize: '14px' }}>+ regalo</span><span style={{ color: col.T, fontWeight: '600' }}>{giftPer.toFixed(0)}€/pers.</span></div>}
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: '14px 16px', background: col.CARD2, border: `1px solid ${col.BD}`, borderRadius: '12px' }}><span style={{ color: col.T, fontWeight: '700' }}>{t.total}</span><span style={{ color: col.A, fontSize: '18px', fontWeight: '800' }}>{(budget + giftPer).toFixed(0)}€</span></div>
          </>}
        </>}

        {!loading && tab === 'extras' && <>
          {plan.gift
            ? <Card c={col} accent style={{ marginBottom: '16px' }}>
                <div style={{ fontSize: '11px', color: col.M2, fontWeight: '700', letterSpacing: '.08em', textTransform: 'uppercase', marginBottom: '12px' }}>{t.gift2}</div>
                <div style={{ fontSize: '18px', color: col.T, fontWeight: '600', marginBottom: '8px' }}>{plan.gift.name || '—'}</div>
                {plan.gift.price && <><div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}><span style={{ color: col.M2, fontSize: '14px' }}>{t.totalPrice}</span><span style={{ color: col.A, fontWeight: '700', fontSize: '18px' }}>{plan.gift.price}€</span></div>
                {total > 0 && <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '12px' }}><span style={{ color: col.M2, fontSize: '14px' }}>{t.perOf} ({total})</span><span style={{ color: col.A, fontWeight: '700' }}>{(parseFloat(plan.gift.price) / total).toFixed(2)}€</span></div>}</>}
                {plan.gift.link && <a href={plan.gift.link.startsWith('http') ? plan.gift.link : 'https://' + plan.gift.link} target="_blank" rel="noreferrer" style={{ display: 'block', textAlign: 'center', padding: '10px', background: `${col.A}20`, border: `1px solid ${col.A}50`, borderRadius: '10px', color: col.A, textDecoration: 'none', fontSize: '14px', fontWeight: '600', marginBottom: '10px' }}>{t.seeGift}</a>}
                <Btn onClick={() => { setPayAmount((budget + giftPer).toFixed(2)); setPayModal(true); }} full style={{ padding: '13px' }} c={col}>💳 {t.payTitle}</Btn>
              </Card>
            : <Card c={col} style={{ textAlign: 'center', padding: '28px' }}><div style={{ fontSize: '32px', marginBottom: '10px' }}>🎁</div><div style={{ color: col.M2, fontSize: '14px' }}>{lang === 'en' ? 'No gift in this plan' : 'No hay regalo en este plan'}</div></Card>
          }
          {plan.bring?.filter(b => b.text || typeof b === 'string').length > 0 && (
            <Card c={col}>
              <Lbl c={col}>{t.bring}</Lbl>
              {plan.bring.filter(b => b.text || typeof b === 'string').map((b, i) => {
                const text = typeof b === 'string' ? b : b.text;
                return <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '10px 0', borderBottom: i < plan.bring.length - 1 ? `1px solid ${col.BD}` : 'none', fontSize: '14px', color: col.T }}><div style={{ width: '7px', height: '7px', borderRadius: '50%', background: col.A, flexShrink: 0 }} />{text}</div>;
              })}
            </Card>
          )}
        </>}

        {!loading && tab === 'weather' && <>
          {best
            ? <>
                <div style={{ fontSize: '14px', color: col.M2, marginBottom: '16px' }}>{t.forecastFor} <span style={{ color: col.T, fontWeight: '600', textTransform: 'capitalize' }}>{fmtDate(plan.confirmedDate || best, lang)}</span>{plan.city ? ` — ${plan.city}` : ''}</div>
                {plan.city
                  ? <WeatherWidget city={plan.city} date={plan.confirmedDate || best} c={col} lang={lang} showAdvice={true} />
                  : <Card c={col} style={{ textAlign: 'center', padding: '28px' }}><div style={{ fontSize: '32px', marginBottom: '10px' }}>🌤️</div><div style={{ color: col.M2, fontSize: '14px' }}>{t.noCity}</div></Card>}
                {plan.city && plan.dates?.length > 1 && <><HR c={col} /><Lbl c={col}>{t.allDates}</Lbl>{plan.dates.map(d => <div key={d} style={{ marginBottom: '14px' }}><div style={{ fontSize: '13px', color: col.M2, marginBottom: '6px', textTransform: 'capitalize' }}>{fmtShort(d, lang)}{d === plan.confirmedDate ? ' 📌' : ''}</div><WeatherWidget city={plan.city} date={d} c={col} lang={lang} showAdvice={true} /></div>)}</>}
              </>
            : <Card c={col} style={{ textAlign: 'center', padding: '28px' }}><div style={{ fontSize: '32px', marginBottom: '10px' }}>⏳</div><div style={{ color: col.M2, fontSize: '14px' }}>{t.needResp}</div></Card>
          }
        </>}

        {!loading && tab === 'transport' && <>
          {fs
            ? <>
                <Card c={col} style={{ marginBottom: '12px' }}><div style={{ fontSize: '11px', color: col.M2, fontWeight: '700', letterSpacing: '.06em', textTransform: 'uppercase', marginBottom: '8px' }}>{t.dest}</div><div style={{ fontSize: '15px', color: col.T, fontWeight: '600' }}>{fs.name}</div>{fs.address && <div style={{ fontSize: '13px', color: col.M2 }}>{fs.address}</div>}</Card>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', marginBottom: '20px' }}>
                  {[{ name: 'Google Maps', icon: '🗺️', url: `https://maps.google.com/?q=${encodeURIComponent((fs.name || '') + (fs.address ? ' ' + fs.address : ''))}` }, { name: 'Uber', icon: '⚫', url: 'https://m.uber.com/' }, { name: 'Cabify', icon: '🟣', url: 'https://cabify.com/' }, { name: 'Renfe', icon: '🚆', url: 'https://www.renfe.com/' }, { name: 'Metro/EMT', icon: '🚇', url: 'https://www.emt.madrid.es/' }, { name: 'Trainline', icon: '🎫', url: 'https://www.thetrainline.com/' }].map(tx => (
                    <a key={tx.name} href={tx.url} target="_blank" rel="noreferrer" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '8px', padding: '18px 10px', background: col.CARD, border: `1px solid ${col.BD}`, borderRadius: '14px', textDecoration: 'none' }}>
                      <div style={{ fontSize: '28px' }}>{tx.icon}</div><div style={{ fontSize: '13px', color: col.T, fontWeight: '600', textAlign: 'center' }}>{tx.name}</div>
                    </a>
                  ))}
                </div>
                {responses.filter(r => r.how).length > 0 && <><Lbl c={col}>{t.howEach}</Lbl>{responses.filter(r => r.how).map((r, i) => <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: `1px solid ${col.BD}`, fontSize: '14px' }}><span style={{ color: col.T }}>{r.name}</span><span style={{ color: col.M2 }}>{howLabel(r.how)}</span></div>)}</>}
              </>
            : <Card c={col} style={{ textAlign: 'center', padding: '28px' }}><div style={{ fontSize: '32px', marginBottom: '10px' }}>📍</div><div style={{ color: col.M2, fontSize: '14px' }}>{t.noStops}</div></Card>
          }
        </>}

        {!loading && tab === 'map' && <RouteMap stops={plan.stops || []} c={col} />}

        {!loading && tab === 'pay' && <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
          <div style={{ fontSize: '14px', color: col.M2, marginBottom: '4px' }}>{lang === 'en' ? 'Pay your share directly from the app' : 'Paga tu parte directamente desde la app'}</div>
          {budget > 0 && <Card c={col} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div><div style={{ fontSize: '13px', color: col.M2 }}>{lang === 'en' ? 'Total per person' : 'Total por persona'}</div><div style={{ fontSize: '22px', fontWeight: '800', color: col.A }}>{(budget + giftPer).toFixed(0)}€</div></div>
            <Btn onClick={() => { setPayAmount((budget + giftPer).toFixed(2)); setPayModal(true); }} c={col}>{lang === 'es' ? 'Pagar →' : 'Pay →'}</Btn>
          </Card>}
        </div>}
      </div>
    </>
  );
}

// FINAL APP — uses ResultsScreenV2
// ══════════════════════════════════════════════════════
function App() {
  const [theme, setTheme] = useState(() => ls.get('q_theme', null) || getSysTheme());
  const [lang, setLang] = useState(() => ls.get('q_lang', 'es'));
  const [screen, setScreen] = useState('home');
  const [plan, setPlan] = useState(null);
  const [isOrg, setIsOrg] = useState(false);
  const [user, setUser] = useState(() => ls.get('q_user', null));
  const c = useMemo(() => C(theme), [theme]);

  useEffect(() => { applyTheme(theme); }, [theme]);
  const toggleTheme = () => setTheme(t => { const n = t === 'dark' ? 'light' : 'dark'; applyTheme(n); ls.set('q_theme', n); return n; });
  const toggleLang = () => setLang(l => { const n = l === 'es' ? 'en' : 'es'; ls.set('q_lang', n); return n; });

  useEffect(() => {
    const code = new URLSearchParams(location.search).get('code');
    if (code) { loadPlan(code).then(p => { if (p) { setPlan(p); setIsOrg(false); setScreen('respond'); } }); return; }
    const saved = ls.get('q_state', null);
    if (saved?.planId) { loadPlan(saved.planId).then(p => { if (p) { setPlan(p); setIsOrg(saved.isOrg || false); setScreen(saved.screen || 'home'); } }); }
  }, []);

  const nav = (s, p = null, org = false) => {
    setScreen(s); if (p) setPlan(p); setIsOrg(org);
    if (s !== 'home') ls.set('q_state', { screen: s, planId: p?.id || plan?.id, isOrg: org });
    else ls.set('q_state', {});
  };

  const handleJoin = async code => { const p = await loadPlan(code); if (p) { nav('respond', p, false); return true; } return false; };
  const handleOpenFromProfile = async id => { const p = await loadPlan(id); if (p) { const mine = getMyPlans().find(x => x.id === id); nav('results', p, mine?.role === 'organizer'); } };
  const handleDiscoverJoin = async id => { const p = await loadPlan(id); if (p) { nav('respond', p, false); } };

  const premium = getPremium();
  const t = T[lang];
  const noNav = ['home', 'create', 'profile', 'discover', 'premium', 'business'];

  return (
    <div style={{ minHeight: '100vh', background: c.BG, color: c.T, fontFamily: "'DM Sans',system-ui,sans-serif" }}>
      <div style={{ borderBottom: `1px solid ${c.BD}`, padding: '14px 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'sticky', top: 0, background: c.BG + 'F0', backdropFilter: 'blur(10px)', zIndex: 10 }}>
        <div onClick={() => nav('home')} style={{ fontFamily: "'Syne',serif", fontWeight: '800', fontSize: '22px', cursor: 'pointer', color: c.T, letterSpacing: '-.02em' }}>
          queda<span style={{ color: c.A }}>.</span>
          {premium.active && <span style={{ fontSize: '11px', color: c.A, marginLeft: '4px', fontWeight: '700' }}>Pro</span>}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
          {plan && !noNav.includes(screen) && <span style={{ fontSize: '12px', color: c.M }}>código: <span style={{ color: c.A, fontWeight: '800', letterSpacing: '.1em' }}>{plan.id}</span></span>}
          {user && <div style={{ width: '28px', height: '28px', borderRadius: '50%', background: `${c.A}25`, border: `1px solid ${c.A}50`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '12px', fontWeight: '800', color: c.A, cursor: 'pointer' }} onClick={() => nav('profile')}>{user.name?.charAt(0).toUpperCase() || '?'}</div>}
          <button onClick={() => nav('premium')} style={{ background: premium.active ? `${c.A}20` : c.CARD, border: `1px solid ${premium.active ? c.A + '50' : c.BD}`, borderRadius: '8px', padding: '5px 9px', cursor: 'pointer', fontSize: '12px', fontWeight: '700', color: premium.active ? c.A : c.M2 }}>⭐{premium.active ? ' Pro' : ''}</button>
          <button onClick={toggleLang} style={{ background: c.CARD, border: `1px solid ${c.BD}`, borderRadius: '8px', padding: '5px 10px', cursor: 'pointer', fontSize: '12px', fontWeight: '700', color: c.M2 }}>{lang === 'es' ? 'EN' : 'ES'}</button>
          <button onClick={toggleTheme} style={{ background: c.CARD, border: `1px solid ${c.BD}`, borderRadius: '8px', padding: '6px 10px', cursor: 'pointer', fontSize: '15px' }}>{theme === 'dark' ? '☀️' : '🌙'}</button>
        </div>
      </div>

      {screen === 'home' && <HomeScreen onCreate={() => nav('create')} onJoin={handleJoin} onProfile={() => nav('profile')} onDiscover={() => nav('discover')} onBusiness={() => nav('business')} onPremium={() => nav('premium')} c={c} lang={lang} toggleLang={toggleLang} toggleTheme={toggleTheme} theme={theme} user={user} premium={premium} />}
      {screen === 'profile' && <ProfileScreen onBack={() => nav('home')} onOpen={handleOpenFromProfile} c={c} lang={lang} user={user} onPremium={() => nav('premium')} />}
      {screen === 'discover' && <DiscoverScreen onBack={() => nav('home')} onJoin={handleDiscoverJoin} c={c} lang={lang} />}
      {screen === 'premium' && <PremiumScreen onBack={() => nav('home')} c={c} lang={lang} />}
      {screen === 'business' && <BusinessScreen onBack={() => nav('home')} c={c} lang={lang} />}
      {screen === 'create' && <CreateScreen onBack={() => nav('home')} onCreated={p => { nav('share', p, true); }} c={c} lang={lang} user={user} />}
      {screen === 'share' && plan && <ShareScreen plan={plan} onViewResults={() => nav('results', plan, isOrg)} onBack={() => nav('home')} c={c} lang={lang} />}
      {screen === 'respond' && plan && <RespondScreen plan={plan} onBack={() => nav('home')} onDone={() => nav('results', plan, false)} onCreateOwn={() => nav('create')} c={c} lang={lang} />}
      {screen === 'results' && plan && <ResultsScreenV2 plan={plan} onBack={() => nav(isOrg ? 'share' : 'home', plan, isOrg)} isOrg={isOrg} c={c} lang={lang} onBusiness={() => nav('business')} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
