  else if(avg>=28){cloth=e?'👕 Ropa muy ligera. Protector solar.':'👕 Very light clothing. Sunscreen.';trans=e?'🚲 Perfecto para ir a pie o en bici.':'🚲 Perfect for walking or cycling.';}

  else if(avg>=14){cloth=e?'🧥 Chaqueta o jersey.':'🧥 Jacket or jumper.';trans=e?'✅ Cualquier transporte bien.':'✅ Any transport fine.';}
  else if(avg>=8){cloth=e?'🧥 Abrigo y bufanda.':'🧥 Coat and scarf.';trans=e?'🚗 Mejor en coche o metro.':'🚗 Better by car or metro.';}
  else{cloth=e?'🧣 Abrigo grueso, bufanda y guantes.':'🧣 Heavy coat, scarf and gloves.';trans=e?'🚗 Demasiado frío para ir a pie.':'🚗 Too cold to walk far.';}
  if(rain>70)ext.push(e?'⚠️ Alta probabilidad de lluvia':'⚠️ High chance of rain');

};

const Inp=({value,onChange,onKey,placeholder,type='text',mono,c})=><input value={value} onChange={e=>onChange(e.target.value)} onKeyDown={onKey} placeholder={placeholder} type={type} style={{background:c?.CARD,border:`1px solid ${c?.BD}`,borderRadius:'10px',padding:'12px 14px',color:c?.T,fontSize:mono?'22px':'14px',fontFamily:mono?'monospace':'inherit',outline:'none',width:'100%',letterSpacing:mono?'.18em':'normal',fontWeight:mono?'800':'400',boxSizing:'border-box'}}/>;
const Txa=({value,onChange,placeholder,rows=3,c})=><textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{background:c?.CARD,border:`1px solid ${c?.BD}`,borderRadius:'10px',padding:'12px 14px',color:c?.T,fontSize:'14px',fontFamily:'inherit',outline:'none',width:'100%',resize:'vertical',boxSizing:'border-box',lineHeight:1.6}}/>;
const Lbl=({children,c})=><div style={{fontSize:'11px',color:c?.M||'#555',fontWeight:'600',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:'8px'}}>{children}</div>;
const HR=({c})=><div style={{height:'1px',background:c?.BD,margin:'20px 0'}}/>;
const Back=({onClick,label,c})=><button onClick={onClick} style={{background:'none',border:'none',color:c?.M2,cursor:'pointer',fontSize:'14px',padding:'0 0 22px',fontFamily:'inherit',display:'block'}}>{label}</button>;
const Badge=({children,color})=><span style={{fontSize:'11px',fontWeight:'700',padding:'3px 10px',borderRadius:'20px',background:`${color}18`,color,border:`1px solid ${color}35`}}>{children}</span>;

const ModeBadge=({mode,lang,c})=>{const m=T[lang]?.modes?.[mode];const color=getMC(mode,c)||c?.A;return<span style={{fontSize:'11px',fontWeight:'700',padding:'3px 10px',borderRadius:'20px',background:`${color}18`,color,border:`1px solid ${color}35`}}>{m?.label||mode}</span>;};

// ─── CALENDAR ─────────────────────────────────────────
function CalendarPicker({selected,onChange,c,lang}){
  const now=dayStart();const max=addDays(now,365);
  const[vy,setVy]=useState(now.getFullYear());const[vm,setVm]=useState(now.getMonth());
  const days=new Date(vy,vm+1,0).getDate();const first=(new Date(vy,vm,1).getDay()+6)%7;
  const dl=lang==='en'?['M','T','W','T','F','S','S']:['L','M','X','J','V','S','D'];
  const prev=()=>{if(vm===0){setVy(y=>y-1);setVm(11);}else setVm(m=>m-1);};
  const next=()=>{const n=new Date(vy,vm+1,1);if(n<=max){if(vm===11){setVy(y=>y+1);setVm(0);}else setVm(m=>m+1);}};
  const tog=iso=>onChange(selected.includes(iso)?selected.filter(d=>d!==iso):[...selected,iso]);
  return(<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'16px'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
      <button onClick={prev} title={lang==='es'?'Mes anterior':'Previous month'} style={{background:'none',border:'none',color:c.M2,cursor:'pointer',fontSize:'20px',padding:'2px 8px'}}>‹</button>
      <span style={{fontSize:'14px',fontWeight:'600',color:c.T,textTransform:'capitalize'}}>{fmtMonthYear(vy,vm,lang)}</span>
      <button onClick={next} title={lang==='es'?'Mes siguiente':'Next month'} style={{background:'none',border:'none',color:c.M2,cursor:'pointer',fontSize:'20px',padding:'2px 8px'}}>›</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px',marginBottom:'4px'}}>
      {dl.map((d,i)=><div key={i} style={{textAlign:'center',fontSize:'11px',color:c.M,fontWeight:'600',padding:'4px'}}>{d}</div>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px'}}>
      {Array.from({length:first}).map((_,i)=><div key={'e'+i}/>)}
      {Array.from({length:days}).map((_,i)=>{const date=new Date(vy,vm,i+1);const iso=toISO(date);const dis=date<now||date>max;const sel=selected.includes(iso);return<div key={i} onClick={()=>!dis&&tog(iso)} style={{textAlign:'center',padding:'7px 2px',borderRadius:'8px',fontSize:'13px',cursor:dis?'default':'pointer',background:sel?c.A:dis?'transparent':c.CARD,color:sel?'#0A0A0A':dis?c.BD:c.T,fontWeight:sel?'700':'400',border:sel?'none':`1px solid ${dis?'transparent':c.BD}`}}>{i+1}</div>;})}
    </div>
    {selected.length>0&&<div style={{marginTop:'10px',display:'flex',flexWrap:'wrap',gap:'4px'}}>
      {selected.sort().map(d=><span key={d} onClick={()=>tog(d)} style={{padding:'3px 8px',background:`${c.A}20`,color:c.A,border:`1px solid ${c.A}40`,borderRadius:'20px',cursor:'pointer',fontSize:'11px',fontWeight:'600',textTransform:'capitalize'}}>{fmtShort(d,lang)} ×</span>)}
    </div>}
  </div>);
}

// ─── TIME PICKER ──────────────────────────────────────
function TimePicker({times,onChange,c,lang,tz}){
  const[h,setH]=useState('20');const[m,setM]=useState('00');
  const add=()=>{const v=`${h}:${m}`;if(!times.includes(v))onChange([...times,v].sort());};
  const ss={background:c.CARD,border:`1px solid ${c.BD}`,color:c.T,fontSize:'14px',padding:'10px 12px',borderRadius:'10px',width:'100%',fontFamily:'inherit'};
  return(<div>
    <div style={{display:'flex',gap:'8px',alignItems:'flex-end',marginBottom:'8px'}}>
      <div style={{flex:1}}><select value={h} onChange={e=>setH(e.target.value)} style={ss}>{Array.from({length:24},(_,i)=>i.toString().padStart(2,'0')).map(hh=><option key={hh} value={hh}>{hh}h</option>)}</select></div>
      <div style={{flex:1}}><select value={m} onChange={e=>setM(e.target.value)} style={ss}>{['00','15','30','45'].map(mm=><option key={mm} value={mm}>:{mm}</option>)}</select></div>
      <Btn onClick={add} sm c={c}>{T[lang].addTime}</Btn>
    </div>
    {tz&&<div style={{fontSize:'12px',color:c.M2,marginBottom:'6px'}}>🌍 {getTzLabel(tz)}</div>}
    {times.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
      {times.map(hh=><span key={hh} onClick={()=>onChange(times.filter(x=>x!==hh))} style={{fontSize:'12px',padding:'5px 11px',borderRadius:'20px',border:`1px solid ${c.A}50`,background:`${c.A}15`,color:c.A,cursor:'pointer',fontWeight:'600'}}>{hh} ×</span>)}
    </div>}
  </div>);
}

function CityInput({value,onChange,onSelect,placeholder,c}){
  const[res,setRes]=useState([]);const[open,setOpen]=useState(false);const[ldg,setL]=useState(false);
  const deb=useRef(null);
  const search=q=>{if(deb.current)clearTimeout(deb.current);if(q.length<2){setRes([]);setOpen(false);return;}deb.current=setTimeout(async()=>{setL(true);try{const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=8&addressdetails=1&featuretype=settlement`).then(x=>x.json());setRes(r.slice(0,6));setOpen(r.length>0);}catch{}setL(false);},400);};
  const pick=r=>{const city=r.address?.city||r.address?.town||r.address?.village||r.address?.county||r.display_name.split(',')[0];const country=r.address?.country||'';const label=`${city}${country?', '+country:''}`.trim();const tz=getCityTz(city);onChange(label);onSelect({label,city,country,lat:parseFloat(r.lat),lon:parseFloat(r.lon),tz});setOpen(false);setRes([]);};
  return(<div style={{position:'relative'}}>
    <div style={{position:'relative'}}>
      <input value={value} onChange={e=>{onChange(e.target.value);search(e.target.value);}} onFocus={()=>res.length>0&&setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),200)} placeholder={placeholder} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'10px',padding:'12px 14px',color:c.T,fontSize:'14px',fontFamily:'inherit',outline:'none',width:'100%',boxSizing:'border-box'}}/>
      {ldg&&<div style={{position:'absolute',right:'12px',top:'50%',transform:'translateY(-50%)',fontSize:'12px',color:c.M}}>...</div>}

// ─── WEATHER WIDGET ───────────────────────────────────
function WeatherWidget({city,date,c,lang,showAdvice=false}){
  const[w,setW]=useState(null);const[state,setState]=useState('idle');

    if(!city||!date){setState('idle');return;}
    const du=daysUntil(date);
    if(du>16){setState('early');return;}
    setState('loading');setW(null);
    (async()=>{try{
      const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=${lang}`).then(r=>r.json());
      if(!geo.results?.length){setState('notfound');return;}
      const{latitude:lat,longitude:lon}=geo.results[0];
      const wd=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max&timezone=auto&start_date=${date}&end_date=${date}`).then(r=>r.json());
      if(wd.daily){setState('ok');setW({code:wd.daily.weathercode[0],max:Math.round(wd.daily.temperature_2m_max[0]),min:Math.round(wd.daily.temperature_2m_min[0]),rain:wd.daily.precipitation_probability_max[0],wind:Math.round(wd.daily.windspeed_10m_max?.[0]||0)});}

  },[city,date]);

  const t=T[lang];
  if(state==='early')return<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'12px',padding:'12px 14px',display:'flex',gap:'10px',alignItems:'center'}}><div style={{fontSize:'22px'}}>📅</div><div><div style={{fontSize:'13px',color:c.T,fontWeight:'500'}}>{t.tooEarlyT}</div><div style={{fontSize:'12px',color:c.M2}}>{du-16} {t.tooEarlyD}</div></div></div>;
  if(state==='notfound')return<div style={{fontSize:'12px',color:c.M2,padding:'6px'}}>{t.cityNotFound}</div>;
  if(state==='loading')return<div style={{fontSize:'12px',color:c.M,padding:'8px'}}>...</div>;
  if(!w)return null;
  const desc=lang==='en'?WX_EN[w.code]||'':WX_ES[w.code]||'';

        <div style={{textAlign:'right'}}><div style={{fontSize:'32px',fontWeight:'800',color:c.A,lineHeight:1}}>{w.max}°</div><div style={{fontSize:'13px',color:c.M2}}>{w.min}° min</div></div>

  const saveName=async()=>{if(!newName.trim())return;await onUpdateProfile({name:newName.trim()});setEditingName(false);};
  const[tab,setTab]=useState('upcoming');

  const sortByDate=arr=>[...arr].sort((a,b)=>(dates[a.id]||'9999').localeCompare(dates[b.id]||'9999'));
  const upcoming=sortByDate(plans.filter(p=>!isPast(p.id)));

        <div style={{fontSize:'13px',color:c.M2,textAlign:'center',marginBottom:'20px'}}>{confirm.role==='organizer'?t.delWarn:t.leaveWarn}</div>
        <div style={{display:'flex',gap:'8px'}}>
          <button onClick={()=>setConfirm(null)} style={{flex:1,padding:'12px',background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'10px',color:c.T,cursor:'pointer',fontFamily:'inherit',fontWeight:'600',fontSize:'14px'}}>{t.cancel}</button>
          <button onClick={()=>confirm.role==='organizer'?delFull(confirm.id):removeLocal(confirm.id)} style={{flex:1,padding:'12px',background:'#ff4444',border:'none',borderRadius:'10px',color:'#fff',cursor:'pointer',fontFamily:'inherit',fontWeight:'700',fontSize:'14px'}}>{confirm.role==='organizer'?t.del:t.leave}</button>
        </div>
      </div>
    </div>}

      <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:c.T}}>{t.myPlansT}</h2>
      <div style={{display:'flex',gap:'5px',marginLeft:'auto'}}>
        {Object.entries(MC_DARK).map(([m,col])=><div key={m} style={{width:'9px',height:'9px',borderRadius:'50%',background:col}} title={m}/>)}

        <div style={{flex:1,minWidth:0}}>

      </div>

          <div style={{fontSize:'11px',color:c.M2,marginTop:'2px'}}>{s.l}</div>
        </div>)}
      </div>);
    })()}
    <div style={{display:'flex',gap:'6px',marginBottom:'20px'}}>
      {['upcoming','past'].map(tb=><button key={tb} onClick={()=>setTab(tb)} style={{flex:1,padding:'10px',borderRadius:'10px',border:`1px solid ${tab===tb?c.A+'60':c.BD}`,background:tab===tb?`${c.A}15`:c.CARD,color:tab===tb?c.A:c.M2,fontSize:'13px',fontWeight:tab===tb?'700':'400',cursor:'pointer',fontFamily:'inherit'}}>

// ─── RESPOND ─────────────────────────────────────────
function Respond({plan,onBack,onDone,onCreateOwn,c,lang:appLang,authUser,profile}){
  const pLang=appLang;const t=T[pLang];const isEs=pLang==='es';
  const mc=getMC(plan.mode,c);
  const prevKey='q_myresp_'+plan.id;
  const prev=ls.get(prevKey,null);
  const urlName=new URLSearchParams(location.search).get('name')||'';
  const[name,setName]=useState(prev?.name||urlName||profile?.name||ls.get('q_myname',''));
  const[avail,setAvail]=useState(prev?.avail||{});
  const[timePref,setTimePref]=useState(prev?.timePref||{});
  const[how,setHow]=useState(prev?.how||'');const[howOther,setHowOther]=useState(prev?.howOther||'');
  const[comment,setComment]=useState(prev?.comment||'');
  const[guestRole,setGuestRole]=useState(prev?.role||t.roles[1]||'');
  const[saving,setSaving]=useState(false);const[done,setDone]=useState(false);
  const[altDate,setAltDate]=useState('');const[altNote,setAltNote]=useState('');
  const[pollVote,setPollVote]=useState(prev?.pollVote||null);
  useEffect(()=>{if(name.trim())ls.set('q_myname',name.trim());},[name]);
  const setDA=(d,val)=>setAvail(p=>({...p,[d]:p[d]===val?undefined:val}));
  const togT=(d,h)=>setTimePref(p=>({...p,[d]:(p[d]||[]).includes(h)?(p[d]||[]).filter(x=>x!==h):[...(p[d]||[]),h]}));
  const AVCOL={yes:'#22c55e',maybe:'#f59e0b',no:'#ef4444'};
  const AVICON={yes:'✅',maybe:'🤔',no:'❌'};
  const AVLBL={yes:t.avYes,maybe:t.avMaybe,no:t.avNo};
  const submit=async()=>{
    if(!name.trim())return;setSaving(true);
    const changeLog=[...(prev?.changeLog||[])];
    if(prev)changeLog.unshift({at:new Date().toISOString(),desc:isEs?'Respuesta actualizada':'Response updated'});
    const resp={name:name.trim(),avail,timePref,how:how==='other'?howOther:how,howOther,comment,role:guestRole,altDate:altDate||null,altNote:altNote||null,pollVote:pollVote||null,changeLog,at:new Date().toISOString()};
    await saveResp(plan.id,name.trim(),resp);
    if(authUser)try{await db.from('responses').update({user_id:authUser.id}).eq('plan_id',plan.id).eq('name',name.trim());}catch{}
    addMyPlan(plan.id,plan.name,'invited',plan.mode);
    ls.set(prevKey,resp);setSaving(false);setDone(true);
  };
  const budget=(plan.stops||[]).reduce((s,p2)=>s+(parseFloat(p2.cost)||0),0);
  if(done){
    const planUrl=location.href.split('?')[0]+'?code='+plan.id;
    const respName=name.trim()||'Alguien';
    const waOrgText=pLang==='es'?`Hola ${plan.organizer}, soy *${respName}* y acabo de responder al plan *${plan.name}*. Mira las respuestas! ${planUrl}`:`Hi ${plan.organizer}, I'm *${respName}* and just responded to *${plan.name}*. Check the responses! ${planUrl}`;
  return(<div style={{padding:'60px 24px',maxWidth:'420px',margin:'0 auto',textAlign:'center'}}>
    <div style={{fontSize:'64px',marginBottom:'20px'}}>{plan.mode==='intimate'?'💘':'🎉'}</div>
    <h2 style={{fontFamily:"'Syne',serif",fontSize:'28px',fontWeight:'800',color:mc,marginBottom:'10px'}}>{t.savedTitle}</h2>
    <p style={{color:c.M2,marginBottom:'20px'}}>{t.savedSub}</p>
    {plan.organizer&&<a href={`https://wa.me/?text=${encodeURIComponent(waOrgText)}`} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',padding:'13px 20px',background:'#25D366',borderRadius:'12px',color:'#fff',textDecoration:'none',fontWeight:'700',fontSize:'14px',marginBottom:'16px'}}>💬 {isEs?`Avisar a ${plan.organizer}`:`Notify ${plan.organizer}`}</a>}
    <div style={{background:`${mc}0D`,border:`1px solid ${mc}30`,borderRadius:'14px',padding:'20px'}}>
      <div style={{fontSize:'15px',fontWeight:'600',color:c.T,marginBottom:'6px'}}>{t.viralQ}</div>
      <div style={{fontSize:'13px',color:c.M2,marginBottom:'14px'}}>{t.viralSub}</div>
      <Btn onClick={onCreateOwn} style={{padding:'11px 24px',background:mc,color:'#0A0A0A'}} c={c}>{t.viralBtn}</Btn>
    </div>
  </div>);
  }
  return(<div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
    <Back onClick={()=>{if(Object.keys(avail).length>0&&!window.confirm(isEs?'¿Salir? Perderás los cambios no guardados.':'Exit? Unsaved changes will be lost.'))return;onBack();}} label={t.back} c={c}/>
    <div style={{background:`${mc}10`,border:`1px solid ${mc}30`,borderRadius:'12px',padding:'12px 14px',marginBottom:'16px',display:'flex',alignItems:'center',gap:'10px'}}>
      <ModeBadge mode={plan.mode||'social'} lang={pLang} c={c}/>
      <div style={{flex:1,minWidth:0}}><div style={{fontSize:'15px',color:c.T,fontWeight:'600',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{plan.name}</div><div style={{fontSize:'12px',color:c.M2}}>@ {plan.organizer}</div></div>
    </div>
    {prev&&<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'10px',padding:'10px 14px',marginBottom:'14px',fontSize:'12px',color:c.M2}}>✏️ {t.editingPrev}</div>}
    {plan.confirmedDate&&<div style={{background:`${mc}15`,border:`1px solid ${mc}50`,borderRadius:'12px',padding:'12px 14px',marginBottom:'16px',display:'flex',gap:'10px',alignItems:'center'}}><span style={{fontSize:'18px'}}>📌</span><div><div style={{fontSize:'11px',color:mc,fontWeight:'700',textTransform:'uppercase',letterSpacing:'.06em'}}>{t.confirmedDate}</div><div style={{fontSize:'14px',color:c.T,fontWeight:'600',textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate,pLang)}</div></div></div>}
    {plan.desc&&<p style={{fontSize:'14px',color:c.T,lineHeight:1.7,marginBottom:'16px',padding:'12px 14px',background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'10px'}}>{plan.desc}</p>}
    {budget>0&&<div style={{background:`${mc}0D`,border:`1px solid ${mc}30`,borderRadius:'10px',padding:'12px 16px',marginBottom:'16px',display:'flex',justifyContent:'space-between'}}><span style={{color:c.M2,fontSize:'13px'}}>{t.estPer||'Estimado'}</span><span style={{color:mc,fontWeight:'700'}}>{budget.toFixed(0)}€</span></div>}
    <HR c={c}/>
    <div style={{marginBottom:'14px'}}><Lbl c={c}>{t.yourName}</Lbl><Inp value={name} onChange={v=>{setName(v);ls.set('q_myname',v);}} placeholder={t.yourNamePh} c={c}/></div>
    {plan.mode==='professional'&&<div style={{marginBottom:'14px'}}><Lbl c={c}>{t.guestRole}</Lbl><select value={guestRole} onChange={e=>setGuestRole(e.target.value)} style={{background:c.CARD,border:`1px solid ${c.BD}`,color:c.T,fontSize:'14px',padding:'12px 14px',borderRadius:'10px',width:'100%',fontFamily:'inherit'}}>{t.roles.map(r=><option key={r} value={r}>{r}</option>)}</select></div>}

        {/* DATE + TIME + YES/MAYBE/NO — each slot independent */}

// ─── EXPENSE SPLITTER ────────────────────────────────
function ExpenseSplitter({plan, rs, mc, c, lang}){
  const t=T[lang];const isEs=lang==='es';
  const[expenses,setExp]=useState(()=>ls.get('q_exp_'+plan.id,[]));
  const[open,setOpen]=useState(false);
  const[who,setWho]=useState('');const[what,setWhat]=useState('');const[amt,setAmt]=useState('');
  const attendees=rs.filter(r=>(plan.dates||[]).some(d=>r.avail?.[d]==='yes')).map(r=>r.name);
  const saveExp=exp=>{ls.set('q_exp_'+plan.id,exp);setExp(exp);};
  const add=()=>{if(!who||!what||!amt)return;const e=[...expenses,{id:Date.now(),who,what,amt:parseFloat(amt),at:new Date().toISOString()}];saveExp(e);setWho('');setWhat('');setAmt('');};
  const rem=id=>saveExp(expenses.filter(e=>e.id!==id));
  const total=expenses.reduce((s,e)=>s+e.amt,0);
  const perPerson=attendees.length>0?total/attendees.length:0;
  // Calculate who owes what
  const paid={};expenses.forEach(e=>{paid[e.who]=(paid[e.who]||0)+e.amt;});
  const balances={};attendees.forEach(p=>{balances[p]=(paid[p]||0)-perPerson;});
  const debtors=Object.entries(balances).filter(([,b])=>b<-0.01).sort((a,b)=>a[1]-b[1]);
  const creditors=Object.entries(balances).filter(([,b])=>b>0.01).sort((a,b)=>b[1]-a[1]);
  const transfers=[];
  const d2=[...debtors.map(([n,b])=>({n,b:Math.abs(b)}))];
  const c2=[...creditors.map(([n,b])=>({n,b}))];
  let i=0,j=0;
  while(i<d2.length&&j<c2.length){
    const amt2=Math.min(d2[i].b,c2[j].b);
    if(amt2>0.01)transfers.push({from:d2[i].n,to:c2[j].n,amt:amt2.toFixed(2)});
    d2[i].b-=amt2;c2[j].b-=amt2;
    if(d2[i].b<0.01)i++;
    if(c2[j].b<0.01)j++;
  }
  if(expenses.length===0&&!open)return(<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'12px',padding:'14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
    <div><div style={{fontSize:'13px',color:c.T,fontWeight:'500'}}>💰 {isEs?'Dividir gastos':'Split expenses'}</div><div style={{fontSize:'12px',color:c.M2}}>{isEs?'Añade gastos y calcula quién debe qué':'Add expenses and calculate who owes what'}</div></div>
    <button onClick={()=>setOpen(true)} style={{background:`${mc}20`,border:`1px solid ${mc}40`,borderRadius:'8px',padding:'7px 12px',color:mc,cursor:'pointer',fontFamily:'inherit',fontSize:'13px',fontWeight:'600'}}>{isEs?'Añadir':'Add'}</button>
  </div>);
  return(<Card c={c}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
      <Lbl c={c}>💰 {isEs?'Gastos del plan':'Plan expenses'}</Lbl>
      <button onClick={()=>setOpen(o=>!o)} style={{background:`${mc}15`,border:`1px solid ${mc}40`,borderRadius:'8px',padding:'5px 10px',color:mc,cursor:'pointer',fontFamily:'inherit',fontSize:'12px',fontWeight:'600'}}>+ {isEs?'Añadir gasto':'Add expense'}</button>
    </div>
    {open&&<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'10px',padding:'12px',marginBottom:'12px',display:'flex',flexDirection:'column',gap:'8px'}}>
      <select value={who} onChange={e=>setWho(e.target.value)} style={{background:c.CARD,border:`1px solid ${c.BD}`,color:who?c.T:c.M,fontSize:'13px',padding:'9px 12px',borderRadius:'8px',fontFamily:'inherit',width:'100%'}}>
        <option value="">{isEs?'¿Quién pagó?':'Who paid?'}</option>
        {attendees.map(a=><option key={a} value={a}>{a}</option>)}
        <option value={isEs?'Yo':'Me'}>{isEs?'Yo (organizador)':'Me (organiser)'}</option>
      </select>
      <input value={what} onChange={e=>setWhat(e.target.value)} placeholder={isEs?'¿Qué fue? (cena, taxi...)':'What was it? (dinner, taxi...)'}  style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'9px 12px',color:c.T,fontSize:'13px',fontFamily:'inherit',outline:'none'}}/>
      <div style={{display:'flex',gap:'8px'}}>
        <input type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="€" style={{flex:1,background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'9px 12px',color:c.T,fontSize:'13px',fontFamily:'inherit',outline:'none'}}/>
        <button onClick={add} disabled={!who||!what||!amt} style={{padding:'9px 16px',background:who&&what&&amt?mc:'transparent',border:`1px solid ${who&&what&&amt?mc:c.BD}`,borderRadius:'8px',color:who&&what&&amt?'#0A0A0A':c.M,cursor:'pointer',fontFamily:'inherit',fontWeight:'700',fontSize:'13px'}}>{isEs?'OK':'OK'}</button>
      </div>
    </div>}
    {expenses.map(e=><div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${c.BD}`,fontSize:'13px'}}>
      <div><span style={{color:mc,fontWeight:'600'}}>{e.who}</span><span style={{color:c.M2}}> — {e.what}</span></div>
      <div style={{display:'flex',gap:'8px',alignItems:'center'}}><span style={{color:c.T,fontWeight:'700'}}>{e.amt.toFixed(2)}€</span><button onClick={()=>rem(e.id)} title={lang==='es'?'Eliminar gasto':'Remove expense'} style={{background:'none',border:'none',color:c.M,cursor:'pointer',fontSize:'14px',padding:'0'}}>×</button></div>
    </div>)}
    {expenses.length>0&&<>

// ─── CALENDAR EXPORT ─────────────────────────────────
const generateICS=(plan,lang)=>{
  const d=plan.confirmedDate;if(!d)return;
  const isEs=lang==='es';
  const dt=d.replace(/-/g,'');
  const time=plan.times?.[d]?.[0];
  let dtStart,dtEnd;
  if(time){
    const[hh,mm]=time.split(':');
    const pad=n=>n.toString().padStart(2,'0');
    dtStart=`${dt}T${pad(hh)}${pad(mm||'00')}00`;
    dtEnd=`${dt}T${pad(parseInt(hh)+2)}${pad(mm||'00')}00`;
  }else{dtStart=dt;dtEnd=dt;}
  const loc=(plan.stops||[]).filter(s=>s.address||s.name).map(s=>s.name||(s.address||'')).join(' → ');
  const desc=isEs
    ?`Plan creado con queda. — queda.app\nCódigo: ${plan.id}${plan.desc?'\n'+plan.desc:''}`
    :`Plan created with queda. — queda.app\nCode: ${plan.id}${plan.desc?'\n'+plan.desc:''}`;
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//queda//queda.app//EN','BEGIN:VEVENT',`UID:${plan.id}@queda.app`,`SUMMARY:${plan.name}`,`DTSTART${time?'':'VALUE=DATE'}:${dtStart}`,`DTEND${time?'':'VALUE=DATE'}:${dtEnd}`,`DESCRIPTION:${desc}`,loc?`LOCATION:${loc}`:'','END:VEVENT','END:VCALENDAR'].filter(x=>x).join('\n');

  const blob=new Blob([ics],{type:'text/calendar'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${plan.name.replace(/[^a-z0-9]/gi,'_')}.ics`;a.click();
  URL.revokeObjectURL(url);
};


// ─── OUTFIT CARD (weather-aware) ─────────────────────
function OutfitCard({dressCode, dressNote, city, date, mc, c, lang, t}){
  const isEs=lang==='es';
  const[weather,setW]=useState(null);
  useEffect(()=>{
    if(!city||!date)return;
    const du=daysUntil(date);
    if(du>16||du<-1)return;
    (async()=>{
      try{
        const geo=await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(city)+"&count=1").then(r=>r.json());
        if(!geo.results?.length)return;
        const{latitude:lat,longitude:lon}=geo.results[0];
        const wd=await fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&start_date="+date+"&end_date="+date).then(r=>r.json());
        if(wd.daily)setW({code:wd.daily.weathercode[0],max:Math.round(wd.daily.temperature_2m_max[0]),min:Math.round(wd.daily.temperature_2m_min[0])});
      }catch{}
    })();
  },[city,date]);
  const tip=getOutfitTip(dressCode,weather?.code,weather?.max,weather?.min,lang);
  const label=t.dressCodes.find(d=>d.k===dressCode)?.l||dressCode;
  return(<div style={{background:`${mc}12`,border:`1px solid ${mc}35`,borderRadius:'14px',padding:'16px',marginBottom:'16px'}}>
    <div style={{fontSize:'11px',color:mc,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'8px'}}>{isEs?'Dress code del plan':'Plan dress code'}</div>
    <div style={{fontSize:'18px',fontWeight:'600',color:c.T,marginBottom:'10px'}}>{label}</div>
    {tip&&<div style={{fontSize:'13px',color:c.T,lineHeight:1.6,marginBottom:tip.wtip?'10px':'0'}}>{tip.base}</div>}
    {tip?.wtip&&<div style={{fontSize:'13px',color:c.T,padding:'10px 12px',background:c.CARD2,borderRadius:'8px',borderLeft:`3px solid ${mc}`,lineHeight:1.5,marginTop:'6px'}}>{tip.wtip}</div>}
    {dressNote&&<div style={{fontSize:'12px',color:c.M2,marginTop:'10px',fontStyle:'italic'}}>"{dressNote}"</div>}
  </div>);
}

                <div><span style={{fontSize:'14px',color:c.T,fontWeight:'600'}}>{r.name}</span>{r.role&&r.role!==t.roles[0]&&<span style={{fontSize:'11px',color:c.M2,marginLeft:'6px'}}>· {r.role}</span>}{r.how&&<span style={{fontSize:'12px',color:c.M2,marginLeft:'6px'}}>· {howL(r.how)}</span>}</div>
                <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                  {r.changeLog?.length>0&&(()=>{const last=r.changeLog[0];const recent=last&&(Date.now()-new Date(last.at).getTime())<3600000;return<span title={isEs?('Editado '+r.changeLog.length+' vez/veces'):('Edited '+r.changeLog.length+' time(s)')} style={{fontSize:'11px',color:recent?'#f59e0b':c.M2,fontWeight:recent?'700':'400'}}>✏️{recent?' nuevo':''}</span>;})()}

        {budget>0&&<><HR c={c}/>

          {giftPer>0&&<div style={{display:'flex',justifyContent:'space-between',padding:'12px 16px',background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'12px',marginBottom:'8px'}}><span style={{color:c.M2,fontSize:'14px'}}>+ {isEs?'regalo':'gift'}</span><span style={{color:c.T,fontWeight:'600'}}>{giftPer.toFixed(0)}€</span></div>}
          <div style={{display:'flex',justifyContent:'space-between',padding:'14px 16px',background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'12px'}}><span style={{color:c.T,fontWeight:'700'}}>{t.totalLbl}</span><span style={{color:mc,fontSize:'18px',fontWeight:'800'}}>{(budget+giftPer).toFixed(0)}€</span></div>
        </>}
        {plan.stops?.some(s=>s.lat&&s.lng)&&<><HR c={c}/><RouteMap stops={plan.stops} c={c}/></>}
      </>}

      {/* DÍA tab = Weather + Outfit */}
      {!ldg&&tab==='dia'&&<div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
        <div>
          <Lbl c={c}>🌤️ {isEs?'Previsión del tiempo':'Weather forecast'}</Lbl>
          {!city&&<Card c={c} style={{textAlign:'center',padding:'20px'}}><div style={{color:c.M2,fontSize:'14px'}}>{t.noCity}</div></Card>}
          {city&&(plan.confirmedDate
            ?<WeatherWidget city={city} date={plan.confirmedDate} c={c} lang={lang} showAdvice={true}/>
            :(plan.dates||[]).map(d=><div key={d} style={{marginBottom:'12px'}}><div style={{fontSize:'12px',color:c.M2,marginBottom:'5px',textTransform:'capitalize'}}>{fmtShort(d,lang)}</div><WeatherWidget city={city} date={d} c={c} lang={lang} showAdvice={true}/></div>)
          )}
        </div>
        <HR c={c}/>
        <div>
          <Lbl c={c}>👗 Outfit</Lbl>
          <p style={{fontSize:'13px',color:c.M2,marginBottom:'12px',lineHeight:1.6}}>{{social:isEs?'¿Qué ponerse para la noche?':'What to wear?',intimate:isEs?'La primera impresión importa.':'First impressions matter.',professional:isEs?'El look adecuado para el entorno.':'The right look for the setting.'}[plan.mode||'social']}</p>
          {plan.dressCode
            ?<OutfitCard dressCode={plan.dressCode} dressNote={plan.dressNote} city={city} date={plan.confirmedDate||plan.dates?.[0]} mc={mc} c={c} lang={lang} t={t}/>
            :<div style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'12px',padding:'16px',textAlign:'center'}}><div style={{fontSize:'24px',marginBottom:'6px'}}>👗</div><div style={{fontSize:'13px',color:c.M2}}>{t.dcNoneNote}</div></div>
          }
        </div>
      </div>}

      {/* IR tab = Transport */}
      {!ldg&&tab==='ir'&&<>
        {fs?<>
          <Card c={c} style={{marginBottom:'12px'}}><Lbl c={c}>{t.dest}</Lbl><div style={{fontSize:'15px',color:c.T,fontWeight:'600'}}>{fs.name}</div>{fs.address&&<div style={{fontSize:'13px',color:c.M2}}>{fs.address}</div>}</Card>
          <TransportPanel to={fs} planCity={city} c={c} lang={lang}/>
          {rs.filter(r=>r.how).length>0&&<><HR c={c}/><Lbl c={c}>{t.howEach}</Lbl>{rs.filter(r=>r.how).map((r,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${c.BD}`,fontSize:'14px'}}><span style={{color:c.T}}>{r.name}</span><span style={{color:c.M2}}>{howL(r.how)}</span></div>)}</>}
        </>:<Card c={c} style={{textAlign:'center',padding:'28px'}}><div style={{fontSize:'32px',marginBottom:'8px'}}>📍</div><div style={{color:c.M2,fontSize:'14px'}}>{t.noStops}</div></Card>}
      </>}

      {/* EXTRAS tab = Gift + Expenses + Pay + Plan card */}
      {!ldg&&tab==='extras'&&<div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
        {/* Expense splitter */}
        <ExpenseSplitter plan={plan} rs={rs} mc={mc} c={c} lang={lang}/>
        {/* Gift */}
        {plan.gift&&<Card c={c} accent>
          <Lbl c={c}>{t.giftSec}</Lbl>
          <div style={{fontSize:'18px',color:c.T,fontWeight:'600',marginBottom:'8px'}}>{plan.gift.name||'—'}</div>
          {plan.gift.price&&<><div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}><span style={{color:c.M2,fontSize:'14px'}}>{t.totalPrice}</span><span style={{color:mc,fontWeight:'700',fontSize:'18px'}}>{plan.gift.price}€</span></div>
          {total>0&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:'12px'}}><span style={{color:c.M2,fontSize:'14px'}}>{t.perOf} ({total})</span><span style={{color:mc,fontWeight:'700'}}>{(parseFloat(plan.gift.price)/total).toFixed(2)}€</span></div>}</>}
          {plan.gift.link&&<a href={plan.gift.link.startsWith('http')?plan.gift.link:'https://'+plan.gift.link} target="_blank" rel="noreferrer" style={{display:'block',textAlign:'center',padding:'10px',background:`${mc}20`,border:`1px solid ${mc}50`,borderRadius:'10px',color:mc,textDecoration:'none',fontSize:'14px',fontWeight:'600',marginBottom:'10px'}}>{t.seeGift}</a>}
          <Btn onClick={()=>{setPayAmt((budget+giftPer).toFixed(2));setPay(true);}} full style={{padding:'13px'}} c={c}>💳 {t.payTitle}</Btn>
        </Card>}
        {/* Bring list */}
        {plan.bring?.filter(b=>b.text||typeof b==='string').length>0&&<Card c={c}>
          <Lbl c={c}>{t.bring}</Lbl>
          {plan.bring.filter(b=>b.text||typeof b==='string').map((b,i)=>{const txt=typeof b==='string'?b:b.text;return<div key={i} style={{display:'flex',alignItems:'center',gap:'10px',padding:'8px 0',borderBottom:i<plan.bring.filter(x=>x.text||typeof x==='string').length-1?`1px solid ${c.BD}`:'none',fontSize:'14px',color:c.T}}><div style={{width:'6px',height:'6px',borderRadius:'50%',background:mc,flexShrink:0}}/>{txt}</div>;})}
        </Card>}
        {/* Pay */}
        {budget>0&&<Card c={c} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div><div style={{fontSize:'13px',color:c.M2}}>{t.totalPerPerson}</div><div style={{fontSize:'22px',fontWeight:'800',color:mc}}>{(budget+giftPer).toFixed(0)}€</div></div>
          <Btn onClick={()=>{setPayAmt((budget+giftPer).toFixed(2));setPay(true);}} c={c} style={{background:mc,color:'#0A0A0A'}}>{isEs?'Pagar →':'Pay →'}</Btn>
        </Card>}
        {/* Plan share card */}
        {plan.confirmedDate&&<Card c={c}>
          <Lbl c={c}>{isEs?'🃏 Tarjeta del plan':'🃏 Plan card'}</Lbl>
          <div style={{background:`linear-gradient(135deg,${mc}20,${mc}05)`,border:`2px solid ${mc}40`,borderRadius:'12px',padding:'16px',textAlign:'center',fontFamily:"'Syne',serif"}}>
            <div style={{fontSize:'28px',marginBottom:'6px'}}>{plan.mode==='intimate'?'💘':plan.mode==='professional'?'💼':'🎉'}</div>
            <div style={{fontSize:'18px',fontWeight:'800',color:c.T,marginBottom:'4px'}}>{plan.name}</div>
            <div style={{fontSize:'13px',color:mc,fontWeight:'600',marginBottom:'6px',textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate,lang)}</div>
            {plan.times?.[plan.confirmedDate]?.length>0&&<div style={{fontSize:'12px',color:c.M2,marginBottom:'4px'}}>🕐 {plan.times[plan.confirmedDate].join(' · ')}</div>}

            <div style={{marginTop:'8px',fontSize:'11px',color:c.M}}>queda. · {plan.id}</div>
          </div>
          <div style={{fontSize:'12px',color:c.M2,textAlign:'center',marginTop:'8px'}}>{isEs?'Haz screenshot y comparte 📱':'Screenshot and share 📱'}</div>
        </Card>}
        <AfterPlanSuggestions plan={plan} c={c} lang={lang}/>
        {/* Suggested dates from guests */}
        {isOrgRef.current&&rs.some(r=>r.altDate)&&<Card c={c} style={{border:'1px solid #f59e0b30',background:'#f59e0b06'}}>
          <Lbl c={c}>📅 {isEs?'Fechas sugeridas por invitados':'Dates suggested by guests'}</Lbl>
          {rs.filter(r=>r.altDate).map((r,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:i<rs.filter(x=>x.altDate).length-1?`1px solid ${c.BD}`:'none'}}>
            <div><div style={{fontSize:'13px',color:c.T,fontWeight:'500',textTransform:'capitalize'}}>{fmtDate(r.altDate,lang)}</div>{r.altNote&&<div style={{fontSize:'12px',color:c.M2}}>{r.altNote}</div>}</div>
            <span style={{fontSize:'12px',color:c.M2}}>— {r.name}</span>
          </div>)}
        </Card>}
      </div>}

    </div>
  </>);
}


// ─── AUTH SCREEN ─────────────────────────────────────
function AuthScreen({onAuth,c,lang}){
  const t=T[lang];const isEs=lang==='es';
  const[step,setStep]=useState('email'); // email | otp | name
  const[email,setEmail]=useState('');
  const[otp,setOtp]=useState('');
  const[name,setName]=useState('');
  const[username,setUsername]=useState('');
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState('');
  const[sent,setSent]=useState(false);

  const sendOtp=async()=>{
    if(!email.trim()||!email.includes('@')){setErr(isEs?'Email no válido':'Invalid email');return;}
    setLoading(true);setErr('');
    const{error}=await authSignIn(email.trim().toLowerCase());
    if(error){setErr(isEs?'Error al enviar el email. Intenta de nuevo.':'Error sending email. Try again.');setLoading(false);return;}
    setSent(true);setStep('otp');setLoading(false);
  };

  const verifyOtp=async()=>{
    if(otp.length<6){setErr(isEs?'El código tiene 6 dígitos':'Code is 6 digits');return;}
    setLoading(true);setErr('');
    const{data,error}=await authVerifyOtp(email.trim().toLowerCase(),otp.trim());
    if(error){setErr(isEs?'Código incorrecto o expirado. Prueba de nuevo.':'Incorrect or expired code. Try again.');setLoading(false);return;}
    // Check if profile exists
    const prof=await loadProfile(data.user.id);
    if(!prof||!prof.name){
      setStep('name');setLoading(false);
    }else{
      onAuth(data.user,prof);
    }
  };

  const saveName=async()=>{
    if(!name.trim()){setErr(isEs?'Pon tu nombre':'Enter your name');return;}
    setLoading(true);
    const user=await getUser();
    if(!user){setErr('Session error');setLoading(false);return;}
    const prof={name:name.trim(),username:username.trim()||null,email:user.email,lang,contacts:[]};
    await saveProfile(user.id,prof);
    onAuth(user,prof);
  };

  return(<div style={{minHeight:'100vh',background:c.BG,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px'}}>
    <div style={{width:'100%',maxWidth:'380px'}}>
      <div style={{textAlign:'center',marginBottom:'40px'}}>
        <div style={{fontFamily:"'Syne',serif",fontWeight:'800',fontSize:'36px',color:c.T,letterSpacing:'-.02em',marginBottom:'8px'}}>queda<span style={{color:c.A}}>.</span></div>
        <div style={{fontSize:'15px',color:c.M2}}>{isEs?'Planes sin caos.':'Plans without chaos.'}</div>
      </div>

      {step==='email'&&<div>
        <div style={{fontSize:'20px',fontWeight:'700',color:c.T,marginBottom:'8px'}}>{isEs?'¿Cuál es tu email?':"What's your email?"}</div>
        <div style={{fontSize:'14px',color:c.M2,marginBottom:'24px'}}>{isEs?'Te mandamos un código para entrar. Sin contraseña.':"We'll send you a code to sign in. No password needed."}</div>
        <input value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendOtp()} type="email" placeholder="tu@email.com" autoFocus style={{width:'100%',background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'12px',padding:'14px 16px',color:c.T,fontSize:'16px',fontFamily:'inherit',outline:'none',boxSizing:'border-box',marginBottom:'12px'}}/>
        {err&&<div style={{color:'#ef4444',fontSize:'13px',marginBottom:'10px'}}>{err}</div>}
        <button onClick={sendOtp} disabled={loading||!email.trim()} style={{width:'100%',padding:'15px',background:email.trim()?c.A:'#555',color:'#0A0A0A',border:'none',borderRadius:'12px',fontSize:'16px',fontWeight:'700',cursor:email.trim()?'pointer':'not-allowed',fontFamily:'inherit',opacity:loading?0.6:1}}>
          {loading?(isEs?'Enviando...':'Sending...'):(isEs?'Continuar →':'Continue →')}
        </button>
      </div>}

      {step==='otp'&&<div>
        <div style={{fontSize:'20px',fontWeight:'700',color:c.T,marginBottom:'8px'}}>{isEs?'Revisa tu email':'Check your email'}</div>
        <div style={{fontSize:'14px',color:c.M2,marginBottom:'6px'}}>{isEs?`Hemos enviado un link mágico a`:`We sent a magic link to`}</div>
        <div style={{fontSize:'14px',color:c.A,fontWeight:'600',marginBottom:'24px'}}>{email}</div>
        <div style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'12px',padding:'16px',marginBottom:'20px',fontSize:'13px',color:c.M2,lineHeight:1.6}}>
          {isEs?'Haz clic en el link del email para entrar. Si no lo ves, revisa la carpeta de spam.':'Click the link in the email to sign in. Check your spam folder if you don't see it.'}
        </div>
        <button onClick={()=>{setStep('email');setSent(false);setOtp('');setErr('');}} style={{width:'100%',padding:'12px',background:'transparent',color:c.M2,border:`1px solid ${c.BD}`,borderRadius:'12px',fontSize:'14px',cursor:'pointer',fontFamily:'inherit'}}>
          {isEs?'← Cambiar email':'← Change email'}
        </button>
        {err&&<div style={{color:'#ef4444',fontSize:'13px',marginTop:'10px'}}>{err}</div>}
        <div style={{marginTop:'20px',textAlign:'center'}}>
          <div style={{fontSize:'13px',color:c.M2,marginBottom:'8px'}}>{isEs?'¿No llegó el email? Introduce el código de 6 dígitos:':"Didn't get the email? Enter the 6-digit code:"}</div>
          <input value={otp} onChange={e=>setOtp(e.target.value.replace(/[^0-9]/g,'').slice(0,6))} onKeyDown={e=>e.key==='Enter'&&verifyOtp()} placeholder="123456" maxLength={6} style={{width:'100%',background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'12px',padding:'14px',color:c.T,fontSize:'24px',fontFamily:'monospace',letterSpacing:'.3em',textAlign:'center',outline:'none',boxSizing:'border-box',marginBottom:'10px'}}/>
          <button onClick={verifyOtp} disabled={loading||otp.length<6} style={{width:'100%',padding:'13px',background:otp.length===6?c.A:'#555',color:'#0A0A0A',border:'none',borderRadius:'12px',fontSize:'15px',fontWeight:'700',cursor:otp.length===6?'pointer':'not-allowed',fontFamily:'inherit',opacity:loading?0.6:1}}>
            {loading?(isEs?'Verificando...':'Verifying...'):(isEs?'Entrar →':'Sign in →')}
          </button>
        </div>
      </div>}

      {step==='name'&&<div>
        <div style={{fontSize:'20px',fontWeight:'700',color:c.T,marginBottom:'8px'}}>{isEs?'¡Bienvenido/a!':'Welcome!'}</div>
        <div style={{fontSize:'14px',color:c.M2,marginBottom:'24px'}}>{isEs?'¿Cómo quieres que te llamen?':'What should we call you?'}</div>
        <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveName()} placeholder={t.editName} autoFocus style={{width:'100%',background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'12px',padding:'14px 16px',color:c.T,fontSize:'16px',fontFamily:'inherit',outline:'none',boxSizing:'border-box',marginBottom:'12px'}}/>
        {err&&<div style={{color:'#ef4444',fontSize:'13px',marginBottom:'10px'}}>{err}</div>}
        <button onClick={saveName} disabled={loading||!name.trim()} style={{width:'100%',padding:'15px',background:name.trim()?c.A:'#555',color:'#0A0A0A',border:'none',borderRadius:'12px',fontSize:'16px',fontWeight:'700',cursor:name.trim()?'pointer':'not-allowed',fontFamily:'inherit',opacity:loading?0.6:1}}>
          {loading?(isEs?'Guardando...':'Saving...'):(isEs?'Empezar →':'Get started →')}
        </button>
      </div>}
    </div>
  </div>);
}

// ─── APP ─────────────────────────────────────────────
function App(){
  const[theme,setTheme]=useState(()=>ls.get('q_theme',null)||getSysTheme());
  const[lang,setLang]=useState(()=>{
    const saved=ls.get('q_lang',null);
    if(saved)return saved;
    const bl=(navigator.language||'es').slice(0,2).toLowerCase();
    const supported=['es','en','pt','fr','de','it'];
    return supported.includes(bl)?bl:'es';
  });
  const[screen,setScreen]=useState('home');
  const[plan,setPlan]=useState(null);
  const[isOrg,setIsOrg]=useState(false);
  const[pendingMode,setPendingMode]=useState(null);
  const[toast,setToast]=useState(null);
  const[langOpen,setLangOpen]=useState(false);
  const[authUser,setAuthUser]=useState(null);   // supabase user object
  const[profile,setProfile]=useState(null);     // {name, email, contacts}
  const[authLoading,setAuthLoading]=useState(true); // checking session
  const c=useMemo(()=>C(theme),[theme]);
  useEffect(()=>{applyTheme(theme);},[theme]);
  useEffect(()=>{setToastFn(msg=>{setToast(msg);setTimeout(()=>setToast(null),4000);});},[]);
  const tgTheme=()=>setTheme(t=>{const n=t==='dark'?'light':'dark';applyTheme(n);ls.set('q_theme',n);return n;});
  const LANGS=['es','en','pt','fr','de','it'];
  const LANG_FLAGS={es:'🇪🇸',en:'🇬🇧',pt:'🇵🇹',fr:'🇫🇷',de:'🇩🇪',it:'🇮🇹'};
  const tgLang=()=>setLang(l=>{const idx=LANGS.indexOf(l);const n=LANGS[(idx+1)%LANGS.length];ls.set('q_lang',n);return n;});

  // Auth: check session on load + listen for changes
  useEffect(()=>{
    getSession().then(async session=>{
      if(session?.user){
        const prof=await loadProfile(session.user.id);
        setAuthUser(session.user);
        setProfile(prof);
        if(prof?.lang)setLang(prof.lang);
      }
      setAuthLoading(false);
    });
    const{data:{subscription}}=db.auth.onAuthStateChange(async(event,session)=>{
      if(session?.user){
        const prof=await loadProfile(session.user.id);
        setAuthUser(session.user);
        setProfile(prof);
        if(prof?.lang)setLang(prof.lang);
      }else{
        setAuthUser(null);setProfile(null);
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  const handleAuth=(user,prof)=>{setAuthUser(user);setProfile(prof);if(prof?.lang)setLang(prof.lang);};
  const handleSignOut=async()=>{await authSignOut();setAuthUser(null);setProfile(null);setScreen('home');ls.set('q_state',{});};
  const updateProfile=async(updates)=>{
    if(!authUser)return;
    const updated={...profile,...updates};
    setProfile(updated);
    await saveProfile(authUser.id,updated);
    if(updates.lang)setLang(updates.lang);
  };

  useEffect(()=>{
    const code=new URLSearchParams(location.search).get('code');
    if(code){loadPlan(code).then(p=>{if(p){setPlan(p);setIsOrg(false);setScreen('preview');}});return;}
    const saved=ls.get('q_state',null);
    if(saved?.planId){loadPlan(saved.planId).then(p=>{if(p){setPlan(p);setIsOrg(saved.isOrg||false);setScreen(saved.screen||'home');}});}
  },[]);
  const nav=(s,p=null,org=false)=>{setScreen(s);if(p)setPlan(p);setIsOrg(org);if(s!=='home')ls.set('q_state',{screen:s,planId:p?.id||plan?.id,isOrg:org});else ls.set('q_state',{});};
  const handleJoin=async code=>{const p=await loadPlan(code);if(p){setPlan(p);setIsOrg(false);setScreen('preview');ls.set('q_state',{screen:'preview',planId:p.id,isOrg:false});return true;}return false;};
  const handleFromProfile=async id=>{const p=await loadPlan(id);if(p){const mine=getMyPlans().find(x=>x.id===id);nav('results',p,mine?.role==='organizer');}};
  const handleDiscoverJoin=async id=>{const p=await loadPlan(id);if(p){setPlan(p);setIsOrg(false);setScreen('preview');}};
  const mc=plan?.mode?getMC(plan.mode,c):c.A;
  const noNav=['home','create','select-mode','profile','discover','preview'];
  if(authLoading)return(<div style={{minHeight:'100vh',background:c.BG,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{fontFamily:"'Syne',serif",fontWeight:'800',fontSize:'28px',color:c.T}}>queda<span style={{color:c.A}}>.</span></div></div>);
  if(!authUser)return<AuthScreen onAuth={handleAuth} c={c} lang={lang}/>;;
  return(<div style={{minHeight:'100vh',background:c.BG,color:c.T,fontFamily:"'DM Sans',system-ui,sans-serif"}} onClick={()=>setLangOpen(false)}>
    {toast&&<div style={{position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%)',background:'#ef4444',color:'#fff',padding:'12px 20px',borderRadius:'30px',fontWeight:'600',fontSize:'13px',zIndex:300,boxShadow:'0 4px 20px rgba(0,0,0,.4)',whiteSpace:'nowrap',animation:'slideDown .3s ease'}}>⚠️ {toast}</div>}
    <div style={{borderBottom:`1px solid ${c.BD}`,padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:c.BG+'F0',backdropFilter:'blur(10px)',zIndex:10}}>
      <div onClick={()=>nav('home')} style={{fontFamily:"'Syne',serif",fontWeight:'800',fontSize:'22px',cursor:'pointer',color:c.T,letterSpacing:'-.02em'}}>queda<span style={{color:c.A}}>.</span></div>
      <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
        {plan&&!noNav.includes(screen)&&<span style={{color:mc,fontWeight:'800',fontSize:'12px',letterSpacing:'.1em'}}>{plan.id}</span>}
        <div style={{position:'relative'}} onClick={e=>e.stopPropagation()}>
          <button onClick={()=>setLangOpen(o=>!o)} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'5px 10px',cursor:'pointer',fontSize:'14px',display:'flex',alignItems:'center',gap:'4px',color:c.T,fontFamily:'inherit',fontWeight:'500'}}>
            {LANG_FLAGS[lang]||'🌐'} <span style={{fontSize:'11px'}}>{lang.toUpperCase()}</span> <span style={{fontSize:'10px',color:c.M}}>▾</span>
          </button>
          {langOpen&&<div style={{position:'absolute',right:0,top:'calc(100% + 4px)',background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'10px',boxShadow:'0 8px 24px rgba(0,0,0,.3)',zIndex:100,overflow:'hidden',minWidth:'130px'}}>
            {LANGS.map(l=><button key={l} onClick={()=>{setLang(l);ls.set('q_lang',l);setLangOpen(false);}} style={{display:'flex',alignItems:'center',gap:'8px',width:'100%',padding:'10px 14px',background:l===lang?`${c.A}15`:'transparent',border:'none',borderBottom:`1px solid ${c.BD}`,cursor:'pointer',fontFamily:'inherit',fontSize:'13px',color:l===lang?c.A:c.T,fontWeight:l===lang?'700':'400',textAlign:'left'}}>
              <span>{LANG_FLAGS[l]}</span><span>{({es:'Español',en:'English',pt:'Português',fr:'Français',de:'Deutsch',it:'Italiano'})[l]}</span>
              {l===lang&&<span style={{marginLeft:'auto',color:c.A}}>✓</span>}
            </button>)}
          </div>}
        </div>
        <button onClick={tgTheme} title={theme==='dark'?(lang==='es'?'Modo claro':'Light mode'):(lang==='es'?'Modo oscuro':'Dark mode')} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'6px 10px',cursor:'pointer',fontSize:'15px'}}>{theme==='dark'?'☀️':'🌙'}</button>
        {authUser&&<button onClick={()=>nav('profile')} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'5px 10px',cursor:'pointer',fontSize:'13px',color:c.T,fontFamily:'inherit',fontWeight:'500',display:'flex',alignItems:'center',gap:'5px'}}><span style={{width:'22px',height:'22px',borderRadius:'50%',background:c.A,color:'#0A0A0A',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:'800',flexShrink:0}}>{(profile?.name||authUser.email||'?')[0].toUpperCase()}</span><span style={{maxWidth:'80px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profile?.name||authUser.email}</span></button>}
      </div>
    </div>
    {screen==='home'&&<Home onCreate={()=>nav('select-mode')} onJoin={handleJoin} onProfile={()=>nav('profile')} onDiscover={()=>nav('discover')} c={c} lang={lang}/>}
    {screen==='select-mode'&&<ModeSelect onSelect={m=>{setPendingMode(m);nav('create');}} onBack={()=>nav('home')} c={c} lang={lang}/>}
    {screen==='profile'&&<Profile onBack={()=>nav('home')} onOpen={handleFromProfile} c={c} lang={lang} authUser={authUser} profile={profile} onUpdateProfile={updateProfile} onSignOut={handleSignOut}/>}
    {screen==='discover'&&<Discover onBack={()=>nav('home')} onJoin={handleDiscoverJoin} c={c} lang={lang}/>}
    {screen==='create'&&<Create onBack={()=>nav('select-mode')} onCreated={p=>nav('share',p,true)} c={c} lang={lang} mode={pendingMode||'social'} authUser={authUser} profile={profile}/>}
    {screen==='share'&&plan&&<Share plan={plan} onViewResults={()=>nav('results',plan,isOrg)} onBack={()=>nav('home')} c={c} lang={lang}/>}
    {screen==='preview'&&plan&&<PlanPreview plan={plan} onRespond={()=>nav('respond',plan,false)} onBack={()=>nav('home')} c={c} lang={lang}/>}
    {screen==='respond'&&plan&&<Respond plan={plan} onBack={()=>nav('preview',plan,false)} onDone={()=>nav('results',plan,false)} onCreateOwn={()=>nav('select-mode')} c={c} lang={lang} authUser={authUser} profile={profile}/>}
    {screen==='results'&&plan&&<Results plan={plan} onBack={()=>nav(isOrg?'share':'home',plan,isOrg)} isOrg={isOrg} c={c} lang={lang}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
