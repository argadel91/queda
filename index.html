<script type="text/babel">

const EJS_TPL = 'PEGA_TEMPLATE_ID';

// ── Tema ──────────────────────────────────────────
function getSysTheme(){ return window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'; }
function applyTheme(t){ document.body.className=t; localStorage.setItem('queda_theme',t); }
function dk(t){ return t==='dark'; }

// ── Colores ───────────────────────────────────────
function C(t){ return dk(t)
  ? {A:'#CDFF6C',BG:'#0A0A0A',CARD:'#141414',CARD2:'#1C1C1C',BD:'#262626',T:'#F0EBE1',M:'#555',M2:'#888'}
  : {A:'#4A8800',BG:'#F8F7F4',CARD:'#FFFFFF',CARD2:'#F0EEE9',BD:'#E0DDD6',T:'#1A1A1A',M:'#999',M2:'#666'}; }

// ── Utils ─────────────────────────────────────────
const genId=()=>Math.random().toString(36).substring(2,7).toUpperCase();
const getNextDays=n=>Array.from({length:n||21},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i+1);d.setHours(0,0,0,0);return d.toISOString().split('T')[0];});
const fmtDate=iso=>{const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});};
const fmtShort=iso=>{const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});};
const HOURS=['18:00','19:00','20:00','21:00','22:00','23:00','00:00','01:00','02:00','03:00'];
const CATS=['🍽️ Restaurante','🍸 Bar','🎉 Discoteca','☕ Café','🎭 Actividad','🏠 Casa','🍕 Informal','📍 Otro'];
const WX={0:'☀️ Despejado',1:'🌤️ Casi despejado',2:'⛅ Parcialmente nublado',3:'☁️ Nublado',45:'🌫️ Niebla',51:'🌦️ Llovizna',61:'🌧️ Lluvia',63:'🌧️ Lluvia moderada',80:'🌧️ Chubascos',95:'⛈️ Tormenta'};

// ── Perfil local ──────────────────────────────────
const getMyPlans=()=>{try{return JSON.parse(localStorage.getItem('queda_plans')||'[]');}catch{return[];}};
const addMyPlan=(id,name,role)=>{const p=getMyPlans().filter(x=>x.id!==id);localStorage.setItem('queda_plans',JSON.stringify([{id,name,role,at:new Date().toISOString()},...p].slice(0,20)));};

// ── Supabase ──────────────────────────────────────
const savePlan=async p=>{await db.from('plans').upsert({id:p.id,data:p});};
const loadPlan=async id=>{const{data}=await db.from('plans').select('data').eq('id',id).single();return data?.data||null;};
const updatePlan=async p=>{await db.from('plans').update({data:p}).eq('id',p.id);};
const saveResp=async(planId,name,resp)=>{const{data:ex}=await db.from('responses').select('id').eq('plan_id',planId).eq('name',name).single();if(ex){await db.from('responses').update({data:resp}).eq('id',ex.id);}else{await db.from('responses').insert({plan_id:planId,name,data:resp});}};
const loadResps=async id=>{const{data}=await db.from('responses').select('data').eq('plan_id',id);return(data||[]).map(r=>r.data);};

// ── Email ─────────────────────────────────────────
const sendEmail=async(plan,who,dates)=>{
  if(!EMAIL_ON||!plan.organizerEmail)return;
  try{await emailjs.send(EJS_SVC,EJS_TPL,{to_email:plan.organizerEmail,to_name:plan.organizer,plan_name:plan.name,responder_name:who,dates_available:dates.join(', ')||'Ninguna',plan_code:plan.id,plan_url:location.href.split('?')[0]+'?code='+plan.id},EJS_KEY);}catch(e){console.log('email:',e);}
};

// ── UI ────────────────────────────────────────────
const Btn=({children,onClick,v='primary',disabled,full,sm,style={},c})=>{
  const col=c||{A:'#CDFF6C',CARD:'#141414',T:'#F0EBE1',BD:'#262626'};
  return<button onClick={onClick} disabled={disabled} style={{padding:sm?'8px 16px':'13px 22px',borderRadius:'12px',border:'none',cursor:disabled?'not-allowed':'pointer',fontSize:sm?'13px':'15px',fontWeight:'600',fontFamily:'inherit',opacity:disabled?.3:1,width:full?'100%':'auto',transition:'opacity .15s',...(v==='primary'?{background:col.A,color:'#0A0A0A'}:v==='wa'?{background:'#25D366',color:'#fff'}:v==='stripe'?{background:'#635BFF',color:'#fff'}:{background:col.CARD,color:col.T,border:`1px solid ${col.BD}`}),...style}}>{children}</button>;
};
const Inp=({value,onChange,placeholder,type='text',mono,c})=>{const col=c||{CARD:'#141414',BD:'#262626',T:'#F0EBE1'};return<input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} type={type} style={{background:col.CARD,border:`1px solid ${col.BD}`,borderRadius:'10px',padding:'12px 14px',color:col.T,fontSize:mono?'20px':'14px',fontFamily:mono?'monospace':'inherit',outline:'none',width:'100%',letterSpacing:mono?'.15em':'normal',fontWeight:mono?'800':'400',boxSizing:'border-box'}}/>;};
const Txa=({value,onChange,placeholder,rows=3,c})=>{const col=c||{CARD:'#141414',BD:'#262626',T:'#F0EBE1'};return<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{background:col.CARD,border:`1px solid ${col.BD}`,borderRadius:'10px',padding:'12px 14px',color:col.T,fontSize:'14px',fontFamily:'inherit',outline:'none',width:'100%',resize:'vertical',boxSizing:'border-box',lineHeight:1.6}}/>;};
const Lbl=({children,c})=>{const col=c||{M:'#555'};return<div style={{fontSize:'11px',color:col.M,fontWeight:'600',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:'8px'}}>{children}</div>;};
const Divider=({c})=><div style={{height:'1px',background:(c||{BD:'#262626'}).BD,margin:'20px 0'}}/>;
const Back=({onClick,c})=>{const col=c||{M2:'#888'};return<button onClick={onClick} style={{background:'none',border:'none',color:col.M2,cursor:'pointer',fontSize:'14px',padding:'0 0 22px',fontFamily:'inherit',display:'block'}}>← Volver</button>;};
const Stepper=({cur,c})=>{const col=c||{A:'#CDFF6C',BD:'#262626',M:'#555'};return(<div style={{display:'flex',gap:'6px',marginBottom:'28px'}}>{['Básico','Fechas','Ruta','Extras'].map((s,i)=>(<div key={s} style={{flex:1,textAlign:'center'}}><div style={{height:'3px',borderRadius:'2px',background:i<=cur?col.A:col.BD,marginBottom:'6px'}}/><span style={{fontSize:'11px',color:i===cur?col.A:col.M,fontWeight:i===cur?'700':'400'}}>{s}</span></div>))}</div>);};

// ── Clima ─────────────────────────────────────────
function WeatherWidget({city,date,c}){
  const col=c||{A:'#CDFF6C',M:'#555',M2:'#888'};
  const[w,setW]=useState(null);const[loading,setL]=useState(false);
  useEffect(()=>{if(!city||!date)return;setL(true);setW(null);(async()=>{try{const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=es`).then(r=>r.json());if(!geo.results?.length){setL(false);return;}const{latitude:lat,longitude:lon}=geo.results[0];const wd=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe/Madrid&start_date=${date}&end_date=${date}`).then(r=>r.json());if(wd.daily)setW({code:wd.daily.weathercode[0],max:Math.round(wd.daily.temperature_2m_max[0]),min:Math.round(wd.daily.temperature_2m_min[0]),rain:wd.daily.precipitation_probability_max[0]});}catch{}finally{setL(false);}})();},[city,date]);
  if(!city||!date)return null;
  if(loading)return<div style={{fontSize:'12px',color:col.M,padding:'12px 0'}}>Consultando el tiempo...</div>;
  if(!w)return<div style={{fontSize:'12px',color:col.M,padding:'12px 0'}}>Ciudad no encontrada.</div>;
  return(<div style={{background:`${col.A}0A`,border:`1px solid ${col.A}25`,borderRadius:'12px',padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontSize:'20px',marginBottom:'2px'}}>{WX[w.code]||'🌡️'}</div><div style={{fontSize:'12px',color:col.M2}}>Lluvia: {w.rain}%</div></div><div style={{textAlign:'right'}}><div style={{fontSize:'28px',fontWeight:'800',color:col.A}}>{w.max}°</div><div style={{fontSize:'13px',color:col.M2}}>{w.min}° mín</div></div></div>);
}

// ── Home ──────────────────────────────────────────
function HomeScreen({onCreate,onJoin,onProfile,theme,toggleTheme,c}){
  const[code,setCode]=useState('');const[err,setErr]=useState('');const[loading,setL]=useState(false);
  const go=async()=>{setErr('');setL(true);const ok=await onJoin(code.trim().toUpperCase());setL(false);if(!ok)setErr('Código no encontrado.');};
  return(<div style={{padding:'52px 24px 40px',maxWidth:'420px',margin:'0 auto'}}>
    <div style={{marginBottom:'52px'}}>
      <span style={{fontSize:'11px',fontWeight:'700',padding:'3px 10px',borderRadius:'20px',background:`${c.A}18`,color:c.A,border:`1px solid ${c.A}35`}}>QUEDA · Planes sin caos</span>
      <h1 style={{fontFamily:"'Syne',serif",fontSize:'48px',fontWeight:'800',color:c.T,margin:'20px 0 16px',lineHeight:1}}>Planes sin<br/><span style={{color:c.A}}>caos.</span></h1>
      <p style={{color:c.M2,fontSize:'15px',lineHeight:1.7}}>Fechas, horarios, ruta, presupuesto, regalo, transporte y clima — todo en un código.</p>
    </div>
    <Btn onClick={onCreate} full style={{padding:'16px',fontSize:'16px',marginBottom:'10px'}} c={c}>Crear un plan →</Btn>
    <Btn onClick={onProfile} v="secondary" full style={{padding:'13px',fontSize:'14px',marginBottom:'16px'}} c={c}>👤 Mis planes</Btn>
    <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'14px'}}><div style={{flex:1,height:'1px',background:c.BD}}/><span style={{color:c.M,fontSize:'11px',fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase'}}>o únete</span><div style={{flex:1,height:'1px',background:c.BD}}/></div>
    <div style={{display:'flex',gap:'8px'}}><Inp value={code} onChange={v=>setCode(v.toUpperCase())} placeholder="Código del plan" mono c={c}/><Btn onClick={go} v="secondary" disabled={code.length<4||loading} style={{flexShrink:0}} c={c}>{loading?'..':'Ir'}</Btn></div>
    {err&&<div style={{color:'#ff6b6b',fontSize:'13px',marginTop:'10px'}}>{err}</div>}
    <div style={{marginTop:'48px',padding:'20px',background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'16px'}}>
      <div style={{fontSize:'11px',color:c.M,fontWeight:'700',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:'14px'}}>Cómo funciona</div>
      {[['1.','Crea un plan con fechas y horarios'],['2.','Comparte el código o link por WhatsApp'],['3.','Cada uno marca cuándo puede'],['4.','Confirma la fecha y avisa al grupo']].map(([n,tx])=>(<div key={n} style={{display:'flex',gap:'12px',marginBottom:'10px',fontSize:'14px'}}><span style={{color:c.A,fontWeight:'700',minWidth:'18px'}}>{n}</span><span style={{color:c.T}}>{tx}</span></div>))}
    </div>
  </div>);
}

// ── Perfil ────────────────────────────────────────
function ProfileScreen({onBack,onOpen,c}){
  const plans=getMyPlans();
  return(<div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
    <Back onClick={onBack} c={c}/>
    <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:c.T,marginBottom:'6px'}}>Mis planes</h2>
    <p style={{color:c.M2,fontSize:'13px',marginBottom:'22px'}}>Planes creados o a los que te has unido en este dispositivo.</p>
    {plans.length===0?(<div style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'32px',textAlign:'center'}}><div style={{fontSize:'36px',marginBottom:'12px'}}>📋</div><div style={{color:c.T,fontWeight:'500',marginBottom:'6px'}}>Todavía no tienes planes</div><div style={{color:c.M2,fontSize:'13px'}}>Crea o únete a uno para verlo aquí</div></div>
    ):(plans.map(p=>(<div key={p.id} onClick={()=>onOpen(p.id)} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'16px',marginBottom:'10px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontSize:'15px',color:c.T,fontWeight:'500',marginBottom:'4px'}}>{p.name}</div><div style={{fontSize:'12px',color:c.M2}}><span style={{color:c.A,fontWeight:'700',letterSpacing:'.08em'}}>{p.id}</span>{' · '}{p.role==='organizer'?'Organizador':'Invitado'}</div></div><span style={{color:c.M2,fontSize:'18px'}}>→</span></div>)))}
  </div>);
}

// ── Create ────────────────────────────────────────
function CreateScreen({onBack,onCreated,c}){
  const days=getNextDays(21);
  const[step,setStep]=useState(0);
  const[name,setName]=useState('');const[desc,setDesc]=useState('');const[org,setOrg]=useState('');const[orgEmail,setOrgEmail]=useState('');
  const[selD,setSelD]=useState([]);const[selH,setSelH]=useState({});
  const[stops,setStops]=useState([{id:1,name:'',cat:CATS[0],address:'',cost:'',link:'',stripeLink:''}]);
  const[city,setCity]=useState('');
  const[gift,setGift]=useState({enabled:false,name:'',link:'',price:'',stripeLink:''});
  const[bring,setBring]=useState(['']);
  const[saving,setSaving]=useState(false);

  const togD=d=>setSelD(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d]);
  const togH=(d,h)=>setSelH(p=>({...p,[d]:(p[d]||[]).includes(h)?(p[d]||[]).filter(x=>x!==h):[...(p[d]||[]),h]}));
  const addStop=()=>setStops(p=>[...p,{id:Date.now(),name:'',cat:CATS[0],address:'',cost:'',link:'',stripeLink:''}]);
  const upd=(id,k,v)=>setStops(p=>p.map(s=>s.id===id?{...s,[k]:v}:s));
  const rem=id=>setStops(p=>p.filter(s=>s.id!==id));
  const budget=stops.reduce((s,x)=>s+(parseFloat(x.cost)||0),0);

  const create=async()=>{
    setSaving(true);
    const plan={id:genId(),name:name.trim(),desc:desc.trim(),organizer:org.trim(),organizerEmail:orgEmail.trim(),dates:[...selD].sort(),hours:selH,stops,city,gift:gift.enabled?gift:null,bring:bring.filter(Boolean),confirmedDate:null,createdAt:new Date().toISOString()};
    await savePlan(plan);addMyPlan(plan.id,plan.name,'organizer');onCreated(plan);
  };

  const iS=(v,placeholder,k,sid)=><input value={v} onChange={e=>upd(sid,k,e.target.value)} placeholder={placeholder} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'9px 12px',color:c.T,fontSize:'13px',fontFamily:'inherit',outline:'none',boxSizing:'border-box',width:'100%'}}/>;

  return(<div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
    <Back onClick={step===0?onBack:()=>setStep(s=>s-1)} c={c}/>
    <Stepper cur={step} c={c}/>

    {step===0&&<>
      <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:c.T,marginBottom:'24px'}}>Lo básico</h2>
      <div style={{marginBottom:'14px'}}><Lbl c={c}>Nombre del plan</Lbl><Inp value={name} onChange={setName} placeholder="Cumpleaños, cena, escapada..." c={c}/></div>
      <div style={{marginBottom:'14px'}}><Lbl c={c}>Descripción (opcional)</Lbl><Txa value={desc} onChange={setDesc} placeholder="Detalles, dress code..." c={c}/></div>
      <div style={{marginBottom:'14px'}}><Lbl c={c}>Tu nombre</Lbl><Inp value={org} onChange={setOrg} placeholder="¿Cómo te llamas?" c={c}/></div>
      <div style={{marginBottom:'24px'}}><Lbl c={c}>Tu email (para notificaciones)</Lbl><Inp value={orgEmail} onChange={setOrgEmail} placeholder="tu@email.com" type="email" c={c}/></div>
      <Btn onClick={()=>setStep(1)} disabled={!name.trim()||!org.trim()} full style={{padding:'15px'}} c={c}>Continuar →</Btn>
    </>}

    {step===1&&<>
      <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:c.T,marginBottom:'6px'}}>Fechas y horarios</h2>
      <p style={{color:c.M2,fontSize:'13px',marginBottom:'20px'}}>Selecciona fechas y horarios posibles.</p>
      {days.slice(0,14).map(d=>{const on=selD.includes(d);return(<div key={d} style={{marginBottom:'8px'}}>
        <div onClick={()=>togD(d)} style={{padding:'12px 14px',borderRadius:'10px',border:`1px solid ${on?c.A:c.BD}`,background:on?`${c.A}12`:c.CARD,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:'14px',color:on?c.A:c.T,fontWeight:on?'600':'400',textTransform:'capitalize'}}>{fmtShort(d)}</span>
          <div style={{width:'22px',height:'22px',borderRadius:'50%',border:`2px solid ${on?c.A:c.BD}`,background:on?c.A:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',color:'#0A0A0A',fontWeight:'800'}}>{on?'✓':''}</div>
        </div>
        {on&&<div style={{padding:'10px 14px',background:c.CARD2,borderRadius:'0 0 10px 10px',border:`1px solid ${c.BD}`,borderTop:'none'}}>
          <div style={{fontSize:'11px',color:c.M,fontWeight:'700',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:'7px'}}>Horarios posibles</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
            {HOURS.map(h=>{const ho=(selH[d]||[]).includes(h);return<span key={h} onClick={()=>togH(d,h)} style={{fontSize:'12px',padding:'5px 11px',borderRadius:'20px',border:`1px solid ${ho?c.A:c.BD}`,background:ho?`${c.A}20`:'transparent',color:ho?c.A:c.M2,cursor:'pointer',fontWeight:ho?'700':'400'}}>{h}</span>;})}
          </div>
        </div>}
      </div>);})}
      <div style={{marginTop:'20px'}}><Btn onClick={()=>setStep(2)} disabled={selD.length<1} full style={{padding:'15px'}} c={c}>Continuar →</Btn></div>
    </>}

    {step===2&&<>
      <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:c.T,marginBottom:'6px'}}>Ruta y presupuesto</h2>
      <p style={{color:c.M2,fontSize:'13px',marginBottom:'18px'}}>Añade los sitios en orden.</p>
      <div style={{marginBottom:'14px'}}><Lbl c={c}>Ciudad (para el clima)</Lbl><Inp value={city} onChange={setCity} placeholder="Madrid, Barcelona..." c={c}/></div>
      <Divider c={c}/>
      {stops.map((s,i)=>(<div key={s.id} style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'16px',marginBottom:'10px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
            <div style={{width:'24px',height:'24px',borderRadius:'50%',background:`${c.A}25`,border:`1px solid ${c.A}50`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:'800',color:c.A}}>{i+1}</div>

          <div style={{fontSize:'11px',color:c.M2,padding:'8px',background:c.CARD,borderRadius:'8px',lineHeight:1.6}}>💡 Stripe Payment Link: dashboard.stripe.com → Payment Links → Create Link</div>

          {bring.length>1&&<button onClick={()=>setBring(p=>p.filter((_,j)=>j!==i))} style={{background:'none',border:`1px solid ${c.BD}`,color:c.M,cursor:'pointer',fontSize:'16px',borderRadius:'8px',width:'36px'}}>×</button>}
        </div>))}

      <Btn onClick={create} disabled={saving} full style={{padding:'16px',fontSize:'16px'}} c={c}>{saving?'Guardando...':'Crear plan 🎉'}</Btn>
    </>}
  </div>);
}

// ── Respond ───────────────────────────────────────
function RespondScreen({plan,onBack,onDone,c}){
  const[name,setName]=useState('');const[avail,setAvail]=useState({});const[hourPref,setHourPref]=useState({});const[how,setHow]=useState('');const[saving,setSaving]=useState(false);const[done,setDone]=useState(false);
  const togD=d=>setAvail(p=>({...p,[d]:!p[d]}));
  const togH=(d,h)=>setHourPref(p=>({...p,[d]:(p[d]||[]).includes(h)?(p[d]||[]).filter(x=>x!==h):[...(p[d]||[]),h]}));
  const submit=async()=>{
    if(!name.trim())return;setSaving(true);
    const resp={name:name.trim(),avail,hourPref,how,at:new Date().toISOString()};
    await saveResp(plan.id,name.trim(),resp);
    addMyPlan(plan.id,plan.name,'invited');
    await sendEmail(plan,name.trim(),plan.dates.filter(d=>avail[d]).map(d=>fmtShort(d)));
    setSaving(false);setDone(true);setTimeout(onDone,1800);
  };
  const budget=plan.stops.reduce((s,p2)=>s+(parseFloat(p2.cost)||0),0);
  const giftPer=plan.gift?.price?parseFloat(plan.gift.price):0;
  if(done)return(<div style={{padding:'80px 24px',maxWidth:'420px',margin:'0 auto',textAlign:'center'}}><div style={{fontSize:'64px',marginBottom:'20px'}}>✅</div><h2 style={{fontFamily:"'Syne',serif",fontSize:'28px',fontWeight:'800',color:c.A,marginBottom:'10px'}}>¡Guardado!</h2><p style={{color:c.M2}}>Tu disponibilidad está registrada.</p></div>);
  return(<div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
    <Back onClick={onBack} c={c}/>
    {plan.confirmedDate&&<div style={{background:`${c.A}15`,border:`1px solid ${c.A}50`,borderRadius:'12px',padding:'14px 16px',marginBottom:'16px',display:'flex',gap:'10px',alignItems:'center'}}><div style={{fontSize:'20px'}}>📌</div><div><div style={{fontSize:'11px',color:c.A,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'2px'}}>Fecha confirmada</div><div style={{fontSize:'15px',color:c.T,fontWeight:'600',textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate)}</div></div></div>}
    <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:c.T,marginBottom:'4px'}}>{plan.name}</h2>
    <div style={{fontSize:'13px',color:c.M2,marginBottom:'8px'}}>Organizado por {plan.organizer}</div>
    {plan.desc&&<p style={{fontSize:'14px',color:c.T,lineHeight:1.7,marginBottom:'16px',padding:'12px 14px',background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'10px'}}>{plan.desc}</p>}
    {budget>0&&<div style={{background:`${c.A}0D`,border:`1px solid ${c.A}30`,borderRadius:'10px',padding:'12px 16px',marginBottom:'16px',display:'flex',justifyContent:'space-between'}}><span style={{color:c.M2,fontSize:'13px'}}>Presupuesto estimado</span><span style={{color:c.A,fontWeight:'700'}}>{(budget+giftPer).toFixed(0)}€/persona</span></div>}
    <Divider c={c}/>
    <div style={{marginBottom:'16px'}}><Lbl c={c}>Tu nombre</Lbl><Inp value={name} onChange={setName} placeholder="¿Cómo te llamas?" c={c}/></div>
    <div style={{marginBottom:'20px'}}>
      <Lbl c={c}>¿Cuándo puedes?</Lbl>
      {plan.dates.map(d=>{const on=avail[d];const hs=plan.hours?.[d]||[];return(<div key={d} style={{marginBottom:'8px'}}>
        <div onClick={()=>togD(d)} style={{padding:'12px 14px',borderRadius:'10px',border:`1px solid ${on?c.A:c.BD}`,background:on?`${c.A}12`:c.CARD,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:'14px',color:on?c.A:c.T,fontWeight:on?'600':'400',textTransform:'capitalize'}}>{fmtDate(d)}</span>
          <div style={{width:'22px',height:'22px',borderRadius:'50%',border:`2px solid ${on?c.A:c.BD}`,background:on?c.A:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',color:'#0A0A0A',fontWeight:'800'}}>{on?'✓':''}</div>
        </div>
        {on&&hs.length>0&&<div style={{padding:'10px 14px',background:c.CARD2,borderRadius:'0 0 10px 10px',border:`1px solid ${c.BD}`,borderTop:'none'}}>
          <div style={{fontSize:'11px',color:c.M,fontWeight:'700',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:'7px'}}>¿A qué hora?</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>{hs.map(h=>{const o=(hourPref[d]||[]).includes(h);return<span key={h} onClick={()=>togH(d,h)} style={{fontSize:'12px',padding:'4px 11px',borderRadius:'20px',border:`1px solid ${o?c.A:c.BD}`,background:o?`${c.A}20`:'transparent',color:o?c.A:c.M2,cursor:'pointer',fontWeight:o?'700':'400'}}>{h}</span>;})}</div>
        </div>}
      </div>);})}
    </div>
    <div style={{marginBottom:'20px'}}>
      <Lbl c={c}>¿Cómo llegas? (opcional)</Lbl>
      <select value={how} onChange={e=>setHow(e.target.value)} style={{background:c.CARD,border:`1px solid ${c.BD}`,color:how?c.T:c.M,fontSize:'14px',padding:'12px 14px',borderRadius:'10px',width:'100%',fontFamily:'inherit'}}>
        <option value=''>Selecciona...</option>
        <option value='coche'>🚗 En coche</option><option value='moto'>🏍 En moto</option><option value='transporte'>🚇 Transporte público</option><option value='uber'>🚕 Taxi/Uber</option><option value='andando'>🚶 Andando</option><option value='bici'>🚲 Bici/Patinete</option>
      </select>
    </div>
    <Btn onClick={submit} disabled={!name.trim()||saving} full style={{padding:'15px',fontSize:'15px'}} c={c}>{saving?'Guardando...':'Confirmar disponibilidad →'}</Btn>
  </div>);
}

// ── Results ───────────────────────────────────────
function ResultsScreen({plan:ip,onBack,isOrg,c}){
  const[plan,setPlan]=useState(ip);
  const[tab,setTab]=useState('disponibilidad');const[responses,setRs]=useState([]);const[loading,setL]=useState(true);const[confirming,setCon]=useState(false);
  const refresh=useCallback(async()=>{setL(true);setRs(await loadResps(plan.id));setL(false);},[plan.id]);
  useEffect(()=>{refresh();},[refresh]);
  const total=responses.length;
  const counts=plan.dates.reduce((acc,d)=>{acc[d]=responses.filter(r=>r.avail[d]).length;return acc;},{});
  const mx=Math.max(...Object.values(counts),1);
  const best=total>0?plan.dates.reduce((b,d)=>counts[d]>counts[b]?d:b,plan.dates[0]):null;
  const budget=plan.stops.reduce((s,p2)=>s+(parseFloat(p2.cost)||0),0);
  const giftPer=plan.gift?.price?parseFloat(plan.gift.price):0;
  const fs=plan.stops.find(s=>s.address||s.name);
  const TABS=['disponibilidad','ruta','extras','clima','transporte'];
  const TLABELS={disponibilidad:'👥 Quién puede',ruta:'📍 Ruta',extras:'🎁 Extras',clima:'🌤️ Clima',transporte:'🚗 Transporte'};

  const confirmDate=async d=>{setCon(true);const up={...plan,confirmedDate:d};await updatePlan(up);setPlan(up);setCon(false);};
  const waConfirm=()=>{if(!plan.confirmedDate)return;const url=location.href.split('?')[0]+'?code='+plan.id;const msg=`📌 *${plan.name}* — ¡fecha confirmada!\n\n🗓️ ${fmtDate(plan.confirmedDate)}\n\n${url}`;window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');};

  return(<div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
    <Back onClick={onBack} c={c}/>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'4px'}}>
      <h2 style={{fontFamily:"'Syne',serif",fontSize:'24px',fontWeight:'800',color:c.T,margin:0}}>{plan.name}</h2>
      <button onClick={refresh} style={{background:'none',border:`1px solid ${c.BD}`,color:c.M2,cursor:'pointer',fontSize:'12px',padding:'6px 10px',borderRadius:'8px',fontFamily:'inherit'}}>↻</button>
    </div>
    <div style={{fontSize:'13px',color:c.M2,marginBottom:'12px'}}>{total} respuesta{total!==1?'s':''} · <span style={{color:c.A,fontWeight:'700',letterSpacing:'.1em'}}>{plan.id}</span></div>

    {plan.confirmedDate&&(<div style={{background:`${c.A}15`,border:`1px solid ${c.A}50`,borderRadius:'12px',padding:'14px 16px',marginBottom:'14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div><div style={{fontSize:'11px',color:c.A,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'2px'}}>📌 Fecha confirmada</div><div style={{fontSize:'15px',color:c.T,fontWeight:'600',textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate)}</div></div>
      {isOrg&&<button onClick={waConfirm} style={{background:'#25D366',border:'none',borderRadius:'10px',padding:'8px 12px',color:'#fff',fontSize:'12px',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'}}>Avisar 💬</button>}
    </div>)}

    <div style={{display:'flex',gap:'6px',overflowX:'auto',paddingBottom:'4px',marginBottom:'20px'}}>
      {TABS.map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:'7px 12px',borderRadius:'20px',border:`1px solid ${tab===t?c.A+'60':c.BD}`,background:tab===t?`${c.A}15`:c.CARD,color:tab===t?c.A:c.M2,fontSize:'12px',fontWeight:tab===t?'700':'400',cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',flexShrink:0}}>{TLABELS[t]}</button>)}
    </div>

    {loading&&<div style={{textAlign:'center',color:c.M,padding:'48px'}}>Cargando...</div>}

    {!loading&&tab==='disponibilidad'&&(total===0?
      (<div style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'32px',textAlign:'center'}}><div style={{fontSize:'36px',marginBottom:'12px'}}>⏳</div><div style={{color:c.T,fontWeight:'500',marginBottom:'6px'}}>Nadie ha respondido todavía</div><div style={{color:c.M2,fontSize:'13px'}}>Comparte el código <span style={{color:c.A,fontWeight:'700'}}>{plan.id}</span></div></div>)
    :(<>
      {best&&counts[best]>0&&(<div style={{background:`${c.A}12`,border:`1px solid ${c.A}35`,borderRadius:'14px',padding:'16px',marginBottom:'18px'}}>
        <div style={{display:'flex',gap:'14px',alignItems:'center',marginBottom:isOrg&&!plan.confirmedDate?'14px':'0'}}>
          <div style={{fontSize:'28px'}}>⭐</div>
          <div>
            <div style={{fontSize:'11px',color:c.A,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'2px'}}>Mejor opción</div>
            <div style={{fontSize:'15px',color:c.T,fontWeight:'600',textTransform:'capitalize'}}>{fmtDate(best)}</div>
            {plan.hours?.[best]?.length>0&&<div style={{fontSize:'12px',color:c.M2}}>Horas: {plan.hours[best].join(', ')}</div>}
            <div style={{fontSize:'13px',color:c.M2}}>{counts[best]}/{total} pueden</div>
          </div>
        </div>
        {isOrg&&!plan.confirmedDate&&<Btn onClick={()=>confirmDate(best)} disabled={confirming} full sm c={c}>{confirming?'Confirmando...':'📌 Confirmar esta fecha'}</Btn>}
      </div>)}
      <div style={{marginBottom:'20px'}}>{plan.dates.map(d=>{const n=counts[d];const pct=(n/mx)*100;const isBest=d===best&&n>0;const isConf=d===plan.confirmedDate;return(<div key={d} style={{marginBottom:'12px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
            <span style={{fontSize:'13px',color:isConf||isBest?c.A:c.T,fontWeight:isConf||isBest?'700':'400',textTransform:'capitalize'}}>{fmtShort(d)}</span>
            {isConf&&<span style={{fontSize:'10px',background:c.A,color:'#0A0A0A',padding:'1px 7px',borderRadius:'20px',fontWeight:'800'}}>CONFIRMADO</span>}
            {!isConf&&isBest&&<span style={{fontSize:'12px'}}>⭐</span>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
            <span style={{fontSize:'13px',color:isBest?c.A:c.M2,fontWeight:isBest?'700':'400'}}>{n}/{total}</span>
            {isOrg&&!plan.confirmedDate&&d!==best&&n>0&&<button onClick={()=>confirmDate(d)} style={{background:'none',border:'none',color:c.M2,fontSize:'11px',cursor:'pointer',fontFamily:'inherit',textDecoration:'underline'}}>Confirmar</button>}
          </div>
        </div>
        <div style={{height:'7px',background:c.BD,borderRadius:'4px',overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,background:isConf||isBest?c.A:c.CARD2,borderRadius:'4px',transition:'width .5s'}}/></div>
      </div>);})}</div>
      <div style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'16px'}}>
        <Lbl c={c}>Detalle por persona</Lbl>
        {responses.map((r,i)=>(<div key={i} style={{paddingBottom:'12px',marginBottom:'12px',borderBottom:i<responses.length-1?`1px solid ${c.BD}`:'none'}}>
          <div style={{fontSize:'14px',color:c.T,fontWeight:'600',marginBottom:'6px'}}>{r.name} {r.how&&<span style={{fontSize:'12px',color:c.M2,fontWeight:'400'}}>· {r.how==='coche'?'🚗':r.how==='transporte'?'🚇':r.how==='uber'?'🚕':r.how==='andando'?'🚶':'🚲'}</span>}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>{plan.dates.map(d=><span key={d} style={{fontSize:'11px',padding:'3px 9px',borderRadius:'20px',background:r.avail[d]?`${c.A}20`:c.CARD2,color:r.avail[d]?c.A:c.M,fontWeight:r.avail[d]?'700':'400',border:`1px solid ${r.avail[d]?c.A+'40':c.BD}`,textTransform:'capitalize'}}>{fmtShort(d)}</span>)}</div>
        </div>))}
      </div>
    </>))}

    {!loading&&tab==='ruta'&&<>
      {plan.stops.map((s,i)=>(<div key={s.id||i} style={{display:'flex',gap:'12px',marginBottom:'10px'}}>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
          <div style={{width:'28px',height:'28px',borderRadius:'50%',background:`${c.A}20`,border:`1.5px solid ${c.A}60`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:'800',color:c.A,flexShrink:0}}>{i+1}</div>
          {i<plan.stops.length-1&&<div style={{width:'2px',flex:1,background:c.BD,margin:'4px 0'}}/>}
        </div>
        <div style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'16px',flex:1}}>
          <div style={{fontSize:'11px',color:c.M2,marginBottom:'4px'}}>{s.cat}</div>
          <div style={{fontSize:'15px',color:c.T,fontWeight:'600',marginBottom:'4px'}}>{s.name||'Sin nombre'}</div>
          {s.address&&<div style={{fontSize:'12px',color:c.M2,marginBottom:'8px'}}>📍 {s.address}</div>}
          <div style={{display:'flex',flexWrap:'wrap',gap:'6px',alignItems:'center'}}>
            {parseFloat(s.cost)>0&&<span style={{fontSize:'11px',fontWeight:'700',padding:'3px 10px',borderRadius:'20px',background:`${c.A}18`,color:c.A,border:`1px solid ${c.A}35`}}>{s.cost}€/pers.</span>}
            {(s.address||s.name)&&<a href={`https://maps.google.com/?q=${encodeURIComponent((s.name||'')+(s.address?' '+s.address:''))}`} target="_blank" rel="noreferrer" style={{fontSize:'12px',color:c.M2,textDecoration:'none',padding:'4px 10px',border:`1px solid ${c.BD}`,borderRadius:'8px'}}>Maps 🗺️</a>}
            {s.link&&<a href={s.link.startsWith('http')?s.link:'https://'+s.link} target="_blank" rel="noreferrer" style={{fontSize:'12px',color:c.A,textDecoration:'none',padding:'4px 10px',border:`1px solid ${c.A}40`,borderRadius:'8px'}}>Reserva ↗</a>}
            {s.stripeLink&&<a href={s.stripeLink.startsWith('http')?s.stripeLink:'https://'+s.stripeLink} target="_blank" rel="noreferrer" style={{fontSize:'12px',color:'#fff',textDecoration:'none',padding:'4px 10px',borderRadius:'8px',background:'#635BFF',fontWeight:'600'}}>💳 Pagar</a>}
          </div>
        </div>
      </div>))}
      {budget>0&&<><Divider c={c}/>
        <div style={{display:'flex',justifyContent:'space-between',padding:'14px 16px',background:`${c.A}0D`,border:`1px solid ${c.A}30`,borderRadius:'12px',marginBottom:'10px'}}><span style={{color:c.M2}}>Por persona</span><span style={{color:c.A,fontSize:'22px',fontWeight:'800'}}>{budget.toFixed(0)}€</span></div>
        {giftPer>0&&<div style={{display:'flex',justifyContent:'space-between',padding:'12px 16px',background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'12px',marginBottom:'10px'}}><span style={{color:c.M2,fontSize:'14px'}}>+ regalo</span><span style={{color:c.T,fontWeight:'600'}}>{giftPer.toFixed(0)}€/pers.</span></div>}
        <div style={{display:'flex',justifyContent:'space-between',padding:'14px 16px',background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'12px'}}><span style={{color:c.T,fontWeight:'700'}}>Total</span><span style={{color:c.A,fontSize:'18px',fontWeight:'800'}}>{(budget+giftPer).toFixed(0)}€</span></div>
      </>}
    </>}

    {!loading&&tab==='extras'&&<>
      {plan.gift?(<div style={{background:c.CARD,border:`1px solid ${c.A}40`,borderRadius:'14px',padding:'16px',marginBottom:'16px'}}>
        <div style={{fontSize:'11px',color:c.M2,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'12px'}}>🎁 Regalo colectivo</div>
        <div style={{fontSize:'18px',color:c.T,fontWeight:'600',marginBottom:'8px'}}>{plan.gift.name||'Sin nombre'}</div>
        {plan.gift.price&&<><div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}><span style={{color:c.M2,fontSize:'14px'}}>Precio total</span><span style={{color:c.A,fontWeight:'700',fontSize:'18px'}}>{plan.gift.price}€</span></div>
        {total>0&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:'12px'}}><span style={{color:c.M2,fontSize:'14px'}}>Por persona ({total})</span><span style={{color:c.A,fontWeight:'700'}}>{(parseFloat(plan.gift.price)/total).toFixed(2)}€</span></div>}</>}
        {plan.gift.link&&<a href={plan.gift.link.startsWith('http')?plan.gift.link:'https://'+plan.gift.link} target="_blank" rel="noreferrer" style={{display:'block',textAlign:'center',padding:'10px',background:`${c.A}20`,border:`1px solid ${c.A}50`,borderRadius:'10px',color:c.A,textDecoration:'none',fontSize:'14px',fontWeight:'600',marginBottom:'10px'}}>Ver el regalo ↗</a>}
        {plan.gift.stripeLink?
          (<a href={plan.gift.stripeLink.startsWith('http')?plan.gift.stripeLink:'https://'+plan.gift.stripeLink} target="_blank" rel="noreferrer" style={{display:'block',textAlign:'center',padding:'13px',background:'#635BFF',borderRadius:'12px',color:'#fff',textDecoration:'none',fontSize:'15px',fontWeight:'700'}}>💳 Pagar mi parte con Stripe</a>)
          :(<div style={{textAlign:'center',padding:'10px',background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'10px',fontSize:'13px',color:c.M2}}>El organizador añadirá pronto el link de pago</div>)
        }
      </div>):<div style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'28px',textAlign:'center'}}><div style={{fontSize:'32px',marginBottom:'10px'}}>🎁</div><div style={{color:c.M2,fontSize:'14px'}}>No hay regalo en este plan</div></div>}
      {plan.bring?.filter(Boolean).length>0&&<div style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'16px'}}>
        <Lbl c={c}>🎒 Qué llevar</Lbl>
        {plan.bring.filter(Boolean).map((b,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 0',borderBottom:i<plan.bring.filter(Boolean).length-1?`1px solid ${c.BD}`:'none',fontSize:'14px',color:c.T}}><div style={{width:'7px',height:'7px',borderRadius:'50%',background:c.A,flexShrink:0}}/>{b}</div>)}
      </div>}
    </>}

    {!loading&&tab==='clima'&&<>
      {best?(<>
        <div style={{fontSize:'14px',color:c.M2,marginBottom:'16px'}}>Previsión para <span style={{color:c.T,fontWeight:'600',textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate||best)}</span>{plan.city?` en ${plan.city}`:''}</div>
        {plan.city?<WeatherWidget city={plan.city} date={plan.confirmedDate||best} c={c}/>:<div style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'28px',textAlign:'center'}}><div style={{fontSize:'32px',marginBottom:'10px'}}>🌤️</div><div style={{color:c.M2,fontSize:'14px'}}>Añade una ciudad al plan para ver el tiempo</div></div>}
        {plan.city&&plan.dates.length>1&&<><Divider c={c}/><Lbl c={c}>Todas las fechas</Lbl>{plan.dates.map(d=><div key={d} style={{marginBottom:'14px'}}><div style={{fontSize:'13px',color:c.M2,marginBottom:'6px',textTransform:'capitalize'}}>{fmtShort(d)}{d===plan.confirmedDate?' 📌':''}</div><WeatherWidget city={plan.city} date={d} c={c}/></div>)}</>}
      </>):<div style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'28px',textAlign:'center'}}><div style={{fontSize:'32px',marginBottom:'10px'}}>⏳</div><div style={{color:c.M2,fontSize:'14px'}}>Necesitas al menos una respuesta</div></div>}
    </>}

    {!loading&&tab==='transporte'&&<>
      {fs?(<>
        <div style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'16px',marginBottom:'12px'}}>
          <div style={{fontSize:'11px',color:c.M2,fontWeight:'700',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:'8px'}}>Destino</div>
          <div style={{fontSize:'15px',color:c.T,fontWeight:'600'}}>{fs.name}</div>
          {fs.address&&<div style={{fontSize:'13px',color:c.M2}}>{fs.address}</div>}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'20px'}}>
          {[{name:'Google Maps',icon:'🗺️',url:`https://maps.google.com/?q=${encodeURIComponent((fs.name||'')+(fs.address?' '+fs.address:''))}`},{name:'Uber',icon:'⚫',url:'https://m.uber.com/'},{name:'Cabify',icon:'🟣',url:'https://cabify.com/'},{name:'Renfe',icon:'🚆',url:'https://www.renfe.com/'},{name:'Metro/EMT',icon:'🚇',url:'https://www.emt.madrid.es/'},{name:'Trainline',icon:'🎫',url:'https://www.thetrainline.com/'}].map(tx=>(
            <a key={tx.name} href={tx.url} target="_blank" rel="noreferrer" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'8px',padding:'18px 10px',background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'14px',textDecoration:'none'}}>
              <div style={{fontSize:'28px'}}>{tx.icon}</div><div style={{fontSize:'13px',color:c.T,fontWeight:'600',textAlign:'center'}}>{tx.name}</div>
            </a>
          ))}
        </div>
        {responses.filter(r=>r.how).length>0&&<><Lbl c={c}>¿Cómo va cada uno?</Lbl>{responses.filter(r=>r.how).map((r,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${c.BD}`,fontSize:'14px'}}><span style={{color:c.T}}>{r.name}</span><span style={{color:c.M2}}>{r.how==='coche'?'🚗 Coche':r.how==='transporte'?'🚇 Transporte':r.how==='uber'?'🚕 Taxi':r.how==='andando'?'🚶 Andando':'🚲 Bici'}</span></div>)}</>}
      </>):<div style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'28px',textAlign:'center'}}><div style={{fontSize:'32px',marginBottom:'10px'}}>📍</div><div style={{color:c.M2,fontSize:'14px'}}>Añade paradas a la ruta para ver el transporte</div></div>}
    </>}
  </div>);
}

// ── App ───────────────────────────────────────────
function App(){
  const[theme,setTheme]=useState(()=>localStorage.getItem('queda_theme')||getSysTheme());
  const[screen,setScreen]=useState('home');
  const[plan,setPlan]=useState(null);
  const[isOrg,setIsOrg]=useState(false);
  const c=C(theme);

  useEffect(()=>{applyTheme(theme);},[theme]);
  const toggleTheme=()=>setTheme(t=>{const next=t==='dark'?'light':'dark';applyTheme(next);return next;});

  useEffect(()=>{
    const code=new URLSearchParams(location.search).get('code');
    if(code){loadPlan(code).then(p=>{if(p){setPlan(p);setIsOrg(false);setScreen('respond');}});}
  },[]);

  const handleJoin=async code=>{const p=await loadPlan(code);if(p){setPlan(p);setIsOrg(false);setScreen('respond');return true;}return false;};
  const handleOpenFromProfile=async id=>{const p=await loadPlan(id);if(p){const mine=getMyPlans().find(x=>x.id===id);setPlan(p);setIsOrg(mine?.role==='organizer');setScreen('results');}};

  return(<div style={{minHeight:'100vh',background:c.BG,color:c.T,fontFamily:"'DM Sans',system-ui,sans-serif"}}>
    <div style={{borderBottom:`1px solid ${c.BD}`,padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:c.BG+'F0',backdropFilter:'blur(10px)',zIndex:10}}>
      <div onClick={()=>setScreen('home')} style={{fontFamily:"'Syne',serif",fontWeight:'800',fontSize:'22px',cursor:'pointer',color:c.T,letterSpacing:'-.02em'}}>queda<span style={{color:c.A}}>.</span></div>
      <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
        {plan&&screen!=='home'&&screen!=='create'&&screen!=='profile'&&<div style={{fontSize:'12px',color:c.M}}>código: <span style={{color:c.A,fontWeight:'800',letterSpacing:'.1em'}}>{plan.id}</span></div>}
        <button onClick={toggleTheme} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'6px 10px',cursor:'pointer',fontSize:'16px'}}>{theme==='dark'?'☀️':'🌙'}</button>
      </div>
    </div>
    {screen==='home'&&<HomeScreen onCreate={()=>setScreen('create')} onJoin={handleJoin} onProfile={()=>setScreen('profile')} theme={theme} toggleTheme={toggleTheme} c={c}/>}
    {screen==='profile'&&<ProfileScreen onBack={()=>setScreen('home')} onOpen={handleOpenFromProfile} c={c}/>}
    {screen==='create'&&<CreateScreen onBack={()=>setScreen('home')} onCreated={p=>{setPlan(p);setIsOrg(true);setScreen('share');}} c={c}/>}
    {screen==='share'&&plan&&<ShareScreen plan={plan} onViewResults={()=>setScreen('results')} onBack={()=>setScreen('home')} c={c}/>}
    {screen==='respond'&&plan&&<RespondScreen plan={plan} onBack={()=>setScreen('home')} onDone={()=>setScreen('results')} c={c}/>}
    {screen==='results'&&plan&&<ResultsScreen plan={ip} onBack={()=>setScreen(isOrg?'share':'home')} isOrg={isOrg} c={c}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
