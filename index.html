// в”Җв”Җв”Җ BASE UI в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const Btn=({children,onClick,v='primary',disabled,full,sm,style={},c,accent})=>{const bg={primary:{background:accent||c?.A||'#CDFF6C',color:'#0A0A0A'},secondary:{background:c?.CARD||'#141414',color:c?.T||'#F0EBE1',border:`1px solid ${c?.BD||'#2A2A2A'}`},wa:{background:'#25D366',color:'#fff'},danger:{background:'#ff4444',color:'#fff'}};return<button onClick={onClick} disabled={disabled} style={{padding:sm?'8px 14px':'13px 20px',borderRadius:'12px',border:'none',cursor:disabled?'not-allowed':'pointer',fontSize:sm?'13px':'15px',fontWeight:'600',fontFamily:'inherit',opacity:disabled?.3:1,width:full?'100%':'auto',transition:'opacity .15s',...(bg[v]||bg.secondary),...style}}>{children}</button>;};
const Inp=({value,onChange,onKey,placeholder,type='text',mono,c})=><input value={value} onChange={e=>onChange(e.target.value)} onKeyDown={onKey} placeholder={placeholder} type={type} style={{background:c?.CARD,border:`1px solid ${c?.BD}`,borderRadius:'10px',padding:'12px 14px',color:c?.T,fontSize:mono?'22px':'14px',fontFamily:mono?'monospace':'inherit',outline:'none',width:'100%',letterSpacing:mono?'.18em':'normal',fontWeight:mono?'800':'400',boxSizing:'border-box'}}/>;
const Txa=({value,onChange,placeholder,rows=3,c})=><textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{background:c?.CARD,border:`1px solid ${c?.BD}`,borderRadius:'10px',padding:'12px 14px',color:c?.T,fontSize:'14px',fontFamily:'inherit',outline:'none',width:'100%',resize:'vertical',boxSizing:'border-box',lineHeight:1.6}}/>;
const Lbl=({children,c})=><div style={{fontSize:'11px',color:c?.M||'#555',fontWeight:'600',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:'8px'}}>{children}</div>;
const HR=({c})=><div style={{height:'1px',background:c?.BD,margin:'20px 0'}}/>;
const Back=({onClick,label,c})=><button onClick={onClick} style={{background:'none',border:'none',color:c?.M2,cursor:'pointer',fontSize:'14px',padding:'0 0 22px',fontFamily:'inherit',display:'block'}}>{label}</button>;
const Badge=({children,color})=><span style={{fontSize:'11px',fontWeight:'700',padding:'3px 10px',borderRadius:'20px',background:`${color}18`,color,border:`1px solid ${color}35`}}>{children}</span>;
const Card=({children,style={},c,accent})=><div style={{background:c?.CARD,border:`1px solid ${accent?c?.A+'50':c?.BD}`,borderRadius:'14px',padding:'16px',marginBottom:'10px',...style}}>{children}</div>;
const Stepper=({cur,labels,c,accent})=><div style={{display:'flex',gap:'6px',marginBottom:'28px'}}>{labels.map((s,i)=><div key={s} style={{flex:1,textAlign:'center'}}><div style={{height:'3px',borderRadius:'2px',background:i<=cur?accent||c?.A:c?.BD,marginBottom:'6px',transition:'background .3s'}}/><span style={{fontSize:'11px',color:i===cur?accent||c?.A:c?.M,fontWeight:i===cur?'700':'400'}}>{s}</span></div>)}</div>;
const ModeBadge=({mode,lang,c})=>{const m=T[lang]?.modes?.[mode];const color=getMC(mode,c)||c?.A;return<span style={{fontSize:'11px',fontWeight:'700',padding:'3px 10px',borderRadius:'20px',background:`${color}18`,color,border:`1px solid ${color}35`}}>{m?.label||mode}</span>;};

// в”Җв”Җв”Җ CALENDAR в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function CalendarPicker({selected,onChange,c,lang}){
  const now=dayStart();const max=addDays(now,365);
  const[vy,setVy]=useState(now.getFullYear());const[vm,setVm]=useState(now.getMonth());
  const days=new Date(vy,vm+1,0).getDate();const first=(new Date(vy,vm,1).getDay()+6)%7;
  const dl=lang==='en'?['M','T','W','T','F','S','S']:['L','M','X','J','V','S','D'];
  const prev=()=>{if(vm===0){setVy(y=>y-1);setVm(11);}else setVm(m=>m-1);};
  const next=()=>{const n=new Date(vy,vm+1,1);if(n<=max){if(vm===11){setVy(y=>y+1);setVm(0);}else setVm(m=>m+1);}};
  const tog=iso=>onChange(selected.includes(iso)?selected.filter(d=>d!==iso):[...selected,iso]);
  return(<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'16px'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
      <button onClick={prev} title={lang==='es'?'Mes anterior':'Previous month'} style={{background:'none',border:'none',color:c.M2,cursor:'pointer',fontSize:'20px',padding:'2px 8px'}}>вҖ№</button>
      <span style={{fontSize:'14px',fontWeight:'600',color:c.T,textTransform:'capitalize'}}>{fmtMonthYear(vy,vm,lang)}</span>
      <button onClick={next} title={lang==='es'?'Mes siguiente':'Next month'} style={{background:'none',border:'none',color:c.M2,cursor:'pointer',fontSize:'20px',padding:'2px 8px'}}>вҖә</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px',marginBottom:'4px'}}>
      {dl.map((d,i)=><div key={i} style={{textAlign:'center',fontSize:'11px',color:c.M,fontWeight:'600',padding:'4px'}}>{d}</div>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px'}}>
      {Array.from({length:first}).map((_,i)=><div key={'e'+i}/>)}
      {Array.from({length:days}).map((_,i)=>{const date=new Date(vy,vm,i+1);const iso=toISO(date);const dis=date<now||date>max;const sel=selected.includes(iso);return<div key={i} onClick={()=>!dis&&tog(iso)} style={{textAlign:'center',padding:'7px 2px',borderRadius:'8px',fontSize:'13px',cursor:dis?'default':'pointer',background:sel?c.A:dis?'transparent':c.CARD,color:sel?'#0A0A0A':dis?c.BD:c.T,fontWeight:sel?'700':'400',border:sel?'none':`1px solid ${dis?'transparent':c.BD}`}}>{i+1}</div>;})}
    </div>
    {selected.length>0&&<div style={{marginTop:'10px',display:'flex',flexWrap:'wrap',gap:'4px'}}>
      {selected.sort().map(d=><span key={d} onClick={()=>tog(d)} style={{padding:'3px 8px',background:`${c.A}20`,color:c.A,border:`1px solid ${c.A}40`,borderRadius:'20px',cursor:'pointer',fontSize:'11px',fontWeight:'600',textTransform:'capitalize'}}>{fmtShort(d,lang)} Г—</span>)}
    </div>}
  </div>);
}

// в”Җв”Җв”Җ TIME PICKER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function TimePicker({times,onChange,c,lang,tz}){
  const[h,setH]=useState('20');const[m,setM]=useState('00');
  const add=()=>{const v=`${h}:${m}`;if(!times.includes(v))onChange([...times,v].sort());};
  const ss={background:c.CARD,border:`1px solid ${c.BD}`,color:c.T,fontSize:'14px',padding:'10px 12px',borderRadius:'10px',width:'100%',fontFamily:'inherit'};
  return(<div>
    <div style={{display:'flex',gap:'8px',alignItems:'flex-end',marginBottom:'8px'}}>
      <div style={{flex:1}}><select value={h} onChange={e=>setH(e.target.value)} style={ss}>{Array.from({length:24},(_,i)=>i.toString().padStart(2,'0')).map(hh=><option key={hh} value={hh}>{hh}h</option>)}</select></div>
      <div style={{flex:1}}><select value={m} onChange={e=>setM(e.target.value)} style={ss}>{['00','15','30','45'].map(mm=><option key={mm} value={mm}>:{mm}</option>)}</select></div>
      <Btn onClick={add} sm c={c}>{T[lang].addTime}</Btn>
    </div>
    {tz&&<div style={{fontSize:'12px',color:c.M2,marginBottom:'6px'}}>рҹҢҚ {getTzLabel(tz)}</div>}
    {times.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
      {times.map(hh=><span key={hh} onClick={()=>onChange(times.filter(x=>x!==hh))} style={{fontSize:'12px',padding:'5px 11px',borderRadius:'20px',border:`1px solid ${c.A}50`,background:`${c.A}15`,color:c.A,cursor:'pointer',fontWeight:'600'}}>{hh} Г—</span>)}
    </div>}
  </div>);
}

// в”Җв”Җв”Җ ROUTE MAP в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

// в”Җв”Җв”Җ WEATHER WIDGET в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function WeatherWidget({city,date,c,lang,showAdvice=false}){
  const[w,setW]=useState(null);const[state,setState]=useState('idle');
  useEffect(()=>{
    if(!city||!date){setState('idle');return;}
    const du=daysUntil(date);
    if(du>16){setState('early');return;}
    setState('loading');setW(null);
    (async()=>{try{
      const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=${lang}`).then(r=>r.json());
      if(!geo.results?.length){setState('notfound');return;}
      const{latitude:lat,longitude:lon}=geo.results[0];
      const wd=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max&timezone=auto&start_date=${date}&end_date=${date}`).then(r=>r.json());
      if(wd.daily){setState('ok');setW({code:wd.daily.weathercode[0],max:Math.round(wd.daily.temperature_2m_max[0]),min:Math.round(wd.daily.temperature_2m_min[0]),rain:wd.daily.precipitation_probability_max[0],wind:Math.round(wd.daily.windspeed_10m_max?.[0]||0)});}
      else setState('notfound');
    }catch{setState('notfound');}})();
  },[city,date]);
  if(!city||!date||state==='idle')return null;
  const isEs=lang==='es';const du=date?daysUntil(date):0;
  const t=T[lang];
  if(state==='early')return<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'12px',padding:'12px 14px',display:'flex',gap:'10px',alignItems:'center'}}><div style={{fontSize:'22px'}}>рҹ“…</div><div><div style={{fontSize:'13px',color:c.T,fontWeight:'500'}}>{t.tooEarlyT}</div><div style={{fontSize:'12px',color:c.M2}}>{du-16} {t.tooEarlyD}</div></div></div>;
  if(state==='notfound')return<div style={{fontSize:'12px',color:c.M2,padding:'6px'}}>{t.cityNotFound}</div>;
  if(state==='loading')return<div style={{fontSize:'12px',color:c.M,padding:'8px'}}>...</div>;
  if(!w)return null;
  const desc=lang==='en'?WX_EN[w.code]||'':WX_ES[w.code]||'';

        <div><div style={{fontSize:'18px',marginBottom:'4px'}}>{WX[w.code]||'рҹҢЎпёҸ'} <span style={{fontSize:'14px',color:c.T,fontWeight:'600'}}>{desc}</span></div><div style={{display:'flex',gap:'12px',fontSize:'12px',color:c.M2}}><span>рҹ’§ {w.rain}%</span>{w.wind>0&&<span>рҹ’Ё {w.wind} km/h</span>}</div></div>
        <div style={{textAlign:'right'}}><div style={{fontSize:'32px',fontWeight:'800',color:c.A,lineHeight:1}}>{w.max}В°</div><div style={{fontSize:'13px',color:c.M2}}>{w.min}В° min</div></div>
      </div>
    </div>
    {adv&&<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'10px',padding:'12px 14px',display:'flex',flexDirection:'column',gap:'6px'}}>
      <div style={{fontSize:'13px',color:c.T}}>{adv.cloth}</div>
      <div style={{fontSize:'13px',color:c.T}}>{adv.trans}</div>
      {adv.ext.map((e,i)=><div key={i} style={{fontSize:'12px',color:c.M2,background:`${c.A}10`,padding:'5px 10px',borderRadius:'8px'}}>{e}</div>)}
    </div>}
  </div>);
}

// в”Җв”Җв”Җ TRANSPORT PANEL в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function TransportPanel({to,planCity,c,lang}){
  const t=T[lang];const isEs=lang==='es';
  const[times,setTimes]=useState({});const[ldg,setL]=useState(false);
  const[pos,setPos]=useState(null);const[asked,setAsked]=useState(false);
  const[roadDist,setRoadDist]=useState(null);const[suggestion,setSuggestion]=useState(null);
  const req=()=>{setAsked(true);navigator.geolocation?.getCurrentPosition(async p=>{const np={lat:p.coords.latitude,lon:p.coords.longitude};setPos(np);setL(true);
    const res={};
    for(const m of TMODES){const r=await getOsrmTime(np.lat,np.lon,to.lat,to.lng,m.k);if(r)res[m.k]=r;}
    // Get road distance via car route
    const carR=res['car'];
    if(carR){
      const distKm=parseFloat(carR.dist);setRoadDist(distKm);
      if(distKm<1)setSuggestion({icon:'рҹҡ¶',msg:isEs?'Puedes ir andando вҖ” menos de 1km':'You can walk вҖ” less than 1km'});
      else if(distKm<5)setSuggestion({icon:'рҹҡІ',msg:isEs?`${distKm}km вҖ” ideal para bici o patinete`:`${distKm}km вҖ” great for cycling`});
      else if(distKm<30)setSuggestion({icon:'рҹҡ—',msg:isEs?`${distKm}km вҖ” en coche o transporte pГәblico`:`${distKm}km вҖ” by car or public transport`});
      else if(distKm<300)setSuggestion({icon:'рҹҡӮ',msg:isEs?`${distKm}km вҖ” considera el tren`:`${distKm}km вҖ” consider the train`});
      else setSuggestion({icon:'вңҲпёҸ',msg:isEs?`${distKm}km вҖ” viaje largo, considera un vuelo`:`${distKm}km вҖ” long trip, consider a flight`});
    }
    setTimes(res);setL(false);
  },()=>setAsked(false),{timeout:8000});};
  if(!to?.lat&&!to?.lng)return null;
  const dest=`${to.lat},${to.lng}`;const destQ=encodeURIComponent(`${to.name||''} ${to.address||''}`.trim()||planCity||'');
  const gmTransit=`https://www.google.com/maps/dir/?api=1&destination=${dest}&travelmode=transit`;
  const tf=mins=>mins<60?`${mins} min`:`${Math.floor(mins/60)}h ${mins%60}min`;
  const flightCity=encodeURIComponent(planCity||to.name||'');
  return(<div style={{marginTop:'12px'}}>
    <Lbl c={c}>вҸұпёҸ {t.gettingThere}</Lbl>
    {/* Smart suggestion */}
    {suggestion&&<div style={{background:`${c.A}10`,border:`1px solid ${c.A}30`,borderRadius:'10px',padding:'10px 14px',marginBottom:'10px',display:'flex',gap:'8px',alignItems:'center'}}><span style={{fontSize:'20px'}}>{suggestion.icon}</span><span style={{fontSize:'13px',color:c.T,fontWeight:'500'}}>{suggestion.msg}</span></div>}
    {/* Public transit */}

// в”Җв”Җв”Җ PROFILE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function Profile({onBack,onOpen,c,lang,authUser,profile,onUpdateProfile,onSignOut}){
  const t=T[lang];const isEs=lang==='es';
  const[plans,setPlans]=useState(getMyPlans());
  const[confirm,setConfirm]=useState(null);
  const[editingName,setEditingName]=useState(false);
  const[newName,setNewName]=useState(profile?.name||'');
  const saveName=async()=>{if(!newName.trim())return;await onUpdateProfile({name:newName.trim()});setEditingName(false);};
  const[tab,setTab]=useState('upcoming');
  const[dates,setDates]=useState({});const[modes,setModes]=useState({});
  const now=dayStart();
  useEffect(()=>{plans.forEach(async p=>{if(!dates[p.id]){const full=await loadPlan(p.id);if(full){setDates(prev=>({...prev,[p.id]:full.confirmedDate||full.dates?.[0]||null}));setModes(prev=>({...prev,[p.id]:full.mode||p.mode||'social'}));}}})},[]);
  const isPast=id=>{const d=dates[id];if(!d)return false;return new Date(d+'T23:59:59')<now;};
  const sortByDate=arr=>[...arr].sort((a,b)=>(dates[a.id]||'9999').localeCompare(dates[b.id]||'9999'));
  const upcoming=sortByDate(plans.filter(p=>!isPast(p.id)));
  const past=sortByDate(plans.filter(p=>isPast(p.id))).reverse();
  const shown=tab==='upcoming'?upcoming:past;
  const removeLocal=id=>{const u=getMyPlans().filter(x=>x.id!==id);ls.set('q_plans',u);setPlans(u);setConfirm(null);};
  const delFull=async id=>{try{await db.from('responses').delete().eq('plan_id',id);await db.from('plans').delete().eq('id',id);}catch{}removeLocal(id);};
  return(<div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
    <Back onClick={onBack} label={t.back} c={c}/>
    {confirm&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}} onClick={()=>setConfirm(null)}>
      <div onClick={e=>e.stopPropagation()} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'16px',padding:'24px',width:'100%',maxWidth:'340px'}}>
        <div style={{fontSize:'32px',textAlign:'center',marginBottom:'12px'}}>{confirm.role==='organizer'?'рҹ—‘пёҸ':'рҹ‘Ӣ'}</div>
        <div style={{fontSize:'16px',fontWeight:'700',color:c.T,textAlign:'center',marginBottom:'8px'}}>{confirm.role==='organizer'?t.delConfirm:t.leaveConfirm}</div>
        <div style={{fontSize:'13px',color:c.M2,textAlign:'center',marginBottom:'20px'}}>{confirm.role==='organizer'?t.delWarn:t.leaveWarn}</div>
        <div style={{display:'flex',gap:'8px'}}>
          <button onClick={()=>setConfirm(null)} style={{flex:1,padding:'12px',background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'10px',color:c.T,cursor:'pointer',fontFamily:'inherit',fontWeight:'600',fontSize:'14px'}}>{t.cancel}</button>
          <button onClick={()=>confirm.role==='organizer'?delFull(confirm.id):removeLocal(confirm.id)} style={{flex:1,padding:'12px',background:'#ff4444',border:'none',borderRadius:'10px',color:'#fff',cursor:'pointer',fontFamily:'inherit',fontWeight:'700',fontSize:'14px'}}>{confirm.role==='organizer'?t.del:t.leave}</button>
        </div>
      </div>
    </div>}
    <div style={{display:'flex',alignItems:'center',marginBottom:'20px'}}>
      <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:c.T}}>{t.myPlansT}</h2>
      <div style={{display:'flex',gap:'5px',marginLeft:'auto'}}>
        {Object.entries(MC_DARK).map(([m,col])=><div key={m} style={{width:'9px',height:'9px',borderRadius:'50%',background:col}} title={m}/>)}
      </div>
    </div>
    {/* Account info */}
    {authUser&&<div style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'16px',marginBottom:'16px'}}>
      <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'12px'}}>
        <div style={{width:'44px',height:'44px',borderRadius:'50%',background:c.A,color:'#0A0A0A',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',fontWeight:'800',flexShrink:0}}>{(profile?.name||authUser.email||'?')[0].toUpperCase()}</div>
        <div style={{flex:1,minWidth:0}}>

    {shown.length===0?<div style={{textAlign:'center',padding:'32px',background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'14px'}}><div style={{fontSize:'36px',marginBottom:'12px'}}>рҹ“Ӣ</div><div style={{color:c.T,fontWeight:'500',marginBottom:'6px'}}>{tab==='upcoming'?t.noPlansUp:t.noPlansPast}</div>{tab==='upcoming'&&<div style={{color:c.M2,fontSize:'13px'}}>{t.noPlansUpS}</div>}</div>

            <div style={{fontSize:'12px',color:c.M2,display:'flex',gap:'6px',flexWrap:'wrap'}}>
              <span style={{color:mc,fontWeight:'700',letterSpacing:'.08em'}}>{p.id}</span>

}

// в”Җв”Җв”Җ DISCOVER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function Discover({onBack,onJoin,c,lang}){
  const t=T[lang];const isEs=lang==='es';
  const[plans,setPlans]=useState([]);const[ldg,setL]=useState(true);
  const[fc,setFC]=useState('');const[modeF,setModeF]=useState('all');
  useEffect(()=>{(async()=>{setL(true);setPlans(await loadPublicPlans());setL(false);})();},[]);
  const filtered=plans.filter(p=>{
    const matchText=!fc||p.city?.toLowerCase().includes(fc.toLowerCase())||p.name?.toLowerCase().includes(fc.toLowerCase());
    const matchMode=modeF==='all'||p.mode===modeF;
    return matchText&&matchMode;
  });
  const modes=[{k:'all',l:isEs?'Todos':'All'},{k:'social',l:'рҹ‘Ҙ Social'},{k:'intimate',l:'рҹ’ҳ ГҚntimo'},{k:'professional',l:'рҹ’ј Pro'}];
  return(<div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
    <Back onClick={onBack} label={t.back} c={c}/>
    <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:c.T,marginBottom:'4px'}}>{t.discoverT}</h2>
    <p style={{color:c.M2,fontSize:'13px',marginBottom:'16px'}}>{t.discoverS}</p>
    <div style={{display:'flex',gap:'6px',marginBottom:'12px',flexWrap:'wrap'}}>
      {modes.map(m=>{const mc2=m.k==='all'?c.A:getMC(m.k,c);return(<button key={m.k} onClick={()=>setModeF(m.k)} style={{padding:'6px 12px',borderRadius:'20px',border:`1px solid ${modeF===m.k?mc2+'60':c.BD}`,background:modeF===m.k?`${mc2}15`:c.CARD,color:modeF===m.k?mc2:c.M2,fontSize:'12px',fontWeight:modeF===m.k?'700':'400',cursor:'pointer',fontFamily:'inherit'}}>{m.l}</button>);})}
    </div>
    <input value={fc} onChange={e=>setFC(e.target.value)} placeholder={isEs?'Buscar por ciudad o nombre...':'Search by city or name...'} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'10px',padding:'10px 14px',color:c.T,fontSize:'14px',fontFamily:'inherit',outline:'none',width:'100%',boxSizing:'border-box',marginBottom:'16px'}}/>
    {ldg&&<div style={{textAlign:'center',color:c.M,padding:'48px'}}>...</div>}
    {!ldg&&filtered.length===0&&<Card c={c} style={{textAlign:'center',padding:'32px'}}><div style={{fontSize:'36px',marginBottom:'10px'}}>рҹ”Қ</div><div style={{color:c.M2,fontSize:'14px'}}>{t.noPublic}</div></Card>}
    {!ldg&&filtered.map(p=><Card key={p.id} c={c} style={{cursor:'pointer'}} onClick={()=>onJoin(p.id)}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'}}>
        <div><div style={{fontSize:'16px',color:c.T,fontWeight:'600',marginBottom:'3px'}}>{p.name}</div><div style={{fontSize:'12px',color:c.M2}}>@ {p.organizer}{p.city?` В· ${p.city}`:''}</div></div>
        <ModeBadge mode={p.mode||'social'} lang={lang} c={c}/>
      </div>
      {p.desc&&<div style={{fontSize:'13px',color:c.M2,marginBottom:'8px',lineHeight:1.5}}>{p.desc.slice(0,100)}{p.desc.length>100?'...':''}</div>}
      <div style={{display:'flex',justifyContent:'flex-end'}}><span style={{fontSize:'12px',color:c.A,fontWeight:'700'}}>{t.joinPlan}</span></div>
    </Card>)}
  </div>);
}


// в”Җв”Җв”Җ CREATE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function Create({onBack,onCreated,c,lang,mode,authUser,profile}){

  const[surpriseMode,setSurprise]=useState(false);
  const[maxGuests,setMaxGuests]=useState('');

  const[poll,setPoll]=useState({q:'',opts:['','']});

  useEffect(()=>{if(org.trim())ls.set('q_myname',org.trim());},[org]);
  const addStop=()=>setStops(p=>[...p,{id:Date.now(),name:'',cat:t.cat[0],address:'',cost:'',link:'',lat:null,lng:null}]);
  const upd=(id,k,v)=>setStops(p=>p.map(s=>s.id===id?{...s,[k]:v}:s));

  const stepLabels=mode==='intimate'?[t.basics,t.datesStep,t.routeStep]:[t.basics,t.datesStep,t.routeStep,t.extrasStep];
  const create=async()=>{
    setSaving(true);
    const plan={id:genId(),name:name.trim(),desc:desc.trim(),organizer:org.trim(),organizerEmail:orgEmail.trim(),organizerRole:orgRole,mode,dates:[...selDates].sort(),times:selTimes,timezone:planTz,city:city.split(',')[0].trim(),cityFull:city,cityLat:cityData?.lat,cityLon:cityData?.lon,stops,dressCode,dressNote,autoConfirm,autoConfirmN,surpriseMode,maxGuests:maxGuests?parseInt(maxGuests):null,orgAttends,poll:poll.q.trim()?poll:null,gift:giftOn?gift:null,bring:bring.filter(b=>b.text.trim()),payment,confirmedDate:null,isPublic:mode!=='intimate'?isPublic:false,lang,createdAt:new Date().toISOString()};

    {mapStop!==null&&<MapModal onSelect={sel=>{upd(mapStop,'name',sel.name);upd(mapStop,'address',sel.address);upd(mapStop,'lat',sel.lat);upd(mapStop,'lng',sel.lng);if(!city&&sel.address)setCity(sel.address.split(',').slice(-3,-1).join(',').trim()||'');setMapStop(null);}} onClose={()=>setMapStop(null)} c={c} lang={lang} init={stops.find(s=>s.id===mapStop)?.name||city||''}/>}
    <div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
      <Back onClick={step===0?onBack:()=>setStep(s=>s-1)} label={t.back} c={c}/>
      <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'20px'}}><ModeBadge mode={mode} lang={lang} c={c}/><div style={{flex:1,height:'1px',background:c.BD}}/></div>
      <Stepper cur={step} labels={stepLabels} c={c} accent={mc}/>

      {step===0&&<>
        <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:c.T,marginBottom:'20px'}}>{t.basics}</h2>
        {mode==='intimate'&&<div style={{background:'#F472B620',border:'1px solid #F472B650',borderRadius:'12px',padding:'12px 14px',marginBottom:'16px',fontSize:'13px',color:'#F472B6',lineHeight:1.6}}>{t.privateNote}</div>}
        <div style={{marginBottom:'14px'}}><Lbl c={c}>{t.planName}</Lbl><Inp value={name} onChange={setName} placeholder={t.modes[mode].ex[0]} c={c}/></div>
        <div style={{marginBottom:'14px'}}><Lbl c={c}>{t.desc}</Lbl><Txa value={desc} onChange={setDesc} placeholder={t.descPh} c={c}/></div>
        <div style={{marginBottom:'14px'}}><Lbl c={c}>{t.yourName}</Lbl><Inp value={org} onChange={setOrg} placeholder={t.yourNamePh} c={c}/></div>
        <div style={{marginBottom:'14px'}}><Lbl c={c}>{t.emailLbl}</Lbl><Inp value={orgEmail} onChange={setOrgEmail} placeholder={t.emailPh} type="email" c={c}/></div>

            <div style={{display:'flex',gap:'6px'}}>

            </div>

        {mode==='professional'&&<div style={{marginBottom:'14px'}}><Lbl c={c}>{t.yourRole}</Lbl><select value={orgRole} onChange={e=>setOrgRole(e.target.value)} style={{background:c.CARD,border:`1px solid ${c.BD}`,color:c.T,fontSize:'14px',padding:'12px 14px',borderRadius:'10px',width:'100%',fontFamily:'inherit'}}>{t.roles.map(r=><option key={r} value={r}>{r}</option>)}</select></div>}

          <div style={{width:'22px',height:'22px',borderRadius:'50%',border:`2px solid ${isPublic?mc:c.BD}`,background:isPublic?mc:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',color:'#0A0A0A',fontWeight:'800',flexShrink:0}}>{isPublic?'вң“':''}</div>
          <div><div style={{fontSize:'14px',color:c.T,fontWeight:'500'}}>рҹҢҚ {isPublic?t.isPublicLbl:(isEs?'Plan privado':'Private plan')}</div><div style={{fontSize:'12px',color:c.M2}}>{isPublic?(isEs?'Aparece en Descubrir':'Appears in Discover'):(isEs?'Solo con cГіdigo':'Code only')}</div></div>
        </div>}
        {mode==='intimate'&&<div style={{height:'24px'}}/>}
        <Btn onClick={()=>setStep(1)} disabled={!name.trim()||!org.trim()} full style={{padding:'15px',background:mc,color:'#0A0A0A'}} c={c}>{t.cont}</Btn>
      </>}

      {step===1&&<>
        <h2 style={{fontFamily:"'Syne',serif",fontSize:'26px',fontWeight:'800',color:c.T,marginBottom:'6px'}}>{t.datesTitle}</h2>
        <p style={{color:c.M2,fontSize:'13px',marginBottom:'16px'}}>{t.datesSub}</p>

  {(()=>{const uTz=getUserTz();if(!uTz||uTz===planTz)return null;return<span style={{color:c.M}}>В· {isEs?'Tu zona:':'Your zone:'} <span style={{fontWeight:'500'}}>{getGMTOffset(uTz)}</span></span>;})()}
</div>}

          <span>рҹ“Қ</span><span style={{color:c.T,fontWeight:'500'}}>{city}</span>
          <span style={{color:c.M2,fontSize:'11px',marginLeft:'auto',cursor:'pointer'}} onClick={()=>setStep(1)}>вңҸпёҸ</span>

          {autoConfirm&&<div style={{display:'flex',alignItems:'center',gap:'10px',padding:'12px 14px',background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'0 0 12px 12px',borderTop:'none'}}>

            <div><div style={{fontSize:'14px',color:c.T,fontWeight:'500'}}>рҹҺӯ {t.surpriseMode_lbl||'рҹҺӯ'}</div><div style={{fontSize:'12px',color:c.M2}}>{t.surpriseModeSub}</div></div>

            <div><div style={{fontSize:'14px',color:c.T,fontWeight:'500'}}>{t.gift}</div><div style={{fontSize:'12px',color:c.M2}}>{t.giftSub}</div></div>

          </div>}
        </div>
        {/* BRING */}
        <div style={{marginBottom:'20px'}}>
          <Lbl c={c}>{t.bring}</Lbl>
          {bring.map(b=><div key={b.id} style={{display:'flex',gap:'8px',marginBottom:'8px'}}>
            <input value={b.text} onChange={e=>setBring(p=>p.map(x=>x.id===b.id?{...x,text:e.target.value}:x))} placeholder={t.newItem} style={{flex:1,background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'10px 12px',color:c.T,fontSize:'14px',fontFamily:'inherit',outline:'none'}}/>
            {bring.length>1&&<button onClick={()=>setBring(p=>p.filter(x=>x.id!==b.id))} title={isEs?'Eliminar elemento':'Remove item'} style={{background:'none',border:`1px solid ${c.BD}`,color:c.M,cursor:'pointer',fontSize:'16px',borderRadius:'8px',width:'36px'}}>Г—</button>}
          </div>)}
          <Btn onClick={()=>setBring(p=>[...p,{id:Date.now(),text:''}])} v="secondary" sm c={c}>{t.addItem}</Btn>
        </div>
        {/* POLL */}
        <div style={{marginBottom:'20px'}}>
          <Lbl c={c}>рҹ—іпёҸ {isEs?'Encuesta rГЎpida (opcional)':'Quick poll (optional)'}</Lbl>
          <input value={poll.q} onChange={e=>setPoll(p=>({...p,q:e.target.value}))} placeholder={isEs?'ВҝRestaurante italiano o japonГ©s?':'Italian or Japanese restaurant?'} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'10px',padding:'10px 14px',color:c.T,fontSize:'14px',fontFamily:'inherit',outline:'none',width:'100%',boxSizing:'border-box',marginBottom:'8px'}}/>
          {poll.q.trim()&&<div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
            {poll.opts.map((o,i)=><div key={i} style={{display:'flex',gap:'6px'}}>
              <input value={o} onChange={e=>setPoll(p=>({...p,opts:p.opts.map((x,j)=>j===i?e.target.value:x)}))} placeholder={`${isEs?'OpciГіn':'Option'} ${i+1}`} style={{flex:1,background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'8px 12px',color:c.T,fontSize:'13px',fontFamily:'inherit',outline:'none'}}/>
              {poll.opts.length>2&&<button onClick={()=>setPoll(p=>({...p,opts:p.opts.filter((_,j)=>j!==i)}))} style={{background:'none',border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'6px 10px',color:c.M,cursor:'pointer',fontSize:'14px'}}>Г—</button>}
            </div>)}
            {poll.opts.length<5&&<button onClick={()=>setPoll(p=>({...p,opts:[...p.opts,'']}))} style={{background:'none',border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'7px',color:c.M2,cursor:'pointer',fontFamily:'inherit',fontSize:'12px'}}>+ {isEs?'AГұadir opciГіn':'Add option'}</button>}
          </div>}
        </div>
        {/* PAYMENT */}
        <div style={{marginBottom:'24px',background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'16px'}}>
          <Lbl c={c}>{t.payData}</Lbl>
          <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
            {[['bizumPhone',t.bizumPh],['paypalUser','PayPal.me user'],['revolutUser','Revolut.me user']].map(([k,ph])=><input key={k} value={payment[k]} onChange={e=>setPayment(p=>({...p,[k]:e.target.value}))} placeholder={ph} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'10px 12px',color:c.T,fontSize:'13px',fontFamily:'inherit',outline:'none',width:'100%',boxSizing:'border-box'}}/>)}
          </div>
          <div style={{fontSize:'11px',color:c.M2,marginTop:'8px'}}>{t.payNote}</div>
        </div>
        <Btn onClick={create} disabled={saving} full style={{padding:'16px',fontSize:'16px',background:mc,color:'#0A0A0A'}} c={c}>{saving?t.saving:t.createBtn}</Btn>
      </>}
    </div>
  </>);
}


// в”Җв”Җв”Җ SHARE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function Share({plan,onViewResults,onBack,c,lang}){
  const t=T[lang];const mc=getMC(plan.mode,c);
  const[copied,setCopied]=useState(false);const[count,setCount]=useState(null);
  const url=location.href.split('?')[0]+'?code='+plan.id;
  const copy=()=>{navigator.clipboard?.writeText(url).catch(()=>{});setCopied(true);setTimeout(()=>setCopied(false),2000);};
  const msgs={social:(n,u,id)=>lang==='es'?`ВЎOye! Гҡnete al plan *${n}*.\n\nMarca cuГЎndo puedes:\n${u}\n\nCГіdigo: *${id}*`:`Hey! Join *${n}*.\n\nMark when you can:\n${u}\n\nCode: *${id}*`,intimate:(n,u)=>lang==='es'?`Te tengo una propuesta... рҹ‘Җ\n\n${u}`:`I have a proposal for you рҹ‘Җ\n\n${u}`,professional:(n,u,id)=>lang==='es'?`Le convoco a *${n}*.\n\nConfirme asistencia:\n${u}\n\nCГіdigo: *${id}*`:`You are invited to *${n}*.\n\nConfirm attendance:\n${u}\n\nCode: *${id}*`};
  const wa=()=>window.open('https://wa.me/?text='+encodeURIComponent((msgs[plan.mode||'social']||msgs.social)(plan.name,url,plan.id)),'_blank');
  useEffect(()=>{const f=async()=>{const rs=await loadResps(plan.id);setCount(rs.length);};f();const iv=setInterval(f,15000);return()=>clearInterval(iv);},[plan.id]);
  return(<div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
    <Back onClick={onBack} label={t.back} c={c}/>
    <div style={{textAlign:'center',marginBottom:'28px'}}>
      <div style={{fontSize:'52px',marginBottom:'14px'}}>{plan.mode==='intimate'?'рҹ’ҳ':plan.mode==='professional'?'рҹ’ј':'рҹҺү'}</div>
      <h2 style={{fontFamily:"'Syne',serif",fontSize:'28px',fontWeight:'800',color:c.T,marginBottom:'8px'}}>{t.planCreated}</h2>
      <p style={{color:c.M2,fontSize:'14px'}}>{t.shareWith}</p>
    </div>
    <div style={{background:c.CARD,border:`1px solid ${mc}40`,borderRadius:'14px',padding:'20px',textAlign:'center',marginBottom:'14px'}}>
      <ModeBadge mode={plan.mode||'social'} lang={lang} c={c}/>
      <div style={{fontFamily:'monospace',fontSize:'58px',fontWeight:'900',color:mc,letterSpacing:'.2em',lineHeight:1,margin:'16px 0 12px'}}>{plan.id}</div>
      <div style={{fontSize:'15px',color:c.T,fontWeight:'600',marginBottom:'4px'}}>{plan.name}</div>
      <div style={{fontSize:'13px',color:c.M2}}>@ {plan.organizer} В· {plan.dates?.length||0} {lang==='es'?'fecha':'date'}{plan.dates?.length!==1?'s':''}</div>
    </div>
    {count!==null&&<div style={{textAlign:'center',padding:'12px',background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'10px',marginBottom:'14px',fontSize:'14px',color:c.T}}>
      {count===0?(lang==='es'?'Nadie ha respondido aГәn':'Nobody has responded yet'):<><span style={{color:mc,fontWeight:'800',fontSize:'20px'}}>{count}</span> {lang==='es'?`persona${count!==1?'s':''} ha${count!==1?'n':''} respondido`:`person${count!==1?'s':''} responded`}</>}
    </div>}
    <button onClick={wa} style={{width:'100%',padding:'15px',borderRadius:'12px',border:'none',background:'#25D366',color:'#fff',fontSize:'15px',fontWeight:'700',cursor:'pointer',fontFamily:'inherit',marginBottom:'10px'}}>{t.shareWa}</button>
    <Btn onClick={copy} full style={{marginBottom:'10px',padding:'14px'}} c={c}>{copied?t.copied:t.copyLink}</Btn>
    <HR c={c}/>
    <PersonalisedLink plan={plan} c={c} lang={lang}/>
    <HR c={c}/>
    <SavedGroups plan={plan} c={c} lang={lang}/>
    <div style={{height:'12px'}}/>
    <Btn onClick={onViewResults} v="secondary" full style={{padding:'14px'}} c={c}>{t.viewRes}</Btn>
  </div>);
}

// в”Җв”Җв”Җ PERSONALISED LINK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function PersonalisedLink({plan,c,lang}){
  const isEs=lang==='es'; const mc=getMC(plan.mode,c);
  const[name,setName]=useState('');const[copied,setCopied]=useState(false);
  const base=location.href.split('?')[0];
  const url=name.trim()?`${base}?code=${plan.id}&name=${encodeURIComponent(name.trim())}`:null;
  const copy=()=>{if(!url)return;navigator.clipboard?.writeText(url).catch(()=>{});setCopied(true);setTimeout(()=>setCopied(false),2500);};
  return(<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'12px',padding:'14px'}}>
    <div style={{fontSize:'11px',color:c.M,fontWeight:'600',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:'8px'}}>рҹ”— {isEs?'Link personalizado':'Personalised link'}</div>
    <div style={{fontSize:'12px',color:c.M2,marginBottom:'10px',lineHeight:1.5}}>{isEs?'Genera un link con el nombre del invitado ya relleno вҖ” cero fricciГіn para Г©l.':"Generate a link with the guest's name pre-filled вҖ” zero friction for them."}</div>
    <div style={{display:'flex',gap:'8px'}}>
      <input value={name} onChange={e=>setName(e.target.value)} placeholder={isEs?'Nombre del invitado...':'Guest name...'} style={{flex:1,background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'9px 12px',color:c.T,fontSize:'13px',fontFamily:'inherit',outline:'none'}}/>
      <button onClick={copy} disabled={!name.trim()} style={{padding:'9px 14px',background:name.trim()?`${mc}20`:'transparent',border:`1px solid ${name.trim()?mc+'50':c.BD}`,borderRadius:'8px',color:name.trim()?mc:c.M,cursor:name.trim()?'pointer':'not-allowed',fontSize:'12px',fontWeight:'600',fontFamily:'inherit',whiteSpace:'nowrap',flexShrink:0}}>{copied?(isEs?'вң“ Copiado':'вң“ Copied'):(isEs?'Copiar':'Copy')}</button>
    </div>
    {url&&<div style={{marginTop:'8px',fontSize:'11px',color:c.M2,wordBreak:'break-all',padding:'6px 10px',background:c.CARD,borderRadius:'6px',lineHeight:1.4}}>{url}</div>}
  </div>);
}

// в”Җв”Җв”Җ PLAN PREVIEW в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  const AVCOL={yes:'#22c55e',maybe:'#f59e0b',no:'#ef4444'};

  return(<div style={{padding:'0',maxWidth:'420px',margin:'0 auto'}}>

    </div>
    <div style={{padding:'24px'}}>
      {plan.confirmedDate&&<div style={{background:`${mc}15`,border:`1px solid ${mc}50`,borderRadius:'12px',padding:'12px 14px',marginBottom:'16px',display:'flex',gap:'10px',alignItems:'center'}}><div style={{fontSize:'18px'}}>рҹ“Ң</div><div><div style={{fontSize:'11px',color:mc,fontWeight:'700',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'2px'}}>{t.confirmedDate}</div><div style={{fontSize:'14px',color:c.T,fontWeight:'600',textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate,lang)}</div></div></div>}
      {plan.desc&&<p style={{fontSize:'14px',color:c.T,lineHeight:1.7,marginBottom:'16px',padding:'12px 14px',background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'10px'}}>{plan.desc}</p>}

        </div>
      </div>}
      {plan.dressCode&&<div style={{background:`${mc}0D`,border:`1px solid ${mc}25`,borderRadius:'10px',padding:'12px 14px',marginBottom:'16px',display:'flex',gap:'10px',alignItems:'center'}}><span style={{fontSize:'18px'}}>рҹ‘—</span><div><div style={{fontSize:'12px',color:mc,fontWeight:'600'}}>{t.dcLbl.replace('рҹ‘— ','')}</div><div style={{fontSize:'13px',color:c.T,fontWeight:'500'}}>{t.dressCodes.find(d=>d.k===plan.dressCode)?.l||plan.dressCode}</div>{plan.dressNote&&<div style={{fontSize:'12px',color:c.M2,fontStyle:'italic'}}>"{plan.dressNote}"</div>}</div></div>}
      {budget>0&&<div style={{background:`${mc}0D`,border:`1px solid ${mc}25`,borderRadius:'10px',padding:'12px 14px',marginBottom:'16px',display:'flex',justifyContent:'space-between'}}><span style={{fontSize:'13px',color:c.M2}}>{t.previewBudget}</span><span style={{color:mc,fontWeight:'700'}}>{budget.toFixed(0)}вӮ¬/{isEs?'persona':'person'}</span></div>}
      {hasPrev&&prev&&<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'12px',padding:'14px',marginBottom:'12px'}}>
        <div style={{fontSize:'11px',color:mc,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'10px'}}>вң“ {isEs?'Tu respuesta anterior':'Your previous response'}</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:prev.comment?'8px':'0'}}>
          {(plan.dates||[]).map(d=>{const v=prev.avail?.[d];if(!v||v==='no')return null;const col2=AVCOL[v]||c.M;return(<span key={d} style={{fontSize:'11px',padding:'3px 9px',borderRadius:'20px',background:`${col2}20`,color:col2,border:`1px solid ${col2}30`,fontWeight:'600',textTransform:'capitalize'}}>{AVICON[v]} {fmtShort(d,lang)}</span>);})}
        </div>
        {prev.comment&&<div style={{fontSize:'12px',color:c.M2,fontStyle:'italic',marginTop:'4px'}}>"{prev.comment}"</div>}
      </div>}
      <button onClick={onRespond} style={{width:'100%',padding:'16px',borderRadius:'14px',border:'none',background:mc,color:'#0A0A0A',fontSize:'16px',fontWeight:'700',cursor:'pointer',fontFamily:'inherit',marginBottom:'10px'}}>{hasPrev?t.editAvail:t.previewJoin}</button>
      <button onClick={onBack} style={{width:'100%',padding:'12px',borderRadius:'14px',border:`1px solid ${c.BD}`,background:'transparent',color:c.M2,fontSize:'14px',cursor:'pointer',fontFamily:'inherit'}}>{t.back}</button>
    </div>
  </div>);
}

// в”Җв”Җв”Җ RESPOND в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function Respond({plan,onBack,onDone,onCreateOwn,c,lang:appLang,authUser,profile}){
  const pLang=appLang;const t=T[pLang];const isEs=pLang==='es';
  const mc=getMC(plan.mode,c);
  const prevKey='q_myresp_'+plan.id;
  const prev=ls.get(prevKey,null);
  const urlName=new URLSearchParams(location.search).get('name')||'';
  const[name,setName]=useState(prev?.name||urlName||profile?.name||ls.get('q_myname',''));
  const[avail,setAvail]=useState(prev?.avail||{});
  const[timePref,setTimePref]=useState(prev?.timePref||{});
  const[how,setHow]=useState(prev?.how||'');const[howOther,setHowOther]=useState(prev?.howOther||'');
  const[comment,setComment]=useState(prev?.comment||'');
  const[guestRole,setGuestRole]=useState(prev?.role||t.roles[1]||'');
  const[saving,setSaving]=useState(false);const[done,setDone]=useState(false);
  const[altDate,setAltDate]=useState('');const[altNote,setAltNote]=useState('');
  const[pollVote,setPollVote]=useState(prev?.pollVote||null);
  useEffect(()=>{if(name.trim())ls.set('q_myname',name.trim());},[name]);
  const setDA=(d,val)=>setAvail(p=>({...p,[d]:p[d]===val?undefined:val}));
  const togT=(d,h)=>setTimePref(p=>({...p,[d]:(p[d]||[]).includes(h)?(p[d]||[]).filter(x=>x!==h):[...(p[d]||[]),h]}));
  const AVCOL={yes:'#22c55e',maybe:'#f59e0b',no:'#ef4444'};
  const AVICON={yes:'вң…',maybe:'рҹӨ”',no:'вқҢ'};
  const AVLBL={yes:t.avYes,maybe:t.avMaybe,no:t.avNo};
  const submit=async()=>{
    if(!name.trim())return;setSaving(true);
    const changeLog=[...(prev?.changeLog||[])];
    if(prev)changeLog.unshift({at:new Date().toISOString(),desc:isEs?'Respuesta actualizada':'Response updated'});
    const resp={name:name.trim(),avail,timePref,how:how==='other'?howOther:how,howOther,comment,role:guestRole,altDate:altDate||null,altNote:altNote||null,pollVote:pollVote||null,changeLog,at:new Date().toISOString()};
    await saveResp(plan.id,name.trim(),resp);
    if(authUser)try{await db.from('responses').update({user_id:authUser.id}).eq('plan_id',plan.id).eq('name',name.trim());}catch{}
    addMyPlan(plan.id,plan.name,'invited',plan.mode);
    ls.set(prevKey,resp);setSaving(false);setDone(true);
  };
  const budget=(plan.stops||[]).reduce((s,p2)=>s+(parseFloat(p2.cost)||0),0);
  if(done){
    const planUrl=location.href.split('?')[0]+'?code='+plan.id;
    const respName=name.trim()||'Alguien';
    const waOrgText=pLang==='es'?`Hola ${plan.organizer}, soy *${respName}* y acabo de responder al plan *${plan.name}*. Mira las respuestas! ${planUrl}`:`Hi ${plan.organizer}, I'm *${respName}* and just responded to *${plan.name}*. Check the responses! ${planUrl}`;
  return(<div style={{padding:'60px 24px',maxWidth:'420px',margin:'0 auto',textAlign:'center'}}>
    <div style={{fontSize:'64px',marginBottom:'20px'}}>{plan.mode==='intimate'?'рҹ’ҳ':'рҹҺү'}</div>
    <h2 style={{fontFamily:"'Syne',serif",fontSize:'28px',fontWeight:'800',color:mc,marginBottom:'10px'}}>{t.savedTitle}</h2>
    <p style={{color:c.M2,marginBottom:'20px'}}>{t.savedSub}</p>
    {plan.organizer&&<a href={`https://wa.me/?text=${encodeURIComponent(waOrgText)}`} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',padding:'13px 20px',background:'#25D366',borderRadius:'12px',color:'#fff',textDecoration:'none',fontWeight:'700',fontSize:'14px',marginBottom:'16px'}}>рҹ’¬ {isEs?`Avisar a ${plan.organizer}`:`Notify ${plan.organizer}`}</a>}
    <div style={{background:`${mc}0D`,border:`1px solid ${mc}30`,borderRadius:'14px',padding:'20px'}}>
      <div style={{fontSize:'15px',fontWeight:'600',color:c.T,marginBottom:'6px'}}>{t.viralQ}</div>
      <div style={{fontSize:'13px',color:c.M2,marginBottom:'14px'}}>{t.viralSub}</div>
      <Btn onClick={onCreateOwn} style={{padding:'11px 24px',background:mc,color:'#0A0A0A'}} c={c}>{t.viralBtn}</Btn>
    </div>
  </div>);
  }
  return(<div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
    <Back onClick={()=>{if(Object.keys(avail).length>0&&!window.confirm(isEs?'ВҝSalir? PerderГЎs los cambios no guardados.':'Exit? Unsaved changes will be lost.'))return;onBack();}} label={t.back} c={c}/>
    <div style={{background:`${mc}10`,border:`1px solid ${mc}30`,borderRadius:'12px',padding:'12px 14px',marginBottom:'16px',display:'flex',alignItems:'center',gap:'10px'}}>
      <ModeBadge mode={plan.mode||'social'} lang={pLang} c={c}/>
      <div style={{flex:1,minWidth:0}}><div style={{fontSize:'15px',color:c.T,fontWeight:'600',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{plan.name}</div><div style={{fontSize:'12px',color:c.M2}}>@ {plan.organizer}</div></div>
    </div>
    {prev&&<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'10px',padding:'10px 14px',marginBottom:'14px',fontSize:'12px',color:c.M2}}>вңҸпёҸ {t.editingPrev}</div>}
    {plan.confirmedDate&&<div style={{background:`${mc}15`,border:`1px solid ${mc}50`,borderRadius:'12px',padding:'12px 14px',marginBottom:'16px',display:'flex',gap:'10px',alignItems:'center'}}><span style={{fontSize:'18px'}}>рҹ“Ң</span><div><div style={{fontSize:'11px',color:mc,fontWeight:'700',textTransform:'uppercase',letterSpacing:'.06em'}}>{t.confirmedDate}</div><div style={{fontSize:'14px',color:c.T,fontWeight:'600',textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate,pLang)}</div></div></div>}
    {plan.desc&&<p style={{fontSize:'14px',color:c.T,lineHeight:1.7,marginBottom:'16px',padding:'12px 14px',background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'10px'}}>{plan.desc}</p>}
    {budget>0&&<div style={{background:`${mc}0D`,border:`1px solid ${mc}30`,borderRadius:'10px',padding:'12px 16px',marginBottom:'16px',display:'flex',justifyContent:'space-between'}}><span style={{color:c.M2,fontSize:'13px'}}>{t.estPer||'Estimado'}</span><span style={{color:mc,fontWeight:'700'}}>{budget.toFixed(0)}вӮ¬</span></div>}
    <HR c={c}/>
    <div style={{marginBottom:'14px'}}><Lbl c={c}>{t.yourName}</Lbl><Inp value={name} onChange={v=>{setName(v);ls.set('q_myname',v);}} placeholder={t.yourNamePh} c={c}/></div>
    {plan.mode==='professional'&&<div style={{marginBottom:'14px'}}><Lbl c={c}>{t.guestRole}</Lbl><select value={guestRole} onChange={e=>setGuestRole(e.target.value)} style={{background:c.CARD,border:`1px solid ${c.BD}`,color:c.T,fontSize:'14px',padding:'12px 14px',borderRadius:'10px',width:'100%',fontFamily:'inherit'}}>{t.roles.map(r=><option key={r} value={r}>{r}</option>)}</select></div>}

        {/* DATE + TIME + YES/MAYBE/NO вҖ” each slot independent */}
    <div style={{marginBottom:'20px'}}>
      <Lbl c={c}>{plan.mode==='intimate'?(isEs?'Para ti... ВҝcuГЎndo te va bien?':'When works best for you?'):plan.mode==='professional'?(isEs?'ВҝCuГЎndo tiene disponibilidad?':'When are you available?'):t.yourAvail}</Lbl>
      <div style={{fontSize:'12px',color:c.M2,marginBottom:'12px',lineHeight:1.5}}>{isEs?'Marca cada fecha y hora individualmente вҖ” puedes poner SГӯ a una hora y No a otra del mismo dГӯa.':'Mark each date and time individually вҖ” you can say Yes to one time and No to another on the same day.'}</div>
      {(plan.dates||[]).map(d=>{
        const ts=plan.times?.[d]||[];
        const slots=ts.length>0?ts.map(h=>({key:`${d}_${h}`,label:h})):[{key:d,label:null}];
        return(<div key={d} style={{marginBottom:'12px',background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'14px',overflow:'hidden'}}>
          <div style={{padding:'10px 14px',background:c.CARD,borderBottom:`1px solid ${c.BD}`,fontSize:'13px',color:c.T,fontWeight:'600',textTransform:'capitalize',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>{fmtDate(d,pLang)}</span>
            {slots.length>1&&<button onClick={()=>{const u={};slots.forEach(s=>{u[s.key]='no';});setAvail(p=>({...p,...u}));}} title={isEs?'Marcar todas las horas de este dГӯa como No puedo':'Mark all times this day as Cannot make it'} style={{background:'none',border:'none',color:'#ef4444',fontSize:'11px',cursor:'pointer',fontFamily:'inherit',opacity:0.7}}>вқҢ {isEs?'Todo No':'All No'}</button>}
          </div>
          {slots.map((slot,si)=>{
            const val=avail[slot.key];
            return(<div key={slot.key} style={{borderBottom:si<slots.length-1?`1px solid ${c.BD}`:'none'}}>
              {slot.label&&<div style={{padding:'8px 14px 4px',fontSize:'12px',color:mc,fontWeight:'700'}}>рҹ•җ {slot.label}</div>}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'1px',background:c.BD}}>
                {(['yes','maybe','no']).map(v=><button key={v} onClick={()=>setAvail(p=>({...p,[slot.key]:p[slot.key]===v?undefined:v}))} style={{padding:'10px 6px',background:val===v?AVCOL[v]+'25':c.CARD,color:val===v?AVCOL[v]:c.M2,cursor:'pointer',border:'none',fontFamily:'inherit',fontSize:'12px',fontWeight:val===v?'700':'400',transition:'all .1s'}}>
                  {AVICON[v]}<br/><span style={{fontSize:'10px'}}>{AVLBL[v].replace(/[вң…рҹӨ”вқҢ]\s?/,'')}</span>
                </button>)}
              </div>
              {val==='maybe'&&<div style={{padding:'6px 12px',background:'#f59e0b10',fontSize:'11px',color:'#f59e0b'}}>{t.maybeNote}</div>}
            </div>);
          })}
        </div>);
      })}
      <button onClick={()=>{const u={};(plan.dates||[]).forEach(d=>{const ts=plan.times?.[d]||[];const slots=ts.length>0?ts.map(h=>`${d}_${h}`):[d];slots.forEach(k=>{if(!avail[k])u[k]='yes';});});setAvail(p=>({...p,...u}));}} title={isEs?'Marcar todas las fechas y horas como SГӯ puedo':'Mark all dates and times as Yes'} style={{width:'100%',padding:'8px',background:'none',border:`1px dashed ${c.BD}`,borderRadius:'10px',color:c.M2,cursor:'pointer',fontFamily:'inherit',fontSize:'12px',marginTop:'4px'}}>вң… {isEs?'Marcar todo SГӯ':'Mark all Yes'}</button>
    </div>
    {/* Suggest alternative date */}
    {Object.keys(avail).length>0&&Object.values(avail).every(v=>v==='no')&&<div style={{background:'#f59e0b10',border:'1px solid #f59e0b30',borderRadius:'12px',padding:'14px',marginBottom:'14px'}}>
      <div style={{fontSize:'13px',color:'#f59e0b',fontWeight:'600',marginBottom:'8px'}}>рҹҳ• {isEs?'Ninguna fecha te viene bien. ВҝPropones otra?':'None of the dates work. Want to suggest one?'}</div>
      <input type="date" value={altDate||''} onChange={e=>setAltDate(e.target.value)} min={new Date().toISOString().split('T')[0]} style={{background:c.CARD,border:'1px solid #f59e0b50',borderRadius:'8px',padding:'8px 12px',color:c.T,fontSize:'13px',fontFamily:'inherit',outline:'none',width:'100%',boxSizing:'border-box',marginBottom:'6px'}}/>
      {altDate&&<input value={altNote||''} onChange={e=>setAltNote(e.target.value)} placeholder={isEs?'Nota opcional...':'Optional note...'} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'8px 12px',color:c.T,fontSize:'12px',fontFamily:'inherit',outline:'none',width:'100%',boxSizing:'border-box'}}/>}
    </div>}
    {plan.mode!=='professional'&&<div style={{marginBottom:'14px'}}>
      <Lbl c={c}>{t.howGet} <span style={{fontWeight:'400',textTransform:'none',fontSize:'11px'}}>{t.howOpt}</span></Lbl>
      <select value={how} onChange={e=>setHow(e.target.value)} style={{background:c.CARD,border:`1px solid ${c.BD}`,color:how?c.T:c.M,fontSize:'14px',padding:'12px 14px',borderRadius:'10px',width:'100%',fontFamily:'inherit',marginBottom:how==='other'?'8px':'0'}}>
        <option value="">вҖ”</option>
        <option value="car">{t.car}</option><option value="moto">{t.moto}</option>
        <option value="transit">{t.transit}</option><option value="taxi">{t.taxi}</option>
        <option value="walk">{t.walk}</option><option value="bike">{t.bike}</option>
        <option value="other">{t.other}</option>
      </select>
      {how==='other'&&<Inp value={howOther} onChange={setHowOther} placeholder={t.otherPh} c={c}/>}
    </div>}

    {/* POLL VOTE */}
    {plan.poll?.q&&<div style={{marginBottom:'16px'}}>
      <Lbl c={c}>рҹ—іпёҸ {plan.poll.q}</Lbl>
      <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
        {plan.poll.opts.filter(o=>o.trim()).map((o,i)=><button key={i} onClick={()=>setPollVote(v=>v===o?null:o)} style={{padding:'10px 14px',background:pollVote===o?`${mc}20`:c.CARD,border:`1px solid ${pollVote===o?mc+'50':c.BD}`,borderRadius:'10px',color:pollVote===o?mc:c.T,cursor:'pointer',fontFamily:'inherit',fontSize:'14px',fontWeight:pollVote===o?'600':'400',textAlign:'left',transition:'all .1s'}}>{pollVote===o?'в—ү ':' в—Ҝ '}{o}</button>)}
      </div>
    </div>}
    {/* COMMENT */}
    <div style={{marginBottom:'20px'}}>
      <Lbl c={c}>{t.commentLbl}</Lbl>
      <Txa value={comment} onChange={setComment} placeholder={t.commentPh} rows={2} c={c}/>
    </div>

    <Btn onClick={submit} disabled={!name.trim()||saving} full style={{padding:'15px',fontSize:'15px',background:mc,color:'#0A0A0A'}} c={c}>{saving?t.saving:plan.mode==='professional'?(isEs?'Confirmar asistencia вҶ’':'Confirm attendance вҶ’'):plan.mode==='intimate'?(isEs?'Confirmar вҶ’':'Confirm вҶ’'):t.saveAvail}</Btn>
  </div>);
}


// в”Җв”Җв”Җ ACCOMMODATION + AFTER PLAN SUGGESTIONS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function AfterPlanSuggestions({plan, c, lang}){
  const t=T[lang];const isEs=lang==='es'; const mc=getMC(plan.mode,c);
  const city=plan.city||'';
  const cityEnc=encodeURIComponent(city);

      <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
        {[
          {icon:'рҹҡ•',text:isEs?'Si bebes, pide un taxi de antemano вҖ” los precios suben de noche.':"If you're drinking, book a taxi in advance вҖ” prices surge at night.",link:'https://m.uber.com/',linkText:'Uber'},
          {icon:'рҹҚ”',text:isEs?'ВҝHamburguesa de madrugada? Los mejores sitios siempre tienen cola.':'Late night burger? The best spots always have a queue.',link:null,linkText:null},
          {icon:'рҹҺө',text:isEs?'ВҝContinuar la fiesta? Busca salas o bares de copas cercanos.':'Continue the party? Find nearby clubs or bars.',link:`https://www.google.com/maps/search/nightclub+near+${cityEnc}`,linkText:'Google Maps'},
          {icon:'рҹҢ…',text:isEs?'Si amaneces fuera, el desayuno es sagrado.':"If you're out till sunrise, breakfast is sacred.",link:`https://www.google.com/maps/search/breakfast+near+${cityEnc}`,linkText:'Google Maps'},
          plan.mode==='intimate'?{icon:'рҹҢ№',text:isEs?'Una noche especial merece el mejor alojamiento.':'A special night deserves the best accommodation.',link:('https://www.airbnb.com/s/'+cityEnc+'/homes?room_types%5B%5D=Entire+home%2Fapt&checkin='+date),linkText:'Airbnb'}:null,
        ].filter(Boolean).map((tip,i)=><div key={i} style={{display:'flex',gap:'10px',alignItems:'flex-start',padding:'8px 0',borderBottom:i<4?`1px solid ${c.BD}`:'none'}}><span style={{fontSize:'18px',flexShrink:0}}>{tip.icon}</span><div><div style={{fontSize:'13px',color:c.T,lineHeight:1.5}}>{tip.text}</div>{tip.link&&<a href={tip.link} target="_blank" rel="noreferrer" style={{fontSize:'12px',color:mc,textDecoration:'none',fontWeight:'600'}}>{tip.linkText} вҶ’</a>}</div></div>)}

// в”Җв”Җв”Җ POST-PLAN SURVEY в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function PostPlanSurvey({plan, c, lang, mc}){
  const isEs=lang==='es';
  const key='q_survey_'+plan.id;
  const[done,setDone]=useState(!!ls.get(key,null));
  const[rating,setRating]=useState(0);
  const[repeat,setRepeat]=useState(null);
  const[feedback,setFeedback]=useState('');
  if(done)return null;
  if(!plan.confirmedDate||daysUntil(plan.confirmedDate)>-1)return null;
  const submit=()=>{ls.set(key,{rating,repeat,feedback,at:new Date().toISOString()});setDone(true);};
  return(<div style={{background:`${mc}10`,border:`1px solid ${mc}30`,borderRadius:'16px',padding:'20px',marginBottom:'16px'}}>
    <div style={{fontSize:'13px',fontWeight:'700',color:mc,marginBottom:'4px',textTransform:'uppercase',letterSpacing:'.07em'}}>рҹ“Ӣ {isEs?'ВҝQuГ© tal fue?':'How did it go?'}</div>
    <div style={{fontSize:'14px',color:c.T,marginBottom:'14px'}}>{plan.name}</div>
    <div style={{marginBottom:'14px'}}>

// в”Җв”Җв”Җ EXPENSE SPLITTER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function ExpenseSplitter({plan, rs, mc, c, lang}){
  const t=T[lang];const isEs=lang==='es';
  const[expenses,setExp]=useState(()=>ls.get('q_exp_'+plan.id,[]));
  const[open,setOpen]=useState(false);
  const[who,setWho]=useState('');const[what,setWhat]=useState('');const[amt,setAmt]=useState('');
  const attendees=rs.filter(r=>(plan.dates||[]).some(d=>r.avail?.[d]==='yes')).map(r=>r.name);
  const saveExp=exp=>{ls.set('q_exp_'+plan.id,exp);setExp(exp);};
  const add=()=>{if(!who||!what||!amt)return;const e=[...expenses,{id:Date.now(),who,what,amt:parseFloat(amt),at:new Date().toISOString()}];saveExp(e);setWho('');setWhat('');setAmt('');};
  const rem=id=>saveExp(expenses.filter(e=>e.id!==id));
  const total=expenses.reduce((s,e)=>s+e.amt,0);
  const perPerson=attendees.length>0?total/attendees.length:0;
  // Calculate who owes what
  const paid={};expenses.forEach(e=>{paid[e.who]=(paid[e.who]||0)+e.amt;});
  const balances={};attendees.forEach(p=>{balances[p]=(paid[p]||0)-perPerson;});
  const debtors=Object.entries(balances).filter(([,b])=>b<-0.01).sort((a,b)=>a[1]-b[1]);
  const creditors=Object.entries(balances).filter(([,b])=>b>0.01).sort((a,b)=>b[1]-a[1]);
  const transfers=[];
  const d2=[...debtors.map(([n,b])=>({n,b:Math.abs(b)}))];
  const c2=[...creditors.map(([n,b])=>({n,b}))];
  let i=0,j=0;
  while(i<d2.length&&j<c2.length){
    const amt2=Math.min(d2[i].b,c2[j].b);
    if(amt2>0.01)transfers.push({from:d2[i].n,to:c2[j].n,amt:amt2.toFixed(2)});
    d2[i].b-=amt2;c2[j].b-=amt2;
    if(d2[i].b<0.01)i++;
    if(c2[j].b<0.01)j++;
  }
  if(expenses.length===0&&!open)return(<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'12px',padding:'14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
    <div><div style={{fontSize:'13px',color:c.T,fontWeight:'500'}}>рҹ’° {isEs?'Dividir gastos':'Split expenses'}</div><div style={{fontSize:'12px',color:c.M2}}>{isEs?'AГұade gastos y calcula quiГ©n debe quГ©':'Add expenses and calculate who owes what'}</div></div>
    <button onClick={()=>setOpen(true)} style={{background:`${mc}20`,border:`1px solid ${mc}40`,borderRadius:'8px',padding:'7px 12px',color:mc,cursor:'pointer',fontFamily:'inherit',fontSize:'13px',fontWeight:'600'}}>{isEs?'AГұadir':'Add'}</button>
  </div>);
  return(<Card c={c}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
      <Lbl c={c}>рҹ’° {isEs?'Gastos del plan':'Plan expenses'}</Lbl>
      <button onClick={()=>setOpen(o=>!o)} style={{background:`${mc}15`,border:`1px solid ${mc}40`,borderRadius:'8px',padding:'5px 10px',color:mc,cursor:'pointer',fontFamily:'inherit',fontSize:'12px',fontWeight:'600'}}>+ {isEs?'AГұadir gasto':'Add expense'}</button>
    </div>
    {open&&<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'10px',padding:'12px',marginBottom:'12px',display:'flex',flexDirection:'column',gap:'8px'}}>
      <select value={who} onChange={e=>setWho(e.target.value)} style={{background:c.CARD,border:`1px solid ${c.BD}`,color:who?c.T:c.M,fontSize:'13px',padding:'9px 12px',borderRadius:'8px',fontFamily:'inherit',width:'100%'}}>
        <option value="">{isEs?'ВҝQuiГ©n pagГі?':'Who paid?'}</option>
        {attendees.map(a=><option key={a} value={a}>{a}</option>)}
        <option value={isEs?'Yo':'Me'}>{isEs?'Yo (organizador)':'Me (organiser)'}</option>
      </select>
      <input value={what} onChange={e=>setWhat(e.target.value)} placeholder={isEs?'ВҝQuГ© fue? (cena, taxi...)':'What was it? (dinner, taxi...)'}  style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'9px 12px',color:c.T,fontSize:'13px',fontFamily:'inherit',outline:'none'}}/>
      <div style={{display:'flex',gap:'8px'}}>
        <input type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="вӮ¬" style={{flex:1,background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'9px 12px',color:c.T,fontSize:'13px',fontFamily:'inherit',outline:'none'}}/>
        <button onClick={add} disabled={!who||!what||!amt} style={{padding:'9px 16px',background:who&&what&&amt?mc:'transparent',border:`1px solid ${who&&what&&amt?mc:c.BD}`,borderRadius:'8px',color:who&&what&&amt?'#0A0A0A':c.M,cursor:'pointer',fontFamily:'inherit',fontWeight:'700',fontSize:'13px'}}>{isEs?'OK':'OK'}</button>
      </div>
    </div>}
    {expenses.map(e=><div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${c.BD}`,fontSize:'13px'}}>
      <div><span style={{color:mc,fontWeight:'600'}}>{e.who}</span><span style={{color:c.M2}}> вҖ” {e.what}</span></div>
      <div style={{display:'flex',gap:'8px',alignItems:'center'}}><span style={{color:c.T,fontWeight:'700'}}>{e.amt.toFixed(2)}вӮ¬</span><button onClick={()=>rem(e.id)} title={lang==='es'?'Eliminar gasto':'Remove expense'} style={{background:'none',border:'none',color:c.M,cursor:'pointer',fontSize:'14px',padding:'0'}}>Г—</button></div>
    </div>)}
    {expenses.length>0&&<>
      <div style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderTop:`1px solid ${c.BD}`,marginTop:'4px',fontSize:'14px'}}><span style={{color:c.M2}}>{t.statTotal}</span><span style={{color:mc,fontWeight:'800'}}>{total.toFixed(2)}вӮ¬</span></div>
      {attendees.length>1&&perPerson>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:'13px',marginBottom:'12px'}}><span style={{color:c.M2}}>{isEs?'Por persona':'Per person'}</span><span style={{color:c.T,fontWeight:'600'}}>{perPerson.toFixed(2)}вӮ¬</span></div>}
      {transfers.length>0&&<div style={{background:`${mc}08`,border:`1px solid ${mc}25`,borderRadius:'10px',padding:'12px'}}>
        <div style={{fontSize:'11px',color:mc,fontWeight:'700',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:'8px'}}>{isEs?'Transferencias para cuadrar':'Transfers to settle up'}</div>
        {transfers.map((t2,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',fontSize:'13px',borderBottom:i<transfers.length-1?`1px solid ${c.BD}`:'none'}}>
          <span style={{color:c.T}}><span style={{color:'#ef4444',fontWeight:'600'}}>{t2.from}</span> вҶ’ <span style={{color:'#22c55e',fontWeight:'600'}}>{t2.to}</span></span>
          <span style={{color:c.T,fontWeight:'700'}}>{t2.amt}вӮ¬</span>
        </div>)}
      </div>}
      {transfers.length===0&&expenses.length>0&&attendees.length>1&&<div style={{fontSize:'12px',color:'#22c55e',textAlign:'center',padding:'8px'}}>вң“ {isEs?'ВЎTodo cuadrado!':'All settled!'}</div>}
    </>}
  </Card>);
}


// в”Җв”Җв”Җ CALENDAR EXPORT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const generateICS=(plan,lang)=>{
  const d=plan.confirmedDate;if(!d)return;
  const isEs=lang==='es';
  const dt=d.replace(/-/g,'');
  const time=plan.times?.[d]?.[0];
  let dtStart,dtEnd;
  if(time){
    const[hh,mm]=time.split(':');
    const pad=n=>n.toString().padStart(2,'0');
    dtStart=`${dt}T${pad(hh)}${pad(mm||'00')}00`;
    dtEnd=`${dt}T${pad(parseInt(hh)+2)}${pad(mm||'00')}00`;
  }else{dtStart=dt;dtEnd=dt;}
  const loc=(plan.stops||[]).filter(s=>s.address||s.name).map(s=>s.name||(s.address||'')).join(' вҶ’ ');
  const desc=isEs
    ?`Plan creado con queda. вҖ” queda.app\nCГіdigo: ${plan.id}${plan.desc?'\n'+plan.desc:''}`
    :`Plan created with queda. вҖ” queda.app\nCode: ${plan.id}${plan.desc?'\n'+plan.desc:''}`;
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//queda//queda.app//EN','BEGIN:VEVENT',`UID:${plan.id}@queda.app`,`SUMMARY:${plan.name}`,`DTSTART${time?'':'VALUE=DATE'}:${dtStart}`,`DTEND${time?'':'VALUE=DATE'}:${dtEnd}`,`DESCRIPTION:${desc}`,loc?`LOCATION:${loc}`:'','END:VEVENT','END:VCALENDAR'].filter(x=>x).join('\n');

  const blob=new Blob([ics],{type:'text/calendar'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${plan.name.replace(/[^a-z0-9]/gi,'_')}.ics`;a.click();
  URL.revokeObjectURL(url);
};


// в”Җв”Җв”Җ OUTFIT CARD (weather-aware) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function OutfitCard({dressCode, dressNote, city, date, mc, c, lang, t}){
  const isEs=lang==='es';
  const[weather,setW]=useState(null);
  useEffect(()=>{
    if(!city||!date)return;
    const du=daysUntil(date);
    if(du>16||du<-1)return;
    (async()=>{
      try{
        const geo=await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(city)+"&count=1").then(r=>r.json());
        if(!geo.results?.length)return;
        const{latitude:lat,longitude:lon}=geo.results[0];
        const wd=await fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&start_date="+date+"&end_date="+date).then(r=>r.json());
        if(wd.daily)setW({code:wd.daily.weathercode[0],max:Math.round(wd.daily.temperature_2m_max[0]),min:Math.round(wd.daily.temperature_2m_min[0])});
      }catch{}
    })();
  },[city,date]);
  const tip=getOutfitTip(dressCode,weather?.code,weather?.max,weather?.min,lang);
  const label=t.dressCodes.find(d=>d.k===dressCode)?.l||dressCode;
  return(<div style={{background:`${mc}12`,border:`1px solid ${mc}35`,borderRadius:'14px',padding:'16px',marginBottom:'16px'}}>
    <div style={{fontSize:'11px',color:mc,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'8px'}}>{isEs?'Dress code del plan':'Plan dress code'}</div>
    <div style={{fontSize:'18px',fontWeight:'600',color:c.T,marginBottom:'10px'}}>{label}</div>
    {tip&&<div style={{fontSize:'13px',color:c.T,lineHeight:1.6,marginBottom:tip.wtip?'10px':'0'}}>{tip.base}</div>}
    {tip?.wtip&&<div style={{fontSize:'13px',color:c.T,padding:'10px 12px',background:c.CARD2,borderRadius:'8px',borderLeft:`3px solid ${mc}`,lineHeight:1.5,marginTop:'6px'}}>{tip.wtip}</div>}
    {dressNote&&<div style={{fontSize:'12px',color:c.M2,marginTop:'10px',fontStyle:'italic'}}>"{dressNote}"</div>}
  </div>);
}



// в”Җв”Җв”Җ RESULTS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function Results({plan:ip,onBack,isOrg,c,lang}){
  const[plan,setPlan]=useState(ip);const t=T[lang];const isEs=lang==='es';
  const mc=getMC(plan.mode,c);
  const[tab,setTab]=useState('who');const[rs,setRs]=useState([]);const[ldg,setL]=useState(true);
  const[conf,setConf]=useState(false);const[remSent,setRem]=useState(false);
  const[payModal,setPay]=useState(false);const[payAmt,setPayAmt]=useState(0);
  const[newRespAlert,setAlert]=useState(null);
  const isOrgRef=useRef(isOrg);
  const prevCountRef=useRef(null);
  const refresh=useCallback(async(silent=false)=>{
    if(!silent)setL(true);
    const newRs=await loadResps(plan.id);
    if(silent&&prevCountRef.current!==null&&newRs.length>prevCountRef.current){
      const added=newRs.filter(r=>!rs.find(x=>x.name===r.name));
      if(added.length>0){
        const who=added[added.length-1].name;
        setAlert(who);
        setTimeout(()=>setAlert(null),4000);
        // Browser notification if permission granted
        if(Notification.permission==='granted'){
          new Notification(plan.name,{body:(plan.lang==='es'?`Nueva respuesta de ${who}`:`New response from ${who}`),icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">рҹ“…</text></svg>'});
        }
      }
    }
    prevCountRef.current=newRs.length;
    setRs(newRs);
    // Auto-confirm check
    if(isOrgRef.current&&plan.autoConfirm&&!plan.confirmedDate){
      const cntYFn=d=>newRs.filter(r=>r.avail?.[d]==='yes').length;
      const autoDate=(plan.dates||[]).find(d=>cntYFn(d)>=plan.autoConfirmN);
      if(autoDate){
        const up={...plan,confirmedDate:autoDate};
        await updatePlan(up);setPlan(up);
        if(silent){const url=location.href.split('?')[0]+'?code='+plan.id;window.open('https://wa.me/?text='+encodeURIComponent(`вҡЎ *${plan.name}* вҖ” ${plan.lang==='es'?'ВЎfecha auto-confirmada!':'date auto-confirmed!'}\n\nрҹ—“пёҸ ${fmtDate(autoDate,plan.lang||'es')}\n\n${url}`),'_blank');}
      }
    }
    if(!silent)setL(false);
  },[plan.id,rs]);
  useEffect(()=>{refresh();},[plan.id]);
  useEffect(()=>{const iv=setInterval(()=>refresh(true),12000);return()=>clearInterval(iv);},[refresh]);
  const total=rs.length;
  const cntY=d=>rs.filter(r=>r.avail?.[d]==='yes').length;
  const cntM=d=>rs.filter(r=>r.avail?.[d]==='maybe').length;
  const score=d=>cntY(d)*1000+cntM(d); // SГӯ gana siempre, QuizГЎs solo desempata
  const mx=Math.max(...(plan.dates||[]).map(d=>cntY(d)),1);
  const best=total>0?(plan.dates||[]).reduce((b,d)=>score(d)>score(b)?d:b,plan.dates[0]):null;
  const budget=(plan.stops||[]).reduce((s,p2)=>s+(parseFloat(p2.cost)||0),0);
  const giftPer=plan.gift?.price?parseFloat(plan.gift.price):0;
  const fs=plan.stops?.find(s=>s.lat&&s.lng);
  const city=plan.city||plan.cityFull?.split(',')[0]||'';
  const du=plan.confirmedDate?daysUntil(plan.confirmedDate):null;
  const confirmDate=async d=>{setConf(true);const up={...plan,confirmedDate:d};await updatePlan(up);setPlan(up);setConf(false);};
  const waConfirm=()=>{const url=location.href.split('?')[0]+'?code='+plan.id;window.open('https://wa.me/?text='+encodeURIComponent(`рҹ“Ң *${plan.name}* вҖ” ${isEs?'ВЎfecha confirmada!':'date confirmed!'}\n\nрҹ—“пёҸ ${fmtDate(plan.confirmedDate,lang)}\n\n${url}`),'_blank');};

    <div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
      <Back onClick={onBack} label={t.back} c={c}/>

      {plan.confirmedDate&&du!=null&&du>=0&&du<=3&&<div style={{background:`${mc}15`,border:`1px solid ${mc}40`,borderRadius:'12px',padding:'12px 16px',marginBottom:'14px',display:'flex',gap:'10px',alignItems:'center'}}>

        <div style={{fontSize:'12px',color:c.M2,textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate,lang)}</div></div>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'6px'}}>

      </div>
      <div style={{fontSize:'13px',color:c.M2,margin:'8px 0 12px'}}>{total} {total===1?t.responses:t.responsesP} В· <span style={{color:mc,fontWeight:'700',letterSpacing:'.1em'}}>{plan.id}</span>{city&&<span> В· рҹ“Қ {city}</span>}</div>
      {plan.confirmedDate&&<div style={{background:`${mc}15`,border:`1px solid ${mc}50`,borderRadius:'12px',padding:'14px 16px',marginBottom:'14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div style={{fontSize:'11px',color:mc,fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'2px'}}>{t.confirmedDate}</div><div style={{fontSize:'15px',color:c.T,fontWeight:'600',textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate,lang)}</div></div>
        <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>

      {ldg&&<div style={{textAlign:'center',color:c.M,padding:'48px'}}>...</div>}

        :<>
          {best&&cntY(best)>0&&<div style={{background:`${mc}12`,border:`1px solid ${mc}35`,borderRadius:'14px',padding:'16px',marginBottom:'18px'}}>

                <div style={{fontSize:'13px',color:c.M2}}>вң… {cntY(best)}/{total}{cntM(best)>0?` В· рҹӨ” ${cntM(best)}`:''}</div>

            </div>

          {(plan.dates||[]).map(d=>{const ny=cntY(d);const nm=cntM(d);const pct=(ny/mx)*100;const isBest=d===best&&ny>0;const isConf=d===plan.confirmedDate;return(
            <div key={d} style={{marginBottom:'12px'}}>

                  {isConf&&<span style={{fontSize:'10px',background:mc,color:'#0A0A0A',padding:'1px 7px',borderRadius:'20px',fontWeight:'800'}}>{t.CONFIRMED}</span>}
                  {!isConf&&isBest&&<span>вӯҗ</span>}
                {plan.autoConfirm&&!plan.confirmedDate&&<span style={{fontSize:'10px',background:'#f59e0b20',color:'#f59e0b',padding:'1px 7px',borderRadius:'20px',border:'1px solid #f59e0b40'}}>вҡЎ auto</span>}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <span style={{fontSize:'12px',color:'#22c55e',fontWeight:'600'}}>вң… {ny}</span>
                  {nm>0&&<span style={{fontSize:'12px',color:'#f59e0b',fontWeight:'600'}}>рҹӨ” {nm}</span>}
                  {isOrgRef.current&&!plan.confirmedDate&&d!==best&&(ny+nm)>0&&<button onClick={()=>confirmDate(d)} title={isEs?'Confirmar esta fecha para todo el grupo':'Confirm this date for the whole group'} style={{background:'none',border:'none',color:c.M2,fontSize:'11px',cursor:'pointer',fontFamily:'inherit',textDecoration:'underline'}}>{t.confirmSmall}</button>}
                </div>
              </div>
              <div style={{height:'7px',background:c.BD,borderRadius:'4px',overflow:'hidden',position:'relative'}}>
                <div style={{height:'100%',width:`${pct}%`,background:isConf||isBest?mc:'#22c55e',borderRadius:'4px',transition:'width .5s'}}/>
                {nm>0&&<div style={{position:'absolute',left:`${pct}%`,top:0,height:'100%',width:`${(nm/total)*100}%`,background:'#f59e0b'}}/>}
              </div>
            </div>);})}
          {/* POLL RESULTS */}
          {plan.poll?.q&&rs.some(r=>r.pollVote)&&<Card c={c}>
            <Lbl c={c}>рҹ—іпёҸ {plan.poll.q}</Lbl>
            {plan.poll.opts.filter(o=>o.trim()).map(o=>{const cnt=rs.filter(r=>r.pollVote===o).length;const pct=rs.length>0?Math.round(cnt/rs.length*100):0;return(<div key={o} style={{marginBottom:'8px'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:'3px'}}><span style={{fontSize:'13px',color:c.T}}>{o}</span><span style={{fontSize:'12px',color:mc,fontWeight:'600'}}>{cnt} ({pct}%)</span></div>
              <div style={{height:'6px',background:c.BD,borderRadius:'3px',overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,background:mc,borderRadius:'3px',transition:'width .5s'}}/></div>
            </div>);})}
          </Card>}
          <Card c={c}>
            <Lbl c={c}>{isEs?'Detalle por persona':'Detail per person'}</Lbl>
            {rs.map((r,i)=><div key={i} style={{paddingBottom:'12px',marginBottom:'12px',borderBottom:i<rs.length-1?`1px solid ${c.BD}`:'none'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'5px'}}>
                <div><span style={{fontSize:'14px',color:c.T,fontWeight:'600'}}>{r.name}</span>{r.role&&r.role!==t.roles[0]&&<span style={{fontSize:'11px',color:c.M2,marginLeft:'6px'}}>В· {r.role}</span>}{r.how&&<span style={{fontSize:'12px',color:c.M2,marginLeft:'6px'}}>В· {howL(r.how)}</span>}</div>
                <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                  {r.changeLog?.length>0&&(()=>{const last=r.changeLog[0];const recent=last&&(Date.now()-new Date(last.at).getTime())<3600000;return<span title={isEs?('Editado '+r.changeLog.length+' vez/veces'):('Edited '+r.changeLog.length+' time(s)')} style={{fontSize:'11px',color:recent?'#f59e0b':c.M2,fontWeight:recent?'700':'400'}}>вңҸпёҸ{recent?' nuevo':''}</span>;})()}
                </div>
              </div>

                {(plan.dates||[]).map(d=>{const v=r.avail?.[d];const vc={yes:'#22c55e',maybe:'#f59e0b'};const vi={yes:'вң…',maybe:'рҹӨ”'};return(v==='yes'||v==='maybe')?<span key={d} style={{fontSize:'11px',padding:'3px 9px',borderRadius:'20px',background:`${vc[v]}20`,color:vc[v],border:`1px solid ${vc[v]}30`,textTransform:'capitalize'}}>{vi[v]} {fmtShort(d,lang)}</span>:null;})}

            </div>)}

              <div style={{marginTop:'10px',fontSize:'11px',color:c.M2}}>queda. В· {plan.id}</div>
            </div>
            <div style={{fontSize:'12px',color:c.M2,marginTop:'8px',textAlign:'center'}}>{isEs?'Haz screenshot y comparte рҹ“ұ':'Screenshot and share рҹ“ұ'}</div>

              <span style={{fontSize:'12px',color:c.M2}}>вҖ” {r.name}</span>
            </div>)}
          </Card>}
          {rs.some(r=>r.comment)&&<Card c={c}>
            <Lbl c={c}>рҹ’¬ {t.comments}</Lbl>
            {rs.filter(r=>r.comment).map((r,i)=><div key={i} style={{marginBottom:'10px',paddingBottom:'10px',borderBottom:i<rs.filter(x=>x.comment).length-1?`1px solid ${c.BD}`:'none'}}>
              <div style={{fontSize:'12px',color:mc,fontWeight:'600',marginBottom:'3px'}}>{r.name}</div>
              <div style={{fontSize:'13px',color:c.T}}>"{r.comment}"</div>
            </div>)}
          </Card>}
        </>)}

      {/* PLAN tab = Route + budget + inline map */}
      {!ldg&&tab==='plan'&&<>
        {(plan.stops||[]).length===0&&<Card c={c} style={{textAlign:'center',padding:'28px'}}><div style={{fontSize:'32px',marginBottom:'8px'}}>рҹ“Қ</div><div style={{color:c.M2,fontSize:'14px'}}>{isEs?'Este plan no tiene paradas definidas.':'This plan has no stops defined.'}</div></Card>}
        {(plan.stops||[]).map((s,i)=><div key={s.id||i} style={{display:'flex',gap:'12px',marginBottom:'10px'}}>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
            <div style={{width:'28px',height:'28px',borderRadius:'50%',background:`${mc}20`,border:`1.5px solid ${mc}60`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:'800',color:mc,flexShrink:0}}>{i+1}</div>
            {i<plan.stops.length-1&&<div style={{width:'2px',flex:1,background:c.BD,margin:'4px 0'}}/>}

            <div style={{fontSize:'15px',color:c.T,fontWeight:'600',marginBottom:'4px'}}>{s.name||'вҖ”'}</div>

              {s.link&&<a href={s.link.startsWith('http')?s.link:'https://'+s.link} target="_blank" rel="noreferrer" style={{fontSize:'12px',color:mc,textDecoration:'none',padding:'4px 10px',border:`1px solid ${mc}40`,borderRadius:'8px'}}>{isEs?'Reserva':'Book'} вҶ—</a>}
            </div>
          </Card>
        </div>)}
        {budget>0&&<><HR c={c}/>
          <div style={{display:'flex',justifyContent:'space-between',padding:'14px 16px',background:`${mc}0D`,border:`1px solid ${mc}30`,borderRadius:'12px',marginBottom:'8px'}}><span style={{color:c.M2}}>{t.perPerson}</span><span style={{color:mc,fontSize:'22px',fontWeight:'800'}}>{budget.toFixed(0)}вӮ¬</span></div>
          {giftPer>0&&<div style={{display:'flex',justifyContent:'space-between',padding:'12px 16px',background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'12px',marginBottom:'8px'}}><span style={{color:c.M2,fontSize:'14px'}}>+ {isEs?'regalo':'gift'}</span><span style={{color:c.T,fontWeight:'600'}}>{giftPer.toFixed(0)}вӮ¬</span></div>}
          <div style={{display:'flex',justifyContent:'space-between',padding:'14px 16px',background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'12px'}}><span style={{color:c.T,fontWeight:'700'}}>{t.totalLbl}</span><span style={{color:mc,fontSize:'18px',fontWeight:'800'}}>{(budget+giftPer).toFixed(0)}вӮ¬</span></div>
        </>}
