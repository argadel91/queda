const weatherAdvice=(code,max,min,rain,lang)=>{
  const e=lang==='es';const avg=(max+min)/2;
  let cloth='',trans='',ext=[];
  if(code>=95){cloth=e?'🌧️ Chubasquero obligatorio. Paraguas.':'🌧️ Waterproof jacket essential. Umbrella.';trans=e?'🚇 Taxi o metro. Sin bici ni moto.':'🚇 Taxi or metro. No cycling or motorbike.';}
  else if(code>=61){cloth=e?'☂️ Paraguas sí o sí. Capas impermeables.':'☂️ Umbrella for sure. Waterproof layers.';trans=e?'🚕 Mejor taxi. La bici no es buena idea.':'🚕 Better take a taxi. Cycling not ideal.';}
  else if(code>=51){cloth=e?'🌂 Paraguas por si acaso.':'🌂 Umbrella just in case.';trans=e?'🚇 Transporte público recomendado.':'🚇 Public transport recommended.';}
  else if(avg>=28){cloth=e?'👕 Ropa muy ligera. Protector solar.':'👕 Very light clothing. Sunscreen.';trans=e?'🚲 Perfecto para ir a pie o en bici.':'🚲 Perfect for walking or cycling.';}
  else if(avg>=20){cloth=e?'👕 Ropa ligera. Quizás chaqueta por la noche.':'👕 Light clothing. Maybe a jacket in the evening.';trans=e?'🚲 Buen día para caminar.':'🚲 Good day to walk.';}
  else if(avg>=14){cloth=e?'🧥 Chaqueta o jersey.':'🧥 Jacket or jumper.';trans=e?'✅ Cualquier transporte bien.':'✅ Any transport fine.';}
  else if(avg>=8){cloth=e?'🧥 Abrigo y bufanda.':'🧥 Coat and scarf.';trans=e?'🚗 Mejor en coche o metro.':'🚗 Better by car or metro.';}
  else{cloth=e?'🧣 Abrigo grueso, bufanda y guantes.':'🧣 Heavy coat, scarf and gloves.';trans=e?'🚗 Demasiado frío para ir a pie.':'🚗 Too cold to walk far.';}
  if(rain>70)ext.push(e?'⚠️ Alta probabilidad de lluvia':'⚠️ High chance of rain');
  if(max>35)ext.push(e?'🌡️ Calor extremo. Hidrátate bien.':'🌡️ Extreme heat. Stay hydrated.');
  if(min<0)ext.push(e?'🧊 Posible hielo. Cuidado al conducir.':'🧊 Possible ice. Drive carefully.');
  if(avg>=18&&code<=2)ext.push(e?'😎 Buen día para terraza':'😎 Great day for a terrace');
  return{cloth,trans,ext};
};

const Inp=({value,onChange,onKey,placeholder,type='text',mono,c})=><input value={value} onChange={e=>onChange(e.target.value)} onKeyDown={onKey} placeholder={placeholder} type={type} style={{background:c?.CARD,border:`1px solid ${c?.BD}`,borderRadius:'10px',padding:'12px 14px',color:c?.T,fontSize:mono?'22px':'14px',fontFamily:mono?'monospace':'inherit',outline:'none',width:'100%',letterSpacing:mono?'.18em':'normal',fontWeight:mono?'800':'400',boxSizing:'border-box'}}/>;
const Txa=({value,onChange,placeholder,rows=3,c})=><textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{background:c?.CARD,border:`1px solid ${c?.BD}`,borderRadius:'10px',padding:'12px 14px',color:c?.T,fontSize:'14px',fontFamily:'inherit',outline:'none',width:'100%',resize:'vertical',boxSizing:'border-box',lineHeight:1.6}}/>;
const Lbl=({children,c})=><div style={{fontSize:'11px',color:c?.M||'#555',fontWeight:'600',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:'8px'}}>{children}</div>;
const HR=({c})=><div style={{height:'1px',background:c?.BD,margin:'20px 0'}}/>;
const Back=({onClick,label,c})=><button onClick={onClick} style={{background:'none',border:'none',color:c?.M2,cursor:'pointer',fontSize:'14px',padding:'0 0 22px',fontFamily:'inherit',display:'block'}}>{label}</button>;

const ModeBadge=({mode,lang,c})=>{const m=T[lang]?.modes?.[mode];const color=MC[mode]||c?.A;return<span style={{fontSize:'11px',fontWeight:'700',padding:'3px 10px',borderRadius:'20px',background:`${color}18`,color,border:`1px solid ${color}35`}}>{m?.label||mode}</span>;};

// ─── CALENDAR ─────────────────────────────────────────
function CalendarPicker({selected,onChange,c,lang}){
  const now=dayStart();const max=addDays(now,365);
  const[vy,setVy]=useState(now.getFullYear());const[vm,setVm]=useState(now.getMonth());
  const days=new Date(vy,vm+1,0).getDate();const first=(new Date(vy,vm,1).getDay()+6)%7;
  const dl=lang==='en'?['M','T','W','T','F','S','S']:['L','M','X','J','V','S','D'];
  const prev=()=>{if(vm===0){setVy(y=>y-1);setVm(11);}else setVm(m=>m-1);};
  const next=()=>{const n=new Date(vy,vm+1,1);if(n<=max){if(vm===11){setVy(y=>y+1);setVm(0);}else setVm(m=>m+1);}};
  const tog=iso=>onChange(selected.includes(iso)?selected.filter(d=>d!==iso):[...selected,iso]);
  return(<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'16px'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
      <button onClick={prev} style={{background:'none',border:'none',color:c.M2,cursor:'pointer',fontSize:'20px',padding:'2px 8px'}}>‹</button>
      <span style={{fontSize:'14px',fontWeight:'600',color:c.T,textTransform:'capitalize'}}>{fmtMonthYear(vy,vm,lang)}</span>
      <button onClick={next} style={{background:'none',border:'none',color:c.M2,cursor:'pointer',fontSize:'20px',padding:'2px 8px'}}>›</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px',marginBottom:'4px'}}>
      {dl.map((d,i)=><div key={i} style={{textAlign:'center',fontSize:'11px',color:c.M,fontWeight:'600',padding:'4px'}}>{d}</div>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px'}}>
      {Array.from({length:first}).map((_,i)=><div key={'e'+i}/>)}
      {Array.from({length:days}).map((_,i)=>{const date=new Date(vy,vm,i+1);const iso=toISO(date);const dis=date<now||date>max;const sel=selected.includes(iso);return<div key={i} onClick={()=>!dis&&tog(iso)} style={{textAlign:'center',padding:'7px 2px',borderRadius:'8px',fontSize:'13px',cursor:dis?'default':'pointer',background:sel?c.A:dis?'transparent':c.CARD,color:sel?'#0A0A0A':dis?c.BD:c.T,fontWeight:sel?'700':'400',border:sel?'none':`1px solid ${dis?'transparent':c.BD}`}}>{i+1}</div>;})}
    </div>
    {selected.length>0&&<div style={{marginTop:'10px',display:'flex',flexWrap:'wrap',gap:'4px'}}>
      {selected.sort().map(d=><span key={d} onClick={()=>tog(d)} style={{padding:'3px 8px',background:`${c.A}20`,color:c.A,border:`1px solid ${c.A}40`,borderRadius:'20px',cursor:'pointer',fontSize:'11px',fontWeight:'600',textTransform:'capitalize'}}>{fmtShort(d,lang)} ×</span>)}
    </div>}
  </div>);
}

// ─── TIME PICKER ──────────────────────────────────────
function TimePicker({times,onChange,c,lang,tz}){
  const[h,setH]=useState('20');const[m,setM]=useState('00');
  const add=()=>{const v=`${h}:${m}`;if(!times.includes(v))onChange([...times,v].sort());};
  const ss={background:c.CARD,border:`1px solid ${c.BD}`,color:c.T,fontSize:'14px',padding:'10px 12px',borderRadius:'10px',width:'100%',fontFamily:'inherit'};
  return(<div>
    <div style={{display:'flex',gap:'8px',alignItems:'flex-end',marginBottom:'8px'}}>
      <div style={{flex:1}}><select value={h} onChange={e=>setH(e.target.value)} style={ss}>{Array.from({length:24},(_,i)=>i.toString().padStart(2,'0')).map(hh=><option key={hh} value={hh}>{hh}h</option>)}</select></div>
      <div style={{flex:1}}><select value={m} onChange={e=>setM(e.target.value)} style={ss}>{['00','15','30','45'].map(mm=><option key={mm} value={mm}>:{mm}</option>)}</select></div>
      <Btn onClick={add} sm c={c}>{T[lang].addTime}</Btn>
    </div>
    {tz&&<div style={{fontSize:'12px',color:c.M2,marginBottom:'6px'}}>🌍 {getTzLabel(tz)}</div>}
    {times.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
      {times.map(hh=><span key={hh} onClick={()=>onChange(times.filter(x=>x!==hh))} style={{fontSize:'12px',padding:'5px 11px',borderRadius:'20px',border:`1px solid ${c.A}50`,background:`${c.A}15`,color:c.A,cursor:'pointer',fontWeight:'600'}}>{hh} ×</span>)}
    </div>}
  </div>);
}

// ─── CITY AUTOCOMPLETE ────────────────────────────────
function CityInput({value,onChange,onSelect,placeholder,c}){
  const[res,setRes]=useState([]);const[open,setOpen]=useState(false);const[ldg,setL]=useState(false);
  const deb=useRef(null);
  const search=q=>{if(deb.current)clearTimeout(deb.current);if(q.length<2){setRes([]);setOpen(false);return;}deb.current=setTimeout(async()=>{setL(true);try{const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&addressdetails=1`).then(x=>x.json());const f=r.filter(x=>['city','town','village','municipality'].includes(x.type)||x.class==='place');setRes(f.slice(0,5));setOpen(f.length>0);}catch{}setL(false);},400);};
  const pick=r=>{const city=r.address?.city||r.address?.town||r.address?.village||r.display_name.split(',')[0];const country=r.address?.country||'';const label=`${city}${country?', '+country:''}`;const tz=getCityTz(city);onChange(label);onSelect({label,city,country,lat:parseFloat(r.lat),lon:parseFloat(r.lon),tz});setOpen(false);setRes([]);};
  return(<div style={{position:'relative'}}>
    <div style={{position:'relative'}}>
      <input value={value} onChange={e=>{onChange(e.target.value);search(e.target.value);}} onFocus={()=>res.length>0&&setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),200)} placeholder={placeholder} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'10px',padding:'12px 14px',color:c.T,fontSize:'14px',fontFamily:'inherit',outline:'none',width:'100%',boxSizing:'border-box'}}/>
      {ldg&&<div style={{position:'absolute',right:'12px',top:'50%',transform:'translateY(-50%)',fontSize:'12px',color:c.M}}>...</div>}
    </div>
    {open&&<div style={{position:'absolute',top:'100%',left:0,right:0,background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'10px',boxShadow:'0 8px 24px rgba(0,0,0,.3)',zIndex:50,overflow:'hidden',marginTop:'4px'}}>
      {res.map((r,i)=>{const city=r.address?.city||r.address?.town||r.address?.village||r.display_name.split(',')[0];const country=r.address?.country||'';const state=r.address?.state||'';return(<div key={i} onMouseDown={()=>pick(r)} style={{padding:'12px 14px',cursor:'pointer',borderBottom:i<res.length-1?`1px solid ${c.BD}`:'none'}} onMouseEnter={e=>e.currentTarget.style.background=c.CARD2} onMouseLeave={e=>e.currentTarget.style.background='transparent'}><div style={{fontSize:'14px',color:c.T,fontWeight:'500'}}>{city}</div><div style={{fontSize:'12px',color:c.M2}}>{[state,country].filter(Boolean).join(', ')}</div></div>);})}
    </div>}
  </div>);
}

// ─── MAP MODAL ────────────────────────────────────────
function MapModal({onSelect,onClose,c,lang,init=''}){
  const t=T[lang];const mapRef=useRef(null);const lmap=useRef(null);const mkr=useRef(null);
  const[q,setQ]=useState(init);const[srch,setSrch]=useState(false);const[sel,setSel]=useState(null);
  useEffect(()=>{if(!mapRef.current||lmap.current)return;lmap.current=L.map(mapRef.current,{center:[40.4168,-3.7038],zoom:5});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(lmap.current);lmap.current.on('click',async e=>{const{lat,lng}=e.latlng;try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`).then(x=>x.json());const addr=r.display_name||'';const name=r.name||r.address?.road||'';setSel({name,address:addr,lat,lng});if(mkr.current)mkr.current.remove();mkr.current=L.marker([lat,lng]).addTo(lmap.current).bindPopup(name||addr).openPopup();}catch{}});},[]);
  const search=async()=>{if(!q.trim())return;setSrch(true);try{const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`).then(x=>x.json());if(r.length>0){const{lat,lon,display_name,name}=r[0];const lN=parseFloat(lat),lgN=parseFloat(lon);lmap.current?.setView([lN,lgN],15);setSel({name:name||q,address:display_name,lat:lN,lng:lgN});if(mkr.current)mkr.current.remove();mkr.current=L.marker([lN,lgN]).addTo(lmap.current).bindPopup(name||display_name).openPopup();}}catch{}setSrch(false);};
  return(<div className="map-wrap" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="map-inner">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:'16px',fontWeight:'600',color:'#F0EBE1'}}>{t.searchMap}</span><button onClick={onClose} style={{background:'none',border:'none',color:'#888',cursor:'pointer',fontSize:'22px'}}>×</button></div>
      <div style={{display:'flex',gap:'8px'}}>
        <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&search()} placeholder={t.cityPh} style={{flex:1,background:'#1C1C1C',border:'1px solid #2A2A2A',borderRadius:'10px',padding:'10px 14px',color:'#F0EBE1',fontSize:'14px',fontFamily:'inherit',outline:'none'}}/>
        <button onClick={search} style={{background:'#CDFF6C',border:'none',borderRadius:'10px',padding:'10px 16px',color:'#0A0A0A',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'}}>{srch?'...':t.go}</button>
      </div>
      <div ref={mapRef} style={{flex:1,borderRadius:'12px',overflow:'hidden',minHeight:'200px'}}/>
      {sel&&<div style={{background:'#1C1C1C',borderRadius:'10px',padding:'12px',fontSize:'13px',color:'#F0EBE1'}}>
        <div style={{fontWeight:'600',marginBottom:'4px'}}>{sel.name||sel.address}</div>
        <div style={{color:'#888',fontSize:'12px',marginBottom:'10px'}}>{sel.address}</div>
        <button onClick={()=>onSelect(sel)} style={{width:'100%',background:'#CDFF6C',border:'none',borderRadius:'10px',padding:'11px',color:'#0A0A0A',fontWeight:'700',cursor:'pointer',fontFamily:'inherit',fontSize:'14px'}}>✓ {lang==='es'?'Seleccionar':'Select this place'}</button>
      </div>}
    </div>
  </div>);
}

function RouteMap({stops,c}){
  const mapRef=useRef(null);const lmap=useRef(null);
  const valid=stops.filter(s=>s.lat&&s.lng);

  if(valid.length===0)return<Card c={c} style={{textAlign:'center',padding:'24px'}}><div style={{fontSize:'28px',marginBottom:'8px'}}>🗺️</div><div style={{color:c.M2,fontSize:'13px'}}>Busca los lugares en el mapa para verlos aquí</div></Card>;
  return<div ref={mapRef} style={{height:'300px',borderRadius:'12px',overflow:'hidden'}}/>;
}

// ─── WEATHER WIDGET ───────────────────────────────────
function WeatherWidget({city,date,c,lang,showAdvice=false}){
  const[w,setW]=useState(null);const[state,setState]=useState('idle');
  useEffect(()=>{
    if(!city||!date){setState('idle');return;}
    const du=daysUntil(date);
    if(du>16){setState('early');return;}
    setState('loading');setW(null);
    (async()=>{try{
      const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=${lang}`).then(r=>r.json());
      if(!geo.results?.length){setState('notfound');return;}
      const{latitude:lat,longitude:lon}=geo.results[0];
      const wd=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max&timezone=auto&start_date=${date}&end_date=${date}`).then(r=>r.json());
      if(wd.daily){setState('ok');setW({code:wd.daily.weathercode[0],max:Math.round(wd.daily.temperature_2m_max[0]),min:Math.round(wd.daily.temperature_2m_min[0]),rain:wd.daily.precipitation_probability_max[0],wind:Math.round(wd.daily.windspeed_10m_max?.[0]||0)});}
      else setState('notfound');
    }catch{setState('notfound');}})();
  },[city,date]);
  if(!city||!date||state==='idle')return null;
  const isEs=lang==='es';const du=date?daysUntil(date):0;
  const t=T[lang];
  if(state==='early')return<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'12px',padding:'12px 14px',display:'flex',gap:'10px',alignItems:'center'}}><div style={{fontSize:'22px'}}>📅</div><div><div style={{fontSize:'13px',color:c.T,fontWeight:'500'}}>{t.tooEarlyT}</div><div style={{fontSize:'12px',color:c.M2}}>{du-16} {t.tooEarlyD}</div></div></div>;
  if(state==='notfound')return<div style={{fontSize:'12px',color:c.M2,padding:'6px'}}>{t.cityNotFound}</div>;
  if(state==='loading')return<div style={{fontSize:'12px',color:c.M,padding:'8px'}}>...</div>;
  if(!w)return null;
  const desc=lang==='en'?WX_EN[w.code]||'':WX_ES[w.code]||'';
  const adv=showAdvice?weatherAdvice(w.code,w.max,w.min,w.rain,lang):null;
  return(<div>
    <div style={{background:`${c.A}0A`,border:`1px solid ${c.A}25`,borderRadius:'12px',padding:'14px 16px',marginBottom:adv?'8px':'0'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div style={{fontSize:'18px',marginBottom:'4px'}}>{WX[w.code]||'🌡️'} <span style={{fontSize:'14px',color:c.T,fontWeight:'600'}}>{desc}</span></div><div style={{display:'flex',gap:'12px',fontSize:'12px',color:c.M2}}><span>💧 {w.rain}%</span>{w.wind>0&&<span>💨 {w.wind} km/h</span>}</div></div>
        <div style={{textAlign:'right'}}><div style={{fontSize:'32px',fontWeight:'800',color:c.A,lineHeight:1}}>{w.max}°</div><div style={{fontSize:'13px',color:c.M2}}>{w.min}° min</div></div>
      </div>
    </div>
    {adv&&<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'10px',padding:'12px 14px',display:'flex',flexDirection:'column',gap:'6px'}}>
      <div style={{fontSize:'13px',color:c.T}}>{adv.cloth}</div>
      <div style={{fontSize:'13px',color:c.T}}>{adv.trans}</div>
      {adv.ext.map((e,i)=><div key={i} style={{fontSize:'12px',color:c.M2,background:`${c.A}10`,padding:'5px 10px',borderRadius:'8px'}}>{e}</div>)}
    </div>}
  </div>);
}

            <div style={{width:'22px',height:'22px',borderRadius:'50%',border:`2px solid ${surpriseMode?mc:c.BD}`,background:surpriseMode?mc:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',color:'#0A0A0A',fontWeight:'800',flexShrink:0}}>{surpriseMode?'✓':''}</div>
            <div><div style={{fontSize:'14px',color:c.T,fontWeight:'500'}}>🎭 {isEs?'Modo sorpresa':'Surprise mode'}</div><div style={{fontSize:'12px',color:c.M2}}>{isEs?'El destino se revela al confirmar la fecha':'The destination is revealed when the date is confirmed'}</div></div>

            <div><div style={{fontSize:'14px',color:c.T,fontWeight:'500'}}>{t.gift}</div><div style={{fontSize:'12px',color:c.M2}}>{t.giftSub}</div></div>

        </div>
        {/* BRING */}
        <div style={{marginBottom:'20px'}}>
          <Lbl c={c}>{t.bring}</Lbl>
          {bring.map(b=><div key={b.id} style={{display:'flex',gap:'8px',marginBottom:'8px'}}>

            {bring.length>1&&<button onClick={()=>setBring(p=>p.filter(x=>x.id!==b.id))} style={{background:'none',border:`1px solid ${c.BD}`,color:c.M,cursor:'pointer',fontSize:'16px',borderRadius:'8px',width:'36px'}}>×</button>}
          </div>)}

        </div>
        {/* POLL */}
        <div style={{marginBottom:'20px'}}>
          <Lbl c={c}>🗳️ {isEs?'Encuesta rápida (opcional)':'Quick poll (optional)'}</Lbl>
          <input value={poll.q} onChange={e=>setPoll(p=>({...p,q:e.target.value}))} placeholder={isEs?'¿Restaurante italiano o japonés?':'Italian or Japanese restaurant?'} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'10px',padding:'10px 14px',color:c.T,fontSize:'14px',fontFamily:'inherit',outline:'none',width:'100%',boxSizing:'border-box',marginBottom:'8px'}}/>
          {poll.q.trim()&&<div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
            {poll.opts.map((o,i)=><div key={i} style={{display:'flex',gap:'6px'}}>
              <input value={o} onChange={e=>setPoll(p=>({...p,opts:p.opts.map((x,j)=>j===i?e.target.value:x)}))} placeholder={`${isEs?'Opción':'Option'} ${i+1}`} style={{flex:1,background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'8px 12px',color:c.T,fontSize:'13px',fontFamily:'inherit',outline:'none'}}/>
              {poll.opts.length>2&&<button onClick={()=>setPoll(p=>({...p,opts:p.opts.filter((_,j)=>j!==i)}))} style={{background:'none',border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'6px 10px',color:c.M,cursor:'pointer',fontSize:'14px'}}>×</button>}
            </div>)}
            {poll.opts.length<5&&<button onClick={()=>setPoll(p=>({...p,opts:[...p.opts,'']}))} style={{background:'none',border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'7px',color:c.M2,cursor:'pointer',fontFamily:'inherit',fontSize:'12px'}}>+ {isEs?'Añadir opción':'Add option'}</button>}
          </div>}
        </div>
        {/* PAYMENT */}
        <div style={{marginBottom:'24px',background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'14px',padding:'16px'}}>
          <Lbl c={c}>{t.payData}</Lbl>
          <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
            {[['bizumPhone',t.bizumPh],['paypalUser','PayPal.me user'],['revolutUser','Revolut.me user']].map(([k,ph])=><input key={k} value={payment[k]} onChange={e=>setPayment(p=>({...p,[k]:e.target.value}))} placeholder={ph} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'10px 12px',color:c.T,fontSize:'13px',fontFamily:'inherit',outline:'none',width:'100%',boxSizing:'border-box'}}/>)}
          </div>
          <div style={{fontSize:'11px',color:c.M2,marginTop:'8px'}}>{t.payNote}</div>
        </div>
        <Btn onClick={create} disabled={saving} full style={{padding:'16px',fontSize:'16px',background:mc,color:'#0A0A0A'}} c={c}>{saving?t.saving:t.createBtn}</Btn>
      </>}
    </div>
  </>);
}


// ─── SHARE ────────────────────────────────────────────
function Share({plan,onViewResults,onBack,c,lang}){
  const t=T[lang];const mc=MC[plan.mode||'social']||c.A;
  const[copied,setCopied]=useState(false);const[count,setCount]=useState(null);
  const url=location.href.split('?')[0]+'?code='+plan.id;
  const copy=()=>{navigator.clipboard?.writeText(url).catch(()=>{});setCopied(true);setTimeout(()=>setCopied(false),2000);};
  const msgs={social:(n,u,id)=>lang==='es'?`¡Oye! Únete al plan *${n}*.\n\nMarca cuándo puedes:\n${u}\n\nCódigo: *${id}*`:`Hey! Join *${n}*.\n\nMark when you can:\n${u}\n\nCode: *${id}*`,intimate:(n,u)=>lang==='es'?`Te tengo una propuesta... 👀\n\n${u}`:`I have a proposal for you 👀\n\n${u}`,professional:(n,u,id)=>lang==='es'?`Le convoco a *${n}*.\n\nConfirme asistencia:\n${u}\n\nCódigo: *${id}*`:`You are invited to *${n}*.\n\nConfirm attendance:\n${u}\n\nCode: *${id}*`};
  const wa=()=>window.open('https://wa.me/?text='+encodeURIComponent((msgs[plan.mode||'social']||msgs.social)(plan.name,url,plan.id)),'_blank');
  useEffect(()=>{const f=async()=>{const rs=await loadResps(plan.id);setCount(rs.length);};f();const iv=setInterval(f,15000);return()=>clearInterval(iv);},[plan.id]);
  return(<div style={{padding:'24px',maxWidth:'420px',margin:'0 auto'}}>
    <Back onClick={onBack} label={t.back} c={c}/>
    <div style={{textAlign:'center',marginBottom:'28px'}}>
      <div style={{fontSize:'52px',marginBottom:'14px'}}>{plan.mode==='intimate'?'💘':plan.mode==='professional'?'💼':'🎉'}</div>
      <h2 style={{fontFamily:"'Syne',serif",fontSize:'28px',fontWeight:'800',color:c.T,marginBottom:'8px'}}>{t.planCreated}</h2>
      <p style={{color:c.M2,fontSize:'14px'}}>{t.shareWith}</p>
    </div>
    <div style={{background:c.CARD,border:`1px solid ${mc}40`,borderRadius:'14px',padding:'20px',textAlign:'center',marginBottom:'14px'}}>
      <ModeBadge mode={plan.mode||'social'} lang={lang} c={c}/>
      <div style={{fontFamily:'monospace',fontSize:'58px',fontWeight:'900',color:mc,letterSpacing:'.2em',lineHeight:1,margin:'16px 0 12px'}}>{plan.id}</div>
      <div style={{fontSize:'15px',color:c.T,fontWeight:'600',marginBottom:'4px'}}>{plan.name}</div>
      <div style={{fontSize:'13px',color:c.M2}}>@ {plan.organizer} · {plan.dates?.length||0} {lang==='es'?'fecha':'date'}{plan.dates?.length!==1?'s':''}</div>
    </div>
    {count!==null&&<div style={{textAlign:'center',padding:'12px',background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'10px',marginBottom:'14px',fontSize:'14px',color:c.T}}>
      {count===0?(lang==='es'?'Nadie ha respondido aún':'Nobody has responded yet'):<><span style={{color:mc,fontWeight:'800',fontSize:'20px'}}>{count}</span> {lang==='es'?`persona${count!==1?'s':''} ha${count!==1?'n':''} respondido`:`person${count!==1?'s':''} responded`}</>}
    </div>}
    <button onClick={wa} style={{width:'100%',padding:'15px',borderRadius:'12px',border:'none',background:'#25D366',color:'#fff',fontSize:'15px',fontWeight:'700',cursor:'pointer',fontFamily:'inherit',marginBottom:'10px'}}>{t.shareWa}</button>
    <Btn onClick={copy} full style={{marginBottom:'10px',padding:'14px'}} c={c}>{copied?t.copied:t.copyLink}</Btn>
    <HR c={c}/>
    <PersonalisedLink plan={plan} c={c} lang={lang}/>
    <HR c={c}/>
    <SavedGroups plan={plan} c={c} lang={lang}/>
    <div style={{height:'12px'}}/>
    <Btn onClick={onViewResults} v="secondary" full style={{padding:'14px'}} c={c}>{t.viewRes}</Btn>
  </div>);
}

// ─── PERSONALISED LINK ───────────────────────────────
function PersonalisedLink({plan,c,lang}){
  const isEs=lang==='es'; const mc=MC[plan.mode||'social']||c.A;
  const[name,setName]=useState('');const[copied,setCopied]=useState(false);
  const base=location.href.split('?')[0];
  const url=name.trim()?`${base}?code=${plan.id}&name=${encodeURIComponent(name.trim())}`:null;
  const copy=()=>{if(!url)return;navigator.clipboard?.writeText(url).catch(()=>{});setCopied(true);setTimeout(()=>setCopied(false),2500);};
  return(<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'12px',padding:'14px'}}>
    <div style={{fontSize:'11px',color:c.M,fontWeight:'600',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:'8px'}}>🔗 {isEs?'Link personalizado':'Personalised link'}</div>
    <div style={{fontSize:'12px',color:c.M2,marginBottom:'10px',lineHeight:1.5}}>{isEs?'Genera un link con el nombre del invitado ya relleno — cero fricción para él.':'Generate a link with the guest\'s name pre-filled — zero friction for them.'}</div>
    <div style={{display:'flex',gap:'8px'}}>
      <input value={name} onChange={e=>setName(e.target.value)} placeholder={isEs?'Nombre del invitado...':'Guest name...'} style={{flex:1,background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'9px 12px',color:c.T,fontSize:'13px',fontFamily:'inherit',outline:'none'}}/>
      <button onClick={copy} disabled={!name.trim()} style={{padding:'9px 14px',background:name.trim()?`${mc}20`:'transparent',border:`1px solid ${name.trim()?mc+'50':c.BD}`,borderRadius:'8px',color:name.trim()?mc:c.M,cursor:name.trim()?'pointer':'not-allowed',fontSize:'12px',fontWeight:'600',fontFamily:'inherit',whiteSpace:'nowrap',flexShrink:0}}>{copied?(isEs?'✓ Copiado':'✓ Copied'):(isEs?'Copiar':'Copy')}</button>
    </div>
    {url&&<div style={{marginTop:'8px',fontSize:'11px',color:c.M2,wordBreak:'break-all',padding:'6px 10px',background:c.CARD,borderRadius:'6px',lineHeight:1.4}}>{url}</div>}
  </div>);
}

// ─── PLAN PREVIEW ─────────────────────────────────────

      {plan.surpriseMode&&!plan.confirmedDate&&<div style={{background:`${mc}10`,border:`1px solid ${mc}30`,borderRadius:'12px',padding:'14px',marginBottom:'16px',textAlign:'center'}}><div style={{fontSize:'28px',marginBottom:'6px'}}>🎭</div><div style={{fontSize:'14px',color:mc,fontWeight:'600',marginBottom:'4px'}}>{isEs?'¡Es una sorpresa!':'It\'s a surprise!'}</div><div style={{fontSize:'12px',color:c.M2}}>{isEs?'El destino se revela cuando el organizador confirme la fecha.':'The destination is revealed when the organiser confirms the date.'}</div></div>}
      {plan.dates?.length>0&&<div style={{marginBottom:'16px'}}>
        <Lbl c={c}>📅 {t.previewDates}</Lbl>
        <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
          {plan.dates.slice(0,4).map(d=><span key={d} style={{fontSize:'12px',padding:'5px 12px',borderRadius:'20px',background:`${mc}15`,color:mc,border:`1px solid ${mc}30`,fontWeight:'600',textTransform:'capitalize'}}>{fmtShort(d,lang)}</span>)}

      {hasPrev&&prev&&<div style={{background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'12px',padding:'14px',marginBottom:'12px'}}>

// ─── EXPENSE SPLITTER ────────────────────────────────
function ExpenseSplitter({plan, rs, mc, c, lang}){
  const isEs=lang==='es';
  const[expenses,setExp]=useState(()=>ls.get('q_exp_'+plan.id,[]));
  const[open,setOpen]=useState(false);
  const[who,setWho]=useState('');const[what,setWhat]=useState('');const[amt,setAmt]=useState('');
  const attendees=rs.filter(r=>(plan.dates||[]).some(d=>r.avail?.[d]==='yes')).map(r=>r.name);
  const saveExp=exp=>{ls.set('q_exp_'+plan.id,exp);setExp(exp);};
  const add=()=>{if(!who||!what||!amt)return;const e=[...expenses,{id:Date.now(),who,what,amt:parseFloat(amt),at:new Date().toISOString()}];saveExp(e);setWho('');setWhat('');setAmt('');};
  const rem=id=>saveExp(expenses.filter(e=>e.id!==id));
  const total=expenses.reduce((s,e)=>s+e.amt,0);
  const perPerson=attendees.length>0?total/attendees.length:0;
  // Calculate who owes what
  const paid={};expenses.forEach(e=>{paid[e.who]=(paid[e.who]||0)+e.amt;});
  const balances={};attendees.forEach(p=>{balances[p]=(paid[p]||0)-perPerson;});
  const debtors=Object.entries(balances).filter(([,b])=>b<-0.01).sort((a,b)=>a[1]-b[1]);
  const creditors=Object.entries(balances).filter(([,b])=>b>0.01).sort((a,b)=>b[1]-a[1]);
  const transfers=[];
  const d2=[...debtors.map(([n,b])=>({n,b:Math.abs(b)}))];
  const c2=[...creditors.map(([n,b])=>({n,b}))];
  let i=0,j=0;
  while(i<d2.length&&j<c2.length){
    const amt2=Math.min(d2[i].b,c2[j].b);
    if(amt2>0.01)transfers.push({from:d2[i].n,to:c2[j].n,amt:amt2.toFixed(2)});
    d2[i].b-=amt2;c2[j].b-=amt2;
    if(d2[i].b<0.01)i++;
    if(c2[j].b<0.01)j++;
  }

// ─── CALENDAR EXPORT ─────────────────────────────────
const generateICS=(plan,lang)=>{
  const d=plan.confirmedDate;if(!d)return;
  const isEs=lang==='es';
  const dt=d.replace(/-/g,'');
  const time=plan.times?.[d]?.[0];
  let dtStart,dtEnd;
  if(time){
    const[hh,mm]=time.split(':');
    const pad=n=>n.toString().padStart(2,'0');
    dtStart=`${dt}T${pad(hh)}${pad(mm||'00')}00`;
    dtEnd=`${dt}T${pad(parseInt(hh)+2)}${pad(mm||'00')}00`;
  }else{dtStart=dt;dtEnd=dt;}
  const loc=(plan.stops||[]).filter(s=>s.address||s.name).map(s=>s.name||(s.address||'')).join(' → ');
  const desc=isEs
    ?`Plan creado con queda. — queda.app\nCódigo: ${plan.id}${plan.desc?'\n'+plan.desc:''}`
    :`Plan created with queda. — queda.app\nCode: ${plan.id}${plan.desc?'\n'+plan.desc:''}`;
  const ics=`BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//queda//queda.app//EN
BEGIN:VEVENT
UID:${plan.id}@queda.app
SUMMARY:${plan.name}
DTSTART${time?'':'VALUE=DATE'}:${dtStart}
DTEND${time?'':'VALUE=DATE'}:${dtEnd}
DESCRIPTION:${desc}
${loc?'LOCATION:'+loc+'\n':''}END:VEVENT
END:VCALENDAR`;
  const blob=new Blob([ics],{type:'text/calendar'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${plan.name.replace(/[^a-z0-9]/gi,'_')}.ics`;a.click();
  URL.revokeObjectURL(url);
};


// ─── OUTFIT CARD (weather-aware) ─────────────────────
function OutfitCard({dressCode, dressNote, city, date, mc, c, lang, t}){
  const isEs=lang==='es';
  const[weather,setW]=useState(null);
  useEffect(()=>{
    if(!city||!date)return;
    const du=daysUntil(date);
    if(du>16||du<-1)return;
    (async()=>{
      try{
        const geo=await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(city)+"&count=1").then(r=>r.json());
        if(!geo.results?.length)return;
        const{latitude:lat,longitude:lon}=geo.results[0];
        const wd=await fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&start_date="+date+"&end_date="+date).then(r=>r.json());
        if(wd.daily)setW({code:wd.daily.weathercode[0],max:Math.round(wd.daily.temperature_2m_max[0]),min:Math.round(wd.daily.temperature_2m_min[0])});
      }catch{}
    })();
  },[city,date]);
  const tip=getOutfitTip(dressCode,weather?.code,weather?.max,weather?.min,lang);
  const label=t.dressCodes.find(d=>d.k===dressCode)?.l||dressCode;
  return(<div style={{background:`${mc}12`,border:`1px solid ${mc}35`,borderRadius:"14px",padding:"16px",marginBottom:"16px"}}>
    <div style={{fontSize:"11px",color:mc,fontWeight:"700",letterSpacing:".08em",textTransform:"uppercase",marginBottom:"8px"}}>{isEs?"Dress code del plan":"Plan dress code"}</div>
    <div style={{fontSize:"18px",fontWeight:"600",color:c.T,marginBottom:"10px"}}>{label}</div>
    {tip&&<div style={{fontSize:"13px",color:c.T,lineHeight:1.6,marginBottom:tip.wtip?"10px":"0"}}>{tip.base}</div>}
    {tip?.wtip&&<div style={{fontSize:"13px",color:c.T,padding:"10px 12px",background:c.CARD2,borderRadius:"8px",borderLeft:`3px solid ${mc}`,lineHeight:1.5,marginTop:"6px"}}>{tip.wtip}</div>}
    {dressNote&&<div style={{fontSize:"12px",color:c.M2,marginTop:"10px",fontStyle:"italic"}}>"{dressNote}"</div>}
  </div>);
}

                  <span style={{fontSize:'13px',color:isConf||isBest?mc:c.T,fontWeight:isConf||isBest?'700':'400',textTransform:'capitalize'}}>{fmtShort(d,lang)}</span>
                  {isConf&&<span style={{fontSize:'10px',background:mc,color:'#0A0A0A',padding:'1px 7px',borderRadius:'20px',fontWeight:'800'}}>{t.CONFIRMED}</span>}
                  {!isConf&&isBest&&<span>⭐</span>}
                {plan.autoConfirm&&!plan.confirmedDate&&<span style={{fontSize:'10px',background:'#f59e0b20',color:'#f59e0b',padding:'1px 7px',borderRadius:'20px',border:'1px solid #f59e0b40'}}>⚡ auto</span>}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <span style={{fontSize:'12px',color:'#22c55e',fontWeight:'600'}}>✅ {ny}</span>
                  {nm>0&&<span style={{fontSize:'12px',color:'#f59e0b',fontWeight:'600'}}>🤔 {nm}</span>}
                  {isOrgRef.current&&!plan.confirmedDate&&d!==best&&(ny+nm)>0&&<button onClick={()=>confirmDate(d)} style={{background:'none',border:'none',color:c.M2,fontSize:'11px',cursor:'pointer',fontFamily:'inherit',textDecoration:'underline'}}>{t.confirmSmall}</button>}
                </div>
              </div>
              <div style={{height:'7px',background:c.BD,borderRadius:'4px',overflow:'hidden',position:'relative'}}>
                <div style={{height:'100%',width:`${pct}%`,background:isConf||isBest?mc:'#22c55e',borderRadius:'4px',transition:'width .5s'}}/>
                {nm>0&&<div style={{position:'absolute',left:`${pct}%`,top:0,height:'100%',width:`${(nm/total)*100}%`,background:'#f59e0b'}}/>}
              </div>
            </div>);})}
          {/* POLL RESULTS */}
          {plan.poll?.q&&rs.some(r=>r.pollVote)&&<Card c={c}>
            <Lbl c={c}>🗳️ {plan.poll.q}</Lbl>
            {plan.poll.opts.filter(o=>o.trim()).map(o=>{const cnt=rs.filter(r=>r.pollVote===o).length;const pct=rs.length>0?Math.round(cnt/rs.length*100):0;return(<div key={o} style={{marginBottom:'8px'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:'3px'}}><span style={{fontSize:'13px',color:c.T}}>{o}</span><span style={{fontSize:'12px',color:mc,fontWeight:'600'}}>{cnt} ({pct}%)</span></div>
              <div style={{height:'6px',background:c.BD,borderRadius:'3px',overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,background:mc,borderRadius:'3px',transition:'width .5s'}}/></div>
            </div>);})}
          </Card>}
          <Card c={c}>
            <Lbl c={c}>{isEs?'Detalle por persona':'Detail per person'}</Lbl>
            {rs.map((r,i)=><div key={i} style={{paddingBottom:'12px',marginBottom:'12px',borderBottom:i<rs.length-1?`1px solid ${c.BD}`:'none'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'5px'}}>
                <div><span style={{fontSize:'14px',color:c.T,fontWeight:'600'}}>{r.name}</span>{r.role&&r.role!==t.roles[0]&&<span style={{fontSize:'11px',color:c.M2,marginLeft:'6px'}}>· {r.role}</span>}{r.how&&<span style={{fontSize:'12px',color:c.M2,marginLeft:'6px'}}>· {howL(r.how)}</span>}</div>
                <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                  {r.changeLog?.length>0&&(()=>{const last=r.changeLog[0];const recent=last&&(Date.now()-new Date(last.at).getTime())<3600000;return<span title={isEs?`Editado ${r.changeLog.length} vez/veces`:`Edited ${r.changeLog.length} time(s)`} style={{fontSize:'11px',color:recent?'#f59e0b':c.M2,fontWeight:recent?'700':'400'}}>✏️{recent?' nuevo':''}</span>;})()}
                </div>
              </div>
              {r.comment&&<div style={{fontSize:'13px',color:c.M2,fontStyle:'italic',marginBottom:'6px',padding:'6px 10px',background:c.CARD2,borderRadius:'8px'}}>"{r.comment}"</div>}
              <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                {(plan.dates||[]).map(d=>{const v=r.avail?.[d];const vc={yes:'#22c55e',maybe:'#f59e0b'};const vi={yes:'✅',maybe:'🤔'};return(v==='yes'||v==='maybe')?<span key={d} style={{fontSize:'11px',padding:'3px 9px',borderRadius:'20px',background:`${vc[v]}20`,color:vc[v],border:`1px solid ${vc[v]}30`,textTransform:'capitalize'}}>{vi[v]} {fmtShort(d,lang)}</span>:null;})}
              </div>
            </div>)}
          </Card>
          {/* PLAN CARD for sharing */}
          {plan.confirmedDate&&<Card c={c} style={{marginBottom:'12px'}}>
            <Lbl c={c}>{isEs?'🃏 Tarjeta del plan':'🃏 Plan card'}</Lbl>
            <div id="plan-share-card" style={{background:`linear-gradient(135deg,${mc}20,${mc}05)`,border:`2px solid ${mc}40`,borderRadius:'12px',padding:'16px',textAlign:'center',fontFamily:"'Syne',serif"}}>
              <div style={{fontSize:'28px',marginBottom:'6px'}}>{plan.mode==='intimate'?'💘':plan.mode==='professional'?'💼':'🎉'}</div>
              <div style={{fontSize:'18px',fontWeight:'800',color:c.T,marginBottom:'4px'}}>{plan.name}</div>
              <div style={{fontSize:'13px',color:mc,fontWeight:'600',marginBottom:'8px',textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate,lang)}</div>
              {plan.times?.[plan.confirmedDate]?.length>0&&<div style={{fontSize:'12px',color:c.M2,marginBottom:'6px'}}>🕐 {plan.times[plan.confirmedDate].join(' · ')}</div>}
              {(plan.stops||[]).filter(s=>s.name).slice(0,3).map((s,i)=><div key={i} style={{fontSize:'12px',color:c.M2}}>{i===0?'📍':'↓'} {s.name}</div>)}
              <div style={{marginTop:'10px',fontSize:'11px',color:c.M2}}>queda. · {plan.id}</div>
            </div>
            <div style={{fontSize:'12px',color:c.M2,marginTop:'8px',textAlign:'center'}}>{isEs?'Haz screenshot y comparte 📱':'Screenshot and share 📱'}</div>
          </Card>}
          {rs.some(r=>r.altDate)&&<Card c={c} style={{border:`1px solid #f59e0b30`,background:'#f59e0b08'}}>
            <Lbl c={c}>📅 {isEs?'Fechas sugeridas por invitados':'Dates suggested by guests'}</Lbl>
            {rs.filter(r=>r.altDate).map((r,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<rs.filter(x=>x.altDate).length-1?`1px solid ${c.BD}`:'none'}}>
              <div><div style={{fontSize:'13px',color:c.T,fontWeight:'500'}}>{fmtDate(r.altDate,'es')}</div>{r.altNote&&<div style={{fontSize:'12px',color:c.M2}}>{r.altNote}</div>}</div>
              <span style={{fontSize:'12px',color:c.M2}}>— {r.name}</span>
            </div>)}
          </Card>}
          {rs.some(r=>r.comment)&&<Card c={c}>
            <Lbl c={c}>💬 {t.comments}</Lbl>
            {rs.filter(r=>r.comment).map((r,i)=><div key={i} style={{marginBottom:'10px',paddingBottom:'10px',borderBottom:i<rs.filter(x=>x.comment).length-1?`1px solid ${c.BD}`:'none'}}>
              <div style={{fontSize:'12px',color:mc,fontWeight:'600',marginBottom:'3px'}}>{r.name}</div>
              <div style={{fontSize:'13px',color:c.T}}>"{r.comment}"</div>
            </div>)}
          </Card>
        </>)}

      {/* PLAN tab = Route + budget + inline map */}
      {!ldg&&tab==='plan'&&<>
        {(plan.stops||[]).length===0&&<Card c={c} style={{textAlign:'center',padding:'28px'}}><div style={{fontSize:'32px',marginBottom:'8px'}}>📍</div><div style={{color:c.M2,fontSize:'14px'}}>{isEs?'Este plan no tiene paradas definidas.':'This plan has no stops defined.'}</div></Card>}
        {(plan.stops||[]).map((s,i)=><div key={s.id||i} style={{display:'flex',gap:'12px',marginBottom:'10px'}}>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
            <div style={{width:'28px',height:'28px',borderRadius:'50%',background:`${mc}20`,border:`1.5px solid ${mc}60`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:'800',color:mc,flexShrink:0}}>{i+1}</div>
            {i<plan.stops.length-1&&<div style={{width:'2px',flex:1,background:c.BD,margin:'4px 0'}}/>}
          </div>
          <Card c={c} style={{flex:1,marginBottom:0}}>
            <div style={{fontSize:'11px',color:c.M2,marginBottom:'4px'}}>{s.cat}</div>
            <div style={{fontSize:'15px',color:c.T,fontWeight:'600',marginBottom:'4px'}}>{s.name||'—'}</div>
            {s.address&&<div style={{fontSize:'12px',color:c.M2,marginBottom:'6px'}}>📍 {s.address}</div>}
            <VenueInfo name={s.name} lat={s.lat} lng={s.lng} c={c} lang={lang}/>
            <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginTop:'8px'}}>
              {parseFloat(s.cost)>0&&<Badge color={mc}>{s.cost}€/pers.</Badge>}
              {(s.address||s.name)&&<a href={`https://maps.google.com/?q=${encodeURIComponent((s.name||'')+(s.address?' '+s.address:''))}`} target="_blank" rel="noreferrer" style={{fontSize:'12px',color:c.M2,textDecoration:'none',padding:'4px 10px',border:`1px solid ${c.BD}`,borderRadius:'8px'}}>Google Maps 🗺️</a>}
              {s.link&&<a href={s.link.startsWith('http')?s.link:'https://'+s.link} target="_blank" rel="noreferrer" style={{fontSize:'12px',color:mc,textDecoration:'none',padding:'4px 10px',border:`1px solid ${mc}40`,borderRadius:'8px'}}>{isEs?'Reserva':'Book'} ↗</a>}
            </div>
          </Card>
        </div>)}
        {budget>0&&<><HR c={c}/>
          <div style={{display:'flex',justifyContent:'space-between',padding:'14px 16px',background:`${mc}0D`,border:`1px solid ${mc}30`,borderRadius:'12px',marginBottom:'8px'}}><span style={{color:c.M2}}>{t.perPerson}</span><span style={{color:mc,fontSize:'22px',fontWeight:'800'}}>{budget.toFixed(0)}€</span></div>
          {giftPer>0&&<div style={{display:'flex',justifyContent:'space-between',padding:'12px 16px',background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'12px',marginBottom:'8px'}}><span style={{color:c.M2,fontSize:'14px'}}>+ {isEs?'regalo':'gift'}</span><span style={{color:c.T,fontWeight:'600'}}>{giftPer.toFixed(0)}€</span></div>}
          <div style={{display:'flex',justifyContent:'space-between',padding:'14px 16px',background:c.CARD2,border:`1px solid ${c.BD}`,borderRadius:'12px'}}><span style={{color:c.T,fontWeight:'700'}}>{t.totalLbl}</span><span style={{color:mc,fontSize:'18px',fontWeight:'800'}}>{(budget+giftPer).toFixed(0)}€</span></div>
        </>}
        {plan.stops?.some(s=>s.lat&&s.lng)&&<><HR c={c}/><RouteMap stops={plan.stops} c={c}/></>}
      </>}

      {/* DÍA tab = Weather + Outfit */}
      {!ldg&&tab==='dia'&&<div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
        <div>
          <Lbl c={c}>🌤️ {isEs?'Previsión del tiempo':'Weather forecast'}</Lbl>
          {!city&&<Card c={c} style={{textAlign:'center',padding:'20px'}}><div style={{color:c.M2,fontSize:'14px'}}>{t.noCity}</div></Card>}
          {city&&(plan.confirmedDate
            ?<WeatherWidget city={city} date={plan.confirmedDate} c={c} lang={lang} showAdvice={true}/>
            :(plan.dates||[]).map(d=><div key={d} style={{marginBottom:'12px'}}><div style={{fontSize:'12px',color:c.M2,marginBottom:'5px',textTransform:'capitalize'}}>{fmtShort(d,lang)}</div><WeatherWidget city={city} date={d} c={c} lang={lang} showAdvice={true}/></div>)
          )}
        </div>
        <HR c={c}/>
        <div>
          <Lbl c={c}>👗 Outfit</Lbl>
          <p style={{fontSize:'13px',color:c.M2,marginBottom:'12px',lineHeight:1.6}}>{{social:isEs?'¿Qué ponerse para la noche?':'What to wear?',intimate:isEs?'La primera impresión importa.':'First impressions matter.',professional:isEs?'El look adecuado para el entorno.':'The right look for the setting.'}[plan.mode||'social']}</p>
          {plan.dressCode
            ?<OutfitCard dressCode={plan.dressCode} dressNote={plan.dressNote} city={city} date={plan.confirmedDate||plan.dates?.[0]} mc={mc} c={c} lang={lang} t={t}/>
            :<div style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'12px',padding:'16px',textAlign:'center'}}><div style={{fontSize:'24px',marginBottom:'6px'}}>👗</div><div style={{fontSize:'13px',color:c.M2}}>{t.dcNoneNote}</div></div>
          }
        </div>
      </div>}

      {/* IR tab = Transport */}
      {!ldg&&tab==='ir'&&<>
        {fs?<>
          <Card c={c} style={{marginBottom:'12px'}}><Lbl c={c}>{t.dest}</Lbl><div style={{fontSize:'15px',color:c.T,fontWeight:'600'}}>{fs.name}</div>{fs.address&&<div style={{fontSize:'13px',color:c.M2}}>{fs.address}</div>}</Card>
          <TransportPanel to={fs} c={c} lang={lang}/>
          {rs.filter(r=>r.how).length>0&&<><HR c={c}/><Lbl c={c}>{t.howEach}</Lbl>{rs.filter(r=>r.how).map((r,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${c.BD}`,fontSize:'14px'}}><span style={{color:c.T}}>{r.name}</span><span style={{color:c.M2}}>{howL(r.how)}</span></div>)}</>}
        </>:<Card c={c} style={{textAlign:'center',padding:'28px'}}><div style={{fontSize:'32px',marginBottom:'8px'}}>📍</div><div style={{color:c.M2,fontSize:'14px'}}>{t.noStops}</div></Card>}
      </>}

      {/* EXTRAS tab = Gift + Expenses + Pay + Plan card */}
      {!ldg&&tab==='extras'&&<div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
        {/* Expense splitter */}
        <ExpenseSplitter plan={plan} rs={rs} mc={mc} c={c} lang={lang}/>
        {/* Gift */}
        {plan.gift&&<Card c={c} accent>
          <Lbl c={c}>{t.giftSec}</Lbl>
          <div style={{fontSize:'18px',color:c.T,fontWeight:'600',marginBottom:'8px'}}>{plan.gift.name||'—'}</div>
          {plan.gift.price&&<><div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}><span style={{color:c.M2,fontSize:'14px'}}>{t.totalPrice}</span><span style={{color:mc,fontWeight:'700',fontSize:'18px'}}>{plan.gift.price}€</span></div>
          {total>0&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:'12px'}}><span style={{color:c.M2,fontSize:'14px'}}>{t.perOf} ({total})</span><span style={{color:mc,fontWeight:'700'}}>{(parseFloat(plan.gift.price)/total).toFixed(2)}€</span></div>}</>}
          {plan.gift.link&&<a href={plan.gift.link.startsWith('http')?plan.gift.link:'https://'+plan.gift.link} target="_blank" rel="noreferrer" style={{display:'block',textAlign:'center',padding:'10px',background:`${mc}20`,border:`1px solid ${mc}50`,borderRadius:'10px',color:mc,textDecoration:'none',fontSize:'14px',fontWeight:'600',marginBottom:'10px'}}>{t.seeGift}</a>}
          <Btn onClick={()=>{setPayAmt((budget+giftPer).toFixed(2));setPay(true);}} full style={{padding:'13px'}} c={c}>💳 {t.payTitle}</Btn>
        </Card>}
        {/* Bring list */}
        {plan.bring?.filter(b=>b.text||typeof b==='string').length>0&&<Card c={c}>
          <Lbl c={c}>{t.bring}</Lbl>
          {plan.bring.filter(b=>b.text||typeof b==='string').map((b,i)=>{const txt=typeof b==='string'?b:b.text;return<div key={i} style={{display:'flex',alignItems:'center',gap:'10px',padding:'8px 0',borderBottom:i<plan.bring.filter(x=>x.text||typeof x==='string').length-1?`1px solid ${c.BD}`:'none',fontSize:'14px',color:c.T}}><div style={{width:'6px',height:'6px',borderRadius:'50%',background:mc,flexShrink:0}}/>{txt}</div>;})}
        </Card>}
        {/* Pay */}
        {budget>0&&<Card c={c} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div><div style={{fontSize:'13px',color:c.M2}}>{isEs?'Total por persona':'Total per person'}</div><div style={{fontSize:'22px',fontWeight:'800',color:mc}}>{(budget+giftPer).toFixed(0)}€</div></div>
          <Btn onClick={()=>{setPayAmt((budget+giftPer).toFixed(2));setPay(true);}} c={c} style={{background:mc,color:'#0A0A0A'}}>{isEs?'Pagar →':'Pay →'}</Btn>
        </Card>}
        {/* Plan share card */}
        {plan.confirmedDate&&<Card c={c}>
          <Lbl c={c}>{isEs?'🃏 Tarjeta del plan':'🃏 Plan card'}</Lbl>
          <div style={{background:`linear-gradient(135deg,${mc}20,${mc}05)`,border:`2px solid ${mc}40`,borderRadius:'12px',padding:'16px',textAlign:'center',fontFamily:"'Syne',serif"}}>
            <div style={{fontSize:'28px',marginBottom:'6px'}}>{plan.mode==='intimate'?'💘':plan.mode==='professional'?'💼':'🎉'}</div>
            <div style={{fontSize:'18px',fontWeight:'800',color:c.T,marginBottom:'4px'}}>{plan.name}</div>
            <div style={{fontSize:'13px',color:mc,fontWeight:'600',marginBottom:'6px',textTransform:'capitalize'}}>{fmtDate(plan.confirmedDate,lang)}</div>
            {plan.times?.[plan.confirmedDate]?.length>0&&<div style={{fontSize:'12px',color:c.M2,marginBottom:'4px'}}>🕐 {plan.times[plan.confirmedDate].join(' · ')}</div>}
            {(plan.stops||[]).filter(s=>s.name).slice(0,3).map((s,i)=><div key={i} style={{fontSize:'12px',color:c.M2}}>{i===0?'📍':'↓'} {s.name}</div>)}
            <div style={{marginTop:'8px',fontSize:'11px',color:c.M}}>queda. · {plan.id}</div>
          </div>
          <div style={{fontSize:'12px',color:c.M2,textAlign:'center',marginTop:'8px'}}>{isEs?'Haz screenshot y comparte 📱':'Screenshot and share 📱'}</div>
        </Card>}
        {/* Suggested dates from guests */}
        {isOrgRef.current&&rs.some(r=>r.altDate)&&<Card c={c} style={{border:'1px solid #f59e0b30',background:'#f59e0b06'}}>
          <Lbl c={c}>📅 {isEs?'Fechas sugeridas por invitados':'Dates suggested by guests'}</Lbl>
          {rs.filter(r=>r.altDate).map((r,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:i<rs.filter(x=>x.altDate).length-1?`1px solid ${c.BD}`:'none'}}>
            <div><div style={{fontSize:'13px',color:c.T,fontWeight:'500',textTransform:'capitalize'}}>{fmtDate(r.altDate,lang)}</div>{r.altNote&&<div style={{fontSize:'12px',color:c.M2}}>{r.altNote}</div>}</div>
            <span style={{fontSize:'12px',color:c.M2}}>— {r.name}</span>
          </div>)}
        </Card>}
      </div>}

    </div>
  </>);
}

// ─── APP ─────────────────────────────────────────────
function App(){
  const[theme,setTheme]=useState(()=>ls.get('q_theme',null)||getSysTheme());
  const[lang,setLang]=useState(()=>ls.get('q_lang','es'));
  const[screen,setScreen]=useState('home');
  const[plan,setPlan]=useState(null);
  const[isOrg,setIsOrg]=useState(false);
  const[pendingMode,setPendingMode]=useState(null);
  const[showOnb,setShowOnb]=useState(()=>!ls.get('q_onboarded',false));
  const[toast,setToast]=useState(null);
  const c=useMemo(()=>C(theme),[theme]);
  useEffect(()=>{applyTheme(theme);},[theme]);
  useEffect(()=>{setToastFn(msg=>{setToast(msg);setTimeout(()=>setToast(null),4000);});},[]);
  const tgTheme=()=>setTheme(t=>{const n=t==='dark'?'light':'dark';applyTheme(n);ls.set('q_theme',n);return n;});
  const tgLang=()=>setLang(l=>{const n=l==='es'?'en':'es';ls.set('q_lang',n);return n;});
  const doneOnb=()=>{ls.set('q_onboarded',true);setShowOnb(false);};
  useEffect(()=>{
    const code=new URLSearchParams(location.search).get('code');
    if(code){loadPlan(code).then(p=>{if(p){setPlan(p);setIsOrg(false);setScreen('preview');ls.set('q_onboarded',true);setShowOnb(false);}});return;}
    const saved=ls.get('q_state',null);
    if(saved?.planId){loadPlan(saved.planId).then(p=>{if(p){setPlan(p);setIsOrg(saved.isOrg||false);setScreen(saved.screen||'home');}});}
  },[]);
  const nav=(s,p=null,org=false)=>{setScreen(s);if(p)setPlan(p);setIsOrg(org);if(s!=='home')ls.set('q_state',{screen:s,planId:p?.id||plan?.id,isOrg:org});else ls.set('q_state',{});};
  const handleJoin=async code=>{const p=await loadPlan(code);if(p){setPlan(p);setIsOrg(false);setScreen('preview');ls.set('q_state',{screen:'preview',planId:p.id,isOrg:false});return true;}return false;};
  const handleFromProfile=async id=>{const p=await loadPlan(id);if(p){const mine=getMyPlans().find(x=>x.id===id);nav('results',p,mine?.role==='organizer');}};
  const handleDiscoverJoin=async id=>{const p=await loadPlan(id);if(p){setPlan(p);setIsOrg(false);setScreen('preview');}};
  const mc=plan?.mode?MC[plan.mode]||c.A:c.A;
  const noNav=['home','create','select-mode','profile','discover','preview'];
  if(showOnb)return<Onboarding onDone={doneOnb} c={c} lang={lang}/>;
  return(<div style={{minHeight:'100vh',background:c.BG,color:c.T,fontFamily:"'DM Sans',system-ui,sans-serif"}}>
    {toast&&<div style={{position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%)',background:'#ef4444',color:'#fff',padding:'12px 20px',borderRadius:'30px',fontWeight:'600',fontSize:'13px',zIndex:300,boxShadow:'0 4px 20px rgba(0,0,0,.4)',whiteSpace:'nowrap',animation:'slideDown .3s ease'}}>⚠️ {toast}</div>}
    <div style={{borderBottom:`1px solid ${c.BD}`,padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:c.BG+'F0',backdropFilter:'blur(10px)',zIndex:10}}>
      <div onClick={()=>nav('home')} style={{fontFamily:"'Syne',serif",fontWeight:'800',fontSize:'22px',cursor:'pointer',color:c.T,letterSpacing:'-.02em'}}>queda<span style={{color:c.A}}>.</span></div>
      <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
        {plan&&!noNav.includes(screen)&&<span style={{color:mc,fontWeight:'800',fontSize:'12px',letterSpacing:'.1em'}}>{plan.id}</span>}
        <button onClick={tgLang} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'5px 8px',cursor:'pointer',fontSize:'16px'}}>{lang==='es'?'🇬🇧':'🇪🇸'}</button>
        <button onClick={tgTheme} style={{background:c.CARD,border:`1px solid ${c.BD}`,borderRadius:'8px',padding:'6px 10px',cursor:'pointer',fontSize:'15px'}}>{theme==='dark'?'☀️':'🌙'}</button>
      </div>
    </div>
    {screen==='home'&&<Home onCreate={()=>nav('select-mode')} onJoin={handleJoin} onProfile={()=>nav('profile')} onDiscover={()=>nav('discover')} c={c} lang={lang}/>}
    {screen==='select-mode'&&<ModeSelect onSelect={m=>{setPendingMode(m);nav('create');}} onBack={()=>nav('home')} c={c} lang={lang}/>}
    {screen==='profile'&&<Profile onBack={()=>nav('home')} onOpen={handleFromProfile} c={c} lang={lang}/>}
    {screen==='discover'&&<Discover onBack={()=>nav('home')} onJoin={handleDiscoverJoin} c={c} lang={lang}/>}
    {screen==='create'&&<Create onBack={()=>nav('select-mode')} onCreated={p=>nav('share',p,true)} c={c} lang={lang} mode={pendingMode||'social'}/>}
    {screen==='share'&&plan&&<Share plan={plan} onViewResults={()=>nav('results',plan,isOrg)} onBack={()=>nav('home')} c={c} lang={lang}/>}
    {screen==='preview'&&plan&&<PlanPreview plan={plan} onRespond={()=>nav('respond',plan,false)} onBack={()=>nav('home')} c={c} lang={lang}/>}
    {screen==='respond'&&plan&&<Respond plan={plan} onBack={()=>nav('preview',plan,false)} onDone={()=>nav('results',plan,false)} onCreateOwn={()=>nav('select-mode')} c={c} lang={lang}/>}
    {screen==='results'&&plan&&<Results plan={plan} onBack={()=>nav(isOrg?'share':'home',plan,isOrg)} isOrg={isOrg} c={c} lang={lang}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
